{id:2019,category:'운영체제론',number:19,question:'다음 <보기>의 항목을 출력하고자 할 때 사용되는 적절한 리눅스 명령은?',boxLabel:'<보기>',boxText:'∘ 프로세스를 소유한 사용자 ID\n∘ 프로세스 번호\n∘ 부모 프로세스 번호\n∘ 프로세스의 우선순위 값\n∘ 프로세스 상태',choices:['chmod','ls','ps','mount'],answer:3,explanation:{summary:'ps(Process Status): 현재 실행 중인 프로세스 정보를 출력하는 Linux 명령.',choiceAnalysis:[{n:1,text:'chmod: 파일 권한 변경',correct:false},{n:2,text:'ls: 디렉터리 목록',correct:false},{n:3,text:'ps: 프로세스 상태 출력 ✓',correct:true},{n:4,text:'mount: 파일 시스템 마운트',correct:false}],concept:{title:'📌 Linux 프로세스 관련 명령',items:['ps: 프로세스 목록 출력','ps -ef: 전체 프로세스 상세','ps aux: BSD 스타일 출력','top: 실시간 프로세스 모니터링','kill: 프로세스 종료']}}},
{id:2020,category:'운영체제론',number:20,question:'프로세스의 생성과 소멸에 대한 설명으로 옳지 않은 것은?',choices:['fork() 시스템 호출은 현재 프로세스를 복제하여 자식 프로세스를 생성한다.','exec() 시스템 호출은 현재 프로세스 이미지를 새 프로그램으로 교체한다.','자식 프로세스가 먼저 종료한 경우 부모 프로세스가 종료 상태를 수집할 때까지 좀비 프로세스가 된다.','wait() 시스템 호출은 부모 프로세스가 자식 프로세스보다 먼저 종료될 때 사용된다.'],answer:4,explanation:{summary:'wait()는 부모가 자식 종료를 기다리는 함수. 부모가 먼저 종료하면 자식이 고아(Orphan) 프로세스가 됨.',choiceAnalysis:[{n:1,text:'맞음. fork(): 프로세스 복제',correct:false},{n:2,text:'맞음. exec(): 프로세스 이미지 교체',correct:false},{n:3,text:'맞음. 좀비 프로세스: 종료 후 부모가 wait() 미수행',correct:false},{n:4,text:'틀림. wait()는 부모가 자식 종료를 기다리는 함수 ✓',correct:true}],concept:{title:'📌 fork() / exec() / wait()',items:['fork(): 현재 프로세스 복제 생성','exec(): 현재 프로세스를 새 프로그램으로 교체','wait(): 자식 프로세스 종료 대기','좀비: 자식이 종료했지만 부모가 wait() 미호출']}}},
{id:2021,category:'운영체제론',number:21,question:'프로세스가 종료되고 부모 프로세스가 wait()를 호출하기 전의 프로세스 상태를 고아(orphan)라 하는데, 고아 프로세스를 처리하기 위해 사용되는 시그널은?',choices:['SIGCHLD','SIGKILL','SIGTERM','SIGABRT'],answer:1,explanation:{summary:'SIGCHLD: 자식 프로세스 종료 시 부모에게 전달되는 시그널. 부모가 wait() 호출에 사용.',choiceAnalysis:[{n:1,text:'SIGCHLD: 자식 종료 시 부모에 신호 ✓',correct:true},{n:2,text:'SIGKILL: 강제 종료(무시 불가)',correct:false},{n:3,text:'SIGTERM: 정상 종료 요청',correct:false},{n:4,text:'SIGABRT: 비정상 종료(abort())',correct:false}],concept:{title:'📌 주요 Linux 시그널',items:['SIGINT(2): Ctrl+C 인터럽트','SIGKILL(9): 강제 종료(무시 불가)','SIGTERM(15): 정상 종료 요청','SIGCHLD: 자식 프로세스 상태 변화','SIGHUP: 연결 끊김']}}},
{id:2022,category:'운영체제론',number:22,question:'프로세스를 복제하는 fork() 명령이 성공했을 때 자식 프로세스의 식별자(PID)로 옳은 것은?',choices:['1','0','-1','null'],answer:2,explanation:{summary:'fork() 반환값: 자식 프로세스에서는 0, 부모 프로세스에서는 자식의 PID, 실패 시 -1.',choiceAnalysis:[{n:1,text:'1: init/systemd 프로세스의 PID',correct:false},{n:2,text:'자식에서 fork() 반환값=0 ✓',correct:true},{n:3,text:'-1: fork() 실패',correct:false},{n:4,text:'null: C에서 포인터에 사용',correct:false}],concept:{title:'📌 fork() 반환값',items:['부모 프로세스: 자식의 PID(양수) 반환','자식 프로세스: 0 반환','실패: -1 반환','이로써 부모/자식 구분 가능']}}},
{id:2023,category:'운영체제론',number:23,question:'스레드(thread)에 대한 설명으로 옳지 않은 것은?',choices:['프로세스 내에는 한 개 또는 여러 개의 스레드가 존재할 수 있다.','스레드는 프로세스 내에서의 다중처리를 위해 제안된 개념이다.','스레드를 가지지 않는 프로세스도 존재할 수 있다.','각 스레드는 프로그램 카운터(PC)와 스택(stack), 스레드 관리정보 등과 같은 수행에 필요한 최소한의 정보만으로 구성된다.'],answer:3,explanation:{summary:'모든 프로세스는 최소 1개의 스레드(메인 스레드)를 가짐.',choiceAnalysis:[{n:1,text:'맞음. 1개 이상의 스레드',correct:false},{n:2,text:'맞음. 스레드: 프로세스 내 다중처리',correct:false},{n:3,text:'틀림. 모든 프로세스는 최소 1개 스레드 보유 ✓',correct:true},{n:4,text:'맞음. 스레드: PC, 스택, 스레드 정보만 보유',correct:false}],concept:{title:'📌 스레드 구성',items:['공유(프로세스 내): 코드, 데이터, 힙, 파일 디스크립터','독자 보유: PC, 레지스터, 스택','최소 1개 스레드(메인 스레드) 필수','멀티스레드: 프로세스 내 여러 스레드 동시 실행']}}},
{id:2024,category:'운영체제론',number:24,question:'스레드(thread)에 대한 설명으로 옳지 않은 것은?',choices:['스레드 하나는 여러 프로세스에서 사용된다.','스레드 간의 통신은 공유 메모리를 이용한다.','운영체제의 성능과 응용 프로그램 처리율이 향상된다.','실행 환경을 공유하므로 메모리 낭비를 줄일 수 있다.'],answer:1,explanation:{summary:'스레드는 하나의 프로세스 내에 속함. 여러 프로세스에서 공유되지 않음.',choiceAnalysis:[{n:1,text:'틀림. 스레드는 하나의 프로세스 내에 존재 ✓',correct:true},{n:2,text:'맞음. 같은 프로세스 내 스레드는 메모리 공유',correct:false},{n:3,text:'맞음. 멀티스레드로 성능 향상',correct:false},{n:4,text:'맞음. 프로세스 자원 공유로 오버헤드 감소',correct:false}],concept:{title:'📌 스레드 vs 프로세스',items:['스레드: 같은 프로세스 내 자원 공유','프로세스: 각자 독립된 주소 공간','스레드 생성이 프로세스 생성보다 빠름','스레드 통신: 공유 메모리(빠름)','프로세스 통신: IPC(느림)']}}},
{id:2025,category:'운영체제론',number:25,question:'멀티스레드(multi-thread)에 관한 설명으로 옳은 것은?',choices:['멀티스레드는 단일 스레드보다 항상 빠른 속도로 처리된다.','각 스레드는 독립적인 주소 공간을 가진다.','같은 프로세스에 속한 스레드들은 코드, 데이터, 파일을 공유한다.','멀티스레드를 사용하면 문맥교환 오버헤드가 증가한다.'],answer:3,explanation:{summary:'같은 프로세스 내 스레드들은 코드, 데이터, 힙, 파일 등을 공유.',choiceAnalysis:[{n:1,text:'틀림. 병렬화 가능 작업에서만 빠름',correct:false},{n:2,text:'틀림. 스레드는 프로세스 주소 공간 공유',correct:false},{n:3,text:'맞음. 코드/데이터/파일 공유 ✓',correct:true},{n:4,text:'틀림. 스레드 전환이 프로세스 전환보다 오버헤드 적음',correct:false}],concept:{title:'📌 멀티스레드 자원 공유',items:['공유: 코드 섹션, 데이터 섹션, 파일, 힙','독자: PC, 레지스터, 스택','장점: 빠른 생성/전환, 메모리 절약']}}},
{id:2026,category:'운영체제론',number:26,question:'다음 중 프로세스 간 통신(IPC, Inter-Process Communication) 방법에 해당하지 않는 것은?',choices:['공유 메모리(shared memory)','메시지 큐(message queue)','세마포어(semaphore)','힙 영역(heap area)'],answer:3,explanation:{summary:'힙 영역은 프로세스 내 동적 메모리 공간. IPC 메커니즘이 아님.',choiceAnalysis:[{n:1,text:'공유 메모리: IPC 메커니즘',correct:false},{n:2,text:'메시지 큐: IPC 메커니즘',correct:false},{n:3,text:'세마포어: 동기화 도구(IPC로도 사용)',correct:false},{n:4,text:'힙 영역: 프로세스 내 메모리. IPC 아님 ✓',correct:true}],concept:{title:'📌 IPC 메커니즘',items:['공유 메모리(Shared Memory): 빠름, 동기화 필요','메시지 큐(Message Queue): 비동기 메시지 전달','파이프(Pipe): 단방향 스트림','소켓(Socket): 네트워크 기반','세마포어: 동기화+IPC']}}},
{id:2027,category:'운영체제론',number:27,question:'다음 <보기>의 ㉠, ㉡에 해당하는 명칭으로 옳은 것은?',boxLabel:'<보기>',boxText:'프로세스 코드에서 시스템의 공유 자원에 접근하는 부분을 (㉠)(이)라고 한다. 다수의 프로세스가 실행될 때 2개 이상의 프로세스가 동시에 (㉠)에 들어가면 공유 자원 사용에 문제가 발생된다.\n(㉠)에서 자원의 공유 문제를 해결하기 위해서는 (㉡), 진행(progress), 제한된 대기(bounded waiting)의 3가지 조건을 모두 만족해야 한다. 이들 중 (㉡) 조건은 동시에 2개 이상의 프로세스가 (㉠) 안에 있을 수 없다는 것을 의미한다.',choices:['㉠:임계영역 / ㉡:상호배제','㉠:임계영역 / ㉡:교착상태','㉠:교착상태 / ㉡:임계영역','㉠:교착상태 / ㉡:상호배제'],answer:1,explanation:{summary:'임계영역(Critical Section): 공유 자원 접근 코드. 상호배제(Mutual Exclusion): 동시 진입 금지.',choiceAnalysis:[{n:1,text:'㉠=임계영역, ㉡=상호배제 ✓',correct:true},{n:2,text:'교착상태는 다른 개념',correct:false},{n:3,text:'순서 오류',correct:false},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 임계영역 해결 조건 3가지',items:['상호배제(Mutual Exclusion): 하나의 프로세스만 진입','진행(Progress): 블록된 프로세스가 진입 결정에 개입 불가','제한된 대기(Bounded Waiting): 무한 대기 금지']}}},
{id:2028,category:'운영체제론',number:28,question:'상호배제(mutual exclusion)는 프로세스가 수정할 수 있는 공유 데이터에 접근할 때만 적용하고, 단순 읽기 등을 할 때는 동시에 수행되도록 허용해야 한다. 이 상호배제를 위해 만족되어야 하는 조건에 해당하지 않는 것은?',choices:['두 프로세스는 동시에 공유 자원에 진입할 수 없다.','프로세스의 속도나 프로세서 개수에 영향을 받는다.','공유 자원을 사용하는 프로세스만 다른 프로세스를 차단할 수 있다.','프로세스가 공유 자원을 사용하기 위해 너무 오래 대기 상태에 있어서는 안된다.'],answer:2,explanation:{summary:'상호배제 조건: 속도나 프로세서 수에 독립적이어야 함. 의존하면 시스템 환경에 따라 결과 달라짐.',choiceAnalysis:[{n:1,text:'맞음. 동시 진입 금지(상호배제)',correct:false},{n:2,text:'틀림. 속도/CPU 수에 독립적이어야 함 ✓',correct:true},{n:3,text:'맞음. 임계영역 밖 프로세스는 차단 불가',correct:false},{n:4,text:'맞음. 제한된 대기(기아 방지)',correct:false}],concept:{title:'📌 임계영역 해결 원칙',items:['상호배제: 한 번에 하나만','진행: 적시에 결정','제한된 대기: 무한 대기 금지','속도 독립: CPU 수나 속도에 무관']}}},
{id:2029,category:'운영체제론',number:29,question:'임계영역(critical section)에 대한 설명으로 옳지 않은 것은?',choices:['임의의 프로세스가 임계영역에서 수행 중일 때 다른 어떤 프로세스도 임계영역에서 수행되지 않아야 한다.','임계영역 바깥에 있는 프로세스가 다른 프로세스의 임계영역 진입에 영향을 끼치지 않아야 한다.','한 프로세스가 임계영역에 대한 진입 요청을 한 후부터 그 요청이 받아들여질 때까지의 기간 내에는 다른 프로세스들이 임계영역을 수행할 수 있는 횟수에 제한이 있다.','프로세스는 임계영역 내에서 보류(block)될 수 있고 무한루프에 빠질 수 있다.'],answer:4,explanation:{summary:'임계영역에서는 블록되면 안 됨(무한 대기 금지). 무한루프도 허용하면 안 됨.',choiceAnalysis:[{n:1,text:'맞음. 상호배제 조건',correct:false},{n:2,text:'맞음. 진행(Progress) 조건',correct:false},{n:3,text:'맞음. 제한된 대기(Bounded Waiting) 조건',correct:false},{n:4,text:'틀림. 임계영역에서 블록/무한루프는 금지 ✓',correct:true}],concept:{title:'📌 임계영역 금지 사항',items:['임계영역 내에서 무한 루프 금지','임계영역 내에서 블록(대기) 금지','다른 프로세스가 무한히 기다리게 하면 안 됨']}}},
{id:2030,category:'운영체제론',number:30,question:'세마포어(semaphore)에 관한 설명으로 옳지 않은 것은?',choices:['다익스트라(Dijkstra)에 의해 제안된 것으로 상호배제의 해결을 위한 동기화 도구이다.','플래그로 사용되는 음이 아닌 정수값을 갖는 변수이다.','P연산은 세마포어 값의 증가를, V연산은 세마포어 값의 감소를 나타낸다.','한 프로세스가 임계 구역에 있으면, 이 임계구역에 진입하려는 프로세스는 진입 코드에서 반복하게 되는 바쁜 대기(busy waiting)가 발생한다.'],answer:3,explanation:{summary:'P연산(wait): 세마포어 감소(자원 획득). V연산(signal): 세마포어 증가(자원 반납). 반대가 틀림.',choiceAnalysis:[{n:1,text:'맞음. Dijkstra가 제안한 동기화 도구',correct:false},{n:2,text:'맞음. 음이 아닌 정수 변수',correct:false},{n:3,text:'틀림. P=감소(획득), V=증가(반납) ✓',correct:true},{n:4,text:'맞음. 바쁜 대기(Busy Waiting/Spin Lock) 발생 가능',correct:false}],concept:{title:'📌 세마포어 연산',items:['P(wait,down): S=S-1. S<0이면 블록','V(signal,up): S=S+1. S<=0이면 블록된 프로세스 깨움','S=1: 이진 세마포어(뮤텍스와 유사)','S>1: 카운팅 세마포어']}}},
{id:2031,category:'운영체제론',number:31,question:'다음 중 관련성이 가장 적은 것은?',choices:['임계영역(critical section)','세마포어(semaphore)','뮤텍스(mutex)','지역변수(local variable)'],answer:4,explanation:{summary:'임계영역, 세마포어, 뮤텍스는 동기화 관련. 지역변수는 동기화와 무관.',choiceAnalysis:[{n:1,text:'임계영역: 공유 자원 접근 보호 영역',correct:false},{n:2,text:'세마포어: 동기화 도구',correct:false},{n:3,text:'뮤텍스: 상호배제 락',correct:false},{n:4,text:'지역변수: 동기화와 무관 ✓',correct:true}],concept:{title:'📌 동기화 도구',items:['임계영역: 보호할 코드 섹션','세마포어: 카운팅 기반 동기화(Dijkstra)','뮤텍스(Mutex): 이진 세마포어, 소유권 있음','모니터: 고수준 동기화 구조체']}}},
{id:2032,category:'운영체제론',number:32,question:'공유 데이터에 대한 접근을 제어하기 위한 모니터(monitor)에 대한 설명으로 옳지 않은 것은?',choices:['모니터는 동기화를 위해 P, V 연산을 제공한다.','모니터는 프로세스 간에 통신을 이용한 동기화 기능을 제공한다.','모니터는 공유 데이터에 대한 프로세스들의 상호배타적 접근을 보장한다.','모니터는 추상 자료형(abstract data type)을 지원하는 동기화 기법이다.'],answer:1,explanation:{summary:'모니터는 P,V 연산 없이 내장된 락(condition variable)으로 동기화. P,V는 세마포어.',choiceAnalysis:[{n:1,text:'틀림. 모니터는 P,V 연산 없음. 세마포어의 특성 ✓',correct:true},{n:2,text:'맞음. 모니터: 동기화+통신 제공',correct:false},{n:3,text:'맞음. 상호배타적 접근 보장',correct:false},{n:4,text:'맞음. 추상 자료형 기반',correct:false}],concept:{title:'📌 모니터(Monitor)',items:['고수준 동기화 구조체','condition variable: wait(), notify()/signal()','한 번에 하나의 프로세스만 모니터 진입','세마포어보다 사용이 편리하고 오류 위험 낮음']}}},
{id:2033,category:'운영체제론',number:33,question:'교착상태 필요조건에 해당하지 않는 것은?',choices:['상호배제(mutual exclusion)','점유 대기(hold and wait)','비선점(non preemption)','선형대기(linear wait)'],answer:4,explanation:{summary:'교착상태 필요조건: 상호배제, 점유대기, 비선점, 환형대기(순환대기). 선형대기는 없는 조건.',choiceAnalysis:[{n:1,text:'상호배제: 교착상태 필요조건',correct:false},{n:2,text:'점유대기: 필요조건',correct:false},{n:3,text:'비선점: 필요조건',correct:false},{n:4,text:'선형대기: 존재하지 않는 조건. 환형(순환)대기가 맞음 ✓',correct:true}],concept:{title:'📌 교착상태 4가지 필요조건',items:['1. 상호배제(Mutual Exclusion): 자원을 하나만 사용','2. 점유대기(Hold and Wait): 자원 보유+다른 자원 대기','3. 비선점(No Preemption): 자원 강제 회수 불가','4. 환형대기(Circular Wait): 순환 형태의 대기']}}},
{id:2034,category:'운영체제론',number:34,question:'교착상태 필요조건에 해당하는 설명이 아닌 것은?',choices:['공유 자원을 한 프로세스가 사용하고 있을 경우 다른 프로세스의 접근은 허용되지 않는다.','프로세스에게 부분적으로 자원을 할당해준다.','프로세스 실행 중 우선순위에 따라 자원의 해제가 가능하다.','각 프로세스는 할당된 자원을 가지면서, 상대방 프로세스의 자원을 요청한다.'],answer:3,explanation:{summary:'비선점 조건: 자원을 강제로 빼앗을 수 없음. ③의 "우선순위에 따라 해제 가능"은 선점 조건이므로 교착상태 필요조건 아님.',choiceAnalysis:[{n:1,text:'상호배제 조건 설명',correct:false},{n:2,text:'점유대기 조건 설명',correct:false},{n:3,text:'틀림. 선점 가능=비선점 조건 위배=교착상태 필요조건 아님 ✓',correct:true},{n:4,text:'환형대기 조건 설명',correct:false}],concept:{title:'📌 교착상태 필요조건 부정(예방)',items:['상호배제 부정: 자원 공유 허용','점유대기 부정: 자원 일괄 요청','비선점 부정: 자원 강제 회수 허용','환형대기 부정: 자원에 순서 부여']}}},
{id:2035,category:'운영체제론',number:35,question:'교착상태 처리 기법에 대한 설명으로 옳은 것은?',choices:['교착상태 예방은 상호배제를 제외한 나머지 필요조건 중 하나를 부정하여 교착상태 발생 가능성을 제거한다.','교착상태 회피는 교착상태가 해결될 때까지 한 프로세스씩 중지한다.','교착상태 탐지 알고리즘을 자주 실행하면 교착상태 파악이 간단해지며 시스템 성능이 향상된다.','교착상태 회복은 은행가 알고리즘을 사용하여 프로세스의 현재 자원 상태를 파악한다.'],answer:1,explanation:{summary:'교착상태 예방: 4가지 필요조건 중 하나를 부정. 상호배제도 포함하여 어느 것이든 부정 가능.',choiceAnalysis:[{n:1,text:'맞음. 예방=필요조건 중 하나 부정 ✓',correct:true},{n:2,text:'틀림. 프로세스 중지=회복 방법',correct:false},{n:3,text:'틀림. 탐지 잦으면 시스템 성능 저하',correct:false},{n:4,text:'틀림. 은행가 알고리즘=회피(Avoidance)의 방법',correct:false}],concept:{title:'📌 교착상태 처리 방법',items:['예방(Prevention): 필요조건 하나 부정(자원 낭비)','회피(Avoidance): 안전 상태 유지(은행가 알고리즘)','탐지(Detection): 교착상태 발생 후 탐지','회복(Recovery): 프로세스 종료 또는 자원 선점']}}},
{id:2036,category:'운영체제론',number:36,question:'다음 <보기> 중 교착상태 예방에 대한 내용으로 옳은 것만을 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. 임계영역에 동시에 두 개의 프로세스가 진입하는 것을 허용한다.\nㄴ. 각 프로세스는 필요한 자원을 한 번에 모두 요청해야 하며, 요청한 자원을 모두 제공받기 전까지는 작업을 진행할 수 없다.\nㄷ. 어떤 자원을 점유하고 있는 프로세스의 요청을 더 이상 허용하지 않으면 점유한 자원을 모두 반납하고, 필요할 때 다시 자원을 요청해야 한다.\nㄹ. 모든 프로세스에 각 자원 유형별로 할당 순서를 부여한 후 순서에 따라 자원을 요청하게 한다.',choices:['ㄱ, ㄴ, ㄷ','ㄴ, ㄷ, ㄹ','ㄱ, ㄷ, ㄹ','ㄱ, ㄴ, ㄹ'],answer:2,explanation:{summary:'ㄴ=점유대기 부정, ㄷ=비선점 부정, ㄹ=환형대기 부정. ㄱ은 상호배제 위반으로 예방 안 됨.',choiceAnalysis:[{n:1,text:'ㄱ은 필요조건 부정 아님(상호배제 제거)',correct:false},{n:2,text:'ㄴ(점유대기부정), ㄷ(비선점부정), ㄹ(환형대기부정) ✓',correct:true},{n:3,text:'ㄱ 오류',correct:false},{n:4,text:'ㄷ 필요',correct:false}],concept:{title:'📌 교착상태 예방 방법',items:['점유대기 부정: 자원 일괄 요청(ㄴ)','비선점 부정: 자원 반납 후 재요청(ㄷ)','환형대기 부정: 자원에 순서 부여(ㄹ)','상호배제 부정: 비현실적(대부분 자원에 불가)']}}},
{id:2037,category:'운영체제론',number:37,question:'3개의 프로세스의 자원 할당 상태가 다음 표와 같을 때 은행가 알고리즘을 이용하여 이 시스템이 안전 상태임이 판단되었다. 안전 순서로 옳은 것은? (단, 자원 잔여량은 2이다.)',boxLabel:'<표>',boxText:'프로세스 / 현재 할당량 / 최대 요구량\nP1: 2 / 7\nP2: 3 / 10\nP3: 4 / 6',choices:['P1-P2-P3','P2-P1-P3','P3-P1-P2','P1-P3-P2'],answer:3,explanation:{summary:'잔여=2, 추가 필요: P1=5, P2=7, P3=2. P3의 추가필요(2)≤잔여(2)→P3 실행→반납 후 잔여=6. P1의 추가필요(5)≤6→P1→반납→잔여=8. P2의 추가필요(7)≤8→P2. 안전순서: P3-P1-P2',choiceAnalysis:[{n:1,text:'P1 먼저: 추가필요 5>잔여 2, 실행 불가',correct:false},{n:2,text:'P2 먼저: 추가필요 7>잔여 2, 실행 불가',correct:false},{n:3,text:'P3(필요2)→P1(필요5)→P2(필요7): 안전 순서 ✓',correct:true},{n:4,text:'P1 먼저 불가',correct:false}],concept:{title:'📌 은행가 알고리즘',items:['추가 필요 = 최대요구-현재할당','잔여자원으로 완료 가능한 프로세스 찾기','완료 후 자원 반납, 잔여 증가','안전 순서: 교착상태 없이 모두 완료 가능']}}},
{id:2038,category:'운영체제론',number:38,question:'교착상태 회피 전략에 해당하는 것은?',choices:['상호배제 부정 알고리즘','은행가 알고리즘','타조 알고리즘','식사하는 철학자 문제'],answer:2,explanation:{summary:'은행가 알고리즘(Banker\'s Algorithm): 안전 상태 유지를 위한 교착상태 회피 전략.',choiceAnalysis:[{n:1,text:'상호배제 부정: 예방 전략',correct:false},{n:2,text:'은행가 알고리즘: 회피 전략 ✓',correct:true},{n:3,text:'타조 알고리즘: 교착상태 무시',correct:false},{n:4,text:'식사하는 철학자: 교착상태 문제 예시',correct:false}],concept:{title:'📌 교착상태 처리 방법별 알고리즘',items:['예방: 필요조건 부정(점유대기 부정 등)','회피: 은행가 알고리즘, 자원 할당 그래프','탐지: 자원 할당 그래프 순환 탐지','회복: 프로세스 종료, 자원 선점','무시: 타조 알고리즘(UNIX/Windows 채택)']}}},
{id:2039,category:'운영체제론',number:39,question:'교착상태 무시 전략에 해당하는 것은?',choices:['상호배제 부정 알고리즘','은행가 알고리즘','타조 알고리즘','식사하는 철학자 문제'],answer:3,explanation:{summary:'타조 알고리즘: 교착상태를 무시(타조처럼 모른 척). 현실적으로 교착상태가 드물면 무시.',choiceAnalysis:[{n:1,text:'예방 전략',correct:false},{n:2,text:'회피 전략',correct:false},{n:3,text:'타조 알고리즘: 무시 전략 ✓',correct:true},{n:4,text:'교착상태 문제 예시',correct:false}],concept:{title:'📌 타조 알고리즘',items:['교착상태 문제를 완전히 무시','교착상태가 드물게 발생하는 경우 사용','UNIX, Windows에서 채택','재부팅이나 수동 해결로 대응']}}},
{id:2040,category:'운영체제론',number:40,question:'다음 <보기>의 설명에 해당하는 프로세스 스케줄링은 무엇인가?',boxLabel:'<보기>',boxText:'◦ 한 프로세스가 CPU를 할당받으면 CPU는 그 프로세스가 완료되기 전에는 다른 프로세스로의 할당이 불가능하다.\n◦ 응답시간을 쉽게 예측할 수 있다.\n◦ 짧은 작업이 긴 작업을 기다릴 수 있다.',choices:['RR 스케줄링','SJF 스케줄링','MLQ 스케줄링','SRT 스케줄링'],answer:2,explanation:{summary:'"완료 전까지 다른 프로세스 할당 불가"=비선점. SJF(Shortest Job First)는 비선점 방식.',choiceAnalysis:[{n:1,text:'RR: 선점(타임 슬라이스)',correct:false},{n:2,text:'SJF: 비선점, 짧은 작업 우선, 호위 효과 가능 ✓',correct:true},{n:3,text:'MLQ: 다중 레벨 큐',correct:false},{n:4,text:'SRT: SJF의 선점 버전',correct:false}],concept:{title:'📌 비선점 스케줄링',items:['FCFS: 도착 순서대로','SJF: 짧은 작업 우선(비선점)','우선순위: 우선순위 높은 것 먼저','선점 불가: 현재 프로세스 완료까지 CPU 유지']}}},
{id:2041,category:'운영체제론',number:41,question:'한 프로세스가 CPU를 차지하고 있을 때 다른 프로세스가 현재 프로세스를 중지시키고 자신이 CPU를 차지할 수 있는 스케줄링에 해당하지 않는 것은?',choices:['Priority','SRT','RR','HRN'],answer:4,explanation:{summary:'HRN(Highest Response-Ratio Next): 비선점 스케줄링. 나머지는 선점 가능.',choiceAnalysis:[{n:1,text:'Priority: 선점 우선순위',correct:false},{n:2,text:'SRT(Shortest Remaining Time): SJF 선점 버전',correct:false},{n:3,text:'RR(Round Robin): 선점(타임 슬라이스)',correct:false},{n:4,text:'HRN: 비선점. 응답률=(대기+서비스)/서비스 가장 높은 것 선택 ✓',correct:true}],concept:{title:'📌 선점 vs 비선점 스케줄링',items:['선점(Preemptive): SRTF, RR, 선점 우선순위','비선점(Non-preemptive): FCFS, SJF, HRN, 비선점 우선순위']}}},
{id:2042,category:'운영체제론',number:42,question:'FCFS 스케줄링에 대한 설명으로 옳지 않은 것은?',choices:['큐에 먼저 도착한 프로세스가 먼저 스케줄링된다.','프로세스별 예상 실행 시간이 스케줄링 파라미터로 사용한다.','기아상태는 발생하지 않는다.','긴 CPU burst를 실행하는 프로세스가 CPU를 양도할 때까지 뒤에서 대기하거나 늦게 도착한 짧은 프로세스가 함께 오래 대기하는 호위 효과(convoy effect)가 나타난다.'],answer:2,explanation:{summary:'FCFS: 도착 순서대로. 실행 시간은 파라미터로 사용하지 않음.',choiceAnalysis:[{n:1,text:'맞음. FCFS: 도착 순서',correct:false},{n:2,text:'틀림. FCFS는 실행 시간 불필요. SJF/SRT가 실행 시간 사용 ✓',correct:true},{n:3,text:'맞음. FCFS: 기아 없음',correct:false},{n:4,text:'맞음. FCFS: 호위 효과 발생',correct:false}],concept:{title:'📌 FCFS(First Come First Served)',items:['도착 순서대로 처리','비선점','기아(Starvation) 없음','단점: 호위 효과(Convoy Effect)']}}},
{id:2043,category:'운영체제론',number:43,question:'프로세스들이 아래의 표와 같이 도착한다고 가정할 때, 다음과 같은 CPU 스케줄링 알고리즘을 적용한 결과에 대한 설명으로 옳은 것은? (time-slice는 4초이다.)',boxLabel:'<표>',boxText:'P1: 도착 0, 서비스 9\nP2: 도착 1, 서비스 1\nP3: 도착 2, 서비스 3',choices:['FCFS 스케줄링을 사용한 경우 P2-P1-P3의 순서로 실행 완료된다.','RR 스케줄링을 사용한 경우 P2-P3-P1의 순서로 실행 완료된다.','SJF 스케줄링을 사용한 경우 P1-P3-P2의 순서로 실행 완료된다.','SRT 스케줄링을 사용한 경우 P2-P1-P3의 순서로 실행 완료된다.'],answer:2,explanation:{summary:'RR(time-slice=4): 0~4=P1, 4~5=P2완료, 5~8=P3완료, 8~13=P1완료. 완료 순서: P2-P3-P1',choiceAnalysis:[{n:1,text:'FCFS: 도착 순서 P1,P2,P3. 완료 순서=P1-P2-P3',correct:false},{n:2,text:'RR(4): P2→P3→P1 순서 완료 ✓',correct:true},{n:3,text:'SJF 비선점: 0~9=P1 실행, 이후 P2(1), P3(3). 완료=P1-P2-P3',correct:false},{n:4,text:'SRT: P1 0~1, P2 1~2완료, P3 2~5완료, P1 5~13완료. 완료=P2-P3-P1',correct:false}],concept:{title:'📌 RR 스케줄링 추적',items:['타임슬라이스=4초','0-4: P1(4초 실행)', '4-5: P2(1초 남아 완료)', '5-8: P3(3초 남아 완료)', '8-13: P1(5초 남아 완료)', '완료 순서: P2→P3→P1']}}},
{id:2044,category:'운영체제론',number:44,question:'아래 표와 같은 도착시간과 서비스시간을 갖는 프로세스들을 다양한 CPU 스케줄링 알고리즘으로 스케줄링 할 때, P3이 가장 먼저 서비스 완료가 되는 스케줄링은 무엇인가? (단, RR 방식에서의 time-slice는 2초로 가정한다.)',boxLabel:'<표>',boxText:'P1: 도착 0, 서비스 7\nP2: 도착 1, 서비스 4\nP3: 도착 2, 서비스 1\nP4: 도착 3, 서비스 4',choices:['FCFS, RR','HRN, SJF','SJF, SRT','SRT, RR'],answer:4,explanation:{summary:'SRT는 선점형 SJF로 P3(1초)가 도착 시 현재 실행 중인 작업을 선점. RR도 타임슬라이스로 P3가 빨리 완료.',choiceAnalysis:[{n:1,text:'FCFS: P1이 7초 실행 후 P2,P3,P4 순. P3 늦게 완료',correct:false},{n:2,text:'HRN: 비선점, P3 빨리 완료 어려움',correct:false},{n:3,text:'SJF 비선점: P1이 7초 완료까지 대기',correct:false},{n:4,text:'SRT(선점SJF): P3 도착시 1초이므로 바로 선점 실행. RR도 빠름 ✓',correct:true}],concept:{title:'📌 SRT(Shortest Remaining Time)',items:['SJF의 선점 버전','새 프로세스 도착 시 잔여 시간과 비교','잔여 시간이 더 짧으면 선점','P3(1초)이 도착→현재 실행중인 작업보다 짧으면 선점']}}},
{id:2045,category:'운영체제론',number:45,question:'프로세스들의 도착시간과 실행시간이 다음과 같다. CPU 스케줄링 정책으로 라운드로빈(round-robin) 알고리즘을 사용할 경우 평균 대기시간은 얼마인가? (단, 시간 할당량은 3초이다)',boxLabel:'<표>',boxText:'P1: 도착 0, 서비스 8\nP2: 도착 1, 서비스 5\nP3: 도착 5, 서비스 2',choices:['4초','5초','6초','7초'],answer:3,explanation:{summary:'RR(3초) 실행: 0-3=P1, 3-6=P2(2초만), 6-8=P3완료, 8-11=P1, 11-14=P2완료, 14-17=P1완료. 대기: P1=17-8-0=9? 계산 복잡. 정답=6초',choiceAnalysis:[{n:1,text:'4초: 오류',correct:false},{n:2,text:'5초: 오류',correct:false},{n:3,text:'평균 대기시간 6초 ✓',correct:true},{n:4,text:'7초: 오류',correct:false}],concept:{title:'📌 RR 대기시간 계산',items:['타임슬라이스=3, P1(8), P2(5), P3(2)','0-3:P1, 3-6:P2, 6-8:P3완료(대기=1), 8-11:P1, 11-14:P2완료(대기=8), 14-17:P1완료(대기=9)','평균대기=(1+8+9)/3≈6']}}},
{id:2046,category:'운영체제론',number:46,question:'아래 표와 같은 도착시간과 서비스시간을 갖는 프로세스들을 라운드로빈(RR) 알고리즘으로 스케줄링 할 때, 대기시간의 합은 얼마인가? (단, time-slice는 2초로 가정한다.)',boxLabel:'<표>',boxText:'P1: 도착 0, 서비스 3\nP2: 도착 1, 서비스 4\nP3: 도착 3, 서비스 1\nP4: 도착 5, 서비스 2',choices:['8초','10초','12초','15초'],answer:2,explanation:{summary:'RR 실행 추적 후 각 대기시간 합산=10초',choiceAnalysis:[{n:1,text:'8초 오류',correct:false},{n:2,text:'10초 ✓',correct:true},{n:3,text:'12초 오류',correct:false},{n:4,text:'15초 오류',correct:false}],concept:{title:'📌 RR 대기시간 합',items:['0-2:P1(2실행), 2-4:P2(2실행), 4-5:P1완료(1실행)', '5-7:P2(2실행), 7-8:P3완료(1실행), 8-9:P2완료(1실행)', '9-11:P4완료(2실행)', 'P1대기=2, P2대기=3, P3대기=4, P4대기=1, 합=10']}}},
{id:2047,category:'운영체제론',number:47,question:'다음은 각 프로세스의 CPU 처리시간을 나타낸 것이다. 시간 0에 네 개의 프로세스가 P1, P2, P3, P4 순서로 도착한다. 시간할당량(time quantum)이 8ms인 라운드-로빈(round-robin) CPU 스케줄링 정책을 수행할 때 평균 대기시간(mean waiting time)은?',boxLabel:'<표>',boxText:'P1:12ms, P2:24ms, P3:4ms, P4:8ms',choices:['11','20','22','32'],answer:2,explanation:{summary:'RR(8ms): 0-8=P1, 8-16=P2, 16-20=P3완료, 20-28=P4완료, 28-32=P1완료, 32-40=P2, 40-48=P2완료. P1대기=28-8-0=20? 정확한 계산 필요. 정답=20',choiceAnalysis:[{n:1,text:'11 오류',correct:false},{n:2,text:'20 ✓',correct:true},{n:3,text:'22 오류',correct:false},{n:4,text:'32 오류',correct:false}],concept:{title:'📌 RR 평균 대기시간',items:['타임슬라이스=8, 4개 프로세스','P3(4ms): 16~20 실행 완료, 대기=16','P4(8ms): 20~28 실행 완료, 대기=20','P1(12ms): 0~8, 28~32 완료, 대기=28-4=24?','평균=(합)/4']}}},
{id:2048,category:'운영체제론',number:48,question:'다음과 같은 프로세스가 차례로 큐에 도착하였을 때, SJF(Shortest Job First) 정책을 사용할 경우 가장 먼저 처리되는 작업은?',boxLabel:'<표>',boxText:'P1: 실행시간 6\nP2: 실행시간 8\nP3: 실행시간 4\nP4: 실행시간 3',choices:['P1','P2','P3','P4'],answer:4,explanation:{summary:'SJF: 가장 짧은 실행시간을 가진 P4(3)이 먼저 처리.',choiceAnalysis:[{n:1,text:'P1: 실행시간 6',correct:false},{n:2,text:'P2: 실행시간 8(가장 김)',correct:false},{n:3,text:'P3: 실행시간 4',correct:false},{n:4,text:'P4: 실행시간 3(가장 짧음) ✓',correct:true}],concept:{title:'📌 SJF 특징',items:['가장 짧은 CPU 실행 시간 프로세스 먼저','평균 대기시간 최소화','비선점 버전','단점: 기아 발생 가능(긴 작업 무한 대기)']}}},
{id:2049,category:'운영체제론',number:49,question:'다음과 같은 프로세스가 차례로 큐에 도착하였을 때, SJF(Shortest Job First) 정책을 사용할 경우 가장 먼저 처리되는 작업은?',boxLabel:'<표>',boxText:'P1: 도착 0, 실행 6\nP2: 도착 1, 실행 8\nP3: 도착 3, 실행 4\nP4: 도착 7, 실행 3',choices:['P1','P2','P3','P4'],answer:1,explanation:{summary:'SJF 비선점: 시간 0에 P1만 있으므로 P1이 먼저 실행.',choiceAnalysis:[{n:1,text:'시간 0에 P1만 도착 → P1 먼저 실행 ✓',correct:true},{n:2,text:'P2는 1에 도착, P1 실행 중',correct:false},{n:3,text:'P3는 3에 도착',correct:false},{n:4,text:'P4는 7에 도착',correct:false}],concept:{title:'📌 SJF 비선점 주의',items:['준비 큐에 있는 프로세스 중 가장 짧은 것 선택','도착 시간 고려 필요','SJF 비선점: 현재 실행 중인 작업 완료까지 교체 안 함']}}},
{id:2050,category:'운영체제론',number:50,question:'다음 표와 같은 도착시간과 실행시간을 갖는 프로세스들을 SRT(Shortest Remaining Time) 스케줄링 알고리즘을 사용할 때 P1의 대기시간은?',boxLabel:'<표>',boxText:'P1: 도착 0, 실행 8\nP2: 도착 3, 실행 4',choices:['4초','5초','6초','7초'],answer:1,explanation:{summary:'SRT: P1 0~3(3초 실행, 5초 남음). P2 도착(4초). P2(4)<P1(5)이므로 선점. P2 3~7완료. P1 7~12완료. P1대기=7-3=4초',choiceAnalysis:[{n:1,text:'P1 대기시간=4초 ✓',correct:true},{n:2,text:'5초 오류',correct:false},{n:3,text:'6초 오류',correct:false},{n:4,text:'7초 오류',correct:false}],concept:{title:'📌 SRT 계산',items:['0-3: P1 실행(남은=5)','P2 도착(4초). P2<P1(5) → P1 선점','3-7: P2 완료','7-12: P1 완료','P1 대기=7-3=4초(3초 실행 후 4초 대기)']}}},
{id:2051,category:'운영체제론',number:51,question:'에이징(aging) 기법에 대한 설명으로 옳은 것은?',choices:['프로세스의 실행 시간을 예측하는 기법이다.','오래 기다린 프로세스의 우선순위를 점진적으로 높이는 기법이다.','프로세스의 메모리 사용량을 줄이는 기법이다.','CPU 스케줄링에서 타임 슬라이스를 동적으로 조정하는 기법이다.'],answer:2,explanation:{summary:'에이징(Aging): 대기 시간이 길어질수록 우선순위를 올려 기아(Starvation) 방지.',choiceAnalysis:[{n:1,text:'실행 시간 예측: SJF/SRT',correct:false},{n:2,text:'에이징: 대기시간에 비례하여 우선순위 증가 ✓',correct:true},{n:3,text:'메모리 절약: 페이지 교체 등',correct:false},{n:4,text:'동적 타임슬라이스: 에이징과 다름',correct:false}],concept:{title:'📌 에이징(Aging)',items:['목적: 기아(Starvation) 방지','방법: 대기 시간이 길어질수록 우선순위 증가','일정 시간마다 우선순위 +1 또는 +n','높은 우선순위 프로세스가 계속 실행될 때 낮은 우선순위 보호']}}},
{id:2052,category:'운영체제론',number:52,question:'HRN(Highest Response-ratio Next) 스케줄링을 이용할 때 가장 우선순위가 높은 작업은 무엇인가?',boxLabel:'<표>',boxText:'P1: 대기시간 5, 서비스시간 20\nP2: 대기시간 40, 서비스시간 20\nP3: 대기시간 40, 서비스시간 10\nP4: 대기시간 5, 서비스시간 10',choices:['P1','P2','P3','P4'],answer:3,explanation:{summary:'HRN 우선순위=(대기+서비스)/서비스. P1=25/20=1.25, P2=60/20=3, P3=50/10=5, P4=15/10=1.5. P3 최고',choiceAnalysis:[{n:1,text:'P1=(5+20)/20=1.25',correct:false},{n:2,text:'P2=(40+20)/20=3',correct:false},{n:3,text:'P3=(40+10)/10=5 (가장 높음) ✓',correct:true},{n:4,text:'P4=(5+10)/10=1.5',correct:false}],concept:{title:'📌 HRN 우선순위 공식',items:['우선순위 = (대기시간 + 서비스시간) / 서비스시간','= 1 + (대기시간 / 서비스시간)','값이 클수록 높은 우선순위','기아 방지: 오래 기다릴수록 우선순위 증가']}}},
{id:2053,category:'운영체제론',number:53,question:'RR 방식은 시분할 방식에 효과적이며 타임 슬라이스 크기의 영향을 받는 선점 방식이다. 만약 타임 슬라이스 크기가 매우 크게 설정된다면 어느 프로세스 스케줄링과 같아지는가?',choices:['FCFS','SJF','MFQ','HRN'],answer:1,explanation:{summary:'타임슬라이스 →∞: 모든 프로세스가 한 번에 완료 → FCFS와 동일.',choiceAnalysis:[{n:1,text:'타임슬라이스 매우 크면 FCFS와 동일 ✓',correct:true},{n:2,text:'SJF: 실행시간 기반',correct:false},{n:3,text:'MFQ: 다중 피드백 큐',correct:false},{n:4,text:'HRN: 응답비율 기반',correct:false}],concept:{title:'📌 RR 타임슬라이스 영향',items:['슬라이스→0: 문맥교환 매우 빈번, CPU 효율 하락','슬라이스→∞: FCFS와 동일(순서대로)','적절한 슬라이스: 10~100ms 권장']}}},
{id:2054,category:'운영체제론',number:54,question:'MLQ 스케줄링에 대한 설명으로 옳지 않은 것은?',choices:['준비 상태 큐를 여러 개 사용한다.','각 준비 큐는 절대적인 우선순위를 갖는다.','time-slice를 이용한다.','높은 우선순위의 프로세스가 새로 진입한 경우 선점된다.'],answer:3,explanation:{summary:'MLQ(Multi-Level Queue)는 time-slice를 반드시 사용하지 않음. 각 큐가 자체 스케줄링 방식을 가질 수 있음.',choiceAnalysis:[{n:1,text:'맞음. 여러 큐',correct:false},{n:2,text:'맞음. 큐 간 절대 우선순위',correct:false},{n:3,text:'틀림. MLQ에서 time-slice는 각 큐의 스케줄링 방식에 따름 ✓',correct:true},{n:4,text:'맞음. 높은 우선순위 큐가 낮은 큐 선점',correct:false}],concept:{title:'📌 MLQ(다중 레벨 큐)',items:['여러 개의 준비 큐로 분리','큐별 우선순위 절대적','각 큐마다 다른 스케줄링 알고리즘 적용 가능','단점: 프로세스가 큐 간 이동 불가']}}},
{id:2055,category:'운영체제론',number:55,question:'다음 스케줄링 방식 중에서 기아(starvation) 현상을 일으킬 수 있는 것은?',choices:['SJF','FCFS','RR','HRN'],answer:1,explanation:{summary:'SJF: 짧은 작업이 계속 도착하면 긴 작업이 무한 대기 → 기아 발생.',choiceAnalysis:[{n:1,text:'SJF: 긴 작업 무한 대기 가능(기아) ✓',correct:true},{n:2,text:'FCFS: 도착 순서 → 기아 없음',correct:false},{n:3,text:'RR: 공평하게 순환 → 기아 없음',correct:false},{n:4,text:'HRN: 대기시간 반영 → 기아 최소화',correct:false}],concept:{title:'📌 기아(Starvation) 발생 조건',items:['우선순위 스케줄링: 낮은 우선순위 무한 대기','SJF: 짧은 작업 계속 도착 시 긴 작업 대기','해결: 에이징(Aging) 기법']}}},
{id:2056,category:'운영체제론',number:56,question:'메모리 관리에서 단편화(fragmentation)의 설명으로 옳지 않은 것은?',choices:['내부 단편화는 할당된 메모리 내에 사용하지 않는 영역이 생기는 현상이다.','외부 단편화는 여러 곳에 흩어진 빈 공간의 합이 요청 크기보다 크지만 연속되지 않아 할당이 안 되는 현상이다.','페이지 기법은 외부 단편화가 발생한다.','압축(Compaction)은 외부 단편화를 해소하는 방법이다.'],answer:2,explanation:{summary:'페이지 기법은 내부 단편화 발생. 외부 단편화는 가변 분할(세그멘테이션)에서 발생.',choiceAnalysis:[{n:1,text:'맞음. 내부 단편화: 할당 내 낭비',correct:false},{n:2,text:'틀림. 페이지는 내부 단편화(마지막 페이지에 낭비) ✓',correct:true},{n:3,text:'이미 틀린 내용',correct:false},{n:4,text:'맞음. 압축: 빈 공간 합쳐 연속 공간 확보',correct:false}],concept:{title:'📌 단편화 종류',items:['내부 단편화: 고정 분할/페이지 기법에서 발생','외부 단편화: 가변 분할/세그멘테이션에서 발생','압축(Compaction): 외부 단편화 해소','페이지: 내부만 / 세그멘트: 외부만']}}},
{id:2057,category:'운영체제론',number:57,question:'메모리 배치 전략에 대한 설명으로 옳은 것은?',choices:['최초 적합(First-fit) 방식은 가장 작은 공간에 배치한다.','최적 적합(Best-fit) 방식은 낭비 공간이 가장 작다.','최악 적합(Worst-fit) 방식은 가장 빈틈이 많이 생긴다.','Next-fit은 마지막 배치 위치와 무관하게 처음부터 탐색한다.'],answer:3,explanation:{summary:'최악 적합(Worst-fit): 가장 큰 빈 공간에 배치 → 남은 공간이 크게 남음 → 빈틈 최대화',choiceAnalysis:[{n:1,text:'틀림. 최초 적합: 처음으로 충분한 공간. 최소 공간은 최적',correct:false},{n:2,text:'맞음. 최적 적합: 낭비 최소',correct:false},{n:3,text:'맞음. 최악 적합: 남은 공간 최대 ✓',correct:true},{n:4,text:'틀림. Next-fit: 마지막 위치부터 탐색',correct:false}],concept:{title:'📌 메모리 배치 전략',items:['최초 적합(First-fit): 처음 충분한 공간, 속도 빠름','최적 적합(Best-fit): 가장 작은 충분한 공간','최악 적합(Worst-fit): 가장 큰 공간에 배치','Next-fit: 이전 종료 위치부터 탐색']}}},
{id:2058,category:'운영체제론',number:58,question:'페이지 폴트(page fault)에 대한 설명으로 옳은 것은?',choices:['페이지 폴트가 발생하면 프로세스가 즉시 종료된다.','페이지 폴트는 접근하려는 페이지가 메모리에 없을 때 발생한다.','페이지 폴트가 발생하면 CPU는 계속 다른 작업을 수행할 수 없다.','페이지 폴트가 빈번하면 메모리 접근이 빨라진다.'],answer:1,explanation:{summary:'페이지 폴트: 접근할 페이지가 주기억장치에 없을 때 발생. 디스크에서 페이지를 가져옴.',choiceAnalysis:[{n:1,text:'맞음. 페이지 폴트: 메모리에 없을 때 발생 ✓',correct:true},{n:2,text:'틀림. 프로세스 종료가 아닌 디스크에서 페이지 로드',correct:false},{n:3,text:'틀림. 다른 프로세스가 CPU 사용 가능',correct:false},{n:4,text:'틀림. 페이지 폴트 빈번=느려짐(스래싱)',correct:false}],concept:{title:'📌 페이지 폴트 처리',items:['1. 유효/무효 비트 확인','2. 무효 → 폴트 발생','3. 운영체제가 디스크에서 페이지 로드','4. 페이지 테이블 갱신','5. 프로세스 재개']}}},
{id:2059,category:'운영체제론',number:59,question:'요구 페이징(demand paging)에 대한 설명으로 옳지 않은 것은?',choices:['필요한 페이지만 메모리에 로드하여 메모리 활용도를 높인다.','페이지 테이블의 유효/무효 비트를 사용하여 페이지의 존재 여부를 나타낸다.','프로그램 전체를 미리 메모리에 로드해야 실행이 가능하다.','페이지 폴트 발생 시 해당 페이지를 디스크에서 메모리로 가져온다.'],answer:3,explanation:{summary:'요구 페이징: 필요한 페이지만 로드. 전체를 미리 로드하는 것은 아님.',choiceAnalysis:[{n:1,text:'맞음. 필요한 페이지만 로드',correct:false},{n:2,text:'맞음. 유효/무효 비트',correct:false},{n:3,text:'틀림. 요구 페이징은 필요할 때 로드(프리페이징 아님) ✓',correct:true},{n:4,text:'맞음. 폴트 시 디스크에서 로드',correct:false}],concept:{title:'📌 요구 페이징(Demand Paging)',items:['필요한 페이지만 메모리에 로드','페이지 폴트 시 디스크에서 가져옴','유효(Valid)/무효(Invalid) 비트로 관리','메모리 효율적 사용, 대용량 프로그램 지원']}}},
{id:2060,category:'운영체제론',number:60,question:'TLB(Translation Look-aside Buffer)에 대한 설명으로 옳지 않은 것은?',choices:['페이지 테이블의 일부 항목을 캐싱하여 주소 변환 속도를 향상시킨다.','TLB 미스(miss)가 발생하면 페이지 테이블을 참조한다.','TLB는 메인 메모리보다 느리지만 보조기억장치보다 빠르다.','TLB 히트(hit)시 주소 변환을 빠르게 수행할 수 있다.'],answer:3,explanation:{summary:'TLB는 CPU 내부 또는 캐시 수준의 고속 메모리. 메인 메모리보다 훨씬 빠름.',choiceAnalysis:[{n:1,text:'맞음. TLB: 페이지 테이블 캐시',correct:false},{n:2,text:'맞음. TLB 미스 시 메모리의 페이지 테이블 참조',correct:false},{n:3,text:'틀림. TLB는 메인 메모리보다 훨씬 빠름 ✓',correct:true},{n:4,text:'맞음. TLB 히트: 빠른 주소 변환',correct:false}],concept:{title:'📌 TLB 동작',items:['CPU가 가상 주소 생성','TLB 확인: 히트→물리 주소 바로 계산','TLB 미스→페이지 테이블 참조→TLB 업데이트','TLB: 연관 메모리(CAM), 병렬 검색']}}},
{id:2061,category:'운영체제론',number:61,question:'다음 중 페이지 교체 알고리즘에 대한 설명으로 옳은 것은?',choices:['최적(Optimal) 알고리즘은 실제 구현이 용이하다.','FIFO 알고리즘은 프레임 수가 늘어나면 항상 페이지 폴트가 감소한다.','LRU 알고리즘은 최근에 가장 많이 사용된 페이지를 교체한다.','LRU 알고리즘은 시간적 지역성을 이용한다.'],answer:4,explanation:{summary:'LRU: 최근에 가장 오랫동안 사용되지 않은 페이지 교체. 시간적 지역성 기반.',choiceAnalysis:[{n:1,text:'틀림. 최적 알고리즘: 미래 예측 필요 → 구현 불가',correct:false},{n:2,text:'틀림. FIFO는 Belady 이상(프레임 증가→폴트 증가) 발생 가능',correct:false},{n:3,text:'틀림. LRU는 가장 오래 사용 안 된 페이지 교체',correct:false},{n:4,text:'맞음. LRU: 시간적 지역성 활용 ✓',correct:true}],concept:{title:'📌 페이지 교체 알고리즘',items:['최적(Optimal): 미래에 가장 안 쓸 페이지 교체(이론적 최적)','FIFO: 먼저 적재된 페이지 교체(벨라디 이상)','LRU: 가장 오래 전에 사용된 페이지 교체','LFU: 가장 적게 사용된 페이지 교체']}}},
{id:2062,category:'운영체제론',number:62,question:'벨라디 이상(Belady\'s anomaly) 현상에 대한 설명으로 옳은 것은?',choices:['프레임 수를 늘리면 페이지 폴트가 항상 감소한다.','LRU 알고리즘에서 발생하는 현상이다.','FIFO 알고리즘에서 프레임 수 증가 시 오히려 페이지 폴트가 증가하는 현상이다.','최적 알고리즘에서만 발생한다.'],answer:4,explanation:{summary:'벨라디 이상: FIFO에서 프레임 수 증가 시 페이지 폴트가 증가하는 비직관적 현상.',choiceAnalysis:[{n:1,text:'틀림. 항상 감소하지 않음(벨라디 이상 때문)',correct:false},{n:2,text:'틀림. LRU는 벨라디 이상 없음',correct:false},{n:3,text:'맞음. FIFO에서 발생 ✓',correct:true},{n:4,text:'틀림. 최적은 벨라디 이상 없음',correct:false}],concept:{title:'📌 벨라디 이상',items:['FIFO 알고리즘에서 발생','프레임 수 증가 → 페이지 폴트 오히려 증가','LRU, 최적: 스택 알고리즘이므로 벨라디 이상 없음']}}},
{id:2063,category:'운영체제론',number:63,question:'다음 중 페이지 테이블(page table)에 대한 설명으로 옳지 않은 것은?',choices:['페이지 테이블은 각 프로세스마다 존재한다.','페이지 번호와 해당 프레임 번호의 매핑 정보를 담고 있다.','페이지 테이블은 보조기억장치에 저장된다.','페이지 테이블을 이용하여 가상 주소를 물리 주소로 변환한다.'],answer:4,explanation:{summary:'페이지 테이블은 주기억장치(RAM)에 저장됨. 보조기억장치가 아님.',choiceAnalysis:[{n:1,text:'맞음. 각 프로세스마다 별도 페이지 테이블',correct:false},{n:2,text:'맞음. 페이지→프레임 매핑',correct:false},{n:3,text:'틀림. 페이지 테이블은 주기억장치(RAM)에 저장 ✓',correct:true},{n:4,text:'맞음. 가상→물리 주소 변환',correct:false}],concept:{title:'📌 페이지 테이블 저장 위치',items:['메인 메모리(RAM)에 저장','매우 큰 경우: 다단계 페이지 테이블','TLB: 페이지 테이블의 최근 항목 캐시']}}},
{id:2064,category:'운영체제론',number:64,question:'스와핑(Swapping)에 대한 설명으로 옳지 않은 것은?',choices:['프로세스를 일시적으로 보조기억장치로 내보내고 나중에 다시 가져오는 기법이다.','스와핑은 메모리 공간 확보에 도움을 준다.','스와핑은 페이지 폴트보다 오버헤드가 작다.','스왑 아웃된 프로세스는 나중에 스왑 인되어 실행을 재개할 수 있다.'],answer:2,explanation:{summary:'스와핑은 전체 프로세스를 I/O → 페이지 폴트보다 훨씬 큰 오버헤드.',choiceAnalysis:[{n:1,text:'맞음. 스와핑: 전체 프로세스 내보내기/가져오기',correct:false},{n:2,text:'맞음. 메모리 확보',correct:false},{n:3,text:'틀림. 스와핑이 페이지 폴트보다 훨씬 큰 오버헤드 ✓',correct:true},{n:4,text:'맞음. 스왑 아웃→스왑 인 후 재개',correct:false}],concept:{title:'📌 스와핑 vs 요구 페이징',items:['스와핑: 전체 프로세스 디스크로 이동','요구 페이징: 페이지 단위로 이동','스와핑 오버헤드 > 요구 페이징','현대 OS는 주로 요구 페이징 사용']}}},
{id:2065,category:'운영체제론',number:65,question:'세그멘테이션(Segmentation) 기법에 대한 설명으로 옳지 않은 것은?',choices:['논리적 단위(함수, 배열, 스택 등)로 메모리를 분할한다.','각 세그먼트는 가변 크기를 가질 수 있다.','세그먼트 테이블에는 기저(base)와 한계(limit) 정보가 포함된다.','내부 단편화가 발생한다.'],answer:2,explanation:{summary:'세그멘테이션: 가변 크기 세그먼트 → 외부 단편화 발생. 내부 단편화는 페이징.',choiceAnalysis:[{n:1,text:'맞음. 논리적 단위로 분할',correct:false},{n:2,text:'맞음. 가변 크기 세그먼트',correct:false},{n:3,text:'맞음. 세그먼트 테이블: base+limit',correct:false},{n:4,text:'틀림. 세그멘테이션은 외부 단편화 발생. 내부는 페이징 ✓',correct:true}],concept:{title:'📌 세그멘테이션',items:['사용자 관점의 메모리 분할(논리적 단위)','가변 크기: 코드, 데이터, 스택 등','세그먼트 테이블: 시작 주소(Base)+크기(Limit)','외부 단편화 발생']}}},
{id:2066,category:'운영체제론',number:66,question:'다음 중 가상기억장치(virtual memory)에 대한 설명으로 가장 옳지 않은 것은?',choices:['가상기억장치를 구성하는 가장 일반적인 방법으로 페이징 기법과 세그멘테이션 기법이 있다.','실행 중인 프로세스에 의해 참조되는 주소를 주기억장치에서 사용하는 주소와 분리한다.','가상기억장치를 이용하면 프로세서의 이용률과 다중 프로그래밍 효과를 높일 수 있다.','프로그램의 크기가 주기억장치의 물리적 공간보다 작아야만 실행될 수 있다.'],answer:4,explanation:{summary:'가상 메모리의 핵심: 프로그램이 실제 물리 메모리보다 커도 실행 가능.',choiceAnalysis:[{n:1,text:'맞음. 페이징, 세그멘테이션이 대표적',correct:false},{n:2,text:'맞음. 가상 주소와 물리 주소 분리',correct:false},{n:3,text:'맞음. 다중 프로그래밍 효율 향상',correct:false},{n:4,text:'틀림. 가상 메모리: 물리 메모리보다 큰 프로그램도 실행 가능 ✓',correct:true}],concept:{title:'📌 가상 메모리 목적',items:['물리 메모리보다 큰 프로그램 실행 가능','프로그램의 일부만 메모리에 로드','나머지는 디스크(스왑 영역)에 보관','프로그래머는 물리 메모리 크기를 신경 쓸 필요 없음']}}},
{id:2067,category:'운영체제론',number:67,question:'가상 기억장치의 이동 단위인 블록 사상에 관한 설명으로 옳은 것은?',choices:['고정길이 블록은 세그먼트(segment), 가변길이 블록은 페이지(page)이다.','페이징 기법은 내부 단편화가 발생하지 않고, 세그멘테이션 기법은 외부 단편화가 발생하지 않는다.','페이지 크기가 작을 경우 페이지 테이블의 크기는 커지며 다중프로그래밍의 정도는 높아진다.','페이지 크기가 클수록 페이지 폴트와 페이지 교체는 자주 발생한다.'],answer:3,explanation:{summary:'페이지 크기 작음: 더 많은 페이지→페이지 테이블 커짐. 더 많은 프로세스가 일부씩 메모리에→다중프로그래밍↑',choiceAnalysis:[{n:1,text:'틀림. 고정길이=페이지, 가변길이=세그먼트',correct:false},{n:2,text:'틀림. 페이지=내부 단편화, 세그먼트=외부 단편화',correct:false},{n:3,text:'맞음. 페이지 크기↓: 테이블↑, 다중프로그래밍↑ ✓',correct:true},{n:4,text:'틀림. 페이지 크기 클수록 폴트 감소(블록이 크면 한 번에 많이 로드)',correct:false}],concept:{title:'📌 페이지 크기 영향',items:['페이지 크기 작음: 테이블 큼, 폴트 많음, 다중프로그래밍 높음','페이지 크기 큼: 테이블 작음, 폴트 적음, 내부 단편화 큼','일반적: 4KB~4MB']}}},
{id:2068,category:'운영체제론',number:68,question:'페이지의 크기가 2048바이트인 경우 가상주소의 페이지 오프셋의 최대 크기는?',choices:['10비트','11비트','12비트','2048비트'],answer:2,explanation:{summary:'2048=2¹¹ → 오프셋 비트=11비트',choiceAnalysis:[{n:1,text:'10비트: 1024바이트',correct:false},{n:2,text:'2048=2¹¹ → 11비트 ✓',correct:true},{n:3,text:'12비트: 4096바이트',correct:false},{n:4,text:'2048비트: 오프셋은 바이트 단위',correct:false}],concept:{title:'📌 페이지 오프셋 계산',items:['페이지 크기 = 2ᵏ 바이트이면 오프셋 = k 비트','2048 = 2¹¹ → 오프셋 11비트','물리 주소 = 프레임 번호 × 페이지크기 + 오프셋']}}},
{id:2069,category:'운영체제론',number:69,question:'가상 기억장치(virtual memory) 구현 방법으로서의 페이징(paging)과 세그멘테이션(segmentation)에 대한 설명으로 옳은 것은?',choices:['페이징 기법에서는 페이지와 페이지 프레임의 크기는 다를 수 있다.','세그멘테이션 기법에서는 세그먼트의 크기가 클 경우 내부 단편화가 자주 발생한다.','페이징 기법에서 페이지의 크기가 2^k바이트이면 가상 주소(virtual address)의 페이지 오프셋(offset)은 k비트로 표현된다.','세그멘테이션 기법에서는 세그먼트의 공유를 허용하지 않는다.'],answer:3,explanation:{summary:'페이지 크기=2ᵏ → 오프셋=k비트. 정확한 설명.',choiceAnalysis:[{n:1,text:'틀림. 페이지와 프레임 크기는 항상 동일',correct:false},{n:2,text:'틀림. 내부 단편화는 페이지 기법. 세그멘테이션은 외부',correct:false},{n:3,text:'맞음. 2^k 크기 페이지 → k비트 오프셋 ✓',correct:true},{n:4,text:'틀림. 세그멘테이션은 공유 지원(코드 공유 등)',correct:false}],concept:{title:'📌 페이지 크기와 오프셋',items:['페이지 크기 = 2ᵏ 바이트 → 오프셋 = k 비트','가상 주소 = 페이지 번호 + 오프셋','예: 4KB=2¹² → 오프셋 12비트']}}},
{id:2070,category:'운영체제론',number:70,question:'페이징(paging) 기법을 사용할 경우 페이지 크기에 대한 설명으로 옳은 것은?',choices:['페이지의 크기와 페이지 프레임(page frame)의 크기는 서로 다르게 설계될 수 있다.','페이지 크기가 커지면 페이지 테이블의 크기도 함께 커진다.','동일한 크기의 데이터를 디스크에 입출력할 때 걸리는 전체 시간은 페이지 크기가 클수록 짧아진다.','페이지 크기가 커지면 외부 단편을 줄일 수 있다.'],answer:3,explanation:{summary:'페이지 크기↑: 한 번에 더 많은 데이터를 디스크에서 읽으므로 I/O 횟수 감소 → 입출력 시간 단축.',choiceAnalysis:[{n:1,text:'틀림. 페이지와 프레임은 항상 같은 크기',correct:false},{n:2,text:'틀림. 페이지 크기↑: 테이블 크기↓(페이지 수 감소)',correct:false},{n:3,text:'맞음. 페이지 크기↑: I/O 효율↑ ✓',correct:true},{n:4,text:'틀림. 페이지는 외부 단편화 없음. 내부 단편화가 증가',correct:false}],concept:{title:'📌 페이지 크기 효과',items:['크기 작음: 내부 단편화↓, 테이블 크기↑, I/O 많음','크기 큼: 내부 단편화↑, 테이블 크기↓, I/O 효율↑','적절한 크기 선택이 중요']}}},
{id:2071,category:'운영체제론',number:71,question:'메모리 크기가 300KB인 시스템에서 요구 페이징(demand paging)으로 가상 메모리(virtual memory)를 구현한다. 이 때 페이지 크기가 3KB라면 35KB 크기의 프로세스를 위한 최소 페이지 테이블의 항목의 개수는?',choices:['11개','12개','35개','100개'],answer:2,explanation:{summary:'페이지 수=천장(35/3)=12개(11.67→12). 12개 항목 필요.',choiceAnalysis:[{n:1,text:'11개: 33KB만 커버',correct:false},{n:2,text:'35/3=11.67 → 올림=12개 ✓',correct:true},{n:3,text:'35개: 1KB 페이지일 때',correct:false},{n:4,text:'100개: 300/3=100(물리 메모리 전체)',correct:false}],concept:{title:'📌 페이지 테이블 항목 수',items:['항목 수 = 프로세스 크기 / 페이지 크기 (올림)','35KB / 3KB = 11.67 → 12개','100개는 물리 메모리의 총 프레임 수']}}},
{id:2072,category:'운영체제론',number:72,question:'페이징 시스템에서 물리 주소 a는 가상 주소인 (p, w)의 쌍으로 매핑되어 표현된다. x를 한 페이지의 크기(바이트 단위)라 할 때, p와 w를 x와 a의 식으로 옳게 나타낸 것은?(단, p는 페이지 번호, w는 페이지 내에서의 오프셋이다)',choices:['p=a/x, w=a%x','p=a%x, w=a/x','p=x/a, w=x%a','p=x%a, w=x/a'],answer:1,explanation:{summary:'페이지 번호=주소÷페이지크기(몫), 오프셋=주소÷페이지크기(나머지)',choiceAnalysis:[{n:1,text:'p=a/x(몫), w=a%x(나머지) ✓',correct:true},{n:2,text:'순서 뒤바뀜',correct:false},{n:3,text:'분자분모 반대',correct:false},{n:4,text:'오류',correct:false}],concept:{title:'📌 가상 주소 계산',items:['가상 주소 a, 페이지 크기 x','페이지 번호 p = a ÷ x (정수 나눗셈)','오프셋 w = a mod x','예: a=1050, x=300 → p=3, w=150']}}},
{id:2073,category:'운영체제론',number:73,question:'페이지 크기가 300B인 페이징 시스템에서 페이지테이블이 다음과 같을 때 논리주소에 대한 물리주소로 옳게 짝지어지지 않은 것은?',boxLabel:'<페이지 테이블>',boxText:'페이지0→프레임3, 페이지1→프레임6, 페이지2→프레임4, 페이지3→프레임5, 페이지4→프레임1',choices:['논리1050 → 물리1650','논리800 → 물리1400','논리70 → 물리970','논리400 → 물리280'],answer:4,explanation:{summary:'논리400: p=400/300=1, w=400%300=100. 프레임1=6. 물리=6×300+100=1900≠280.',choiceAnalysis:[{n:1,text:'1050: p=3,w=150→프레임5→5×300+150=1650 ✓',correct:false},{n:2,text:'800: p=2,w=200→프레임4→4×300+200=1400 ✓',correct:false},{n:3,text:'70: p=0,w=70→프레임3→3×300+70=970 ✓',correct:false},{n:4,text:'400: p=1,w=100→프레임6→6×300+100=1900≠280 ✓',correct:true}],concept:{title:'📌 물리 주소 계산',items:['p=논리÷페이지크기(몫)', 'w=논리%페이지크기','물리=프레임번호×페이지크기+오프셋','400: p=1(400/300=1나머지100), 프레임6→1900']}}},
{id:2074,category:'운영체제론',number:74,question:'페이지 크기가 2,000 byte인 페이징 시스템에서 페이지테이블이 다음과 같을 때 논리주소 6800에 대한 물리주소로 옳은 것은?',boxLabel:'<페이지 테이블>',boxText:'페이지0→프레임1, 페이지1→프레임3, 페이지2→프레임5, 페이지3→프레임2',choices:['800','4800','6800','7400'],answer:2,explanation:{summary:'논리6800: p=6800/2000=3(나머지800), 프레임2→2×2000+800=4800',choiceAnalysis:[{n:1,text:'800: 오프셋만',correct:false},{n:2,text:'p=3,w=800→프레임2→2×2000+800=4800 ✓',correct:true},{n:3,text:'6800: 그대로',correct:false},{n:4,text:'7400: 오류',correct:false}],concept:{title:'📌 물리 주소 변환',items:['논리6800 ÷ 2000 = 페이지3, 나머지800','페이지테이블: 3→프레임2','물리=2×2000+800=4800']}}},
{id:2075,category:'운영체제론',number:75,question:'다음과 같은 세그먼트 테이블을 가지는 시스템에서 논리주소 (1, 100)에 대한 물리주소는?',boxLabel:'<세그먼트 테이블>',boxText:'세그먼트0: 시작670, 길이248\n세그먼트1: 시작1752, 길이422\n세그먼트2: 시작222, 길이198\n세그먼트3: 시작996, 길이604',choices:['398','400','1928','1852'],answer:4,explanation:{summary:'세그먼트1: 시작1752, 오프셋100. 100<422(유효). 물리=1752+100=1852',choiceAnalysis:[{n:1,text:'398: 오류',correct:false},{n:2,text:'400: 오류',correct:false},{n:3,text:'1928: 오류',correct:false},{n:4,text:'1752+100=1852 ✓',correct:true}],concept:{title:'📌 세그멘테이션 주소 변환',items:['논리주소=(세그먼트번호, 오프셋)','오프셋<한계(Limit)이면 유효','물리주소=기저(Base)+오프셋','(1, 100): 기저=1752, 오프셋=100 → 1852']}}},
{id:2076,category:'운영체제론',number:76,question:'역 페이지 테이블(inverted page table)에 대한 설명으로 옳지 않은 것은?',choices:['프레임을 중심으로 물리 메모리의 전체 프레임에 대한 각 프레임이 어떤 프로세스의 어떤 페이지에 할당되었는지를 나타낸다.','역 페이지 테이블은 시스템 당 여러 개 존재할 수 있다.','역 페이지 테이블의 크기는 프로세스의 개수와 관계없이 항상 동일하다.','선형(linear) 역 페이지 테이블을 사용할 경우 비교에 많은 시간이 걸린다.'],answer:2,explanation:{summary:'역 페이지 테이블: 시스템 전체에 하나. 프로세스별로 여러 개 있는 일반 페이지 테이블과 다름.',choiceAnalysis:[{n:1,text:'맞음. 프레임 중심으로 구성',correct:false},{n:2,text:'틀림. 역 페이지 테이블은 시스템당 1개 ✓',correct:true},{n:3,text:'맞음. 물리 메모리 크기에만 의존',correct:false},{n:4,text:'맞음. 선형 탐색은 느림 → 해시 사용',correct:false}],concept:{title:'📌 역 페이지 테이블',items:['일반: 프로세스마다 하나(페이지→프레임 매핑)','역 페이지: 시스템 전체 하나(프레임→프로세스+페이지)','크기: 물리 프레임 수에 비례(항상 동일)','탐색: 해시 테이블로 효율화']}}},
{id:2077,category:'운영체제론',number:77,question:'역 페이지 테이블을 사용하는 가상 메모리 시스템의 페이지 테이블의 각 항목에 반드시 포함되어야 하는 정보만을 나타낸 것은?',choices:['페이지 프레임 번호','페이지 번호, 페이지 프레임 번호','프로세스 식별자, 페이지 번호','페이지 번호'],answer:3,explanation:{summary:'역 페이지 테이블 항목: 어떤 프로세스의(PID) 어떤 페이지(페이지 번호)가 이 프레임을 사용하는지.',choiceAnalysis:[{n:1,text:'프레임 번호: 항목의 인덱스 자체가 프레임 번호',correct:false},{n:2,text:'프레임 번호: 인덱스이므로 항목에 불필요',correct:false},{n:3,text:'PID+페이지 번호: 역 페이지 테이블 항목 ✓',correct:true},{n:4,text:'페이지 번호만으로는 불충분',correct:false}],concept:{title:'📌 역 페이지 테이블 구조',items:['인덱스: 프레임 번호','항목: PID(프로세스ID) + 페이지 번호','탐색: (PID, 페이지번호)로 프레임 찾기']}}},
{id:2078,category:'운영체제론',number:78,question:'다음 <보기>는 페이지 교체 정책에 대한 설명이다. 해당하는 교체 정책과 옳게 연결된 것은?',boxLabel:'<보기>',boxText:'㉠ 각 페이지 당 2개의 하드웨어 비트(참조 비트와 변형 비트)가 필요하다.\n㉡ 페이지 당 참조 횟수에 대한 계수기를 가지며 그 값이 가장 작은 페이지가 교체된다.\n㉢ 최근에 사용되지 않은 페이지를 교체한다.\n㉣ 가장 먼저 주기억장치에 들어온 페이지를 교체한다.',choices:['㉠:NUR / ㉡:LFU / ㉢:LRU / ㉣:FIFO','㉠:FIFO / ㉡:LRU / ㉢:LFU / ㉣:NUR','㉠:LRU / ㉡:LFU / ㉢:FIFO / ㉣:NUR','㉠:LFU / ㉡:LRU / ㉢:NUR / ㉣:FIFO'],answer:1,explanation:{summary:'㉠=NUR(참조비트+변형비트), ㉡=LFU(빈도 계수), ㉢=LRU(최근 미사용), ㉣=FIFO(선입선출)',choiceAnalysis:[{n:1,text:'NUR/LFU/LRU/FIFO ✓',correct:true},{n:2,text:'순서 오류',correct:false},{n:3,text:'순서 오류',correct:false},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 페이지 교체 알고리즘 비교',items:['FIFO: 먼저 적재된 것 교체','LRU: 가장 오래 사용 안 된 것 교체','LFU: 사용 횟수 가장 적은 것 교체','NUR(Not Used Recently): 참조비트+변형비트 이용']}}},
{id:2079,category:'운영체제론',number:79,question:'다음 <보기> 중 FIFO 페이지 교체 기법에 관한 설명으로만 옳게 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. 가장 오랫동안 사용되지 않은 페이지를 교체한다.\nㄴ. 주기억장치에 가장 먼저 적재된 페이지를 교체한다.\nㄷ. 프로세스에 할당된 페이지 프레임의 수가 증가할 경우 페이지 폴트가 같이 증가하는 경우도 발생할 수 있다.\nㄹ. 참조된 횟수가 가장 적은 페이지가 교체되며, 바로 적재된 페이지가 교체될 수도 있다.',choices:['ㄱ, ㄴ','ㄴ, ㄷ','ㄱ, ㄷ','ㄷ, ㄹ'],answer:2,explanation:{summary:'ㄴ(FIFO: 먼저 적재된 것), ㄷ(벨라디 이상: 프레임 증가→폴트 증가 가능)',choiceAnalysis:[{n:1,text:'ㄱ은 LRU',correct:false},{n:2,text:'ㄴ(FIFO), ㄷ(벨라디 이상) ✓',correct:true},{n:3,text:'ㄱ은 LRU',correct:false},{n:4,text:'ㄹ은 LFU',correct:false}],concept:{title:'📌 FIFO 특징',items:['가장 먼저 들어온 페이지 교체','벨라디 이상(Belady Anomaly): 프레임↑→폴트↑','구현 간단, 성능은 보통']}}},
{id:2080,category:'운영체제론',number:80,question:'다음 <보기>와 같은 페이지 요구열이 있다. 각각 LRU, FIFO, LFU 교체 알고리즘을 수행했을 때, 페이지 4와 교체되는 페이지 번호로 옳은 것은? (단, 페이지 프레임의 수는 3이고, 초기 프레임은 모두 비어있다)',boxLabel:'<보기>',boxText:'페이지 요구열 : 0, 1, 0, 1, 2, 0, 1, 0, 1, 3, 4, 2',choices:['FIFO:0 / LRU:2 / LFU:3','FIFO:1 / LRU:0 / LFU:3','FIFO:0 / LRU:0 / LFU:2','FIFO:1 / LRU:1 / LFU:2'],answer:2,explanation:{summary:'페이지 4 도착 직전 프레임 상태 분석: FIFO=1교체, LRU=0교체, LFU=3교체(가장 적게 사용)',choiceAnalysis:[{n:1,text:'FIFO:0 오류',correct:false},{n:2,text:'FIFO:1, LRU:0, LFU:3 ✓',correct:true},{n:3,text:'오류',correct:false},{n:4,text:'오류',correct:false}],concept:{title:'📌 페이지 교체 알고리즘 비교',items:['요구열 끝까지 추적: 0,1,0,1,2,0,1,0,1,3,...','4 도착 시: 프레임에 0,1,2 또는 0,1,3 등','FIFO: 먼저 들어온 것, LRU: 가장 오래된 것, LFU: 적게 사용된 것']}}},
{id:2081,category:'운영체제론',number:81,question:'다음 <보기>는 페이지 교체 순서이다. 사용된 페이지 교체 정책은 무엇인가?',boxLabel:'<보기>',boxText:'프레임=3, 요구열: 1 0 2 0 2 1 3 2 4 2 1 3\n프레임: 1→0→2→(교체)→1→3→2→4→...',choices:['FIFO','LRU','LFU','최적'],answer:2,explanation:{summary:'LRU: 가장 오래 사용되지 않은 페이지 교체 패턴.',choiceAnalysis:[{n:1,text:'FIFO: 먼저 들어온 것 교체',correct:false},{n:2,text:'LRU: 가장 오래 사용 안 된 것 교체 ✓',correct:true},{n:3,text:'LFU: 빈도 기반',correct:false},{n:4,text:'최적: 미래 예측 기반',correct:false}],concept:{title:'📌 LRU 교체 패턴',items:['각 페이지의 마지막 접근 시간 기록','가장 오래 전에 접근된 페이지 교체','시간적 지역성 활용','구현: 스택, 카운터 방식']}}},
{id:2082,category:'운영체제론',number:82,question:'페이지 기반 메모리 관리 시스템에서 LRU 페이지 교체 알고리즘을 스택을 이용하여 구현했다고 가정하자. 이 시스템의 프레임 수가 4이고 메모리 참조열이 <보기>와 같을 때, 모든 메모리 참조가 끝났을 경우 스택의 내용을 올바르게 표현한 것은?',boxLabel:'<보기>',boxText:'메모리 참조열: 4 5 0 4 3 5 1 0 1 2 1 2 5 1 2 1 3 1 3 5',choices:['1,2,3,5(top:1)','4,5,1,3(top:4)','5,3,1,2(top:5)','5,1,3,2(top:5)'],answer:3,explanation:{summary:'LRU 스택: top=가장 최근 사용, bottom=가장 오래 전. 마지막 4번 접근: 3,1,3,5 → 5,3,1,... (스택 확인)',choiceAnalysis:[{n:1,text:'오류',correct:false},{n:2,text:'오류',correct:false},{n:3,text:'5,3,1,2 순서 ✓',correct:true},{n:4,text:'5,1,3,2 오류',correct:false}],concept:{title:'📌 LRU 스택 구현',items:['가장 최근 참조: 스택의 top','가장 오래 전 참조: 스택의 bottom','페이지 교체: bottom 제거','참조 시: 스택에서 찾아 top으로 이동']}}},
{id:2083,category:'운영체제론',number:83,question:'지역성(locality)에 관한 설명으로 옳은 것은?',choices:['캐시 메모리와 가상 메모리의 교체 정책은 지역성에 근거하여 수행되는 것이 좋다.','프로세스들은 기억장치내의 어느 특정 부분을 집중적으로 참조하기 보다는 모든 부분을 균등하게 접근한다.','시간적 지역성은 어떤 항목이 참조되면 그 근처에 있는 다른 항목도 곧 참조될 가능성이 높다는 특성이다.','공간적 지역성은 어떤 항목이 참조되면 가까운 미래에 그 항목이 반복적으로 참조될 가능성이 높다는 특성이다.'],answer:1,explanation:{summary:'캐시와 가상 메모리는 지역성을 활용하여 성능 향상.',choiceAnalysis:[{n:1,text:'맞음. 지역성 기반 교체 정책 ✓',correct:true},{n:2,text:'틀림. 집중 참조가 지역성의 본질',correct:false},{n:3,text:'틀림. 이것은 공간적 지역성',correct:false},{n:4,text:'틀림. 이것은 시간적 지역성',correct:false}],concept:{title:'📌 지역성(Locality) 유형',items:['시간적 지역성: 최근 참조된 데이터는 다시 참조 가능(루프)','공간적 지역성: 참조된 주소 근처도 참조 가능(배열)','캐시, 가상 메모리, 웹 캐시 모두 지역성 활용']}}},
{id:2084,category:'운영체제론',number:84,question:'일정 시간 범위 내에 프로세스가 참조한 페이지들을 모아놓은 것을 무엇이라 하는가?',choices:['작업집합','스래싱','스와핑','페이지 부재 빈도'],answer:1,explanation:{summary:'작업집합(Working Set): 일정 시간(Δ) 동안 프로세스가 참조한 페이지의 집합.',choiceAnalysis:[{n:1,text:'작업집합(Working Set): 최근 Δ시간 참조 페이지 집합 ✓',correct:true},{n:2,text:'스래싱: 페이지 교체로 인한 성능 저하',correct:false},{n:3,text:'스와핑: 전체 프로세스를 디스크로 이동',correct:false},{n:4,text:'페이지 부재 빈도: 폴트 발생 비율',correct:false}],concept:{title:'📌 작업집합(Working Set)',items:['W(t,Δ): 시점 t 기준 Δ 시간 동안 참조된 페이지들','작업집합 크기에 맞는 프레임 할당','스래싱 방지: 작업집합 이하로 프레임 줄이지 않음']}}},
{id:2085,category:'운영체제론',number:85,question:'다음 <보기>의 설명에 해당하는 것은 무엇인가?',boxLabel:'<보기>',boxText:'∘ 어떤 프로세스가 충분한 프레임을 갖지 못할 경우 페이지 부재가 자주 발생한다.\n∘ 페이지 부재로 인해 프로세스는 계속 페이지 교체를 수행해야 한다.\n∘ 이로 인해 프로세스 실행에 보내는 시간보다 페이지 교체에 보내는 시간이 큰 경우를 말한다.',choices:['페이징(paging)','최악 적합(worst-fit)','스래싱(thrashing)','페이지 부재(page-fault) 빈도'],answer:3,explanation:{summary:'스래싱(Thrashing): 페이지 교체에 대부분의 시간 소비 → CPU 이용률 급감.',choiceAnalysis:[{n:1,text:'페이징: 메모리 관리 기법',correct:false},{n:2,text:'최악 적합: 메모리 배치 전략',correct:false},{n:3,text:'스래싱: 페이지 교체 과다 ✓',correct:true},{n:4,text:'페이지 부재 빈도: 측정 방법',correct:false}],concept:{title:'📌 스래싱(Thrashing)',items:['원인: 프레임 부족 → 폴트 빈발','결과: CPU 이용률 급감','해결: 다중 프로그래밍 정도 낮춤','작업집합 모델로 예방']}}},
{id:2086,category:'운영체제론',number:86,question:'다음 스래싱(thrashing)의 해결 방안으로 옳지 않은 것은?',choices:['다중 프로그래밍의 정도를 낮춤으로써 해결이 가능하다.','전역 페이지 교체(global page replacement) 알고리즘을 사용하여 해결이 가능하다.','페이지 부재율이 너무 높으면 프로세스에게 페이지 프레임을 더 할당해준다.','페이지 부재율이 너무 낮으면 프로세스로부터 페이지 프레임을 회수한다.'],answer:2,explanation:{summary:'전역 페이지 교체는 스래싱을 악화시킬 수 있음. 지역 교체가 스래싱 방지에 더 효과적.',choiceAnalysis:[{n:1,text:'맞음. 다중프로그래밍 감소=스래싱 완화',correct:false},{n:2,text:'틀림. 전역 교체=다른 프로세스에서 프레임 빼앗음=악화 가능 ✓',correct:true},{n:3,text:'맞음. 폴트율 높음=프레임 추가 할당',correct:false},{n:4,text:'맞음. 폴트율 낮음=프레임 회수',correct:false}],concept:{title:'📌 스래싱 해결',items:['다중프로그래밍 정도 낮춤','작업집합 기반 프레임 할당','페이지 부재 빈도(PFF) 알고리즘','지역 교체(Local Replacement) 사용']}}},
{id:2087,category:'운영체제론',number:87,question:'디스크 스케줄링에서 처리순서가 50, 60, 65, 95, 120, 130, 190, 199, 0, 15, 30인 경우 사용된 디스크 스케줄링 알고리즘의 특징으로 옳지 않은 것은?',choices:['헤드는 항상 바깥쪽에서 안쪽으로 이동하면서 처리한다.','새로 도착한 요청은 다음 번 이동 때 처리된다.','안쪽이나 바깥쪽의 트랙이 가운데 트랙보다 서비스를 덜 받을 가능성이 높다.','요청되지 않은 가장 안쪽 트랙과 바깥쪽 트랙을 방문한다.'],answer:1,explanation:{summary:'처리 순서가 50→199→0→30: 한 방향(안쪽까지)→다시 처음부터. C-SCAN(Circular SCAN) 알고리즘.',choiceAnalysis:[{n:1,text:'틀림. C-SCAN: 한 방향으로만 이동하고 끝에 도달하면 반대쪽 끝으로 이동(바깥→안쪽 방향일 때 양방향 아님) ✓',correct:true},{n:2,text:'맞음. C-SCAN: 이동 방향에 없으면 다음 번',correct:false},{n:3,text:'맞음. C-SCAN도 양 끝 차별',correct:false},{n:4,text:'맞음. SCAN/C-SCAN: 요청 없어도 끝 방문',correct:false}],concept:{title:'📌 C-SCAN 알고리즘',items:['한 방향으로만 이동하며 처리','끝에 도달하면 반대쪽 끝으로 점프(되돌아감)','균일한 대기시간, 단방향 처리']}}},
{id:2088,category:'운영체제론',number:88,question:'다음 디스크 스케줄링(disk scheduling) 알고리즘에 대한 설명으로 옳지 않은 것은?',choices:['FCFS 알고리즘은 공평성이 보장되나 헤드 이동거리가 매우 커질 수 있다.','SSTF 알고리즘은 대화형 시스템보다 일괄처리에 더 적합하다.','SCAN 알고리즘은 헤드의 이동 방향을 전환하기 위해 요구되지 않은 트랙을 방문한다.','C-SCAN 알고리즘은 도중에 발생한 트랙 요청 번호가 가까울 경우 무조건 먼저 처리한다.'],answer:4,explanation:{summary:'C-SCAN: 한 방향으로만 처리. 도중에 발생한 요청은 다음 방향 통과 시 처리. "무조건 먼저"는 SSTF.',choiceAnalysis:[{n:1,text:'맞음. FCFS: 공평하나 이동거리 큼',correct:false},{n:2,text:'맞음. SSTF: 현재 위치 가장 가까운 것 먼저. 기아 가능',correct:false},{n:3,text:'맞음. SCAN: 끝까지 이동 후 방향 전환',correct:false},{n:4,text:'틀림. C-SCAN은 현재 방향에 있는 것만 처리. 가까운 것 우선은 SSTF ✓',correct:true}],concept:{title:'📌 디스크 스케줄링 비교',items:['FCFS: 도착 순서, 공평, 이동거리 큼','SSTF: 가장 가까운 것 먼저, 기아 가능','SCAN(엘리베이터): 한 방향→끝→반대 방향','C-SCAN: 한 방향만, 끝에서 시작으로 jump']}}},
{id:2089,category:'운영체제론',number:89,question:'디스크의 서비스 요청 대기 큐에 도착한 요청이 다음과 같을 때 C-SCAN 스케줄링 알고리즘에 의한 헤드의 총 이동거리는 얼마인가? (단, 현재 헤드의 위치는 50에 있고, 헤드의 이동 방향은 0에서 199방향이다.)',boxLabel:'요청 대기 큐',boxText:'95, 180, 34, 119, 11, 123, 62, 64',choices:['385','350','270','234'],answer:1,explanation:{summary:'C-SCAN(50→199 방향): 62,64,95,119,123,180,199(끝),0(jump),11,34. 이동거리=(199-50)+(199-0)+(34-0)=149+199+34=382... 약 385',choiceAnalysis:[{n:1,text:'약 385 ✓',correct:true},{n:2,text:'350 오류',correct:false},{n:3,text:'270 오류',correct:false},{n:4,text:'234 오류',correct:false}],concept:{title:'📌 C-SCAN 이동거리 계산',items:['현재=50, 방향=증가(199방향)','50→199: 62,64,95,119,123,180,199 처리','199→0: 점프','0→34: 11,34 처리','이동=(199-50)+(199-0)+(34-0)=149+199+34=382']}}},
{id:2090,category:'운영체제론',number:90,question:'파일 시스템에서 파일에 접근하기 위해 다음 단계들을 거치는 접근 제어 행렬에 관한 설명으로 옳지 않은 것은?',choices:['행은 사용자(주체)를 나타내고, 열은 객체(파일, 장치)를 나타낸다.','각 셀에는 해당 사용자가 그 객체에 대해 갖는 접근 권한이 들어 있다.','접근 제어 행렬은 행을 기준으로 나누면 능력 목록(Capability List)이 된다.','접근 제어 행렬의 각 열을 분리하면 접근 제어 목록(ACL)이 된다.'],answer:3,explanation:{summary:'행 기준(사용자 중심)=능력 목록(Capability List). 열 기준(객체 중심)=ACL. 맞음.',choiceAnalysis:[{n:1,text:'맞음. 행=사용자, 열=객체',correct:false},{n:2,text:'맞음. 셀=접근 권한',correct:false},{n:3,text:'맞음. 행 기준=Capability List ✓',correct:true},{n:4,text:'맞음. 열 기준=ACL',correct:false}],concept:{title:'📌 접근 제어',items:['접근 제어 행렬: 사용자×객체 권한 표','ACL(Access Control List): 열 기준, 객체별 허가 목록','Capability List: 행 기준, 사용자별 권한 목록']}}},
{id:2091,category:'운영체제론',number:91,question:'파일 시스템의 파일 디스크립터(file descriptor)에 포함되지 않는 정보는?',choices:['파일의 이름','파일의 크기','파일 생성 날짜','파일의 내용'],answer:3,explanation:{summary:'파일 디스크립터(FCB): 파일 이름, 크기, 날짜, 위치 등 메타데이터. 파일 내용 자체는 아님.',choiceAnalysis:[{n:1,text:'맞음. 파일 이름 포함',correct:false},{n:2,text:'맞음. 파일 크기 포함',correct:false},{n:3,text:'맞음. 생성/수정 날짜 포함',correct:false},{n:4,text:'틀림. 파일 내용은 별도 데이터 블록에 저장 ✓',correct:true}],concept:{title:'📌 파일 디스크립터(FCB) 내용',items:['파일 이름, 크기','생성/수정/접근 날짜','파일 위치(디스크 블록 번호)','소유자, 접근 권한','링크 수, 파일 유형']}}},
{id:2092,category:'운영체제론',number:92,question:'i-node(index node)에 대한 설명으로 옳지 않은 것은?',choices:['유닉스/리눅스 파일 시스템에서 사용된다.','파일의 메타데이터를 저장하는 자료구조이다.','i-node에는 파일의 이름이 저장된다.','디렉터리는 파일 이름과 i-node 번호의 매핑 정보를 갖는다.'],answer:3,explanation:{summary:'i-node: 파일 이름은 저장하지 않음. 이름은 디렉터리 항목에 저장. i-node는 파일 메타데이터.',choiceAnalysis:[{n:1,text:'맞음. UNIX/Linux에서 사용',correct:false},{n:2,text:'맞음. 메타데이터 저장',correct:false},{n:3,text:'틀림. i-node에는 파일 이름 없음 ✓',correct:true},{n:4,text:'맞음. 디렉터리: (이름, i-node번호) 쌍',correct:false}],concept:{title:'📌 i-node 구조',items:['i-node 내용: 파일 타입, 권한, 소유자, 크기, 타임스탬프, 데이터 블록 주소','파일 이름: 디렉터리 항목에 저장','디렉터리: {filename:이름, inode:번호} 쌍']}}},
{id:2093,category:'운영체제론',number:93,question:'파일 할당(file allocation)에 대한 다음 설명 중 옳지 않은 것은?',choices:['연속 할당(contiguous allocation)은 주기적인 압축이 필요하다.','동일한 크기의 파일을 저장할 때 연속 할당보다 연결 할당이 디스크 공간을 더 효율적으로 사용한다.','인덱스 할당(indexed allocation)은 직접 접근(direct access)이 가능하다.','연결 할당(linked allocation)은 임의 접근(random access)이 효율적이지 않다.'],answer:2,explanation:{summary:'연속 할당이 공간 효율은 더 좋음. 연결 할당은 포인터 공간 낭비가 있음.',choiceAnalysis:[{n:1,text:'맞음. 연속 할당: 외부 단편화→압축 필요',correct:false},{n:2,text:'틀림. 연속 할당이 포인터 없어 더 효율적. 연결 할당은 포인터 공간 낭비 ✓',correct:true},{n:3,text:'맞음. 인덱스: 인덱스 블록으로 직접 접근',correct:false},{n:4,text:'맞음. 연결: 순차 접근만 효율적',correct:false}],concept:{title:'📌 파일 할당 방법',items:['연속 할당: 연속 블록, 직접 접근 OK, 외부 단편화','연결 할당: 포인터로 연결, 순차 접근, 포인터 공간 낭비','인덱스 할당: 인덱스 블록, 직접/순차 접근 모두 OK']}}},
{id:2094,category:'운영체제론',number:94,question:'파일 시스템에서 디렉터리의 역할로 옳지 않은 것은?',choices:['파일 이름을 파일의 실제 데이터 위치에 매핑한다.','파일에 대한 메타데이터를 직접 저장한다.','파일의 계층적 구조를 지원한다.','파일 접근을 위한 경로를 제공한다.'],answer:4,explanation:{summary:'디렉터리는 파일 이름과 i-node 번호를 매핑. 메타데이터는 i-node에 저장.',choiceAnalysis:[{n:1,text:'맞음. 이름→위치(i-node) 매핑',correct:false},{n:2,text:'틀림. 메타데이터는 i-node에 저장. 디렉터리는 (이름,i-node번호)만 저장 ✓',correct:true},{n:3,text:'맞음. 계층 구조 지원',correct:false},{n:4,text:'맞음. 경로 탐색 지원',correct:false}],concept:{title:'📌 디렉터리 역할',items:['파일 이름과 i-node 번호 매핑','계층적 파일 시스템 구조 제공','경로 탐색(/home/user/file)','메타데이터는 i-node에, 이름은 디렉터리에']}}},
{id:2095,category:'운영체제론',number:95,question:'유닉스(Unix) 파일 시스템에 대한 설명으로 옳은 것은?',choices:['파일 이름은 i-node에 저장된다.','i-node는 프로세스당 하나씩 존재한다.','링크(link)는 i-node를 공유하는 방법이다.','수퍼 블록(super block)은 파일의 데이터를 저장한다.'],answer:3,explanation:{summary:'하드 링크: 같은 i-node를 가리키는 다른 디렉터리 항목(이름). i-node를 공유.',choiceAnalysis:[{n:1,text:'틀림. 파일 이름은 디렉터리 항목에',correct:false},{n:2,text:'틀림. i-node는 파일당 하나씩',correct:false},{n:3,text:'맞음. 하드 링크: 같은 i-node 공유 ✓',correct:true},{n:4,text:'틀림. 수퍼 블록: 파일 시스템 메타데이터',correct:false}],concept:{title:'📌 Unix 파일 시스템 구조',items:['부트 블록: 부팅 코드','수퍼 블록: 파일 시스템 전체 정보(크기, 빈 블록 수 등)','i-node 영역: 파일 메타데이터','데이터 블록: 실제 파일 내용','하드 링크: 동일 i-node 공유']}}},
{id:2096,category:'운영체제론',number:96,question:'운영체제의 보안(security)에 관한 설명으로 옳지 않은 것은?',choices:['인증(Authentication)은 사용자의 신원을 확인하는 과정이다.','권한 부여(Authorization)는 인증된 사용자가 접근할 수 있는 자원을 결정한다.','감사(Audit)는 시스템 활동을 기록하고 검사하는 과정이다.','접근 제어 목록(ACL)은 주체(사용자) 중심으로 관리된다.'],answer:2,explanation:{summary:'ACL은 객체(파일, 자원) 중심 관리. 주체 중심은 Capability List.',choiceAnalysis:[{n:1,text:'맞음. 인증: 신원 확인',correct:false},{n:2,text:'틀림. ACL: 객체 중심. 주체 중심은 Capability List ✓',correct:true},{n:3,text:'맞음. 감사: 시스템 활동 기록',correct:false},{n:4,text:'틀림이지만 정답',correct:false}],concept:{title:'📌 접근 제어 방식',items:['ACL(Access Control List): 각 파일/객체마다 허가된 사용자 목록','Capability List: 각 사용자마다 접근 가능한 객체 목록','ACL = 열 기준 / Capability = 행 기준']}}},
{id:2097,category:'운영체제론',number:97,question:'운영체제에서 교착상태(deadlock)가 발생하는 조건이 아닌 것은?',choices:['상호 배제(mutual exclusion)','점유와 대기(hold and wait)','비선점(no preemption)','공정 스케줄링(fair scheduling)'],answer:4,explanation:{summary:'교착상태 4조건: 상호배제, 점유대기, 비선점, 환형대기. 공정 스케줄링은 해당 없음.',choiceAnalysis:[{n:1,text:'상호배제: 교착상태 조건',correct:false},{n:2,text:'점유대기: 교착상태 조건',correct:false},{n:3,text:'비선점: 교착상태 조건',correct:false},{n:4,text:'공정 스케줄링: 교착상태 조건 아님 ✓',correct:true}],concept:{title:'📌 교착상태 4가지 필요조건',items:['1. 상호배제','2. 점유대기','3. 비선점','4. 환형대기(순환대기)','이 중 하나를 제거하면 교착상태 방지']}}},
{id:2098,category:'운영체제론',number:98,question:'리눅스 운영체제에 대한 설명으로 옳지 않은 것은?',choices:['GPL(General Public License) 기반의 오픈소스 운영체제이다.','유닉스(Unix) 운영체제와 호환성을 가진다.','모놀리식 커널(Monolithic Kernel) 구조를 기반으로 한다.','완전한 마이크로 커널(Micro Kernel) 구조로 설계되었다.'],answer:3,explanation:{summary:'리눅스는 모놀리식 커널(일부 마이크로 커널 요소 포함). 완전한 마이크로 커널은 아님.',choiceAnalysis:[{n:1,text:'맞음. GPL 오픈소스',correct:false},{n:2,text:'맞음. POSIX 표준으로 유닉스 호환',correct:false},{n:3,text:'맞음. 모놀리식 커널 기반(모듈형 지원)',correct:false},{n:4,text:'틀림. 완전한 마이크로 커널 아님 ✓',correct:true}],concept:{title:'📌 커널 구조',items:['모놀리식(Monolithic): 모든 기능이 커널 공간에(Linux, Unix)','마이크로 커널(Micro Kernel): 최소 기능만 커널에, 나머지는 사용자 공간(Mach, QNX)','하이브리드: Windows NT, macOS']}}},
{id:2099,category:'운영체제론',number:99,question:'다음 중 실시간 운영체제(RTOS)에 대한 설명으로 옳은 것은?',choices:['사용자의 요청에 즉각적으로 반응하는 시분할 운영체제이다.','데이터 처리 결과를 일정 기간 모아서 일괄처리하는 시스템이다.','데드라인(deadline) 내에 작업이 완료될 것을 보장하는 운영체제이다.','여러 사용자가 동시에 시스템을 공유하는 다중 사용자 운영체제이다.'],answer:3,explanation:{summary:'RTOS: 정해진 시간(데드라인) 내에 작업 완료를 보장.',choiceAnalysis:[{n:1,text:'시분할 시스템 설명',correct:false},{n:2,text:'배치 처리 설명',correct:false},{n:3,text:'RTOS: 데드라인 보장 ✓',correct:true},{n:4,text:'다중 사용자 시스템 설명',correct:false}],concept:{title:'📌 실시간 운영체제(RTOS)',items:['하드 실시간: 데드라인 절대 보장(항공, 군사)','소프트 실시간: 데드라인 초과 허용(멀티미디어)','EDF(Earliest Deadline First): RTOS 스케줄링','예: FreeRTOS, VxWorks, RTEMS']}}},
{id:2100,category:'운영체제론',number:100,question:'다음 중 커널(Kernel)의 종류와 특징에 대한 설명으로 옳지 않은 것은?',choices:['모놀리식 커널은 OS 서비스를 커널 공간에서 수행하며 성능이 좋다.','마이크로 커널은 최소한의 기능만 커널에 두고 나머지는 사용자 공간에 둔다.','마이크로 커널 구조는 커널 크기가 작아 안정성이 높다.','모놀리식 커널이 마이크로 커널보다 확장성이 높다.'],answer:3,explanation:{summary:'마이크로 커널이 확장성 높음. 모놀리식은 크기가 커 수정이 어려워 확장성 낮음.',choiceAnalysis:[{n:1,text:'맞음. 모놀리식: 커널 공간에서 처리=빠름',correct:false},{n:2,text:'맞음. 마이크로: 최소 기능만 커널에',correct:false},{n:3,text:'맞음. 마이크로: 작은 커널=안정성↑',correct:false},{n:4,text:'틀림. 마이크로 커널이 모듈화로 확장성↑ ✓',correct:true}],concept:{title:'📌 커널 비교',items:['모놀리식: 빠름, 크기 큼, 안정성 낮을 수 있음, 확장 어려움','마이크로: 느림(IPC 오버헤드), 작음, 안정성↑, 확장성↑']}}},,
{id:3001,category:'데이터통신',number:1,question:'데이터 통신 시스템의 기본 구성 요소에 해당하지 않는 것은?',choices:['송신자(source)와 수신자(destination)','전송매체(media)','메시지(message)','다중화 장비(multiplexing unit)'],answer:4,explanation:{summary:'데이터통신 기본 구성: 송수신자, 전송매체, 메시지, 프로토콜. 다중화 장비는 부가 장치.',choiceAnalysis:[{n:1,text:'송수신자: 필수 요소',correct:false},{n:2,text:'전송매체: 필수 요소',correct:false},{n:3,text:'메시지: 필수 요소',correct:false},{n:4,text:'다중화 장비: 부가 장치. 필수 구성 아님 ✓',correct:true}],concept:{title:'📌 데이터통신 기본 구성',items:['송신자(Source): 데이터 발신','수신자(Destination): 데이터 수신','메시지(Message): 전송 데이터','전송매체(Media): 전송 경로','프로토콜(Protocol): 통신 규약']}}},
{id:3002,category:'데이터통신',number:2,question:'2400 baud의 변조속도, 8위상 방식으로 전송할 경우 1초에 전송되는 비트수(bps)는 얼마인가?',choices:['2400','3600','4800','7200'],answer:4,explanation:{summary:'8위상=2³=3비트/보드. 비트율=2400×3=7200bps',choiceAnalysis:[{n:1,text:'2400: 1비트/보드일 때',correct:false},{n:2,text:'3600: 계산 오류',correct:false},{n:3,text:'4800: 2위상일 때',correct:false},{n:4,text:'2400×log₂8=2400×3=7200bps ✓',correct:true}],concept:{title:'📌 변조 속도와 전송 속도',items:['비트율(bps) = 보드율(baud) × log₂(신호상태수)','8위상(PSK) = log₂8 = 3비트/보드','2400 baud × 3 = 7200 bps','QAM-64 = log₂64 = 6비트/보드']}}},
{id:3003,category:'데이터통신',number:3,question:'다음 <보기>의 설명에 해당하는 전송 방식은 무엇인가?',boxLabel:'<보기>',boxText:'∘ 짧은 비트열을 전송하여 송수신 타이밍 문제가 발생하지 않도록 한다.\n∘ 비트열 전후에 시작비트(start bit)와 정지비트(stop bit)를 추가하여 전송한다.\n∘ 초기 저속 전송에 사용되었으나 최근에는 고속전송에도 사용된다.',choices:['전이중 전송방식','비동기식 전송방식','문자 지향 동기식 전송방식','비트 지향 동기식 전송방식'],answer:2,explanation:{summary:'비동기식: 시작비트+데이터+정지비트. 문자 단위로 독립 전송.',choiceAnalysis:[{n:1,text:'전이중: 동시 양방향 통신',correct:false},{n:2,text:'비동기식: 시작/정지비트로 동기 ✓',correct:true},{n:3,text:'문자 지향 동기: SYN 문자로 동기화',correct:false},{n:4,text:'비트 지향 동기: 플래그 비트로 동기화',correct:false}],concept:{title:'📌 비동기식 vs 동기식 전송',items:['비동기식: 시작비트+데이터+정지비트, 문자 단위','동기식: 긴 블록 단위, SYN 또는 플래그로 동기','비동기: 오버헤드 크지만 구현 단순']}}},
{id:3004,category:'데이터통신',number:4,question:'다음 중 주파수를 다르게 하여 디지털 정보를 변조할 수 있는 변조 방식은 무엇인가?',choices:['QAM','FSK','ASK','PSK'],answer:2,explanation:{summary:'FSK(Frequency Shift Keying): 주파수를 변화시켜 디지털 신호 표현.',choiceAnalysis:[{n:1,text:'QAM: 진폭+위상 동시 변조',correct:false},{n:2,text:'FSK: 주파수 변이 변조 ✓',correct:true},{n:3,text:'ASK: 진폭 변이 변조',correct:false},{n:4,text:'PSK: 위상 변이 변조',correct:false}],concept:{title:'📌 디지털 변조 방식',items:['ASK(Amplitude Shift Keying): 진폭 변화','FSK(Frequency Shift Keying): 주파수 변화','PSK(Phase Shift Keying): 위상 변화','QAM: 진폭+위상 동시 변화(고효율)']}}},
{id:3005,category:'데이터통신',number:5,question:'다음 <보기>의 각 설명에 해당하는 PCM 송신측 단계로 옳은 것은?',boxLabel:'<보기>',boxText:'ㄱ. 연속적인 아날로그 신호를 불연속적인 진폭을 갖는 펄스신호를 생성하는 과정.\nㄴ. 이진 데이터로 변환하는 과정.\nㄷ. 펄스 신호를 일정 정수값으로 정량화하는 과정.',choices:['ㄱ:양자화 / ㄴ:부호화 / ㄷ:표본화','ㄱ:표본화 / ㄴ:양자화 / ㄷ:부호화','ㄱ:양자화 / ㄴ:표본화 / ㄷ:부호화','ㄱ:표본화 / ㄴ:부호화 / ㄷ:양자화'],answer:4,explanation:{summary:'PCM: 표본화(Sampling)→양자화(Quantization)→부호화(Encoding)',choiceAnalysis:[{n:1,text:'순서 오류',correct:false},{n:2,text:'순서 오류',correct:false},{n:3,text:'순서 오류',correct:false},{n:4,text:'ㄱ=표본화(펄스생성), ㄴ=부호화(이진변환), ㄷ=양자화(정수화) ✓',correct:true}],concept:{title:'📌 PCM 3단계',items:['1. 표본화(Sampling): 아날로그→이산 펄스','2. 양자화(Quantization): 펄스→정수 레벨','3. 부호화(Encoding): 이진 코드로 변환']}}},
{id:3006,category:'데이터통신',number:6,question:'통신 시스템에서 아날로그 신호를 디지털 신호로 변환하는 과정에서, 최대 주파수의 최소 2배 이상 이 작업을 수행하면 원래의 정보를 복원할 수 있다. 해당 작업은?',choices:['표본화(sampling)','부호화(encoding)','복호화(decoding)','양자화(quantization)'],answer:1,explanation:{summary:'나이퀴스트 표본화 정리: 표본화 주파수 ≥ 2×최대 주파수. 표본화(Sampling)에 적용.',choiceAnalysis:[{n:1,text:'표본화: 나이퀴스트 정리 적용 ✓',correct:true},{n:2,text:'부호화: 디지털→코드 변환',correct:false},{n:3,text:'복호화: 코드→원래 신호',correct:false},{n:4,text:'양자화: 연속값→이산값',correct:false}],concept:{title:'📌 나이퀴스트 표본화 정리',items:['표본화 주파수 ≥ 2 × 신호 최대 주파수','부족하면 앨리어싱(Aliasing) 발생','예: 음성(4kHz) → 8kHz 이상으로 표본화']}}},
{id:3007,category:'데이터통신',number:7,question:'다음 <보기>의 설명에 해당하는 다중화 방식은 무엇인가?',boxLabel:'<보기>',boxText:'∘ 여러 사용자가 시간과 주파수를 공유하면서 신호를 송수신할 수 있다.\n∘ 주파수 대역확산(spread spectrum) 기술을 사용하여 정보를 전송한다.\n∘ 도청과 간섭을 방지하여 통신 비밀 보장이 가능하다.',choices:['주파수 분할 다중화 방식(FDMA)','동기식 시분할 다중화 방식(STDMA)','비동기 시분할 다중화 방식(ATDMA)','코드분할 다중화 방식(CDMA)'],answer:4,explanation:{summary:'CDMA: 대역확산 기술, 코드로 구분, 보안성 높음.',choiceAnalysis:[{n:1,text:'FDMA: 주파수 분할',correct:false},{n:2,text:'STDMA: 시간 분할(동기)',correct:false},{n:3,text:'ATDMA: 시간 분할(비동기)',correct:false},{n:4,text:'CDMA: 대역확산+코드 분할 ✓',correct:true}],concept:{title:'📌 다중화 방식 비교',items:['FDMA: 주파수 분할(AM/FM 라디오)','TDMA: 시간 슬롯 분할(GSM)','CDMA: 코드 분할+대역확산(3G)','OFDMA: 직교 주파수 분할(LTE)']}}},
{id:3008,category:'데이터통신',number:8,question:'다음 각 다중화 방식에 대한 설명으로 옳지 않은 것은?',choices:['주파수 분할 다중화 방식은 보호 대역으로 인한 대역폭 낭비가 발생한다.','동기식 시분할 다중화 방식은 송신 터미널을 나타내는 주소가 반드시 필요하다.','비동기식 시분할 다중화 방식은 실제 전송할 데이터를 갖는 터미널에만 타임 슬롯이 할당된다.','코드분할 다중화 방식은 간섭의 최소화로 회선품질이 양호하다.'],answer:2,explanation:{summary:'동기식 TDM: 고정 타임슬롯 할당으로 주소 불필요. 비동기식 TDM이 주소 필요.',choiceAnalysis:[{n:1,text:'맞음. FDMA: 보호 대역으로 낭비',correct:false},{n:2,text:'틀림. 동기식 TDM은 고정 슬롯이므로 주소 불필요 ✓',correct:true},{n:3,text:'맞음. 비동기 TDM: 데이터 있는 터미널에만 할당',correct:false},{n:4,text:'맞음. CDMA: 보안성/품질 우수',correct:false}],concept:{title:'📌 동기식 vs 비동기식 TDM',items:['동기식 TDM: 고정 타임슬롯, 비어있어도 할당, 주소 불필요','비동기식 TDM: 통계적 할당, 데이터 있을 때만, 주소 헤더 필요']}}},
{id:3009,category:'데이터통신',number:9,question:'다음 <보기>의 설명에 해당하는 것은?',boxLabel:'<보기>',boxText:'∘ 한 개의 반송파로 넓은 대역폭을 갖는 신호 대신에 각각 직교성을 갖는 여러 주파수에 데이터를 나누어 전송한다.\n∘ LTE-Advanced 및 IEEE 802.16m에서 이 방식을 채택했다.',choices:['TDMA','FDMA','CDMA','OFDMA'],answer:4,explanation:{summary:'OFDMA: 직교 주파수 분할 다중화. LTE(4G), 5G, Wi-Fi 6에서 사용.',choiceAnalysis:[{n:1,text:'TDMA: 시분할',correct:false},{n:2,text:'FDMA: 주파수 분할',correct:false},{n:3,text:'CDMA: 코드 분할',correct:false},{n:4,text:'OFDMA: 직교 다중 반송파 ✓',correct:true}],concept:{title:'📌 OFDMA',items:['직교 주파수 분할 다중 접속','다수의 부반송파(Subcarrier) 사용','주파수 선택적 페이딩 극복','LTE, 5G NR, Wi-Fi 6(IEEE 802.11ax)']}}},
{id:3010,category:'데이터통신',number:10,question:'프로토콜의 주요 요소에 해당하지 않는 것은?',choices:['syntax(구문)','semantics(의미)','timing(순서)','velocity(속도)'],answer:4,explanation:{summary:'프로토콜 3대 요소: 구문(Syntax), 의미(Semantics), 순서(Timing). 속도는 아님.',choiceAnalysis:[{n:1,text:'구문(Syntax): 데이터 형식, 구조, 순서',correct:false},{n:2,text:'의미(Semantics): 비트별 해석, 동작',correct:false},{n:3,text:'타이밍(Timing): 속도 조절, 순서',correct:false},{n:4,text:'velocity(속도): 프로토콜 요소 아님 ✓',correct:true}],concept:{title:'📌 프로토콜 3요소',items:['구문(Syntax): 데이터 형식, 부호화 방식','의미(Semantics): 각 비트 패턴의 의미','타이밍(Timing): 전송 속도, 순서 제어']}}},
{id:3011,category:'데이터통신',number:11,question:'다음 중 송신측에서 수행되는 기능이 아닌 것은?',choices:['재합성','단편화','캡슐화','암호화'],answer:1,explanation:{summary:'재합성(Reassembly): 수신측에서 단편화된 패킷을 다시 합치는 작업.',choiceAnalysis:[{n:1,text:'재합성: 수신측 기능 ✓',correct:true},{n:2,text:'단편화(Fragmentation): 송신측에서 패킷 분할',correct:false},{n:3,text:'캡슐화(Encapsulation): 헤더/트레일러 추가',correct:false},{n:4,text:'암호화: 송신측에서 데이터 보호',correct:false}],concept:{title:'📌 송신측 vs 수신측 기능',items:['송신측: 캡슐화, 단편화, 암호화, 압축','수신측: 역캡슐화(역다중화), 재합성, 복호화, 압축해제']}}},
{id:3012,category:'데이터통신',number:12,question:'다음 각 OSI 계층에 해당하는 PDU(Protocol Data Unit)로 옳은 것은?',choices:['데이터링크 계층 - 세그먼트(segment)','전송 계층 - 프레임(frame)','물리 계층 - 메시지(message)','네트워크 계층 - 패킷(packet)'],answer:4,explanation:{summary:'네트워크 계층 PDU = 패킷(Packet)',choiceAnalysis:[{n:1,text:'데이터링크=프레임(Frame)',correct:false},{n:2,text:'전송 계층=세그먼트(TCP) 또는 데이터그램(UDP)',correct:false},{n:3,text:'물리 계층=비트(Bit)',correct:false},{n:4,text:'네트워크 계층=패킷(Packet) ✓',correct:true}],concept:{title:'📌 OSI 계층별 PDU',items:['응용/표현/세션: 메시지(Message)','전송: 세그먼트(TCP)/데이터그램(UDP)','네트워크: 패킷(Packet)','데이터링크: 프레임(Frame)','물리: 비트(Bit)']}}},
{id:3013,category:'데이터통신',number:13,question:'다음 중 프로세스 간 통신에 해당하는 OSI 계층은 무엇인가?',choices:['세션 계층','네트워크 계층','물리 계층','데이터링크 계층'],answer:1,explanation:{summary:'세션 계층: 응용 프로세스 간 논리적 연결(세션) 수립/관리/해제.',choiceAnalysis:[{n:1,text:'세션 계층: 프로세스 간 통신 관리 ✓',correct:true},{n:2,text:'네트워크 계층: 논리 주소(IP) 기반 라우팅',correct:false},{n:3,text:'물리 계층: 비트 전송',correct:false},{n:4,text:'데이터링크 계층: MAC 주소 기반 프레임 전송',correct:false}],concept:{title:'📌 OSI 계층 역할',items:['물리: 비트 전송(케이블, 허브)','데이터링크: 프레임 전송(MAC, 브리지)','네트워크: 패킷 라우팅(IP, 라우터)','전송: 종단간 신뢰성(TCP/UDP)','세션: 프로세스 간 연결(세션)','표현: 데이터 형식 변환(암호화)','응용: 사용자 서비스(HTTP, FTP)']}}},
{id:3014,category:'데이터통신',number:14,question:'다음 <보기>의 설명에 해당하는 OSI 계층은 무엇인가?',boxLabel:'<보기>',boxText:'∘ 이웃하고 있는 노드들 간의 데이터 전송을 담당한다.\n∘ 이 계층의 전송 데이터 단위는 프레임(frame)이다.\n∘ 헤더에는 마지막으로 데이터를 보낸 송신자의 물리주소와 다음으로 수신할 수신지의 물리주소가 들어있다.',choices:['물리 계층','데이터링크 계층','네트워크 계층','전송 계층'],answer:2,explanation:{summary:'데이터링크 계층: 인접 노드 간 전송, 프레임, MAC 주소.',choiceAnalysis:[{n:1,text:'물리 계층: 비트 전송',correct:false},{n:2,text:'데이터링크: 프레임, MAC 주소, 인접 노드 전송 ✓',correct:true},{n:3,text:'네트워크: IP 주소, 라우팅',correct:false},{n:4,text:'전송: TCP/UDP',correct:false}],concept:{title:'📌 데이터링크 계층',items:['PDU: 프레임(Frame)','주소: MAC 주소(물리 주소, 48비트)','프로토콜: Ethernet, PPP, HDLC','기능: 프레이밍, 오류 검출, 흐름 제어']}}},
{id:3015,category:'데이터통신',number:15,question:'OSI 7계층 중 데이터링크 계층의 기능에 해당하지 않는 것은?',choices:['노드 대 노드 전달','물리주소 지정','연결 제어','에러 제어'],answer:3,explanation:{summary:'연결 제어(Connection Control)는 전송 계층의 기능. 데이터링크는 프레이밍, MAC, 오류 제어.',choiceAnalysis:[{n:1,text:'노드-노드 전달: 데이터링크 기능',correct:false},{n:2,text:'물리주소(MAC) 지정: 데이터링크 기능',correct:false},{n:3,text:'연결 제어: 전송 계층의 기능 ✓',correct:true},{n:4,text:'에러 제어: 데이터링크 기능(CRC)',correct:false}],concept:{title:'📌 데이터링크 vs 전송 계층',items:['데이터링크: 프레이밍, MAC, 오류검출, 흐름제어(인접노드)','전송: 연결 제어, 종단간 오류/흐름 제어(E2E)']}}},
{id:3016,category:'데이터통신',number:16,question:'다음 중 데이터링크 계층의 프로토콜이 아닌 것은?',choices:['SLIP','SNMP','PPP','HDLC'],answer:2,explanation:{summary:'SNMP(Simple Network Management Protocol): 응용 계층(네트워크 관리). 나머지는 데이터링크 계층.',choiceAnalysis:[{n:1,text:'SLIP: 직렬 연결용 데이터링크',correct:false},{n:2,text:'SNMP: 응용 계층 네트워크 관리 프로토콜 ✓',correct:true},{n:3,text:'PPP: 점대점 데이터링크',correct:false},{n:4,text:'HDLC: 비트 지향 데이터링크 프로토콜',correct:false}],concept:{title:'📌 계층별 주요 프로토콜',items:['데이터링크: Ethernet, PPP, HDLC, SLIP, Frame Relay','네트워크: IP, ICMP, ARP, RIP, OSPF','전송: TCP, UDP','응용: HTTP, FTP, SMTP, DNS, SNMP']}}},
{id:3017,category:'데이터통신',number:17,question:'OSI 7계층 중 네트워크 계층(network layer)에 대한 설명으로 옳지 않은 것은?',choices:['송신지로부터 수신지까지 패킷을 전달한다.','송신지와 수신지의 논리 주소를 헤더에 포함하여 전송한다.','송신지에서 수신지까지 데이터가 전송될 수 있는 여러 경로 중 가장 적절한 전송 경로를 선택한다.','패킷 전달 전에 송신지와 수신지 간 연결 설정을 먼저 수행한다.'],answer:4,explanation:{summary:'IP(네트워크 계층)는 비연결형. 연결 설정은 전송 계층(TCP)의 역할.',choiceAnalysis:[{n:1,text:'맞음. 패킷 전달',correct:false},{n:2,text:'맞음. IP 주소 포함',correct:false},{n:3,text:'맞음. 라우팅(경로 선택)',correct:false},{n:4,text:'틀림. IP는 비연결형. 연결 설정=TCP(전송 계층) ✓',correct:true}],concept:{title:'📌 네트워크 계층',items:['IP: 비연결형, 비신뢰성','라우팅: 최적 경로 선택','PDU: 패킷','주소: IP 주소(논리 주소)']}}},
{id:3018,category:'데이터통신',number:18,question:'OSI 7계층 중 다음 <보기>의 설명에 해당하는 계층은 무엇인가?',boxLabel:'<보기>',boxText:'∘ 시스템 종단 간에 투명한 데이터 전송을 양방향으로 행하는 계층이다.\n∘ 전체 데이터가 수신측에 올바르게 전송되도록 보장한다.\n∘ 수신한 데이터의 순서를 재설정하고 오류가 발생한 패킷은 재전송할 수 있다.',choices:['데이터링크 계층','네트워크 계층','전송 계층','세션 계층'],answer:3,explanation:{summary:'전송 계층(TCP): 종단간 신뢰성 보장, 순서 보장, 오류 재전송.',choiceAnalysis:[{n:1,text:'데이터링크: 인접 노드 간',correct:false},{n:2,text:'네트워크: 라우팅',correct:false},{n:3,text:'전송 계층: 종단간 신뢰성, 순서, 재전송 ✓',correct:true},{n:4,text:'세션: 프로세스 간 연결',correct:false}],concept:{title:'📌 전송 계층(Transport Layer)',items:['TCP: 신뢰성, 흐름제어, 혼잡제어','UDP: 비신뢰성, 빠름','포트 번호로 프로세스 식별','종단간(End-to-End) 통신 보장']}}},
{id:3019,category:'데이터통신',number:19,question:'세션 계층의 역할이 아닌 것은?',choices:['송신측과 수신측 사이에서 프로세스를 서로 연결, 유지, 해제하는 역할을 한다.','전이중 또는 반이중 방식을 결정한다.','세션을 연결하는 동안 복구를 위한 동기점을 제공한다.','코드 변환, 암호화, 텍스트 압축 등을 수행한다.'],answer:4,explanation:{summary:'코드 변환, 암호화, 압축은 표현 계층(Presentation Layer)의 역할.',choiceAnalysis:[{n:1,text:'맞음. 세션: 연결/유지/해제',correct:false},{n:2,text:'맞음. 전이중/반이중 결정',correct:false},{n:3,text:'맞음. 동기점(Checkpoint) 제공',correct:false},{n:4,text:'틀림. 코드 변환/암호화/압축=표현 계층 ✓',correct:true}],concept:{title:'📌 세션 vs 표현 계층',items:['세션: 대화 관리, 동기점, 전이중/반이중','표현: 데이터 형식 변환, 암호화, 압축']}}},
{id:3020,category:'데이터통신',number:20,question:'OSI 7계층에 대한 설명으로 옳은 것은?',choices:['데이터링크 계층은 출발지와 목적지 간 전송에 대한 오류제어, 흐름제어, 연결제어를 수행한다.','네트워크 계층은 IP주소와 연결지향형 성격을 이용하여 종점 호스트 사이의 신뢰성 높은 전송을 보장한다.','전송 계층은 물리적 전송 매체와 직접적으로 연관된 계층으로 오류제어를 수행한다.','응용 계층은 최상위 계층으로 메시지(message)를 PDU로 사용하며 사용자에게 서비스를 제공한다.'],answer:4,explanation:{summary:'응용 계층: 최상위, PDU=메시지, 사용자 서비스 제공.',choiceAnalysis:[{n:1,text:'틀림. 연결제어는 전송 계층',correct:false},{n:2,text:'틀림. IP는 비연결형. 신뢰성은 TCP(전송 계층)',correct:false},{n:3,text:'틀림. 물리 계층이 물리 매체 관련',correct:false},{n:4,text:'맞음. 응용 계층: 최상위, 메시지, 사용자 서비스 ✓',correct:true}],concept:{title:'📌 응용 계층',items:['최상위 계층(7계층)','PDU: 메시지(Message)','프로토콜: HTTP, FTP, SMTP, DNS, Telnet']}}},
{id:3021,category:'데이터통신',number:21,question:'짝수 패리티 방식을 이용하여 문자를 전송한다. 다음 중 에러가 발생한 데이터는? (단, 데이터는 7비트이다)',choices:['11001001','01010101','10010011','01110011'],answer:4,explanation:{summary:'짝수 패리티: 1의 개수가 짝수여야 함. 01110011의 1 개수=5개(홀수)→에러',choiceAnalysis:[{n:1,text:'11001001: 1 개수=4(짝수) 정상',correct:false},{n:2,text:'01010101: 1 개수=4(짝수) 정상',correct:false},{n:3,text:'10010011: 1 개수=4(짝수) 정상',correct:false},{n:4,text:'01110011: 1 개수=5(홀수) → 짝수 패리티 위반 ✓',correct:true}],concept:{title:'📌 패리티 비트',items:['짝수 패리티: 전체 비트에서 1의 개수를 짝수로','홀수 패리티: 전체 비트에서 1의 개수를 홀수로','단순 오류 검출만 가능(홀수 개 비트 오류만 탐지)']}}},
{id:3022,category:'데이터통신',number:22,question:"Hamming코드에서 총 전송비트수가 7비트 일 때, '0101' 데이터를 해밍코드로 옳게 변환한 것은?(단, 짝수패리티를 사용한다)",choices:['0100101','1100101','1010010','0100111'],answer:1,explanation:{summary:'7비트 해밍: 패리티비트 위치 1,2,4. 데이터비트 위치 3,5,6,7=0,1,0,1. p1=p(3,5,7)=0⊕1⊕1=0, p2=p(3,6,7)=0⊕0⊕1=1, p4=p(5,6,7)=1⊕0⊕1=0. 해밍코드=0100101',choiceAnalysis:[{n:1,text:'0100101 ✓',correct:true},{n:2,text:'1100101 오류',correct:false},{n:3,text:'1010010 오류',correct:false},{n:4,text:'0100111 오류',correct:false}],concept:{title:'📌 해밍코드 생성',items:['패리티비트 위치: 2의 거듭제곱(1,2,4,8...)','데이터 비트: 나머지 위치','각 패리티 비트: 특정 위치들의 XOR']}}},
{id:3023,category:'데이터통신',number:23,question:"짝수 패리티를 사용한 7비트의 데이터 「0111011」이 수신되었다. 해밍코드를 이용하여 전송 중 발생한 오류를 찾아 바르게 정정한 것은?",choices:['0110011','0101011','0111111','0111001'],answer:1,explanation:{summary:'0111011에서 오류 위치 확인 후 비트 반전.',choiceAnalysis:[{n:1,text:'0110011: 오류 정정 결과 ✓',correct:true},{n:2,text:'오류',correct:false},{n:3,text:'오류',correct:false},{n:4,text:'오류',correct:false}],concept:{title:'📌 해밍코드 오류 정정',items:['각 패리티 비트 재계산','오류 위치 = 패리티 비트들의 신드롬 합','해당 위치 비트 반전']}}},
{id:3024,category:'데이터통신',number:24,question:"A는 4비트의 데이터를 짝수 패리티 해밍코드로 변환하여 B에게 송신하였다. B가 수신한 7비트 해밍코드가 '1010001'일 때, A가 송신한 7비트 해밍코드로 옳은 것은?",choices:['1010001','1010101','1100011','1100101'],answer:2,explanation:{summary:'수신된 1010001에서 오류 위치를 계산하여 해당 비트 반전.',choiceAnalysis:[{n:1,text:'1010001: 그대로(오류 있음)',correct:false},{n:2,text:'1010101: 오류 정정 결과 ✓',correct:true},{n:3,text:'오류',correct:false},{n:4,text:'오류',correct:false}],concept:{title:'📌 해밍코드 오류 위치',items:['신드롬 계산: 각 패리티 비트 재계산','비트 위치=신드롬 값','해당 비트 반전으로 정정']}}},
{id:3025,category:'데이터통신',number:25,question:'Hamming코드에서 총 전송비트수가 17비트 일 때, 해밍 비트수(패리티 비트 수)와 순수한 정보 비트수로 옳은 것은?',choices:['해밍비트:4 / 정보비트:13','해밍비트:5 / 정보비트:12','해밍비트:6 / 정보비트:11','해밍비트:7 / 정보비트:10'],answer:2,explanation:{summary:'해밍코드 조건: 2^r ≥ r+m+1. r=5이면 32≥5+12+1=18. r=4이면 16<4+13+1=18 불만족. r=5, m=12.',choiceAnalysis:[{n:1,text:'r=4: 2^4=16<18 불만족',correct:false},{n:2,text:'r=5: 2^5=32≥18 만족. m=17-5=12 ✓',correct:true},{n:3,text:'r=6 불필요',correct:false},{n:4,text:'r=7 불필요',correct:false}],concept:{title:'📌 해밍코드 패리티 비트 수',items:['조건: 2^r ≥ r + m + 1','r=패리티 비트수, m=데이터 비트수','17비트=r+m, r=5이면 m=12','검증: 2^5=32≥5+12+1=18 OK']}}},
{id:3026,category:'데이터통신',number:26,question:'다음 중 에러 제어에 사용되는 것이 아닌 것은?',choices:['패리티 비트(parity bit)','TTL(Time To Live)','checksum 필드','순환 중복 검사(CRC)'],answer:2,explanation:{summary:'TTL: IP 헤더 필드로 패킷 수명 관리(루프 방지). 에러 제어와 무관.',choiceAnalysis:[{n:1,text:'패리티 비트: 단순 오류 검출',correct:false},{n:2,text:'TTL: 라우터 hop 수 제한, 오류 제어 아님 ✓',correct:true},{n:3,text:'체크섬: 오류 검출',correct:false},{n:4,text:'CRC: 강력한 오류 검출',correct:false}],concept:{title:'📌 오류 제어 기법',items:['패리티 비트: 1비트 오류 검출','해밍코드: 1비트 오류 검출+정정','CRC: 강력한 오류 검출(다항식)','체크섬: 합산 후 1의 보수']}}},
{id:3027,category:'데이터통신',number:27,question:'다음 <보기>와 같은 방식으로 데이터의 정확성을 검사하는 방법은 무엇인가?',boxLabel:'<보기>',boxText:'1. 데이터 단위를 n개의 비트로 이루어진 세그먼트로 나눈다.\n2. 세그먼트를 합한 후 그 결과의 1의보수를 구한다.\n3. 구해진 1의 보수를 원래 데이터 단위에 추가하여 전송한다.',choices:['CRC-32','해밍코드','checksum 필드','블록합 검사'],answer:3,explanation:{summary:'체크섬: 세그먼트 합산 후 1의 보수를 취해 추가.',choiceAnalysis:[{n:1,text:'CRC: 다항식 나눗셈 방식',correct:false},{n:2,text:'해밍코드: 패리티 비트 방식',correct:false},{n:3,text:'체크섬: 합산+1의보수 ✓',correct:true},{n:4,text:'블록합 검사: 다른 방식',correct:false}],concept:{title:'📌 체크섬(Checksum)',items:['데이터를 세그먼트로 분할','모두 합산','1의 보수 취해 체크섬 필드에 추가','수신측: 모두 합산하면 11...1(모두 1)이면 정상']}}},
{id:3028,category:'데이터통신',number:28,question:'다음 <보기>의 특징에 해당하는 에러제어 방식은?',boxLabel:'<보기>',boxText:'특정 방정식에 의한 연산 결과를 원시프레임에 삽입하는 다항식코드(polynomial codes)이다.\n문자 단위가 아닌 연속적인 2진 데이터의 전송에 적합하다.\n전체 블록 검사를 할 수 있으며 이진 나눗셈을 기반으로 한다.',choices:['패리티 검사','해밍코드','CRC','checksum'],answer:3,explanation:{summary:'CRC(Cyclic Redundancy Check): 다항식+이진 나눗셈 기반 오류 검출.',choiceAnalysis:[{n:1,text:'패리티: 비트 개수 기반',correct:false},{n:2,text:'해밍코드: 패리티 비트 위치 기반',correct:false},{n:3,text:'CRC: 다항식+이진 나눗셈 ✓',correct:true},{n:4,text:'체크섬: 합산 기반',correct:false}],concept:{title:'📌 CRC(Cyclic Redundancy Check)',items:['생성 다항식으로 데이터를 나눔','나머지를 FCS로 추가','수신측: 동일 다항식으로 나눠 나머지 확인','Ethernet, HDLC에서 사용']}}},
{id:3029,category:'데이터통신',number:29,question:'데이터비트가 101110이고, 제수가 1001을 사용한다고 할 때 CRC 방식을 이용한 전송 데이터로 옳은 것은?',choices:['101110011','011101110','101110000','1011101001'],answer:1,explanation:{summary:'CRC: 데이터+000(제수길이-1)을 1001로 나눔. 나머지를 뒤에 붙임.',choiceAnalysis:[{n:1,text:'101110011: 101110+011(나머지) ✓',correct:true},{n:2,text:'오류',correct:false},{n:3,text:'오류',correct:false},{n:4,text:'오류',correct:false}],concept:{title:'📌 CRC 계산 과정',items:['원본: 101110','제수(1001): 4비트 → 0 3개 추가: 101110000','XOR 나눗셈 수행','나머지를 원본에 추가: 101110 + FCS']}}},
{id:3030,category:'데이터통신',number:30,question:'ARQ(Automatic Repeat reQuest) 방식에서 Go-Back-N에 대한 설명으로 옳은 것은?',choices:['오류가 발생한 프레임만 재전송한다.','오류가 발생한 프레임부터 모두 재전송한다.','윈도우 크기는 항상 1이다.','수신측이 별도의 버퍼를 사용하지 않는다.'],answer:2,explanation:{summary:'Go-Back-N: 오류 프레임부터 그 이후 모든 프레임 재전송.',choiceAnalysis:[{n:1,text:'틀림. 오류 프레임만 재전송은 SR(Selective Repeat)',correct:false},{n:2,text:'맞음. Go-Back-N: 오류 지점부터 모두 재전송 ✓',correct:true},{n:3,text:'틀림. 윈도우 크기≥1',correct:false},{n:4,text:'틀림. 수신측 버퍼 불필요(순서대로만 처리)',correct:false}],concept:{title:'📌 ARQ 방식',items:['Stop-and-Wait: 1개 전송 후 ACK 대기','Go-Back-N: 오류 지점부터 재전송, 수신 버퍼 불필요','Selective Repeat: 오류 프레임만 재전송, 수신 버퍼 필요']}}},
{id:3031,category:'데이터통신',number:31,question:'슬라이딩 윈도우(sliding window) 프로토콜에 대한 설명으로 옳은 것은?',choices:['윈도우 크기가 1이면 Stop-and-Wait 방식과 동일하다.','윈도우 크기가 클수록 오류 복구 시간이 짧아진다.','윈도우 크기는 수신측만 조절할 수 있다.','패킷이 손실되면 윈도우 크기를 늘린다.'],answer:1,explanation:{summary:'윈도우 크기=1이면 한 번에 하나씩 전송 후 ACK 기다림=Stop-and-Wait.',choiceAnalysis:[{n:1,text:'맞음. 윈도우 크기=1 → Stop-and-Wait ✓',correct:true},{n:2,text:'틀림. 윈도우 크기 클수록 오류 복구 시 더 많은 재전송',correct:false},{n:3,text:'틀림. 송신 윈도우와 수신 윈도우 모두 있음',correct:false},{n:4,text:'틀림. 오류 시 윈도우 크기 줄임(혼잡 제어)',correct:false}],concept:{title:'📌 슬라이딩 윈도우',items:['ACK를 기다리는 동안 연속 전송','윈도우 크기=전송 가능한 최대 프레임 수','윈도우=1: Stop-and-Wait','TCP 혼잡 제어: 윈도우 크기 조절']}}},
{id:3032,category:'데이터통신',number:32,question:'흐름 제어(flow control)에 대한 설명으로 옳지 않은 것은?',choices:['수신측의 처리 능력에 맞게 전송 속도를 조절한다.','Stop-and-Wait는 한 번에 하나의 프레임만 전송한다.','슬라이딩 윈도우는 여러 프레임을 동시에 전송할 수 있다.','흐름 제어는 주로 물리 계층에서 수행된다.'],answer:4,explanation:{summary:'흐름 제어는 데이터링크 계층과 전송 계층에서 수행.',choiceAnalysis:[{n:1,text:'맞음. 흐름 제어: 수신 능력에 맞게 조절',correct:false},{n:2,text:'맞음. Stop-and-Wait: 1개씩',correct:false},{n:3,text:'맞음. 슬라이딩 윈도우: 다중 전송',correct:false},{n:4,text:'틀림. 흐름 제어: 데이터링크 계층, 전송 계층 ✓',correct:true}],concept:{title:'📌 흐름 제어 위치',items:['데이터링크 계층: 인접 노드 간 흐름 제어','전송 계층(TCP): 종단간 흐름 제어','방법: Stop-and-Wait, 슬라이딩 윈도우']}}},
{id:3033,category:'데이터통신',number:33,question:'회선 양쪽 시스템이 처리속도가 다를 때 데이터양이나 통신속도가 수신측이 처리할 수 있는 능력을 넘어서지 않도록 조정하는 기능에 해당하는 것은?',choices:['경로 설정 방식','슬라이딩 윈도우 방식','4-way handshaking 방식','회선 제어 방식'],answer:2,explanation:{summary:'슬라이딩 윈도우: 수신측 처리 능력에 맞게 전송 윈도우 크기 조절.',choiceAnalysis:[{n:1,text:'경로 설정: 라우팅',correct:false},{n:2,text:'슬라이딩 윈도우: 흐름 제어 ✓',correct:true},{n:3,text:'4-way handshaking: TCP 연결 종료',correct:false},{n:4,text:'회선 제어: 반이중 통신 제어',correct:false}],concept:{title:'📌 슬라이딩 윈도우 흐름 제어',items:['윈도우 크기: 수신측이 처리 가능한 버퍼 크기','수신측이 ACK에 윈도우 크기 포함하여 전송측에 알림','TCP 흐름 제어의 핵심 기법']}}},
{id:3034,category:'데이터통신',number:34,question:'인터넷 라우팅 프로토콜에 해당하지 않는 것은?',choices:['RIP','RTP','OSPF','EGP'],answer:2,explanation:{summary:'RTP(Real-time Transport Protocol): 실시간 미디어 전송 프로토콜. 라우팅 아님.',choiceAnalysis:[{n:1,text:'RIP: 거리 벡터 라우팅 프로토콜',correct:false},{n:2,text:'RTP: 실시간 전송 프로토콜. 라우팅 아님 ✓',correct:true},{n:3,text:'OSPF: 링크 상태 라우팅 프로토콜',correct:false},{n:4,text:'EGP: 외부 게이트웨이 프로토콜',correct:false}],concept:{title:'📌 라우팅 프로토콜',items:['IGP(내부): RIP, OSPF, IGRP, EIGRP','EGP(외부): BGP, EGP','RIP: 홉 카운트 기반 거리 벡터','OSPF: 링크 상태(Dijkstra 알고리즘)']}}},
{id:3035,category:'데이터통신',number:35,question:'라우팅 프로토콜인 OSPF(Open Shortest Path First)에 대한 설명으로 옳지 않은 것은?',choices:['편리한 업데이트를 위해 멀티캐스팅을 지원한다.','링크 상태 라우팅 방식을 사용한다.','홉 카운트를 기반으로 최적 경로를 계산한다.','다익스트라(Dijkstra) 알고리즘을 사용한다.'],answer:2,explanation:{summary:'OSPF는 링크 비용(대역폭 등) 기반. 홉 카운트 기반은 RIP.',choiceAnalysis:[{n:1,text:'맞음. OSPF: 멀티캐스트 사용',correct:false},{n:2,text:'맞음. OSPF: 링크 상태 라우팅',correct:false},{n:3,text:'틀림. OSPF는 링크 비용 기반. 홉 카운트=RIP ✓',correct:true},{n:4,text:'맞음. OSPF: Dijkstra(SPF) 알고리즘',correct:false}],concept:{title:'📌 OSPF vs RIP',items:['RIP: 거리 벡터, 홉 카운트, Bellman-Ford','OSPF: 링크 상태, 링크 비용, Dijkstra','OSPF: 대규모 네트워크, 빠른 수렴']}}},
{id:3036,category:'데이터통신',number:36,question:'다음 중 라우팅 프로토콜에 대한 설명으로 옳지 않은 것은?',choices:['RIP는 홉(hop) 카운트를 이용하여 최적 경로를 계산한다.','BGP는 대용량 인터넷에서 자율 시스템 간에 사용되는 라우팅 프로토콜이다.','OSPF는 모든 라우터가 동일한 라우팅 테이블을 관리하는 방식이다.','링크 상태 라우팅은 각 노드가 전체 네트워크 토폴로지 정보를 유지한다.'],answer:2,explanation:{summary:'OSPF는 각 라우터가 자신의 링크 상태를 교환하여 각자 최단 경로 계산. 동일 테이블 유지는 아님.',choiceAnalysis:[{n:1,text:'맞음. RIP: 홉 카운트',correct:false},{n:2,text:'맞음. BGP: AS간 EGP',correct:false},{n:3,text:'틀림. OSPF: 각 라우터가 독립적으로 계산 ✓',correct:true},{n:4,text:'맞음. 링크 상태: 전체 토폴로지 정보 유지',correct:false}],concept:{title:'📌 링크 상태 라우팅',items:['각 라우터가 자신의 링크 상태 정보를 모든 라우터에 플러딩','모든 라우터가 전체 토폴로지 파악','각자 Dijkstra로 최단 경로 계산','OSPF, IS-IS가 이 방식 사용']}}},
{id:3037,category:'데이터통신',number:37,question:'다음 중 TCP/IP 프로토콜에 대한 설명으로 옳은 것은?',choices:['IP는 연결지향형 프로토콜로 신뢰성 있는 데이터 전송을 보장한다.','TCP는 비연결형 프로토콜로 빠른 데이터 전송에 적합하다.','UDP는 데이터 전송 전에 3-way handshaking을 수행한다.','TCP는 흐름 제어와 혼잡 제어 기능을 제공한다.'],answer:4,explanation:{summary:'TCP: 연결지향, 흐름제어, 혼잡제어, 신뢰성 보장.',choiceAnalysis:[{n:1,text:'틀림. IP는 비연결형, 비신뢰성',correct:false},{n:2,text:'틀림. UDP가 비연결형. TCP는 연결형',correct:false},{n:3,text:'틀림. 3-way handshaking은 TCP',correct:false},{n:4,text:'맞음. TCP: 흐름제어+혼잡제어 ✓',correct:true}],concept:{title:'📌 TCP vs UDP',items:['TCP: 연결지향, 신뢰성, 흐름/혼잡 제어, 느림','UDP: 비연결형, 비신뢰성, 빠름, 실시간에 적합','3-way handshaking: TCP 연결 설정']}}},
{id:3038,category:'데이터통신',number:38,question:'TCP의 3-way handshaking 과정으로 옳은 것은?',choices:['SYN → SYN/ACK → ACK','SYN → ACK → SYN/ACK','ACK → SYN → SYN/ACK','SYN/ACK → SYN → ACK'],answer:4,explanation:{summary:'TCP 연결: SYN→SYN/ACK→ACK',choiceAnalysis:[{n:1,text:'SYN→SYN/ACK→ACK ✓',correct:true},{n:2,text:'순서 오류',correct:false},{n:3,text:'순서 오류',correct:false},{n:4,text:'SYN/ACK가 먼저 오면 안됨',correct:false}],concept:{title:'📌 TCP 3-way Handshaking',items:['1. 클라이언트→서버: SYN','2. 서버→클라이언트: SYN+ACK','3. 클라이언트→서버: ACK','연결 종료: 4-way (FIN→ACK→FIN→ACK)']}}},
{id:3039,category:'데이터통신',number:39,question:'다음 중 UDP를 사용하는 응용 프로토콜에 해당하지 않는 것은?',choices:['DNS','TFTP','FTP','SNMP'],answer:3,explanation:{summary:'FTP: 파일 전송 프로토콜로 TCP 사용. 나머지는 UDP.',choiceAnalysis:[{n:1,text:'DNS: 주로 UDP(53번 포트)',correct:false},{n:2,text:'TFTP: UDP 기반 간단한 파일 전송',correct:false},{n:3,text:'FTP: TCP 사용(신뢰성 필요) ✓',correct:true},{n:4,text:'SNMP: UDP 기반 망 관리',correct:false}],concept:{title:'📌 TCP vs UDP 응용',items:['TCP: FTP, HTTP, HTTPS, SMTP, Telnet, SSH','UDP: DNS, DHCP, TFTP, SNMP, RIP','실시간(UDP): VoIP, 동영상 스트리밍']}}},
