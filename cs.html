{id:6049,category:'소프트웨어공학론',number:49,question:'싱글톤 패턴(Singleton Pattern)에 대한 설명으로 옳은 것은?',choices:['하나의 인터페이스에 여러 구현을 제공하는 패턴이다.','클래스의 인스턴스를 오직 하나만 생성하도록 보장하는 패턴이다.','알고리즘을 캡슐화하여 교환 가능하게 하는 패턴이다.','객체 간의 의사소통을 캡슐화하는 패턴이다.'],answer:2,explanation:{summary:'싱글톤: 인스턴스를 오직 하나만 보장.',choiceAnalysis:[{n:1,text:'전략 패턴',correct:false},{n:2,text:'싱글톤: 하나의 인스턴스 ✓',correct:true},{n:3,text:'전략 패턴',correct:false},{n:4,text:'중재자 패턴',correct:false}],concept:{title:'📌 싱글톤 패턴',items:['private static instance','private 생성자','public static getInstance()','전역 상태 관리에 사용']}}},
{id:6050,category:'소프트웨어공학론',number:50,question:'객체지향 설계 기법 중 "클라이언트는 자신이 사용하지 않는 메서드에 의존 관계를 맺으면 안 된다."라는 설계 원칙으로 옳은 것은?',choices:['단일 책임의 원칙','개방 폐쇄의 원칙','인터페이스 분리의 원칙','의존 역전의 원칙'],answer:4,explanation:{summary:'ISP(Interface Segregation Principle): 클라이언트가 사용하지 않는 인터페이스에 의존하면 안 됨.',choiceAnalysis:[{n:1,text:'SRP: 하나의 책임',correct:false},{n:2,text:'OCP: 확장/폐쇄',correct:false},{n:3,text:'ISP: 인터페이스 분리 ✓',correct:true},{n:4,text:'DIP: 추상화 의존',correct:false}],concept:{title:'📌 ISP(Interface Segregation Principle)',items:['클라이언트는 사용하는 인터페이스만 의존','큰 인터페이스를 작은 단위로 분리']}}},
{id:6051,category:'소프트웨어공학론',number:51,question:'소프트웨어 테스트의 원칙으로 옳지 않은 것은?',choices:['테스트는 결함이 없음을 증명할 수 없다.','완벽한 테스트는 불가능하다.','테스트는 개발 초기에 시작해야 한다.','테스트는 항상 모든 버그를 찾아낼 수 있다.'],answer:2,explanation:{summary:'테스트: 모든 버그 발견 보장 불가.',choiceAnalysis:[{n:1,text:'맞음. 결함 없음 증명 불가',correct:false},{n:2,text:'맞음. 완벽한 테스트 불가',correct:false},{n:3,text:'맞음. 조기 시작',correct:false},{n:4,text:'틀림. 모든 버그 발견 불가 ✓',correct:true}],concept:{title:'📌 소프트웨어 테스트 원칙',items:['결함 없음 증명 불가','완벽한 테스트 불가','조기 시작','살충제 역설: 같은 테스트 반복시 효과 감소','결함 집중(파레토 원칙)']}}},
{id:6052,category:'소프트웨어공학론',number:52,question:'소프트웨어 테스트에서 블랙박스 테스트와 화이트박스 테스트의 차이로 옳은 것은?',choices:['블랙박스: 내부 로직 기반 / 화이트박스: 기능 기반','블랙박스: 기능 기반 / 화이트박스: 내부 로직 기반','블랙박스: 경로 기반 / 화이트박스: 명세 기반','블랙박스: 구조 기반 / 화이트박스: 기능 기반'],answer:1,explanation:{summary:'블랙박스: 외부 기능/명세 기반. 화이트박스: 내부 로직/코드 기반.',choiceAnalysis:[{n:1,text:'틀림. 반대',correct:false},{n:2,text:'블랙=기능, 화이트=내부 ✓',correct:true},{n:3,text:'반대',correct:false},{n:4,text:'반대',correct:false}],concept:{title:'📌 블랙박스 vs 화이트박스',items:['블랙박스: 명세 기반, 기능 테스트','화이트박스: 코드 구조 기반, 경로/분기']}}},
{id:6053,category:'소프트웨어공학론',number:53,question:'화이트박스 테스트 기법에 해당하는 것은?',choices:['동치 분할','경계값 분석','기본 경로 테스트','원인-결과 그래프'],answer:4,explanation:{summary:'기본 경로 테스트(Basic Path Testing): 화이트박스. 나머지는 블랙박스.',choiceAnalysis:[{n:1,text:'동치 분할: 블랙박스',correct:false},{n:2,text:'경계값 분석: 블랙박스',correct:false},{n:3,text:'기본 경로: 화이트박스 ✓',correct:true},{n:4,text:'원인-결과 그래프: 블랙박스',correct:false}],concept:{title:'📌 테스트 기법 분류',items:['블랙박스: 동치분할, 경계값, 원인-결과 그래프, 결정표','화이트박스: 기본경로, 조건검사, 루프검사, 제어 흐름']}}},
{id:6054,category:'소프트웨어공학론',number:54,question:'단위 테스트(Unit Testing)에 대한 설명으로 옳지 않은 것은?',choices:['가장 작은 단위(모듈, 함수)를 테스트한다.','개발자가 작성하는 경우가 많다.','통합 테스트 이후에 수행된다.','JUnit이 단위 테스트 도구의 예이다.'],answer:2,explanation:{summary:'단위 테스트는 가장 먼저 수행. 통합 테스트 이전.',choiceAnalysis:[{n:1,text:'맞음.',correct:false},{n:2,text:'맞음.',correct:false},{n:3,text:'틀림. 단위→통합 순서 ✓',correct:true},{n:4,text:'맞음. JUnit',correct:false}],concept:{title:'📌 테스트 순서',items:['단위 → 통합 → 시스템 → 인수']}}},
{id:6055,category:'소프트웨어공학론',number:55,question:'소프트웨어 테스트에서 회귀 테스트(regression testing)에 대한 설명으로 옳은 것은?',choices:['소프트웨어 변경 후 기존 기능이 여전히 정상 작동하는지 확인하는 테스트이다.','처음 개발된 소프트웨어를 최초로 테스트하는 것이다.','사용자 요구사항에 맞는지 확인하는 인수 테스트이다.','내부 로직을 검사하는 화이트박스 테스트이다.'],answer:1,explanation:{summary:'회귀 테스트: 변경 후 기존 기능 정상 작동 확인.',choiceAnalysis:[{n:1,text:'회귀 테스트: 변경 후 재테스트 ✓',correct:true},{n:2,text:'최초 테스트',correct:false},{n:3,text:'인수 테스트',correct:false},{n:4,text:'화이트박스',correct:false}],concept:{title:'📌 회귀 테스트',items:['수정 후 기존 기능 재확인','변경 사항이 다른 기능에 영향 없는지 확인','자동화에 적합']}}},
{id:6056,category:'소프트웨어공학론',number:56,question:'동등분할(Equivalence Partitioning) 기법에 대한 설명으로 옳은 것은?',choices:['입력 데이터를 경계값 중심으로 나누어 테스트한다.','입력 데이터를 동일한 결과를 예상할 수 있는 그룹으로 나누어 테스트한다.','소프트웨어 내부 구조를 분석하여 테스트한다.','모든 경우의 수를 테스트한다.'],answer:2,explanation:{summary:'동등분할: 동일한 결과를 내는 입력 그룹으로 나눔.',choiceAnalysis:[{n:1,text:'경계값 분석',correct:false},{n:2,text:'동등분할: 동일 결과 그룹 ✓',correct:true},{n:3,text:'화이트박스',correct:false},{n:4,text:'완전 테스트(불가)',correct:false}],concept:{title:'📌 동등분할',items:['유효 동등클래스: 정상 입력 대표값','무효 동등클래스: 비정상 입력 대표값','각 클래스에서 대표값 1개만 테스트']}}},
{id:6057,category:'소프트웨어공학론',number:57,question:'소프트웨어 품질 속성 중 ISO/IEC 9126 표준에 포함되지 않는 것은?',choices:['기능성(Functionality)','신뢰성(Reliability)','사용성(Usability)','비용 효율성(Cost Efficiency)'],answer:4,explanation:{summary:'ISO 9126: 기능성, 신뢰성, 사용성, 효율성, 유지보수성, 이식성. 비용 효율성은 없음.',choiceAnalysis:[{n:1,text:'기능성: ISO 9126',correct:false},{n:2,text:'신뢰성: ISO 9126',correct:false},{n:3,text:'사용성: ISO 9126',correct:false},{n:4,text:'비용 효율성: 없음 ✓',correct:true}],concept:{title:'📌 ISO/IEC 9126 품질 특성',items:['기능성(Functionality)','신뢰성(Reliability)','사용성(Usability)','효율성(Efficiency)','유지보수성(Maintainability)','이식성(Portability)']}}},
{id:6058,category:'소프트웨어공학론',number:58,question:'소프트웨어 유지보수 유형 중 사용자의 새로운 요구나 변경된 환경에 따라 기능을 추가하는 유지보수 유형은?',choices:['수정(Corrective) 유지보수','예방(Preventive) 유지보수','완전(Perfective) 유지보수','적응(Adaptive) 유지보수'],answer:4,explanation:{summary:'적응 유지보수: 환경 변화에 적응. 완전 유지보수: 성능/기능 향상.',choiceAnalysis:[{n:1,text:'수정: 결함 수정',correct:false},{n:2,text:'예방: 미래 결함 예방',correct:false},{n:3,text:'완전: 기능 개선/추가(성능 향상)',correct:false},{n:4,text:'적응: 환경 변화 대응 ✓',correct:true}],concept:{title:'📌 유지보수 유형',items:['수정(Corrective): 오류 수정','적응(Adaptive): 환경 변화 대응','완전(Perfective): 기능 개선/추가','예방(Preventive): 미래 문제 예방']}}},
{id:6059,category:'소프트웨어공학론',number:59,question:'소프트웨어 형상관리(SCM)에 대한 설명으로 옳지 않은 것은?',choices:['소프트웨어 변경사항을 체계적으로 추적하고 통제한다.','형상 항목에는 소스코드, 문서, 데이터 등이 포함된다.','형상관리는 유지보수 단계에서만 수행한다.','버전 관리 도구로 Git, SVN 등이 있다.'],answer:4,explanation:{summary:'형상관리는 개발 전체 단계에서 수행.',choiceAnalysis:[{n:1,text:'맞음.',correct:false},{n:2,text:'맞음.',correct:false},{n:3,text:'틀림. 전체 생명주기에서 수행 ✓',correct:true},{n:4,text:'맞음. Git, SVN',correct:false}],concept:{title:'📌 소프트웨어 형상관리(SCM)',items:['변경 제어, 버전 관리','전체 생명주기에서 수행','형상 항목: 소스코드, 문서, 계획서','도구: Git, SVN, ClearCase']}}},
{id:6060,category:'소프트웨어공학론',number:60,question:'클래스 간 관계에 대한 설명으로 옳지 않은 것은?',choices:['연관관계의 다중성(multiplicity)은 두 클래스의 연관관계에서 실제로 연관을 가지는 객체의 수를 나타낸다.','집합(aggregation) 관계는 하나의 객체에 여러 개의 독립적인 객체들이 구성되는 경우이다.','합성(composition) 관계에서 부분 객체는 전체 객체 없이도 독립적으로 존재할 수 있다.','의존(dependency) 관계는 한 클래스가 다른 클래스를 일시적으로 사용하는 관계이다.'],answer:4,explanation:{summary:'합성(Composition): 부분은 전체에 종속, 독립 존재 불가.',choiceAnalysis:[{n:1,text:'맞음.',correct:false},{n:2,text:'맞음. 집합: 독립적 부분',correct:false},{n:3,text:'틀림. 합성: 부분은 전체에 종속 ✓',correct:true},{n:4,text:'맞음.',correct:false}],concept:{title:'📌 집합 vs 합성',items:['집합(Aggregation): 전체-부분, 부분은 독립(◇)','합성(Composition): 전체-부분, 부분은 종속(◆)','예: 집합-학교와 학생 / 합성-집과 방']}}},
{id:6061,category:'소프트웨어공학론',number:61,question:'다음 중 소프트웨어 프로세스 성숙도 모델 CMM(Capability Maturity Model)의 레벨 순서로 옳은 것은?',choices:['초기→반복→정의→관리→최적화','초기→정의→반복→관리→최적화','초기→최적화→관리→정의→반복','반복→초기→관리→정의→최적화'],answer:2,explanation:{summary:'CMM: 초기(1)→반복(2)→정의(3)→관리(4)→최적화(5)',choiceAnalysis:[{n:1,text:'반복→정의 순서',correct:false},{n:2,text:'초기→반복→정의→관리→최적화 ✓',correct:true},{n:3,text:'역순',correct:false},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 CMM 5단계',items:['1. 초기(Initial): 혼돈, 비체계적','2. 반복(Repeatable): 기본 프로세스','3. 정의(Defined): 문서화된 프로세스','4. 관리(Managed): 측정, 통제','5. 최적화(Optimizing): 지속 개선']}}},

{id:6080,category:'소프트웨어공학론',number:80,question:'CASE를 계층적으로 분류하면 상위 CASE, 하위 CASE로 분류할 수 있다. 다음 중 하위 CASE에 속하는 도구는 무엇인가?',choices:['코드 생성기','다이어그래밍 도구','프로토타이핑 도구','설계 사전 도구'],answer:1,explanation:{summary:'하위 CASE: 코드 생성기, 컴파일러, 디버거(구현 단계). 상위: 다이어그램, 프로토타이핑(분석/설계)',choiceAnalysis:[{n:1,text:'코드 생성기: 하위 CASE ✓',correct:true},{n:2,text:'다이어그래밍: 상위 CASE',correct:false},{n:3,text:'프로토타이핑: 상위 CASE',correct:false},{n:4,text:'설계 사전: 상위 CASE',correct:false}],concept:{title:'📌 CASE 분류',items:['상위(Upper) CASE: 분석/설계(다이어그램, 프로토타이핑)','하위(Lower) CASE: 구현(코드생성기, 컴파일러)','통합(Integrated) CASE: 전체 지원']}}},
].filter(Boolean);

const SAVE_KEY='cg_all_v1';
const CAT_DATE={
  '전자계산기구조론':'1/7(수)',
  '운영체제론':'1/14(수)',
  '데이터통신':'1/22(목)',
  '데이터베이스론':'2/4(수)',
  '자료구조론':'2/4(수)',
  '소프트웨어공학론':'미정'
};

let state={
  idx:0,
  ids:[],
  prog:{},
  bm:new Set(),
  cfg:{cat:'all',st:'all',shuffle:false}
};

function save(){
  const d={prog:state.prog,bm:[...state.bm],cfg:state.cfg,lastId:state.ids[state.idx]};
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(d));}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');
    if(d.prog) state.prog=d.prog;
    if(d.bm) state.bm=new Set(d.bm);
    if(d.cfg) state.cfg={...state.cfg,...d.cfg};
    return d.lastId||null;
  }catch(e){return null;}
}

function buildList(){
  let list=QUIZ_DATA.filter(q=>{
    if(state.cfg.cat!=='all'&&q.category!==state.cfg.cat) return false;
    if(state.cfg.st==='unsolved'&&state.prog[q.id]) return false;
    if(state.cfg.st==='wrong'&&state.prog[q.id]!=='ng') return false;
    if(state.cfg.st==='bookmarked'&&!state.bm.has(q.id)) return false;
    return true;
  });
  if(state.cfg.shuffle) list=[...list].sort(()=>Math.random()-.5);
  state.ids=list.map(q=>q.id);
}

function updateHeader(){
  const total=state.ids.length;
  const solved=Object.keys(state.prog).filter(id=>state.ids.includes(+id)&&state.prog[+id]&&!String(id).includes('_')).length;
  const ok=Object.keys(state.prog).filter(id=>state.ids.includes(+id)&&state.prog[+id]==='ok').length;
  const ng=solved-ok;
  document.getElementById('ss').textContent=solved;
  document.getElementById('st').textContent=total;
  document.getElementById('sc').textContent=ok;
  document.getElementById('sw').textContent=ng;
  document.getElementById('sb').textContent=[...state.bm].filter(id=>state.ids.includes(id)).length;
  const pos=state.idx+1;
  document.getElementById('ptxt').textContent=`문제 ${pos} / ${total}`;
  const pct=total?Math.round(solved/total*100):0;
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('prev').disabled=state.idx<=0;
  document.getElementById('next').disabled=state.idx>=state.ids.length-1;
}

function renderQ(){
  const qa=document.getElementById('qa');
  if(!state.ids.length){
    qa.innerHTML='<div class="empty">😅 해당 조건의 문제가 없습니다.</div>';
    updateHeader();return;
  }
  const id=state.ids[state.idx];
  const q=QUIZ_DATA.find(x=>x.id===id);
  const done=state.prog[q.id];
  const isBm=state.bm.has(q.id);
  const dateLabel=CAT_DATE[q.category]||'';

  let choicesHtml=q.choices.map((c,i)=>{
    let cls='choice';
    if(done){
      if(i+1===q.answer) cls+=' ok';
      else if(i+1===state.prog[q.id+'_picked']) cls+=' ng';
    }
    return `<button class="${cls}" data-n="${i+1}" ${done?'disabled':''}><span class="cnum">${'①②③④'[i]}</span><span class="ctxt">${c}</span></button>`;
  }).join('');

  let expHtml='';
  if(done){
    const e=q.explanation;
    const correct=done==='ok';
    expHtml=`<div class="exp">
      <span class="res-tag ${correct?'ok':'ng'}">${correct?'✅ 정답!':'❌ 오답'}</span>
      <div class="esec"><p>${e.summary||''}</p></div>`;
    if(e.choiceAnalysis){
      expHtml+=`<div class="esec" style="margin-top:12px"><h4>선택지 해설</h4>`;
      e.choiceAnalysis.forEach(ca=>{
        expHtml+=`<div class="eci${ca.correct?' ans':''}"><span class="n">${'①②③④'[ca.n-1]}</span><span>${ca.text}</span></div>`;
      });
      expHtml+='</div>';
    }
    if(e.concept){
      expHtml+=`<div class="econcept"><h4>${e.concept.title||'📌 핵심 개념'}</h4><ul>`;
      (e.concept.items||[]).forEach(it=>{expHtml+=`<li>${it}</li>`;});
      expHtml+='</ul></div>';
    }
    expHtml+='</div>';
  }

  qa.innerHTML=`<div class="qcard">
    <div class="qhdr">
      <div class="qmeta">
        <span class="qnum">${q.number}번</span>
        <span class="qbadge" data-cat="${q.category}">${q.category}</span>
        <span class="qdate">${dateLabel}</span>
      </div>
      <button class="bmbtn${isBm?' on':''}" data-id="${q.id}" title="북마크">⭐</button>
    </div>
    <p class="qtxt">${q.question}</p>
    ${q.boxLabel?`<div class="qbox"><div class="qbox-lbl">${q.boxLabel}</div>${q.boxText||''}</div>`:''}
    <div class="choices">${choicesHtml}</div>
    ${expHtml}
  </div>`;
  updateHeader();
}

document.getElementById('qa').addEventListener('click',e=>{
  const btn=e.target.closest('.choice');
  const bm=e.target.closest('.bmbtn');
  if(btn&&!btn.disabled){
    const id=state.ids[state.idx];
    const q=QUIZ_DATA.find(x=>x.id===id);
    const n=+btn.dataset.n;
    state.prog[q.id]=n===q.answer?'ok':'ng';
    state.prog[q.id+'_picked']=n;
    save(); renderQ();
    if(n===q.answer&&state.idx<state.ids.length-1){
      setTimeout(()=>{state.idx++;renderQ();},700);
    }
  }
  if(bm){
    const id=+bm.dataset.id;
    if(state.bm.has(id)) state.bm.delete(id); else state.bm.add(id);
    save(); renderQ();
  }
});

document.getElementById('prev').addEventListener('click',()=>{if(state.idx>0){state.idx--;renderQ();}});
document.getElementById('next').addEventListener('click',()=>{if(state.idx<state.ids.length-1){state.idx++;renderQ();}});

document.addEventListener('keydown',e=>{
  if(['1','2','3','4'].includes(e.key)&&!e.ctrlKey&&!e.metaKey){
    const btn=document.querySelector(`.choice[data-n="${e.key}"]:not(:disabled)`);
    if(btn) btn.click();
  }
  if(e.key==='ArrowLeft') document.getElementById('prev').click();
  if(e.key==='ArrowRight') document.getElementById('next').click();
});

document.getElementById('jb').addEventListener('click',()=>{
  const v=+document.getElementById('ji').value;
  const q=QUIZ_DATA.find(x=>x.number===v&&state.ids.includes(x.id));
  if(q){const i=state.ids.indexOf(q.id);if(i>=0){state.idx=i;renderQ();}}
  else{
    const all=QUIZ_DATA.filter(x=>x.number===v);
    if(all.length){
      toast(`${v}번 문제로 이동합니다`);
      const i2=state.ids.indexOf(all[0].id);
      if(i2>=0){state.idx=i2;}
      else{state.cfg.cat='all';state.cfg.st='all';buildList();state.idx=state.ids.indexOf(all[0].id)||0;}
      renderQ();
    }
  }
});

document.getElementById('fcat').addEventListener('change',e=>{
  state.cfg.cat=e.target.value;buildList();state.idx=0;save();renderQ();
});
document.getElementById('fst').addEventListener('change',e=>{
  state.cfg.st=e.target.value;buildList();state.idx=0;save();renderQ();
});
document.getElementById('bshuffle').addEventListener('click',e=>{
  state.cfg.shuffle=!state.cfg.shuffle;
  e.target.classList.toggle('active',state.cfg.shuffle);
  buildList();state.idx=0;save();renderQ();
});
document.getElementById('breset').addEventListener('click',()=>{
  if(!confirm('진도를 초기화할까요?')) return;
  state.prog={};state.bm=new Set();
  save();buildList();state.idx=0;renderQ();
  toast('초기화 완료!');
});

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

(()=>{
  const lastId=load();
  buildList();
  if(lastId){
    const i=state.ids.indexOf(lastId);
    if(i>=0) state.idx=i;
  }
  document.getElementById('fcat').value=state.cfg.cat;
  document.getElementById('fst').value=state.cfg.st;
  document.getElementById('bshuffle').classList.toggle('active',state.cfg.shuffle);
  renderQ();
})();
</script>
</body>
</html>
