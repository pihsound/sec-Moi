{id:3040,category:'데이터통신',number:40,question:'다음 중 TCP 포트 번호가 올바르게 연결된 것은?',choices:['HTTP - 80, HTTPS - 443, FTP - 21','HTTP - 8080, HTTPS - 443, FTP - 20','HTTP - 80, HTTPS - 8443, FTP - 21','HTTP - 80, HTTPS - 443, FTP - 23'],answer:2,explanation:{summary:'HTTP=80, HTTPS=443, FTP 제어=21, FTP 데이터=20',choiceAnalysis:[{n:1,text:'HTTP-80, HTTPS-443, FTP-21 맞음 ✓',correct:true},{n:2,text:'HTTP-8080 오류',correct:false},{n:3,text:'HTTPS-8443 오류',correct:false},{n:4,text:'FTP-23은 Telnet',correct:false}],concept:{title:'📌 주요 포트 번호',items:['HTTP:80, HTTPS:443, FTP:21/20','SSH:22, Telnet:23, SMTP:25','DNS:53, DHCP:67/68, POP3:110','SNMP:161, HTTPS:443, RDP:3389']}}},
{id:3041,category:'데이터통신',number:41,question:'IP 주소 중 A, B, C 클래스의 구분으로 옳은 것은?',choices:['A클래스: 0~127, B클래스: 128~191, C클래스: 192~223','A클래스: 1~126, B클래스: 128~191, C클래스: 192~223','A클래스: 0~127, B클래스: 128~192, C클래스: 193~223','A클래스: 1~128, B클래스: 129~192, C클래스: 193~224'],answer:4,explanation:{summary:'A클래스: 0~127(127=루프백), B: 128~191, C: 192~223',choiceAnalysis:[{n:1,text:'A:0~127, B:128~191, C:192~223 맞음 ✓',correct:true},{n:2,text:'1~126은 실제 사용 가능 범위이나 클래스는 0~127',correct:false},{n:3,text:'B 192까지 오류',correct:false},{n:4,text:'경계값 오류',correct:false}],concept:{title:'📌 IP 클래스',items:['A클래스: 0xxx xxxx(0~127), 대형 네트워크','B클래스: 10xx xxxx(128~191), 중형 네트워크','C클래스: 110x xxxx(192~223), 소형 네트워크','D클래스: 1110 xxxx(224~239), 멀티캐스트','E클래스: 1111 xxxx(240~255), 예약']}}},
{id:3042,category:'데이터통신',number:42,question:'ARP(Address Resolution Protocol)에 대한 설명으로 옳은 것은?',choices:['호스트의 MAC주소에 해당하는 IP주소를 구할 수 있다.','ARP 요청은 해당 네트워크 상의 모든 호스트와 라우터에게 유니캐스트된다.','ARP 응답은 ARP 요청을 전송한 요청자와 모든 호스트에게 브로드캐스트된다.','ARP는 인증 기능이 없으므로 위조된 정보를 사용할 수 있다.'],answer:3,explanation:{summary:'ARP: IP→MAC 변환. ARP 요청=브로드캐스트, 응답=유니캐스트. ARP 위조(Spoofing) 가능.',choiceAnalysis:[{n:1,text:'틀림. ARP=IP→MAC. RARP=MAC→IP',correct:false},{n:2,text:'틀림. ARP 요청=브로드캐스트',correct:false},{n:3,text:'틀림. ARP 응답=유니캐스트(요청자에게만)',correct:false},{n:4,text:'맞음. ARP 인증 없음→ARP Spoofing 가능 ✓',correct:true}],concept:{title:'📌 ARP 동작',items:['ARP 요청: IP 주소로 MAC 주소 문의 → 브로드캐스트','ARP 응답: 해당 IP 소유자가 MAC 주소 알림 → 유니캐스트','ARP 캐시: 결과를 일정 시간 저장','ARP Spoofing: 인증 없어 위조 가능']}}},
{id:3043,category:'데이터통신',number:43,question:'다음 <보기> 중 MAC 주소와 IP 주소에 대한 설명으로 옳은 것만을 모두 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. 물리 주소인 MAC 주소의 길이는 48비트이다.\nㄴ. 논리 주소인 IPv4 주소의 길이는 32비트이다.\nㄷ. 논리 주소인 IPv6 주소의 길이는 128비트이다.\nㄹ. 실행 중인 서비스 번호인 UDP 포트번호의 길이는 16비트이다.',choices:['ㄱ, ㄴ, ㄷ','ㄱ, ㄴ, ㄹ','ㄱ, ㄷ, ㄹ','ㄱ, ㄴ, ㄷ, ㄹ'],answer:2,explanation:{summary:'ㄱ(MAC=48비트), ㄴ(IPv4=32비트), ㄷ(IPv6=128비트), ㄹ(UDP 포트=16비트) 모두 맞음',choiceAnalysis:[{n:1,text:'ㄹ도 맞음',correct:false},{n:2,text:'ㄱ,ㄴ,ㄹ: ㄷ 빠짐',correct:false},{n:3,text:'ㄴ 빠짐',correct:false},{n:4,text:'ㄱ,ㄴ,ㄷ,ㄹ 모두 맞음 ✓',correct:true}],concept:{title:'📌 주소/포트 크기',items:['MAC 주소: 48비트(6바이트)','IPv4: 32비트(4바이트)','IPv6: 128비트(16바이트)','TCP/UDP 포트: 16비트(0~65535)']}}},
{id:3044,category:'데이터통신',number:44,question:'IP(Internet Protocol)의 주요 기능에 해당하지 않는 것은?',choices:['호스트의 주소지정','패킷 전달','전송 경로의 논리적 관리','전송 패킷의 흐름제어'],answer:2,explanation:{summary:'흐름제어는 TCP(전송 계층)의 기능. IP는 비연결형, 비신뢰성, 라우팅.',choiceAnalysis:[{n:1,text:'주소지정: IP 기능(IP 주소)',correct:false},{n:2,text:'패킷 전달: IP 기능',correct:false},{n:3,text:'경로 관리(라우팅): IP 기능',correct:false},{n:4,text:'흐름제어: TCP 기능. IP에는 없음 ✓',correct:true}],concept:{title:'📌 IP 주요 기능',items:['주소지정(Addressing): IP 주소로 호스트 식별','패킷 전달(Forwarding): 다음 홉으로 전달','단편화/재조합(Fragmentation)','라우팅(Routing): 경로 결정']}}},
{id:3045,category:'데이터통신',number:45,question:'IP address에서 네트워크 ID와 호스트 ID를 구별하기 위해 사용하는 정보는 무엇인가?',choices:['서브넷 마스크(subnet mask)','브로드캐스트 주소','네트워크 인터페이스','MAC주소'],answer:1,explanation:{summary:'서브넷 마스크: 네트워크 부분(1)과 호스트 부분(0)을 구분하는 32비트 마스크.',choiceAnalysis:[{n:1,text:'서브넷 마스크: 네트워크/호스트 ID 구분 ✓',correct:true},{n:2,text:'브로드캐스트: 전체 전송용 주소',correct:false},{n:3,text:'네트워크 인터페이스: 물리적 장치',correct:false},{n:4,text:'MAC: 물리 주소',correct:false}],concept:{title:'📌 서브넷 마스크',items:['IP AND 서브넷마스크 = 네트워크 주소','예: 192.168.1.100 / 255.255.255.0','네트워크: 192.168.1.0, 호스트: 100','CIDR: /24는 서브넷마스크 앞 24비트가 1']}}},
{id:3046,category:'데이터통신',number:46,question:'다음 중 IP 헤더에 포함된 내용으로 옳지 않은 것은?',choices:['데이터그램이 경유할 수 있는 라우터의 수에 대한 상한(upper)','목적지 IP주소와 송신지 IP주소','수신측으로 전송되는 데이터 스트림의 바이트를 구분하기 위한 순서번호','데이터그램의 상위 프로토콜을 알려주는 값'],answer:4,explanation:{summary:'순서번호(Sequence Number)는 TCP 헤더의 필드. IP 헤더에 없음.',choiceAnalysis:[{n:1,text:'TTL: IP 헤더 필드',correct:false},{n:2,text:'소스/목적지 IP: IP 헤더 필드',correct:false},{n:3,text:'순서번호: TCP 헤더 필드. IP 헤더에 없음 ✓',correct:true},{n:4,text:'프로토콜 번호: IP 헤더 필드',correct:false}],concept:{title:'📌 IP 헤더 주요 필드',items:['버전, 헤더 길이, 서비스 유형','전체 길이, 식별자(단편화)','TTL(Time To Live), 프로토콜','소스 IP, 목적지 IP','단편화: 플래그, 오프셋']}}},
{id:3047,category:'데이터통신',number:47,question:'클래스 B의 IP 주소 범위에 해당하는 것은?',choices:['0.0.0.0 ~ 127.255.255.255','128.0.0.0 ~ 191.255.255.255','192.0.0.0 ~ 223.255.255.255','224.0.0.0 ~ 239.255.255.255'],answer:4,explanation:{summary:'B클래스: 128~191(10xx xxxx로 시작)',choiceAnalysis:[{n:1,text:'A클래스',correct:false},{n:2,text:'B클래스: 128.0.0.0~191.255.255.255 ✓',correct:true},{n:3,text:'C클래스',correct:false},{n:4,text:'D클래스(멀티캐스트)',correct:false}],concept:{title:'📌 IP 클래스 범위',items:['A: 0.0.0.0 ~ 127.255.255.255','B: 128.0.0.0 ~ 191.255.255.255','C: 192.0.0.0 ~ 223.255.255.255','D: 224.0.0.0 ~ 239.255.255.255(멀티캐스트)']}}},
{id:3048,category:'데이터통신',number:48,question:'다음 IPv4 주소 중 공인 IP 주소에 해당하는 것은?',choices:['10.0.0.1','172.16.0.1','192.168.1.1','200.100.50.1'],answer:2,explanation:{summary:'사설 IP: 10.x.x.x, 172.16~31.x.x, 192.168.x.x. 200.100.50.1은 공인 IP.',choiceAnalysis:[{n:1,text:'10.0.0.1: 사설 IP (A클래스 사설)',correct:false},{n:2,text:'172.16.0.1: 사설 IP (B클래스 사설)',correct:false},{n:3,text:'192.168.1.1: 사설 IP (C클래스 사설)',correct:false},{n:4,text:'200.100.50.1: 공인 IP ✓',correct:true}],concept:{title:'📌 사설 IP 주소 범위',items:['A클래스 사설: 10.0.0.0/8','B클래스 사설: 172.16.0.0~172.31.255.255/12','C클래스 사설: 192.168.0.0/16']}}},
{id:3049,category:'데이터통신',number:49,question:'다음 중 IPv4의 특수 목적 주소에 해당하지 않는 것은?',choices:['127.0.0.1','0.0.0.0','255.255.255.255','200.100.50.1'],answer:1,explanation:{summary:'200.100.50.1은 일반 공인 IP. 나머지는 특수 목적 주소.',choiceAnalysis:[{n:1,text:'127.0.0.1: 루프백(Loopback) 주소 = 특수 목적',correct:false},{n:2,text:'0.0.0.0: 미지정 주소(unknown)',correct:false},{n:3,text:'255.255.255.255: 제한된 브로드캐스트',correct:false},{n:4,text:'200.100.50.1: 일반 공인 IP ✓',correct:true}],concept:{title:'📌 특수 IPv4 주소',items:['127.0.0.1: 루프백(자기 자신)','0.0.0.0: 미지정 주소','255.255.255.255: 제한 브로드캐스트','169.254.x.x: APIPA(자동 사설 IP)']}}},

{id:3051,category:'데이터통신',number:51,question:'ICMP(Internet Control Message Protocol)에 대한 설명으로 옳지 않은 것은?',choices:['IP 프로토콜의 오류 보고 및 피드백 기능을 위해 사용된다.','ping 명령은 ICMP Echo Request/Reply를 이용한다.','ICMP는 전송 계층 프로토콜이다.','ICMP 메시지는 IP 데이터그램 내에 캡슐화되어 전송된다.'],answer:4,explanation:{summary:'ICMP는 네트워크 계층 프로토콜(IP와 같은 계층).',choiceAnalysis:[{n:1,text:'맞음. ICMP: IP 오류 보고',correct:false},{n:2,text:'맞음. ping=ICMP Echo',correct:false},{n:3,text:'틀림. ICMP는 네트워크 계층 ✓',correct:true},{n:4,text:'맞음. IP 데이터그램에 캡슐화',correct:false}],concept:{title:'📌 ICMP',items:['IP의 오류 보고 프로토콜','네트워크 계층(IP와 동일)','ping: Echo Request/Reply','traceroute: TTL 초과 오류 활용']}}},

{id:3053,category:'데이터통신',number:53,question:'IP address에서 네트워크 ID와 호스트 ID를 구별하기 위해 사용하는 정보는 무엇인가?',choices:['서브넷 마스크(subnet mask)','브로드캐스트 주소','네트워크 인터페이스','MAC주소'],answer:1,explanation:{summary:'서브넷 마스크로 네트워크/호스트 ID 구분.',choiceAnalysis:[{n:1,text:'서브넷 마스크 ✓',correct:true},{n:2,text:'브로드캐스트: 전송 주소',correct:false},{n:3,text:'네트워크 인터페이스: 장치',correct:false},{n:4,text:'MAC: 물리 주소',correct:false}],concept:{title:'📌 서브넷 마스크',items:['네트워크 부분: 1로 채움','호스트 부분: 0으로 채움','IP AND 마스크 = 네트워크 주소']}}},
{id:3054,category:'데이터통신',number:54,question:'다음 중 IP 헤더에 포함된 내용으로 옳지 않은 것은?',choices:['데이터그램이 경유할 수 있는 라우터의 수에 대한 상한(upper)','목적지 IP주소와 송신지 IP주소','수신측으로 전송되는 데이터 스트림의 바이트를 구분하기 위한 순서번호','데이터그램의 상위 프로토콜을 알려주는 값'],answer:3,explanation:{summary:'순서번호(Sequence Number): TCP 헤더. IP 헤더에 없음.',choiceAnalysis:[{n:1,text:'TTL: IP 헤더',correct:false},{n:2,text:'소스/목적지 IP: IP 헤더',correct:false},{n:3,text:'순서번호: TCP 헤더에만 존재 ✓',correct:true},{n:4,text:'프로토콜 필드: IP 헤더',correct:false}],concept:{title:'📌 TCP vs IP 헤더 필드',items:['IP만: TTL, 단편화, 프로토콜 번호','TCP만: 순서번호, 확인번호, 포트','공통: 소스/목적지 주소(다른 레벨)']}}},
{id:3055,category:'데이터통신',number:55,question:'다음 중 클래스 A의 네트워크에 해당하는 IP 주소는?',choices:['126.10.9.81','131.10.81.9','140.252.20.7','191.230.100.10'],answer:1,explanation:{summary:'A클래스: 0~127로 시작. 126.x.x.x는 A클래스.',choiceAnalysis:[{n:1,text:'126.10.9.81: A클래스(0~127) ✓',correct:true},{n:2,text:'131.10.81.9: B클래스(128~191)',correct:false},{n:3,text:'140.252.20.7: B클래스',correct:false},{n:4,text:'191.230.100.10: B클래스(끝부분)',correct:false}],concept:{title:'📌 클래스 판별',items:['A클래스: 첫 번째 필드 0~127','B클래스: 128~191','C클래스: 192~223','126으로 시작=A클래스']}}},
{id:3056,category:'데이터통신',number:56,question:'다음 IPv4 주소에 대한 클래스별 분류가 옳지 않은 것은?',choices:['110.200.10.2는 클래스 A의 주소이다.','124.100.7.4는 클래스 B의 주소이다.','210.224.100.5는 클래스 C의 주소이다.','225.76.2.91은 클래스 D의 주소이다.'],answer:2,explanation:{summary:'124.100.7.4: 124는 0~127 범위이므로 A클래스. B클래스가 아님.',choiceAnalysis:[{n:1,text:'맞음. 110→A클래스',correct:false},{n:2,text:'틀림. 124→A클래스(0~127) ✓',correct:true},{n:3,text:'맞음. 210→C클래스',correct:false},{n:4,text:'맞음. 225→D클래스(멀티캐스트)',correct:false}],concept:{title:'📌 클래스 판별 기준',items:['0~127: A클래스','128~191: B클래스','192~223: C클래스','224~239: D클래스']}}},
{id:3057,category:'데이터통신',number:57,question:'인터넷 B클래스 주소가 할당되었다. 실제 900개의 호스트 주소만 필요하다면 남는 주소를 효율적으로 사용하기 위해 서브넷(subnet)을 구성하려 한다. 이 때 최대로 만들 수 있는 서브넷의 개수는?',choices:['16개','32개','64개','128개'],answer:3,explanation:{summary:'900개 호스트 수용: 2^10=1024≥900. 호스트 비트=10. B클래스 호스트 부분=16비트. 서브넷 비트=16-10=6. 서브넷 수=2^6=64.',choiceAnalysis:[{n:1,text:'16개: 2^4',correct:false},{n:2,text:'32개: 2^5',correct:false},{n:3,text:'64개: 2^6 ✓',correct:true},{n:4,text:'128개: 2^7',correct:false}],concept:{title:'📌 서브넷 수 계산',items:['B클래스 호스트 부분: 16비트','900개 호스트: 2^10=1024 ≥ 900','호스트 비트=10, 서브넷 비트=16-10=6','서브넷 수=2^6=64']}}},
{id:3058,category:'데이터통신',number:58,question:'어떤 네트워크가 IPv4 방식의 C클래스 IP주소를 할당받았다. 서브넷팅을 수행할 경우 사용될 수 없는 서브넷 마스크는 무엇인가?',choices:['255.255.255.128','255.255.255.158','255.255.255.192','255.255.255.224'],answer:2,explanation:{summary:'서브넷 마스크는 연속된 1 다음 연속된 0이어야 함. 158=10011110→비연속 → 유효하지 않음.',choiceAnalysis:[{n:1,text:'128=10000000: 유효',correct:false},{n:2,text:'158=10011110: 비연속 비트→무효 ✓',correct:true},{n:3,text:'192=11000000: 유효',correct:false},{n:4,text:'224=11100000: 유효',correct:false}],concept:{title:'📌 유효한 서브넷 마스크',items:['반드시 연속된 1 다음 연속된 0','유효: 128(10000000), 192(11000000), 224(11100000)','무효: 158(10011110), 185(10111001)']}}},
{id:3059,category:'데이터통신',number:59,question:'C클래스 IP주소인 200.100.20.0 네트워크를 각 네트워크 당 60개의 호스트가 사용할 수 있도록 서브네팅(subnetting)할 경우 서브넷 마스크(subnet mask)로 옳은 것은?',choices:['255.255.255.128','255.255.255.192','255.255.255.224','255.255.255.240'],answer:2,explanation:{summary:'60개 호스트: 2^6-2=62≥60. 호스트 비트=6. 서브넷 마스크=256-64=192. 255.255.255.192',choiceAnalysis:[{n:1,text:'128: 호스트 7비트, 126개',correct:false},{n:2,text:'192: 호스트 6비트, 62개 ✓',correct:true},{n:3,text:'224: 호스트 5비트, 30개',correct:false},{n:4,text:'240: 호스트 4비트, 14개',correct:false}],concept:{title:'📌 서브넷 마스크 계산',items:['호스트 수 60개 → 2^n-2 ≥ 60 → n=6','호스트 비트=6, 서브넷 비트=8-6=2','마지막 옥텟=11000000=192','서브넷 마스크=255.255.255.192']}}},
{id:3060,category:'데이터통신',number:60,question:'C클래스 IP주소인 211.100.10.0 네트워크를 각 네트워크 당 60개의 호스트가 사용할 수 있도록 서브네팅(subnetting)할 경우 첫 번째 서브넷의 브로드캐스트(broadcast) 주소는?',choices:['211.100.10.15','211.100.10.31','211.100.10.63','211.100.10.127'],answer:3,explanation:{summary:'서브넷 마스크 255.255.255.192. 첫 번째 서브넷: 211.100.10.0~211.100.10.63. 브로드캐스트=63.',choiceAnalysis:[{n:1,text:'15: 4비트 호스트',correct:false},{n:2,text:'31: 5비트 호스트',correct:false},{n:3,text:'63: 6비트 호스트. 0~63 범위, 브로드캐스트=63 ✓',correct:true},{n:4,text:'127: 7비트 호스트',correct:false}],concept:{title:'📌 서브넷 브로드캐스트 계산',items:['서브넷 크기=64(호스트 6비트)','1번째 서브넷: .0~.63','브로드캐스트=마지막 주소=.63','네트워크 주소=.0(첫 주소)']}}},
{id:3061,category:'데이터통신',number:61,question:'212.122.100.25/24으로 표현할 경우 이에 대한 설명으로 옳지 않은 것은?',choices:['CIDR(Classless Inter-Domain Routing) 방식이다.','왼쪽 24비트는 IP주소 내 네트워크 ID이다.','오른쪽 8비트는 호스트 ID이다.','/이후의 숫자는 반드시 8의 배수여야 한다.'],answer:4,explanation:{summary:'CIDR에서 /뒤 숫자는 네트워크 비트 수. 8의 배수가 아니어도 됨(/21, /25 등 가능).',choiceAnalysis:[{n:1,text:'맞음. CIDR 표기법',correct:false},{n:2,text:'맞음. /24=앞 24비트=네트워크 ID',correct:false},{n:3,text:'맞음. 나머지 8비트=호스트 ID',correct:false},{n:4,text:'틀림. 8의 배수 불필요. /21, /25도 유효 ✓',correct:true}],concept:{title:'📌 CIDR(Classless Inter-Domain Routing)',items:['클래스 구분 없는 유연한 주소 할당','/n: 네트워크 비트 수(1~32)','8의 배수 불필요: /21, /22, /25 모두 가능','IP 주소 고갈 문제 완화']}}},
{id:3062,category:'데이터통신',number:62,question:"CIDR(classless inter-domain routing)로 표현된 호스트의 IP Address가 '201.100.5.68/28'일 때 서브넷 마스크(subnet mask)와 Network-ID로 옳은 것은?",choices:['서브넷:255.255.255.0 / 네트워크:201.100.5.28','서브넷:255.255.255.127 / 네트워크:201.100.5.32','서브넷:255.255.255.240 / 네트워크:201.100.5.64','서브넷:255.255.255.248 / 네트워크:201.100.5.240'],answer:3,explanation:{summary:'/28: 28비트 마스크=255.255.255.240. 68 AND 240=64. 네트워크=201.100.5.64',choiceAnalysis:[{n:1,text:'/24이면 이 서브넷 마스크',correct:false},{n:2,text:'/25이면 127',correct:false},{n:3,text:'/28=11110000=240. 68 AND 240=64 ✓',correct:true},{n:4,text:'/29=248',correct:false}],concept:{title:'📌 /28 서브넷 계산',items:['/28 = 앞 28비트가 1','마지막 옥텟: 11110000=240','서브넷 마스크: 255.255.255.240','68 = 01000100, AND 11110000 = 01000000 = 64']}}},
{id:3063,category:'데이터통신',number:63,question:"192.168.1.222/28라는 IP가 소속되어 있는 네트워크 주소와 브로드캐스트 주소로 옳게 나열한 것은?",choices:['192.168.1.96 / 192.168.1.127','192.168.1.192 / 192.168.1.255','192.168.1.208 / 192.168.1.223','192.168.1.224 / 192.168.1.239'],answer:3,explanation:{summary:'/28: 서브넷 크기=16. 222/16=13.875→13번째 서브넷. 시작=208, 끝=223.',choiceAnalysis:[{n:1,text:'96~127: 7번째 서브넷',correct:false},{n:2,text:'192~255: /25',correct:false},{n:3,text:'208~223: 222가 포함됨 ✓',correct:true},{n:4,text:'224~239: 다음 서브넷',correct:false}],concept:{title:'📌 서브넷 범위 계산',items:['/28: 블록 크기=16(2^4)','222÷16=13.875→블록=13×16=208','범위: 208~223','네트워크=208, 브로드캐스트=223']}}},
{id:3064,category:'데이터통신',number:64,question:'다음 중 IPv4 캐스트 모드에 해당하지 않는 것은?',choices:['애니 캐스트(any-cast)','유니 캐스트(uni-cast)','멀티 캐스트(multi-cast)','브로드 캐스트(broad-cast)'],answer:1,explanation:{summary:'애니캐스트(Anycast): IPv6의 캐스트 모드. IPv4에는 없음. IPv4는 유니, 멀티, 브로드캐스트.',choiceAnalysis:[{n:1,text:'애니캐스트: IPv6 전용 ✓',correct:true},{n:2,text:'유니캐스트: IPv4 캐스트 모드',correct:false},{n:3,text:'멀티캐스트: IPv4 캐스트 모드',correct:false},{n:4,text:'브로드캐스트: IPv4 캐스트 모드',correct:false}],concept:{title:'📌 IPv4 vs IPv6 캐스트',items:['IPv4: 유니캐스트, 멀티캐스트, 브로드캐스트','IPv6: 유니캐스트, 멀티캐스트, 애니캐스트(브로드캐스트 없음)','애니캐스트: 가장 가까운 노드에만 전달']}}},
{id:3065,category:'데이터통신',number:65,question:'IPv6에서 사용하는 캐스트 모드에 해당하지 않는 것은?',choices:['유니 캐스트(uni-cast)','애니 캐스트(any-cast)','멀티 캐스트(multi-cast)','브로드 캐스트(broad-cast)'],answer:4,explanation:{summary:'IPv6는 브로드캐스트 없음. 대신 애니캐스트와 확장된 멀티캐스트로 대체.',choiceAnalysis:[{n:1,text:'유니캐스트: IPv6 지원',correct:false},{n:2,text:'애니캐스트: IPv6 지원',correct:false},{n:3,text:'멀티캐스트: IPv6 지원',correct:false},{n:4,text:'브로드캐스트: IPv6에 없음 ✓',correct:true}],concept:{title:'📌 IPv6 캐스트 모드',items:['유니캐스트: 단일 수신자','멀티캐스트: 그룹 수신자','애니캐스트: 가장 가까운 단일 수신자','브로드캐스트: IPv6에서 제거']}}},
{id:3066,category:'데이터통신',number:66,question:'IPv4 주소와 IPv6 주소에 대한 비교 설명으로 옳은 것은?',choices:['IPv4의 주소는 4바이트이고 IPv6의 주소는 6바이트이다.','IPv4의 기본 헤더 길이는 고정이며, IPv6의 기본 헤더 길이는 가변이다.','IPv4는 클래스 별로 주소 할당을 하며, IPv6는 순차적 주소 할당 방식을 사용한다.','IPv4와 IPv6 모두 캐스트 방식으로 유니캐스트, 멀티캐스트, 브로드캐스트 방식을 사용한다.'],answer:3,explanation:{summary:'IPv4: 클래스별 할당. IPv6: 계층적(순차적) 할당.',choiceAnalysis:[{n:1,text:'틀림. IPv4=4바이트(32비트), IPv6=16바이트(128비트)',correct:false},{n:2,text:'틀림. IPv4 기본 헤더=가변(옵션 있음). IPv6 기본 헤더=고정(40바이트)',correct:false},{n:3,text:'맞음. IPv4=클래스 기반, IPv6=계층적 할당 ✓',correct:true},{n:4,text:'틀림. IPv6에는 브로드캐스트 없음',correct:false}],concept:{title:'📌 IPv4 vs IPv6 비교',items:['IPv4: 32비트, 클래스 기반, 브로드캐스트','IPv6: 128비트, 계층적 할당, 애니캐스트','IPv6: 고정 40바이트 기본 헤더(IPv4는 가변)']}}},
{id:3067,category:'데이터통신',number:67,question:'인터넷 프로토콜인 IPv6와 IPv4를 비교하여 설명한 것이다. 옳은 것을 <보기>에서 모두 고른 것은?',boxLabel:'<보기>',boxText:'㉠ IPv6의 기본 헤더에는 헤더길이 필드가 있고, IPv4의 기본 헤더에는 헤더길이 필드가 없다.\n㉡ IPv4에서 단편화는 발신지 호스트에서만 수행될 수 있으나, IPv6에서는 단편화가 패킷이 전파되는 경로상의 모든 라우터에서 수행될 수 있다.\n㉢ IPv6는 네트워크 규모에 따른 순차적 주소 할당을 하고, IPv4는 클래스 단위의 비순차적 주소 할당을 한다.\n㉣ IPv6는 데이터그램 헤더에 홉 제한(hop limit) 필드는 IPv4 헤더 내 TTL 필드와 동일한 역할을 한다.',choices:['㉠, ㉡','㉡, ㉢','㉠, ㉣','㉢, ㉣'],answer:4,explanation:{summary:'㉢(순차적 할당)과 ㉣(홉제한=TTL)이 맞음. ㉠,㉡은 반대.',choiceAnalysis:[{n:1,text:'㉠ 틀림(반대)',correct:false},{n:2,text:'㉡ 틀림(반대: IPv6에서 라우터 단편화 불가)',correct:false},{n:3,text:'㉠ 틀림',correct:false},{n:4,text:'㉢(맞음)+㉣(맞음) ✓',correct:true}],concept:{title:'📌 IPv4 vs IPv6 핵심 차이',items:['단편화: IPv4=라우터도 가능 / IPv6=발신지만','헤더 길이: IPv4=가변, IPv6=고정','TTL↔홉 제한(Hop Limit): 동일 기능']}}},
{id:3068,category:'데이터통신',number:68,question:'IPv4에서 IPv6으로의 전환을 위해 IETF에서 고안한 전략 중 IPv6를 사용하는 두 컴퓨터가 서로 통신하려고 하는데 IPv4를 사용하는 영역을 통과해야만 할 때 사용하는 전략은 무엇인가?',choices:['이중 스택(dual stack)','터널링(tunneling)','헤더 변환(header translation)','NAT-PT'],answer:2,explanation:{summary:'터널링: IPv6 패킷을 IPv4 패킷으로 캡슐화하여 IPv4 구간 통과.',choiceAnalysis:[{n:1,text:'이중 스택: 하나의 장치에 IPv4+IPv6 모두 지원',correct:false},{n:2,text:'터널링: IPv6를 IPv4로 캡슐화 ✓',correct:true},{n:3,text:'헤더 변환: IPv4↔IPv6 직접 변환',correct:false},{n:4,text:'NAT-PT: 프로토콜 주소 변환',correct:false}],concept:{title:'📌 IPv4→IPv6 전환 기술',items:['이중 스택: 두 프로토콜 동시 운용','터널링: IPv6-in-IPv4 캡슐화','헤더 변환: 헤더 형식 직접 변환']}}},
{id:3069,category:'데이터통신',number:69,question:'다음 프로토콜 중 헤더(header) 내의 정보에 체크섬(checksum) 필드가 없는 것은?',choices:['TCP','UDP','IPv4','IPv6'],answer:4,explanation:{summary:'IPv6: 체크섬 필드 없음(하위 계층이 담당). IPv4, TCP, UDP는 체크섬 있음.',choiceAnalysis:[{n:1,text:'TCP: 체크섬 필수',correct:false},{n:2,text:'UDP: 체크섬 있음(선택적 사용)',correct:false},{n:3,text:'IPv4: 헤더 체크섬 있음',correct:false},{n:4,text:'IPv6: 체크섬 없음(하위 계층 담당) ✓',correct:true}],concept:{title:'📌 IPv6 헤더 단순화',items:['IPv4 헤더에서 제거된 필드: Header Length, Checksum, Fragment Offset','IPv6: 고정 40바이트 기본 헤더','체크섬: 링크 계층(Ethernet 등)이 담당']}}},
{id:3070,category:'데이터통신',number:70,question:'IPv4에서 전송할 데이터의 전체 크기가 4000바이트이다. MTU(Maximum Transfer Unit)가 1500바이트일 경우 각 단편의 오프셋(offset) 값에 해당하지 않는 것은? (단, IP헤더의 크기가 20바이트이고 MTU에 맞게 패킷을 단편화한다)',choices:['0','64','185','370'],answer:2,explanation:{summary:'데이터=3980바이트. 단편당 데이터=1480바이트. 오프셋=0, 185(1480/8), 370(2960/8). 64는 해당없음.',choiceAnalysis:[{n:1,text:'0: 첫 번째 단편',correct:false},{n:2,text:'64: 해당 없음 ✓',correct:true},{n:3,text:'185=1480/8: 두 번째 단편',correct:false},{n:4,text:'370=2960/8: 세 번째 단편',correct:false}],concept:{title:'📌 IP 단편화 오프셋',items:['MTU=1500, 헤더=20→데이터=1480','오프셋은 8바이트 단위','단편1: 오프셋=0, 단편2: 1480/8=185','단편3: 2960/8=370']}}},
{id:3071,category:'데이터통신',number:71,question:'외부 네트워크에 알려진 것과 다른 사설 IP주소를 사용하는 내부 네트워크에서, 외부 네트워크와의 호환성을 위해 IP주소를 변환하여 연결시켜주는 역할을 하는 것은?',choices:['DNS','VPN','MAN','NAT'],answer:4,explanation:{summary:'NAT(Network Address Translation): 사설 IP↔공인 IP 변환.',choiceAnalysis:[{n:1,text:'DNS: 도메인↔IP 변환',correct:false},{n:2,text:'VPN: 가상 사설망',correct:false},{n:3,text:'MAN: 도시권 통신망',correct:false},{n:4,text:'NAT: 사설↔공인 IP 변환 ✓',correct:true}],concept:{title:'📌 NAT(Network Address Translation)',items:['사설 IP를 공인 IP로 변환하여 인터넷 접속','IP 주소 절약','보안 효과(내부 네트워크 숨김)','PAT/NAPT: 포트 번호로 구분(다수 내부 호스트)']}}},
{id:3072,category:'데이터통신',number:72,question:'다음 중 사설 IP 주소에 해당하지 않는 것은?',choices:['10.200.100.10','172.30.100.10','192.168.100.10','210.168.100.10'],answer:4,explanation:{summary:'사설 IP: 10.x.x.x, 172.16~31.x.x, 192.168.x.x. 210.168.x.x는 공인 IP.',choiceAnalysis:[{n:1,text:'10.x.x.x: A클래스 사설',correct:false},{n:2,text:'172.30.x.x: B클래스 사설',correct:false},{n:3,text:'192.168.x.x: C클래스 사설',correct:false},{n:4,text:'210.168.x.x: C클래스 공인 IP ✓',correct:true}],concept:{title:'📌 사설 IP 주소',items:['A: 10.0.0.0~10.255.255.255','B: 172.16.0.0~172.31.255.255','C: 192.168.0.0~192.168.255.255']}}},
{id:3073,category:'데이터통신',number:73,question:'사설 IP 주소에 대한 설명으로 옳지 않은 것은?',choices:['공인IP 주소의 부족을 해결하기 위해 사용된다.','사설 IP 주소는 내부 네트워크 내에서만 사용된다.','사설 IP 주소는 내부에서만 유일한 값이며 다른 네트워크 내에서는 같은 값이 있을 수 있다.','IP 주소의 첫 필드 값이 172인 경우 B클래스에서의 사설 IP 주소이다.'],answer:4,explanation:{summary:'172는 B클래스이지만 172.0~172.15, 172.32~172.255는 공인 IP. 172.16~31만 사설.',choiceAnalysis:[{n:1,text:'맞음. 공인 IP 부족 해결',correct:false},{n:2,text:'맞음. 내부 전용',correct:false},{n:3,text:'맞음. 다른 네트워크에서 중복 가능',correct:false},{n:4,text:'틀림. 172로 시작해도 172.16~31 범위만 사설 ✓',correct:true}],concept:{title:'📌 172 사설 IP 주의',items:['172.0.0.0~172.15.x.x: 공인 IP','172.16.0.0~172.31.x.x: 사설 IP','172.32.0.0~172.255.x.x: 공인 IP','단순히 172로 시작한다고 모두 사설이 아님']}}},
{id:3074,category:'데이터통신',number:74,question:'다음 프로토콜의 설명으로 옳지 않은 것은?',choices:['TFTP는 UDP 서비스를 이용하는 파일 전송 프로토콜이다.','DHCP는 UDP 서비스를 이용하며 네트워크의 각 노드들에게 IP주소를 자동으로 할당, 관리하는 프로토콜이다.','SNMP는 UDP 서비스를 이용하는 망 관리 프로토콜이다.','Telnet은 UDP 서비스를 이용하는 원격 접속 프로토콜이다.'],answer:4,explanation:{summary:'Telnet: TCP 사용(포트 23). UDP가 아님.',choiceAnalysis:[{n:1,text:'맞음. TFTP: UDP/69',correct:false},{n:2,text:'맞음. DHCP: UDP/67,68',correct:false},{n:3,text:'맞음. SNMP: UDP/161',correct:false},{n:4,text:'틀림. Telnet: TCP/23 ✓',correct:true}],concept:{title:'📌 주요 프로토콜과 TCP/UDP',items:['TCP: HTTP(80), FTP(21), SSH(22), Telnet(23), SMTP(25)','UDP: DNS(53), DHCP(67/68), TFTP(69), SNMP(161)']}}},
{id:3075,category:'데이터통신',number:75,question:'다음 프로토콜에 대한 설명으로 옳은 것은?',choices:['RARP는 논리 주소인 IP주소를 물리 주소인 MAC 주소로 변환한다.','MIME은 텍스트, 이미지, 오디오, 비디오 등의 멀티미디어 전자우편을 위한 통신규약이다.','UDP는 한정된 개수의 IP주소를 여러 사용자가 공유할 수 있도록 동적으로 가용한 주소를 호스트에 할당해준다.','HTTP는 웹서버와 웹브라우저 간에 안전한 하이퍼텍스트 문서를 주고받기 위해 상태 정보를 항상 포함한다.'],answer:2,explanation:{summary:'MIME: 멀티미디어 이메일 첨부를 위한 표준. 나머지 설명들이 틀림.',choiceAnalysis:[{n:1,text:'틀림. RARP=MAC→IP(역방향). ARP=IP→MAC',correct:false},{n:2,text:'맞음. MIME: 멀티미디어 이메일 표준 ✓',correct:true},{n:3,text:'틀림. UDP 설명이 DHCP 설명',correct:false},{n:4,text:'틀림. HTTP는 무상태(Stateless). 상태 정보는 별도 세션/쿠키',correct:false}],concept:{title:'📌 MIME(Multipurpose Internet Mail Extensions)',items:['이메일에 텍스트 이외 멀티미디어 첨부','Content-Type으로 형식 명시','HTTP에서도 Content-Type 헤더로 사용']}}},
{id:3076,category:'데이터통신',number:76,question:'다음 중 가장 관련성이 적은 프로토콜은 무엇인가?',choices:['MIME','SNMP','SMTP','IMAP'],answer:2,explanation:{summary:'SNMP: 네트워크 관리 프로토콜. MIME, SMTP, IMAP은 이메일 관련.',choiceAnalysis:[{n:1,text:'MIME: 이메일 멀티미디어',correct:false},{n:2,text:'SNMP: 네트워크 관리. 이메일과 무관 ✓',correct:true},{n:3,text:'SMTP: 이메일 전송',correct:false},{n:4,text:'IMAP: 이메일 수신',correct:false}],concept:{title:'📌 이메일 관련 프로토콜',items:['SMTP(25): 메일 전송','POP3(110): 메일 수신(다운로드)','IMAP(143): 메일 수신(서버 관리)','MIME: 멀티미디어 첨부 형식']}}},
{id:3077,category:'데이터통신',number:77,question:'다음 <보기>의 설명에 해당하는 프로토콜은 무엇인가?',boxLabel:'<보기>',boxText:'∘ 네트워크 관리 소프트웨어를 실행하는 메인 컴퓨터에서 서버 컴퓨터, 라우터, 브리지 및 허브 같은 네트워크 호스트를 관리하는 방법을 제공한다.\n∘ 에이전트는 매니저에게 관리 시스템의 MIB(Management Information Basement) 정보를 제공한다.\n∘ 트랩 메시지는 에이전트에서 시스템 재부팅이나 허용되지 않은 액세스 같은 경고를 호출하는 이벤트이다.',choices:['IP','SNMP','DNS','HTTPS'],answer:2,explanation:{summary:'SNMP: 네트워크 장치 관리 프로토콜. 매니저-에이전트 구조, MIB.',choiceAnalysis:[{n:1,text:'IP: 인터넷 프로토콜',correct:false},{n:2,text:'SNMP: 네트워크 관리 ✓',correct:true},{n:3,text:'DNS: 도메인 이름 해석',correct:false},{n:4,text:'HTTPS: 보안 웹',correct:false}],concept:{title:'📌 SNMP',items:['Simple Network Management Protocol','UDP/161 사용','매니저(NMS): 중앙 관리 소프트웨어','에이전트: 각 장치에서 실행','MIB: 관리 정보 베이스','트랩: 이벤트 알림']}}},
{id:3078,category:'데이터통신',number:78,question:'다음 <보기>의 특징을 갖는 프로토콜의 포트번호(port number)는?',boxLabel:'<보기>',boxText:'∘ OSI 7계층의 Application 계층 프로토콜이다.\n∘ 메시지는 단순히 요청과 응답 형식의 프로토콜에 의해 교환되기 때문에 전송계층 프로토콜로 UDP 프로토콜을 사용한다.\n∘ Get, Set, Trap 동작을 수행한다.',choices:['UDP 53','UDP 67','UDP 69','UDP 161'],answer:4,explanation:{summary:'Get, Set, Trap 동작을 하는 SNMP의 포트번호는 UDP 161.',choiceAnalysis:[{n:1,text:'UDP 53: DNS',correct:false},{n:2,text:'UDP 67: DHCP',correct:false},{n:3,text:'UDP 69: TFTP',correct:false},{n:4,text:'UDP 161: SNMP ✓',correct:true}],concept:{title:'📌 주요 UDP 포트',items:['53: DNS','67/68: DHCP','69: TFTP','123: NTP','161: SNMP','514: Syslog']}}},
{id:3079,category:'데이터통신',number:79,question:'다음 <보기>의 특징을 갖는 네트워크 토폴로지(topology)로 옳은 것은?',boxLabel:'<보기>',boxText:'∘ 근거리통신망에서 일반적으로 많이 사용된다.\n∘ 네트워크 트래픽이 많을 경우 전송 효율이 떨어진다.\n∘ 브로드캐스팅으로 인한 잦은 인터럽트로 호스트의 성능을 떨어뜨리고 네트워크 대역폭을 낭비할 수 있다.',choices:['버스형','스타형','트리형','메쉬형'],answer:1,explanation:{summary:'버스형: 단일 공유 케이블에 모든 호스트 연결. 브로드캐스팅, 충돌, 트래픽 문제.',choiceAnalysis:[{n:1,text:'버스형: 공유 케이블, 브로드캐스트, 충돌 ✓',correct:true},{n:2,text:'스타형: 중앙 장치에 연결',correct:false},{n:3,text:'트리형: 계층 구조',correct:false},{n:4,text:'메쉬형: 모든 노드 직접 연결',correct:false}],concept:{title:'📌 네트워크 토폴로지 비교',items:['버스형: 공유 케이블, 충돌 가능, 저비용','스타형: 중앙 집중식, 단일 장애점','링형: 순환, 토큰 패싱','메쉬형: 완전 연결, 고신뢰성, 고비용']}}},
{id:3080,category:'데이터통신',number:80,question:'토폴로지(topology) 각각의 단점을 설명한 것이다. 옳지 않은 것은?',choices:['성(start)형은 중앙에 있는 전송 제어장치에 장애가 오면 네트워크 전체가 동작할 수 없고 통신량이 많은 경우 전송이 지연된다.','트리(tree)형은 부노드에 트래픽이 집중되어 병목현상이 발생할 수 있다.','버스(bus)형은 장비의 수가 많아지면 네트워크의 성능이 저하되고 중앙 케이블이 고장나면 네트워크 전체가 동작하지 않는다.','망(mesh)형은 링크의 결함이 발생하면 전체 네트워크를 사용할 수 없게 한다.'],answer:4,explanation:{summary:'메쉬형: 링크 하나 결함이 생겨도 다른 경로로 우회 가능. 내결함성이 가장 높음.',choiceAnalysis:[{n:1,text:'맞음. 스타: 중앙 장치 단일 장애점',correct:false},{n:2,text:'맞음. 트리: 부노드 병목',correct:false},{n:3,text:'맞음. 버스: 공유 케이블, 성능 저하',correct:false},{n:4,text:'틀림. 메쉬: 링크 하나 고장해도 다른 경로 사용 ✓',correct:true}],concept:{title:'📌 메쉬형 특징',items:['모든 노드가 직접 연결','최고의 내결함성(링크 고장 시 우회)','가장 많은 링크 필요','구축비용 높음']}}},
{id:3081,category:'데이터통신',number:81,question:'데이터 통신망의 형태(topology)에 대한 설명으로 가장 적절하지 않은 것은?',choices:['버스형은 케이블에 연결되어 있는 하나의 단말기가 전송을 하면 모든 단말기가 수신할 수 있다.','링형은 단말기의 수가 많아지면 충돌이 자주 발생한다.','스타형은 중앙 제어장치에서 문제가 발생하면 전체 네트워크의 통신이 곤란해진다.','메쉬형은 가장 많은 통신회선을 필요로 하며 신뢰성이 가장 높다.'],answer:2,explanation:{summary:'링형은 토큰 패싱 방식으로 충돌이 발생하지 않음.',choiceAnalysis:[{n:1,text:'맞음. 버스: 브로드캐스트',correct:false},{n:2,text:'틀림. 링형은 토큰 패싱으로 충돌 없음. 충돌은 버스형 ✓',correct:true},{n:3,text:'맞음. 스타: 중앙 장치 단일 장애점',correct:false},{n:4,text:'맞음. 메쉬: 최다 링크, 최고 신뢰성',correct:false}],concept:{title:'📌 링형(Ring)',items:['단방향 또는 양방향 링','토큰 패싱: 토큰 보유자만 전송','충돌 없음(CSMA/CD 불필요)','하나의 노드 고장이 전체에 영향']}}},
{id:3082,category:'데이터통신',number:82,question:'회선 교환과 패킷 교환에 대한 설명으로 옳은 것은?',choices:['패킷 교환은 전용 전송로가 있다.','패킷 교환은 고정된 대역폭을 사용한다.','회선 교환은 전송 지연이 발생할 수 있다.','회선 교환은 메시지 저장이 불가능하다.'],answer:4,explanation:{summary:'회선 교환: 연결 설정 후 전용 회선 독점. 메시지 저장 불가(직접 전달).',choiceAnalysis:[{n:1,text:'틀림. 전용 전송로는 회선 교환',correct:false},{n:2,text:'틀림. 고정 대역폭은 회선 교환',correct:false},{n:3,text:'틀림. 패킷 교환이 전송 지연 발생',correct:false},{n:4,text:'맞음. 회선 교환: 메시지 저장 불가 ✓',correct:true}],concept:{title:'📌 회선 교환 vs 패킷 교환',items:['회선 교환: 전용 회선, 일정 품질, 메모리 불필요','패킷 교환: 공유 회선, 가변 지연, 노드에 저장-전달','현대 인터넷: 패킷 교환 방식']}}},
{id:3083,category:'데이터통신',number:83,question:'데이터 교환 방식에 따른 네트워크 분류. 해당 방식에 대한 설명으로 옳지 않은 것은?',choices:['회선 교환 방식은 접속되어 있는 동안 연결된 두 시스템에서 통신 회선을 독점한다.','메시지 교환 방식은 메시지를 한 개 복사하여 여러 노드로 전송할 수 있다.','가상 회선 방식은 데이터의 전송을 보장하며 여러 노드가 동시에 가상회선을 가질 수 있다.','데이터그램 방식은 송신 데이터의 순서와 수신 데이터의 순서가 항상 일치한다.'],answer:4,explanation:{summary:'데이터그램: 각 패킷이 독립적으로 라우팅. 순서가 뒤바뀔 수 있음.',choiceAnalysis:[{n:1,text:'맞음. 회선 교환: 독점',correct:false},{n:2,text:'맞음. 메시지 교환: 복사 전송 가능',correct:false},{n:3,text:'맞음. 가상 회선: 연결 설정 후 순서 보장',correct:false},{n:4,text:'틀림. 데이터그램: 순서 뒤바뀔 수 있음 ✓',correct:true}],concept:{title:'📌 패킷 교환 종류',items:['가상 회선: 논리적 연결 설정, 순서 보장(ATM)','데이터그램: 비연결, 순서 비보장(IP)','인터넷 IP는 데이터그램 방식']}}},
{id:3084,category:'데이터통신',number:84,question:'네트워크 연결 장비에 대한 설명으로 옳은 것은?',choices:['리피터는 감쇄된 신호를 증폭 재생시키며 OSI 3계층에서 동작한다.','브리지는 패킷을 적절히 중계하고 필터링하며 OSI 2계층에서 동작한다.','라우터는 최적 경로를 선택해주며 OSI 1계층에서 동작한다.','게이트웨이는 서로 다른 네트워크를 연결시켜주며 OSI 4계층에서 동작한다.'],answer:2,explanation:{summary:'브리지: MAC 주소 기반 필터링, 데이터링크 계층(2계층).',choiceAnalysis:[{n:1,text:'틀림. 리피터: 1계층(물리)',correct:false},{n:2,text:'맞음. 브리지: 2계층, MAC 기반 ✓',correct:true},{n:3,text:'틀림. 라우터: 3계층(네트워크)',correct:false},{n:4,text:'틀림. 게이트웨이: 7계층까지 모두 처리',correct:false}],concept:{title:'📌 네트워크 장비 계층',items:['1계층: 리피터, 허브','2계층: 브리지, 스위치','3계층: 라우터','4~7계층: 게이트웨이']}}},
{id:3085,category:'데이터통신',number:85,question:'네트워크 연결 장비의 설명으로 옳은 것은?',choices:['라우터는 데이터링크 계층과 관련한 네트워크 장비이다.','데이터링크 계층과 관련한 네트워크 장비는 MAC 주소를 기반으로 작동한다.','브리지와 스위치는 전송 계층과 관련한 네트워크 장비이다.','네트워크 계층과 관련한 네트워크 장비는 포트 넘버(port number)를 기반으로 작동한다.'],answer:2,explanation:{summary:'데이터링크 계층 장비(브리지, 스위치): MAC 주소 기반.',choiceAnalysis:[{n:1,text:'틀림. 라우터: 네트워크 계층(3)',correct:false},{n:2,text:'맞음. 데이터링크: MAC 주소 기반 ✓',correct:true},{n:3,text:'틀림. 브리지/스위치: 데이터링크 계층',correct:false},{n:4,text:'틀림. 포트 번호: 전송 계층',correct:false}],concept:{title:'📌 계층별 주소',items:['물리 계층: 전기 신호','데이터링크: MAC 주소','네트워크: IP 주소','전송: 포트 번호']}}},
{id:3086,category:'데이터통신',number:86,question:'다음 네트워크 연결 장비에 대한 설명으로 옳은 것은?',choices:['더미 허브(dummy hub)는 전체 대역폭을 분할하지 않고 사용하기 때문에 호스트의 수가 증가해도 속도는 저하되지 않는다.','리피터(repeater)는 네트워크 계층에서 동작하는 장치로 IP주소를 사용하여 데이터의 경로를 설정한다.','브리지(bridge)는 케이블 손실로 인한 신호 감쇠를 보상해준다.','게이트웨이(gateway)는 서로 다른 프로토콜 통신망 간에 프로토콜을 변환하여 정보를 주고받는다.'],answer:4,explanation:{summary:'게이트웨이: 프로토콜 변환 장치.',choiceAnalysis:[{n:1,text:'틀림. 더미 허브: 대역폭 공유→호스트 증가 시 속도 저하',correct:false},{n:2,text:'틀림. 리피터: 물리 계층, 신호 증폭',correct:false},{n:3,text:'틀림. 신호 재생은 리피터',correct:false},{n:4,text:'맞음. 게이트웨이: 프로토콜 변환 ✓',correct:true}],concept:{title:'📌 게이트웨이',items:['서로 다른 프로토콜 네트워크 연결','모든 OSI 계층 처리 가능','예: 이메일 게이트웨이, VoIP 게이트웨이']}}},
{id:3087,category:'데이터통신',number:87,question:'IEEE 802 프로젝트에서 구분한 LAN의 부계층으로만 옳게 고른 것은?',choices:['MAC, LLC','CRC, LLC','MAC, CRC','CRC, CBC'],answer:1,explanation:{summary:'IEEE 802: 데이터링크 계층을 LLC와 MAC으로 분리.',choiceAnalysis:[{n:1,text:'MAC+LLC: IEEE 802 LAN 부계층 ✓',correct:true},{n:2,text:'CRC는 부계층 아님',correct:false},{n:3,text:'CRC 아님',correct:false},{n:4,text:'모두 아님',correct:false}],concept:{title:'📌 IEEE 802 LAN 계층',items:['LLC(Logical Link Control): 상위 계층과 인터페이스','MAC(Media Access Control): 매체 접근 제어','IEEE 802.2: LLC','IEEE 802.3: Ethernet CSMA/CD']}}},
{id:3088,category:'데이터통신',number:88,question:'다음 중 IEEE 802 프로젝트의 내용으로 옳게 연결되지 않은 것은?',choices:['802.2 – LLC','802.3 - CSMA/CD','802.5 – FDDI','802.6 - DQDB'],answer:3,explanation:{summary:'802.5: 토큰 링(Token Ring). FDDI는 802.8 또는 ANSI 표준.',choiceAnalysis:[{n:1,text:'맞음. 802.2=LLC',correct:false},{n:2,text:'맞음. 802.3=이더넷/CSMA/CD',correct:false},{n:3,text:'틀림. 802.5=Token Ring. FDDI≠802.5 ✓',correct:true},{n:4,text:'맞음. 802.6=DQDB(MAN)',correct:false}],concept:{title:'📌 IEEE 802 시리즈',items:['802.2: LLC','802.3: Ethernet(CSMA/CD)','802.5: Token Ring','802.11: Wireless LAN(Wi-Fi)','802.15: Bluetooth','802.16: WiMAX']}}},
{id:3089,category:'데이터통신',number:89,question:'다음 IEEE 802 시리즈의 연결로 옳은 것은?',choices:['IEEE 802.3 : LLC','IEEE 802.5 : 이더넷(Ethernet) LAN','IEEE 802.11 : 무선 LAN','IEEE 802.16 : 개인구역 네트워크'],answer:3,explanation:{summary:'IEEE 802.11: Wi-Fi(무선 LAN).',choiceAnalysis:[{n:1,text:'802.3: CSMA/CD(이더넷). LLC=802.2',correct:false},{n:2,text:'802.5: 토큰 링. 이더넷=802.3',correct:false},{n:3,text:'802.11: 무선 LAN(Wi-Fi) ✓',correct:true},{n:4,text:'802.16: WiMAX(광역 무선). 개인구역=802.15',correct:false}],concept:{title:'📌 IEEE 802.11 Wi-Fi 시리즈',items:['802.11a: 5GHz, 54Mbps','802.11b: 2.4GHz, 11Mbps','802.11g: 2.4GHz, 54Mbps','802.11n: 2.4/5GHz, 600Mbps(MIMO)','802.11ac: 5GHz, 3.5Gbps']}}},
{id:3090,category:'데이터통신',number:90,question:'다음 <보기>의 설명에 해당하는 LAN 매체접근제어 방식은 무엇인가?',boxLabel:'<보기>',boxText:'∘ 매체가 비어있는지 여부를 조사하여 비어있으면 전송한다.\n∘ 매체 상에서 충돌 발생 여부를 조사하며, 충돌이 감지되면 데이터 전송을 중지하고 모든 스테이션에 충돌 사실을 알린다.\n∘ 임의의 시간이 지난 후 재전송을 시도한다.',choices:['CSMA/CD','CSMA/CA','FDDI','토큰 링'],answer:1,explanation:{summary:'CSMA/CD: 충돌 감지(Collision Detection). 이더넷에서 사용.',choiceAnalysis:[{n:1,text:'CSMA/CD: 유선 이더넷, 충돌 감지 ✓',correct:true},{n:2,text:'CSMA/CA: 무선(Wi-Fi), 충돌 회피(Avoidance)',correct:false},{n:3,text:'FDDI: 광섬유 토큰 링',correct:false},{n:4,text:'토큰 링: 토큰 패싱',correct:false}],concept:{title:'📌 CSMA/CD 동작',items:['CS: 반송파 감지(사용 중인지 확인)','MA: 다중 접속','CD: 충돌 감지 후 잼(Jam) 신호 전송','랜덤 대기 후 재전송(Backoff 알고리즘)']}}},
{id:3091,category:'데이터통신',number:91,question:'다음 중 CSMA/CD(Carrier Sense Multiple Access with Collision Detection)에 대한 설명으로 옳지 않은 것은?',choices:['호스트가 전송하기 전에 매체의 전압을 점검하여 회선이 사용되지 않는 상태임을 확인하고 전송을 시작한다.','회선이 사용 중이면 임의의 시간만큼 기다린 후 다시 회선의 사용 유무를 점검한다.','최소 전송 프레임의 길이는 전송 프레임의 첫 비트가 케이블 전체에 전파되는 시간의 최소 두 배 이상이 되어야 한다.','이더넷에서 발생하는 충돌로 인한 지연현상을 최소화하였으며 IEEE 802.5로 표준화하였다.'],answer:4,explanation:{summary:'CSMA/CD는 IEEE 802.3으로 표준화. 802.5는 토큰 링.',choiceAnalysis:[{n:1,text:'맞음. 반송파 감지',correct:false},{n:2,text:'맞음. 사용 중이면 대기',correct:false},{n:3,text:'맞음. 최소 프레임 길이 요구사항',correct:false},{n:4,text:'틀림. IEEE 802.3이 CSMA/CD 표준. 802.5=Token Ring ✓',correct:true}],concept:{title:'📌 IEEE 802.3 CSMA/CD',items:['이더넷 표준','충돌 발생 시 잼 신호 전송','지수적 백오프(Exponential Backoff)','충돌 도메인: 같은 세그먼트']}}},
{id:3092,category:'데이터통신',number:92,question:'LAN의 매체 접근 제어 방식에 대한 설명으로 옳지 않은 것은?',choices:['토큰 링은 토큰 패싱(token passing) 방식을 사용하며 데이터의 충돌이 발생하지 않는다.','토큰 링 방식을 이용한 대표적인 제품으로는 이더넷(ethernet)이 있다.','토큰 버스는 토큰 링과 CSMA/CD 방식을 결합한 형태이다.','FDDI는 ANSI 표준으로 링 2개를 사용한다.'],answer:2,explanation:{summary:'이더넷은 CSMA/CD 방식. 토큰 링의 대표 제품은 IBM Token Ring.',choiceAnalysis:[{n:1,text:'맞음. 토큰 링: 충돌 없음',correct:false},{n:2,text:'틀림. 이더넷=CSMA/CD. 토큰 링=IBM Token Ring ✓',correct:true},{n:3,text:'맞음. 토큰 버스: 토큰 패싱+버스 구조',correct:false},{n:4,text:'맞음. FDDI: 이중 링',correct:false}],concept:{title:'📌 매체 접근 방식 정리',items:['CSMA/CD: 이더넷(IEEE 802.3)','토큰 링: IBM(IEEE 802.5)','토큰 버스: 제조 자동화(IEEE 802.4)','FDDI: 광섬유 고속 LAN']}}},
{id:3093,category:'데이터통신',number:93,question:'MIMO(Multi-Input Multi-Output) 안테나 기술은 한정된 주파수 자원을 효율적으로 활용하고, 통신 용량을 증대하기 위해 채용된 기술이다. 다음 중 MIMO 방식을 사용하는 것은?',choices:['IEEE 802.11a','IEEE 802.11b','IEEE 802.11g','IEEE 802.11n'],answer:4,explanation:{summary:'IEEE 802.11n: 최초로 MIMO 기술 도입한 Wi-Fi 표준.',choiceAnalysis:[{n:1,text:'802.11a: 5GHz, 54Mbps, OFDM',correct:false},{n:2,text:'802.11b: 2.4GHz, 11Mbps, DSSS',correct:false},{n:3,text:'802.11g: 2.4GHz, 54Mbps, OFDM',correct:false},{n:4,text:'802.11n: 2.4/5GHz, 최대600Mbps, MIMO+OFDM ✓',correct:true}],concept:{title:'📌 Wi-Fi MIMO',items:['802.11n: MIMO 도입(최대 4×4)','802.11ac: MU-MIMO(다중 사용자)','802.11ax(Wi-Fi 6): 향상된 MU-MIMO','MIMO: 다중 안테나로 공간 다중화']}}},
{id:3094,category:'데이터통신',number:94,question:'다음 무선 LAN 방식 중 직교주파수분할 다중화방식(OFDM)을 사용하지 않는 것은?',choices:['IEEE 802.11a','IEEE 802.11b','IEEE 802.11n','IEEE 802.11ac'],answer:2,explanation:{summary:'802.11b: DSSS(직접 확산) 방식. OFDM 아님.',choiceAnalysis:[{n:1,text:'802.11a: OFDM 사용',correct:false},{n:2,text:'802.11b: DSSS(OFDM 아님) ✓',correct:true},{n:3,text:'802.11n: OFDM+MIMO',correct:false},{n:4,text:'802.11ac: OFDM',correct:false}],concept:{title:'📌 Wi-Fi 변조 방식',items:['802.11b: DSSS(2.4GHz, 11Mbps)','802.11a/g: OFDM(54Mbps)','802.11n: OFDM+MIMO','802.11ac: 5GHz OFDM+MU-MIMO']}}},
{id:3095,category:'데이터통신',number:95,question:'다음 <보기>의 설명에 해당하는 것은?',boxLabel:'<보기>',boxText:'∘ IEEE 802.15 표준이다.\n∘ 2.4GHz 주파수 대역을 이용한다.\n∘ 마우스, 키보드, 프린터, 이어폰 등을 무선으로 연결하는 접속 인터페이스로 볼 수 있다.',choices:['Wi-Fi','블루투스(Bluetooth)','NFC','RFID'],answer:2,explanation:{summary:'블루투스: IEEE 802.15, 2.4GHz, 근거리 개인 장치 연결.',choiceAnalysis:[{n:1,text:'Wi-Fi: IEEE 802.11',correct:false},{n:2,text:'블루투스: IEEE 802.15, 2.4GHz, PAN ✓',correct:true},{n:3,text:'NFC: 13.56MHz, 초근거리(10cm)',correct:false},{n:4,text:'RFID: 무선 태그 인식',correct:false}],concept:{title:'📌 블루투스(Bluetooth)',items:['IEEE 802.15.1 표준','주파수: 2.4GHz ISM 대역','범위: 약 10~100m','WPAN(Wireless Personal Area Network)','용도: 헤드셋, 키보드, 마우스']}}},
{id:3096,category:'데이터통신',number:96,question:'다음 중 블루투스(bluetooth) 기술과 관련이 없는 것은?',choices:['zigbee','ad hoc','Wireless PAN','CSMA/CD'],answer:4,explanation:{summary:'CSMA/CD: 유선 이더넷 프로토콜. 블루투스와 무관.',choiceAnalysis:[{n:1,text:'Zigbee: 저전력 무선 센서, 블루투스와 유사한 WPAN',correct:false},{n:2,text:'Ad hoc: 블루투스 피코넷도 ad hoc',correct:false},{n:3,text:'Wireless PAN: 블루투스의 범주',correct:false},{n:4,text:'CSMA/CD: 유선 이더넷 프로토콜. 블루투스와 무관 ✓',correct:true}],concept:{title:'📌 블루투스 관련 개념',items:['피코넷(Piconet): 마스터+슬레이브 구조','스캐터넷(Scatternet): 여러 피코넷 연결','Ad hoc: 인프라 없이 직접 연결','Zigbee: 저전력 IoT용 WPAN']}}},
{id:3097,category:'데이터통신',number:97,question:'이동 Ad-hoc 방식에 대한 설명으로 옳지 않은 것은?',choices:['각 이동 단말이 서로 가까이 있을 때에만 통신망을 구성하는 유연성을 제공한다.','이동이 자유롭기 때문에 네트워크 토폴로지가 동적으로 구성된다.','중앙 제어나 표준 지원 서비스를 사용하여 임시로 망을 구성한다.','노드의 거리에 따라 신호속도가 달라지며 노드의 추가, 탈퇴가 쉽다.'],answer:3,explanation:{summary:'Ad-hoc은 중앙 인프라 없이 자율적으로 망 구성. 중앙 제어 사용 안 함.',choiceAnalysis:[{n:1,text:'맞음. Ad-hoc: 근접 노드 간 망 구성',correct:false},{n:2,text:'맞음. 동적 토폴로지',correct:false},{n:3,text:'틀림. Ad-hoc은 중앙 제어 없는 분산 방식 ✓',correct:true},{n:4,text:'맞음. 거리에 따라 신호 변화',correct:false}],concept:{title:'📌 Ad-hoc 네트워크',items:['인프라(AP/기지국) 없이 직접 연결','각 노드가 라우터 역할','MANET(Mobile Ad-hoc Network)','군사, 재난 대응에 활용']}}},
{id:3098,category:'데이터통신',number:98,question:'다음 <보기>의 정보통신 기술에 해당하는 설명으로 옳은 것은?',boxLabel:'<보기>',boxText:'◦ 무선 주파수를 이용하여 비접촉식으로 데이터를 읽어내는 인식 시스템이다.\n◦ 판독기(RF reader)와 고유 정보를 내장한 전파 식별 태그, 운용 소프트웨어 및 네트워크로 구성된다.',choices:['제품의 유통과정에서부터 재고관리에 이르기까지 제품에 대한 정보를 효율적으로 관리할 수 있다.','인터넷으로 음성 정보를 전송하므로 통신요금의 인하가 가능해진다.','인공 신경망(ANN)을 기반으로 하여 컴퓨터가 특정 업무를 수행할 때 스스로 필요한 데이터를 수집·분석하게 하여 고속으로 처리할 수 있다.','공중망에 사설망을 구축하여 마치 사설 구내망 또는 전용망 같이 이용할 수 있다.'],answer:1,explanation:{summary:'RFID: 재고관리, 유통, 물류 추적에 활용.',choiceAnalysis:[{n:1,text:'RFID: 유통/재고관리 ✓',correct:true},{n:2,text:'VoIP 설명',correct:false},{n:3,text:'신경망/딥러닝 설명',correct:false},{n:4,text:'VPN 설명',correct:false}],concept:{title:'📌 RFID(Radio Frequency Identification)',items:['RF 태그+리더기로 구성','바코드 대체(비접촉, 다중 인식)','능동형: 자체 전원 / 수동형: 리더 전원','활용: 물류, 재고, 교통카드, 전자여권']}}},
{id:3099,category:'데이터통신',number:99,question:'QR 코드에 대한 설명으로 옳지 않은 것은?',choices:['기존의 바코드와 달리 가로와 세로를 활용하는 2차원적으로 구성되어 있다.','URL, 사진, 동영상 정보 등을 한꺼번에 담을 수 있으므로 처리속도는 느린 편이다.','오류 복원 기능을 가지고 있어 코드의 일부가 손상되어도 데이터를 복원할 수 있다.','\'위치 찾기 심벌\'을 이용하여 배경 모양에 영향을 받지 않는다.'],answer:2,explanation:{summary:'QR 코드는 2차원 구조로 빠른 처리 속도가 특징.',choiceAnalysis:[{n:1,text:'맞음. 2차원(가로×세로)',correct:false},{n:2,text:'틀림. QR 코드는 빠른 인식(Quick Response) ✓',correct:true},{n:3,text:'맞음. 오류 복원(Reed-Solomon) 기능',correct:false},{n:4,text:'맞음. 파인더 패턴으로 방향 인식',correct:false}],concept:{title:'📌 QR 코드 특징',items:['Quick Response: 빠른 인식','2차원: 1차원 바코드보다 많은 데이터','오류 정정: Reed-Solomon 코드','파인더 패턴: 3개 모서리 □']}}},
{id:3100,category:'데이터통신',number:100,question:'다음 <보기>에서 설명하는 것은?',boxLabel:'<보기>',boxText:'∘ 센서와 통신 칩을 탑재한 사물이 사람의 개입 없이 자동적으로 실시간 데이터를 주고받을 수 있는 물리적 네트워크이다.\n∘ 기기들이 인터넷으로 연결되어 주변의 정보를 수집하고, 이 정보를 다른 기기와 주고받으며 적절한 결정까지 내릴 수 있다.',choices:['사물 인터넷','클라우드 컴퓨팅','빅 데이터 서비스','RFID 서비스'],answer:1,explanation:{summary:'IoT(사물 인터넷): 사물이 인터넷으로 연결되어 데이터를 자동으로 교환.',choiceAnalysis:[{n:1,text:'사물 인터넷(IoT) ✓',correct:true},{n:2,text:'클라우드: IT 자원 서비스',correct:false},{n:3,text:'빅데이터: 대용량 데이터 분석',correct:false},{n:4,text:'RFID: 무선 태그 인식',correct:false}],concept:{title:'📌 IoT(Internet of Things)',items:['사물에 센서+통신 탑재','인터넷 연결로 데이터 자동 교환','M2M(Machine-to-Machine) 통신','스마트 홈, 스마트 팩토리, 자율주행']}}},
{id:3101,category:'데이터통신',number:101,question:'사물 인터넷(IoT)의 3대 주요 기술에 해당하지 않는 것은?',choices:['센싱 기술','유무선 통신 및 네트워크 인프라 기술','서비스 인터페이스 기술','신경망 기술'],answer:4,explanation:{summary:'IoT 3대 기술: 센싱, 통신/네트워크, 서비스 인터페이스. 신경망은 AI 기술.',choiceAnalysis:[{n:1,text:'센싱: IoT 핵심 기술',correct:false},{n:2,text:'통신/네트워크: IoT 핵심',correct:false},{n:3,text:'서비스 인터페이스: IoT 핵심',correct:false},{n:4,text:'신경망: AI/딥러닝 기술. IoT 3대 기술 아님 ✓',correct:true}],concept:{title:'📌 IoT 3대 기술',items:['센싱 기술: 각종 센서로 물리량 측정','통신/네트워크: Wi-Fi, 블루투스, LTE 등','서비스 인터페이스: 데이터 처리/서비스 제공']}}},
{id:3102,category:'데이터통신',number:102,question:'다음 각 용어의 설명으로 옳은 것은?',choices:['DMB 서비스는 이동하면서도 초고속인터넷을 이용할 수 있는 무선 인터넷 서비스이다.','텔레매틱스는 음성 신호를 패킷 데이터로 변환하여 인터넷으로 전화 서비스를 제공한다.','VoIP는 자동차 안의 단말기를 통해서 자동차와 운전자에게 다양한 종류의 정보 서비스를 제공한다.','비콘(beacon)은 근거리 무선 센서의 일종으로 스마트폰 사용자의 위치를 인식해 상호간 데이터를 주고받을 수 있게 한 기기를 말한다.'],answer:4,explanation:{summary:'비콘: BLE(Bluetooth Low Energy) 기반 근거리 위치 인식 기술.',choiceAnalysis:[{n:1,text:'틀림. DMB는 디지털 방송',correct:false},{n:2,text:'틀림. 텔레매틱스는 자동차 정보 서비스. VoIP가 음성 인터넷 전화',correct:false},{n:3,text:'틀림. VoIP는 인터넷 전화. 자동차 서비스는 텔레매틱스',correct:false},{n:4,text:'맞음. 비콘: 위치 인식 근거리 무선 ✓',correct:true}],concept:{title:'📌 주요 통신 기술',items:['DMB: 디지털 방송(이동 수신)','VoIP: 인터넷 전화','텔레매틱스: 차량+정보통신','비콘: BLE 기반 위치 서비스']}}},
{id:3103,category:'데이터통신',number:103,question:'다음 <보기>에서 설명하는 클라우드 컴퓨팅 서비스 모델은 무엇인가?',boxLabel:'<보기>',boxText:'사업자는 이 서비스를 통해 서비스 구성 부품인 컴파일 언어, 웹 프로그램, 제작 툴, 데이터베이스 인터페이스, 과금 모듈 등을 제공하고, 개발자는 서비스 사업자가 마련해 놓은 이 서비스로 데이터베이스와 애플리케이션 서버, 파일 시스템과 관련한 솔루션 등 미들웨어까지 확장된 자원을 활용하여 새로운 애플리케이션을 만들어 사용할 수 있다.',choices:['PaaS','IaaS','SaaS','HaaS'],answer:1,explanation:{summary:'PaaS: 개발 플랫폼(컴파일러, DB, 미들웨어) 제공.',choiceAnalysis:[{n:1,text:'PaaS: 개발 환경 제공 ✓',correct:true},{n:2,text:'IaaS: 가상 HW 제공',correct:false},{n:3,text:'SaaS: 완성 SW 제공',correct:false},{n:4,text:'HaaS: 비표준 분류',correct:false}],concept:{title:'📌 클라우드 서비스 모델',items:['IaaS: VM, 스토리지(AWS EC2)','PaaS: 개발 플랫폼(Heroku)','SaaS: 완성 앱(Gmail)']}}},
{id:3104,category:'데이터통신',number:104,question:'다음 <보기>의 각 설명에 해당하는 용어는 무엇인가?',boxLabel:'<보기>',boxText:'ㄱ. 현실에 존재하는 이미지에 가상 이미지를 겹쳐 하나의 영상으로 보여주는 기술\nㄴ. 현실의 특정한 환경이나 상황을 컴퓨터를 통해 그대로 모방하여 사용자가 마치 실제 주변 상황·환경과 상호작용을 하고 있는 것처럼 만드는 기술',choices:['ㄱ:증강현실 / ㄴ:가상현실','ㄱ:가상현실 / ㄴ:텐서플로우','ㄱ:증강가상 / ㄴ:텐서플로우','ㄱ:가상현실 / ㄴ:증강가상'],answer:1,explanation:{summary:'ㄱ=AR(증강현실): 현실+가상 오버레이. ㄴ=VR(가상현실): 완전한 가상 환경.',choiceAnalysis:[{n:1,text:'ㄱ=증강현실(AR), ㄴ=가상현실(VR) ✓',correct:true},{n:2,text:'순서 오류',correct:false},{n:3,text:'텐서플로우는 ML 프레임워크',correct:false},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 AR vs VR',items:['AR(Augmented Reality/증강현실): 현실+가상(포켓몬GO)','VR(Virtual Reality/가상현실): 완전한 가상 환경(헤드셋)','MR(Mixed Reality/혼합현실): AR+VR 결합']}}},
{id:3105,category:'데이터통신',number:105,question:'다음 각 용어의 설명으로 옳지 않은 것은?',choices:['빅데이터는 막대한 양의 정형 또는 비정형 데이터 집합으로 Volume, Velocity, Variety의 속성을 갖는다.','클라우드(cloud) 컴퓨팅의 서비스는 IaaS, PaaS, SaaS등이 있으며 인터넷 기술을 이용하여 가상화된 IT 자원을 서비스로 제공하는 기술이다.','노매딕(nomadic) 컴퓨팅은 뇌의 작용에서 힌트를 얻은 학습 능력이 있는 패턴 인식 기계를 이용한 기술이다.','그리드(grid) 컴퓨팅은 다양한 컴퓨터들을 네트워크로 연결하여 고성능 컴퓨터로 사용하는 기술이다.'],answer:3,explanation:{summary:'노매딕 컴퓨팅: 이동 중에도 업무 처리. 뇌 모델은 신경망 컴퓨팅.',choiceAnalysis:[{n:1,text:'맞음. 빅데이터 3V',correct:false},{n:2,text:'맞음. 클라우드 서비스',correct:false},{n:3,text:'틀림. 노매딕=이동 컴퓨팅. 뇌 모델=신경망 ✓',correct:true},{n:4,text:'맞음. 그리드 컴퓨팅',correct:false}],concept:{title:'📌 유비쿼터스 컴퓨팅 유형',items:['노매딕(Nomadic): 이동 중 컴퓨팅','웨어러블: 착용 가능한 컴퓨팅','임베디드: 특정 목적 내장 컴퓨팅','신경망: 뇌 구조 모방 AI']}}},
{id:3106,category:'데이터통신',number:106,question:'유비쿼터스 컴퓨팅 각 종류에 해당하는 설명으로 옳지 않은 것은?',choices:['웨어러블 컴퓨팅(wearable computing) : 컴퓨터를 옷이나 안경처럼 착용할 수 있게 해준다.','감지 컴퓨팅(sentient computing) : 컴퓨터가 센서 등을 통해 사용자의 상황을 인식하여 사용자가 필요로 하는 정보를 제공해준다.','엑조틱 컴퓨팅(exotic computing) : 스스로 생각하여 현실세계와 가상세계를 연계해주는 컴퓨팅을 실현한다.','디스포절 컴퓨팅(disposable computing) : 사물에다 마이크로칩(microchip) 등을 심어 사물을 지능화하는 컴퓨팅 기술이다.'],answer:4,explanation:{summary:'디스포절 컴퓨팅: 일회용 컴퓨팅 소자. 사물 지능화는 임베디드.',choiceAnalysis:[{n:1,text:'맞음. 웨어러블',correct:false},{n:2,text:'맞음. 감지 컴퓨팅',correct:false},{n:3,text:'맞음. 엑조틱 컴퓨팅',correct:false},{n:4,text:'틀림. 디스포절=일회용. 사물 지능화=임베디드 컴퓨팅 ✓',correct:true}],concept:{title:'📌 유비쿼터스 컴퓨팅',items:['웨어러블: 착용형(스마트워치)','감지(Sentient): 상황인식','엑조틱: 실-가상 연계','디스포절: 일회용 칩']}}},
{id:3107,category:'데이터통신',number:107,question:'빅데이터는 크기(Volume), 변화의 다양성(Variety), 속도(Velocity)라는 3가지 특징을 가지고 있는 데이터로부터 효과적인 결과물을 창출해 낼 수 있다. 최근에는 기존의 3V 요소에 추가되어 6V로 확대되었다. 추가된 요소에 해당하지 않는 것은?',choices:['가상화(Virtuality)','진실성(Veracity)','시각화(Visualization)','가치(Value)'],answer:1,explanation:{summary:'빅데이터 추가된 V: 정확성(Veracity), 시각화(Visualization), 가치(Value). 가상화는 해당 없음.',choiceAnalysis:[{n:1,text:'가상화(Virtuality): 빅데이터 V 아님 ✓',correct:true},{n:2,text:'진실성(Veracity): 추가된 V',correct:false},{n:3,text:'시각화(Visualization): 추가된 V',correct:false},{n:4,text:'가치(Value): 추가된 V',correct:false}],concept:{title:'📌 빅데이터 5V (또는 6V)',items:['기본 3V: Volume(크기), Velocity(속도), Variety(다양성)','추가: Veracity(진실성/정확성), Value(가치)','시각화(Visualization)도 포함되기도 함']}}},
{id:3108,category:'데이터통신',number:108,question:'다음 설명 중 옳은 것은?',choices:['정형 데이터(structured data)는 형태가 없고 연산도 불가능하다.','소셜데이터는 반정형 데이터(semi-structured data)에 해당한다.','비정형 데이터(unstructured data)는 형태가 있으나 연산은 불가능하다.','정형 데이터는 RDBMS로 저장되고, 반정형 데이터는 파일로, 비정형 데이터는 NoSQL이라는 저장구조를 갖는다.'],answer:4,explanation:{summary:'정형=RDBMS(SQL), 반정형=파일(XML/JSON/HTML), 비정형=NoSQL/파일시스템.',choiceAnalysis:[{n:1,text:'틀림. 정형 데이터: 구조 있음, 연산 가능',correct:false},{n:2,text:'맞음. 소셜데이터는 반정형',correct:false},{n:3,text:'틀림. 비정형: 형태 없음',correct:false},{n:4,text:'맞음. 저장 방식 분류 ✓',correct:true}],concept:{title:'📌 데이터 유형',items:['정형: 스키마 있음, RDBMS (엑셀, 관계형 DB)','반정형: 스키마 유연, XML/JSON/HTML','비정형: 스키마 없음, 텍스트/이미지/동영상']}}},
{id:3109,category:'데이터통신',number:109,question:'다음 <보기>의 설명에 해당하는 것은?',boxLabel:'<보기>',boxText:'∘ 대용량 데이터를 분산 처리하기 위한 목적으로 개발된 프로그래밍 모델이며 동시에 이 모델을 구동하는 프레임워크를 의미하는 것으로 구글(Google)에 의해 고안된 기술이다.\n∘ 대표적인 대용량 데이터 처리를 위한 병렬 처리 기법이다.\n∘ 임의의 순서로 정렬된 데이터를 분산 처리하고 이를 다시 합치는 과정을 거친다.',choices:['퍼셉트론','딥러닝','맵리듀스','텔레매틱스'],answer:3,explanation:{summary:'맵리듀스(MapReduce): Google이 개발한 분산 병렬 처리 프레임워크.',choiceAnalysis:[{n:1,text:'퍼셉트론: 신경망의 기본 단위',correct:false},{n:2,text:'딥러닝: 심층 신경망',correct:false},{n:3,text:'맵리듀스: 분산 병렬 처리 ✓',correct:true},{n:4,text:'텔레매틱스: 자동차 정보 서비스',correct:false}],concept:{title:'📌 맵리듀스(MapReduce)',items:['Map: 데이터를 키-값 쌍으로 변환','Reduce: 같은 키의 값을 합산','Hadoop: 오픈소스 맵리듀스 구현','HDFS: Hadoop 분산 파일 시스템']}}},
{id:3110,category:'데이터통신',number:110,question:'빅데이터 처리 과정 순서로 옳은 것은?',boxLabel:'<보기>',boxText:'ㄱ. 저장    ㄴ. 분석    ㄷ. 수집\nㄹ. 처리    ㅁ. 표현',choices:['ㄱ-ㄴ-ㄷ-ㄹ-ㅁ','ㄷ-ㄱ-ㄹ-ㄴ-ㅁ','ㄱ-ㄷ-ㄴ-ㅁ-ㄹ','ㄷ-ㄱ-ㄴ-ㅁ-ㄹ'],answer:2,explanation:{summary:'빅데이터 처리: 수집→저장→처리→분석→표현',choiceAnalysis:[{n:1,text:'순서 오류',correct:false},{n:2,text:'ㄷ(수집)→ㄱ(저장)→ㄹ(처리)→ㄴ(분석)→ㅁ(표현) ✓',correct:true},{n:3,text:'순서 오류',correct:false},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 빅데이터 처리 단계',items:['수집(Collect) → 저장(Store) → 처리(Process) → 분석(Analyze) → 표현(Visualize)']}}},
{id:3111,category:'데이터통신',number:111,question:'다음 <보기>의 설명에 해당하는 용어는 무엇인가?',boxLabel:'<보기>',boxText:'ㄱ. 대용량 데이터를 분산 처리할 수 있는 자바 기반의 오픈소스 프레임워크이다. HDFS에 데이터를 저장하고, 맵리듀스를 이용하여 데이터를 처리한다.\nㄴ. 기존 관계 데이터베이스의 일관성보다는 가용성과 확장성에 중점을 둔다. 비정형 데이터의 저장을 위해 유연한 데이터 모델을 지원한다.',choices:['ㄱ:하둡 / ㄴ:텍스트 마이닝','ㄱ:군집 분석 / ㄴ:R언어','ㄱ:하둡 / ㄴ:NoSQL','ㄱ:R언어 / ㄴ:NoSQL'],answer:3,explanation:{summary:'ㄱ=Hadoop(하둡): HDFS+맵리듀스. ㄴ=NoSQL: 비정형, 가용성+확장성.',choiceAnalysis:[{n:1,text:'텍스트 마이닝 오류',correct:false},{n:2,text:'군집 분석/R 오류',correct:false},{n:3,text:'ㄱ=하둡, ㄴ=NoSQL ✓',correct:true},{n:4,text:'R언어 오류',correct:false}],concept:{title:'📌 하둡 vs NoSQL',items:['하둡(Hadoop): 분산 파일시스템(HDFS)+맵리듀스','NoSQL: Not Only SQL, 비정형 데이터','NoSQL 예: MongoDB, Cassandra, Redis']}}},
{id:3112,category:'데이터통신',number:112,question:'다음 중 다양한 환경에서 수집한 모든 데이터를 가공되지 않은 원래의 형태로 저장하여 공유하는 공통 데이터 저장소를 무엇이라 하는가?',choices:['데이터베이스','데이터웨어하우스','데이터 호수','데이터 마이닝'],answer:3,explanation:{summary:'데이터 호수(Data Lake): 원시 데이터를 원형 그대로 저장하는 대규모 저장소.',choiceAnalysis:[{n:1,text:'데이터베이스: 구조화된 데이터 저장',correct:false},{n:2,text:'데이터 웨어하우스: 분석용 정제된 데이터',correct:false},{n:3,text:'데이터 레이크(호수): 원시 데이터 저장 ✓',correct:true},{n:4,text:'데이터 마이닝: 데이터에서 패턴 발견',correct:false}],concept:{title:'📌 데이터 저장소 비교',items:['DB: 실시간 트랜잭션(OLTP)','데이터 웨어하우스: 분석용(OLAP), 정제 데이터','데이터 레이크: 모든 형태 원시 데이터 저장','데이터 마이닝: 분석 기법(저장소 아님)']}}},
{id:3113,category:'데이터통신',number:113,question:'웹으로 제공하고 있는 정보와 서비스를 융합하여 새로운 소프트웨어나 서비스, 데이터베이스 등을 만드는 것을 의미하는 용어는 무엇인가?',choices:['매쉬업(mashup)','엣지 컴퓨팅(edge computing)','디지털트윈(digital twin)','웹 크롤링(crawling)'],answer:1,explanation:{summary:'매쉬업: 기존 웹 서비스/API를 조합해 새로운 서비스 생성.',choiceAnalysis:[{n:1,text:'매쉬업: 기존 서비스 조합으로 새 서비스 ✓',correct:true},{n:2,text:'엣지 컴퓨팅: 근거리 데이터 처리',correct:false},{n:3,text:'디지털 트윈: 실물의 가상 복제',correct:false},{n:4,text:'웹 크롤링: 자동 웹 탐색',correct:false}],concept:{title:'📌 매쉬업(Mashup)',items:['여러 오픈 API를 조합하여 새로운 앱 생성','예: 구글 지도+부동산 정보=주택 매물 지도','Web 2.0 시대의 핵심 개념']}}},
{id:3114,category:'데이터통신',number:114,question:'인공지능, 기계학습, 딥러닝 기술 간 포함관계로 옳은 것은?',choices:['인공지능 ⊃ 기계학습 ⊃ 딥러닝','기계학습 ⊃ 인공지능 ⊃ 딥러닝','딥러닝 ⊃ 기계학습 ⊃ 인공지능','인공지능 ⊃ 딥러닝 ⊃ 기계학습'],answer:1,explanation:{summary:'인공지능(AI) ⊃ 기계학습(ML) ⊃ 딥러닝(DL). 포함 관계.',choiceAnalysis:[{n:1,text:'AI > ML > DL 순으로 포함 ✓',correct:true},{n:2,text:'순서 오류',correct:false},{n:3,text:'역순 오류',correct:false},{n:4,text:'ML과 DL 순서 오류',correct:false}],concept:{title:'📌 AI, ML, DL 관계',items:['AI(인공지능): 가장 넓은 개념','ML(기계학습): AI의 부분집합','DL(딥러닝): ML의 부분집합(신경망 기반)','AI > ML > DL']}}},
{id:3115,category:'데이터통신',number:115,question:'다음 <보기> 중 기계학습(machine learning)에 대한 설명으로 옳은 것만을 모두 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. 지도 학습(Supervised Learning)은 훈련 데이터(Training Data)로부터 하나의 함수를 유추해내기 위한 기계 학습의 한 방법이다.\nㄴ. 비지도 학습(Unsupervised Learning)은 입력값에 대한 목표치가 주어지지 않는 기계 학습의 한 방법이다.\nㄷ. 강화 학습(Reinforcement learning)은 어떤 환경 안에서 정의된 에이전트가 현재의 상태를 인식하여, 선택 가능한 행동들 중 보상을 최대화하는 행동을 선택하는 방법이다.',choices:['ㄱ, ㄴ','ㄱ, ㄷ','ㄴ, ㄷ','ㄱ, ㄴ, ㄷ'],answer:4,explanation:{summary:'ㄱ,ㄴ,ㄷ 모두 기계학습에 대한 올바른 설명.',choiceAnalysis:[{n:1,text:'ㄷ도 맞음',correct:false},{n:2,text:'ㄴ도 맞음',correct:false},{n:3,text:'ㄱ도 맞음',correct:false},{n:4,text:'ㄱ,ㄴ,ㄷ 모두 맞음 ✓',correct:true}],concept:{title:'📌 기계학습 3가지 유형',items:['지도학습: 입력+정답 쌍으로 학습(분류, 회귀)','비지도학습: 정답 없이 패턴 발견(군집화)','강화학습: 보상으로 최적 행동 학습(게임AI)']}}},
{id:3116,category:'데이터통신',number:116,question:'다음 머신러닝(machine learning)과 관련된 설명으로 옳은 것은?',choices:['지도학습(supervised learning)에서 입력과 해당 출력, 이 출력에 대한 평가의 쌍을 학습 데이터로 사용한다.','비지도학습(unsupervised learning)에서 하나의 학습 데이터는 입력과 정답의 쌍으로 구성되어야 한다.','강화학습(reinforcement learning)은 하나의 학습 데이터는 입력만 있고 정답은 없는 형태로 구성된다.','군집화(clustering)는 비지도학습에 해당하고, 분류(classification)는 지도 학습에 해당된다.'],answer:4,explanation:{summary:'군집화=비지도학습, 분류=지도학습.',choiceAnalysis:[{n:1,text:'틀림. 지도학습=입력+출력(정답) 쌍',correct:false},{n:2,text:'틀림. 비지도학습=정답 없음',correct:false},{n:3,text:'틀림. 비지도학습이 정답 없음',correct:false},{n:4,text:'맞음. 군집화=비지도, 분류=지도 ✓',correct:true}],concept:{title:'📌 학습 유형별 알고리즘',items:['지도학습: 분류(SVM, 결정트리), 회귀(선형회귀)','비지도학습: 군집화(k-means), PCA','강화학습: Q-learning, DQN']}}},
{id:3117,category:'데이터통신',number:117,question:'생성형 AI를 기존 AI와 비교했을 때 가장 큰 차이점은 무엇인가?',choices:['미리 정답이 지정된 데이터를 학습한다.','정확한 분류 및 예측을 목표로 한다.','새로운 콘텐츠를 생성한다.','지도학습을 기반으로 작동한다.'],answer:3,explanation:{summary:'생성형 AI(Generative AI): 새로운 콘텐츠(텍스트, 이미지, 음악 등) 생성이 핵심.',choiceAnalysis:[{n:1,text:'일반 지도학습 특성',correct:false},{n:2,text:'분류/예측 AI 특성',correct:false},{n:3,text:'생성형 AI의 핵심 특징 ✓',correct:true},{n:4,text:'지도학습은 다른 AI도 사용',correct:false}],concept:{title:'📌 생성형 AI',items:['새로운 콘텐츠 생성(사진, 텍스트, 음악)','예: ChatGPT, DALL-E, Stable Diffusion','GAN, VAE, Transformer 기반','기존 AI: 분류/예측 위주']}}},
{id:3118,category:'데이터통신',number:118,question:'다음 <보기>의 내용들과 관련성이 높은 정보 서비스 유형은?',boxLabel:'<보기>',boxText:'IoT망, 드론, 빅데이터, 비콘, 자율주행차, 고정밀 지도',choices:['클라우드 서비스','스마트 시티 서비스','핀테크 서비스','소셜 미디어 서비스'],answer:2,explanation:{summary:'IoT, 드론, 자율주행, 빅데이터 등 → 스마트 시티 관련 기술.',choiceAnalysis:[{n:1,text:'클라우드: IaaS/PaaS/SaaS',correct:false},{n:2,text:'스마트 시티: IoT+빅데이터+자율주행 통합 ✓',correct:true},{n:3,text:'핀테크: 금융+기술',correct:false},{n:4,text:'소셜 미디어: SNS',correct:false}],concept:{title:'📌 스마트 시티',items:['IoT 센서로 도시 데이터 수집','빅데이터 분석으로 도시 운영 최적화','자율주행, 스마트 교통, 스마트 에너지']}}},
{id:3119,category:'데이터통신',number:119,question:'다음 설명에 해당하는 것은?',choices:['디지털 트윈(Digital Twin)','블록체인(Block Chain)','핀테크(FinTech)','엣지 컴퓨팅(Edge Computing)'],answer:1,explanation:{summary:'디지털 트윈: 현실 객체의 디지털 복제본(가상 복제물). 시뮬레이션, 예측에 활용.',choiceAnalysis:[{n:1,text:'디지털 트윈: 실물의 가상 복제 ✓',correct:true},{n:2,text:'블록체인: 분산 원장 기술',correct:false},{n:3,text:'핀테크: 금융+기술',correct:false},{n:4,text:'엣지 컴퓨팅: 근거리 처리',correct:false}],concept:{title:'📌 디지털 트윈(Digital Twin)',items:['현실 객체의 디지털 복제본 생성','실시간 데이터로 동기화','시뮬레이션, 예측, 최적화에 활용','제조, 건설, 의료 등에 응용']}}},
{id:3120,category:'데이터통신',number:120,question:'다음 중 블록체인(blockchain)에 대한 설명으로 옳지 않은 것은?',choices:['분산 원장 기술로 중앙 관리자 없이 운영된다.','한 번 기록된 데이터는 변경이 매우 어렵다.','암호화폐(cryptocurrency)에만 사용된다.','스마트 계약(smart contract)을 지원할 수 있다.'],answer:3,explanation:{summary:'블록체인은 금융 외에 공급망, 의료, 투표 등 다양한 분야에서 활용.',choiceAnalysis:[{n:1,text:'맞음. 분산 원장, 탈중앙화',correct:false},{n:2,text:'맞음. 불변성(Immutability)',correct:false},{n:3,text:'틀림. 암호화폐 외에도 광범위 활용 ✓',correct:true},{n:4,text:'맞음. 이더리움의 스마트 계약',correct:false}],concept:{title:'📌 블록체인 특징',items:['탈중앙화: 중앙 기관 없음','분산 원장: 모든 참여자가 사본 보유','불변성: 과거 데이터 수정 사실상 불가','스마트 계약: 조건 자동 실행']}}},
{id:3121,category:'데이터통신',number:121,question:'양자 컴퓨터(quantum computer)에 대한 설명으로 옳지 않은 것은?',choices:['양자역학 원리에 따라 작동되는 컴퓨터로 복잡한 병렬처리 연산이 가능해 기존의 방식으로 해결할 수 없었던 다양한 문제를 해결할 수 있게 된다.','1과 0의 상태를 동시에 갖는 상태인 큐비트(qubit) 단위를 이용한다.','측정에 의해 중첩된 현상이 깨어지고 다시 그 상태로 만들 수 있는 복제성이 가능하다.','양자 상호간 특수한 관계로 거리와 무관하게 두 양자 쌍에 특수한 상관 관계가 존재하는 얽힘 현상이 포함된다.'],answer:3,explanation:{summary:'양자 복제 불가 원리(No-Cloning Theorem): 양자 상태를 완전히 복제할 수 없음.',choiceAnalysis:[{n:1,text:'맞음. 양자 병렬 처리',correct:false},{n:2,text:'맞음. 큐비트: 0+1 중첩 상태',correct:false},{n:3,text:'틀림. 양자 복제 불가 원리 ✓',correct:true},{n:4,text:'맞음. 양자 얽힘(Entanglement)',correct:false}],concept:{title:'📌 양자 컴퓨터 핵심 원리',items:['중첩(Superposition): 0과 1 동시 존재','얽힘(Entanglement): 두 큐비트의 상관관계','간섭(Interference): 확률 조작','복제 불가 원리: 양자 상태 완전 복제 불가']}}},
{id:3122,category:'데이터통신',number:122,question:'사용자 또는 데이터 소스의 물리적인 위치나 그 근처에서 컴퓨팅을 수행하는 것을 의미하는 것은?',choices:['엣지 컴퓨팅','클라우드 컴퓨팅','N-스크린 컴퓨팅','노매딕 컴퓨팅'],answer:1,explanation:{summary:'엣지 컴퓨팅: 데이터 발생 위치 근처에서 처리(지연 감소, 대역폭 절약).',choiceAnalysis:[{n:1,text:'엣지 컴퓨팅: 근거리 처리 ✓',correct:true},{n:2,text:'클라우드: 원격 서버 처리',correct:false},{n:3,text:'N-스크린: 여러 화면 서비스',correct:false},{n:4,text:'노매딕: 이동 컴퓨팅',correct:false}],concept:{title:'📌 엣지 컴퓨팅',items:['데이터 소스 근처에서 처리','클라우드와 반대 개념(분산 처리)','IoT 장치의 데이터 실시간 처리','장점: 낮은 지연, 대역폭 절감']}}},
{id:3123,category:'데이터통신',number:123,question:'엣지 컴퓨팅(edge computing)에 대한 설명으로 옳지 않은 것은?',choices:['사용자 또는 데이터 소스의 물리적인 위치나 그 근처에서 컴퓨팅을 수행한다.','데이터를 로컬에서 실시간으로 처리해야 하는 상황에서 처리를 위한 대기시간이 길어질 수 있다.','네트워크 비용을 절감하고, 대역폭의 제약을 해소할 수 있다.','IoT 장치에서 수집된 데이터를 즉각 처리할 수 있다.'],answer:2,explanation:{summary:'엣지 컴퓨팅은 근거리 처리로 대기시간을 단축. 길어지는 게 아님.',choiceAnalysis:[{n:1,text:'맞음. 근거리 처리',correct:false},{n:2,text:'틀림. 엣지: 대기시간 감소가 장점 ✓',correct:true},{n:3,text:'맞음. 네트워크 비용 절감',correct:false},{n:4,text:'맞음. IoT 즉각 처리',correct:false}],concept:{title:'📌 엣지 컴퓨팅 장점',items:['낮은 지연시간(Latency): 근거리 처리','대역폭 절약: 원시 데이터 클라우드 전송 불필요','보안: 로컬 처리로 데이터 외부 전송 최소화']}}},
{id:3124,category:'데이터통신',number:124,question:'다음 중 5G 이동통신의 주요 특징에 해당하지 않는 것은?',choices:['초고속: 최대 수십 Gbps의 데이터 전송 속도를 지원한다.','초저지연: 1ms 수준의 초저지연을 지원한다.','초연결: 1km² 당 약 100만 개의 기기를 연결할 수 있다.','협대역: 좁은 주파수 대역폭을 활용하여 전력 소모를 최소화한다.'],answer:1,explanation:{summary:'5G 특징: 초고속(eMBB), 초저지연(URLLC), 초연결(mMTC). 협대역은 5G와 반대 방향.',choiceAnalysis:[{n:1,text:'초고속: 5G 특징',correct:false},{n:2,text:'초저지연: 5G 특징',correct:false},{n:3,text:'초연결: 5G 특징',correct:false},{n:4,text:'협대역: 5G와 반대(광대역이 5G 특징) ✓',correct:true}],concept:{title:'📌 5G 3가지 주요 시나리오',items:['eMBB(초고속): 최대 20Gbps','URLLC(초저지연): 1ms 지연','mMTC(초연결): 1km²당 100만 기기','활용: 자율주행, AR/VR, IoT']}}},,
{id:5001,category:'데이터베이스론',number:1,question:'데이터베이스의 정의로 옳지 않은 것은?',choices:['데이터베이스는 동시에 여러 명이 접근하여 사용할 수 있다.','데이터베이스는 그 시스템의 목적에 맞는 유용한 데이터의 집합이다.','데이터베이스는 중복이 완벽히 제거된 통합된 데이터의 모임이다.','데이터베이스는 보조기억장치에 저장된 데이터이다.'],answer:3,explanation:{summary:'DB는 중복을 최소화하지만 완벽히 제거하지는 않음. 일부 제어된 중복 허용.',choiceAnalysis:[{n:1,text:'맞음. 동시 공유 가능',correct:false},{n:2,text:'맞음. 목적에 맞는 데이터 집합',correct:false},{n:3,text:'틀림. 중복 최소화이지 완벽 제거는 아님 ✓',correct:true},{n:4,text:'맞음. 보조기억장치에 영구 저장',correct:false}],concept:{title:'📌 데이터베이스 특징',items:['실시간 접근성: 즉각 처리','지속적 변화: 삽입/삭제/수정','동시 공유: 여러 사용자','내용 참조: 주소가 아닌 내용으로 검색','통합 데이터: 최소 중복']}}},
{id:5002,category:'데이터베이스론',number:2,question:'데이터베이스의 특성으로 옳지 않은 것은?',choices:['데이터베이스는 실시간 처리로 응답할 수 있어야 한다.','데이터베이스의 내용은 읽기 전용이다.','데이터베이스는 여러 사용자가 동시에 접근할 수 있어야 한다.','데이터베이스는 데이터의 내용에 의해 참조된다.'],answer:2,explanation:{summary:'DB는 읽기 전용이 아님. 삽입/수정/삭제 모두 가능.',choiceAnalysis:[{n:1,text:'맞음. 실시간 응답',correct:false},{n:2,text:'틀림. 읽기뿐 아니라 쓰기도 가능 ✓',correct:true},{n:3,text:'맞음. 동시 접근',correct:false},{n:4,text:'맞음. 내용(값)으로 참조',correct:false}],concept:{title:'📌 DB vs 파일 시스템',items:['파일 시스템: 중복 많음, 데이터 종속','DB: 중복 최소화, 데이터 독립','DB CRUD: Create, Read, Update, Delete']}}},
{id:5003,category:'데이터베이스론',number:3,question:'파일 시스템(file system)에 대한 설명으로 옳지 않은 것은?',choices:['같은 내용의 데이터가 여러 파일에 중복 저장된다.','데이터 파일의 구조가 변경되면 그 데이터 파일에 접근하는 응용 프로그램도 변경해야 한다.','데이터를 수정하는 도중 장애가 발생한 경우 데이터를 일관된 상태로 회복할 수 있다.','데이터 관리 기능을 포함하여야 하므로 응용 프로그램 개발이 쉽지 않다.'],answer:3,explanation:{summary:'파일 시스템은 장애 발생 시 일관성 회복 기능이 없거나 미약. DB의 회복 기능이 더 강력.',choiceAnalysis:[{n:1,text:'맞음. 파일 시스템: 중복 많음',correct:false},{n:2,text:'맞음. 데이터 종속성 문제',correct:false},{n:3,text:'틀림. 파일 시스템은 회복 기능 부족 ✓',correct:true},{n:4,text:'맞음. 데이터 관리 부담',correct:false}],concept:{title:'📌 파일 시스템의 문제점',items:['데이터 중복성: 같은 데이터 여러 파일에 저장','데이터 종속성: 파일 구조 변경 시 프로그램도 수정','무결성 유지 어려움','회복 기능 없거나 미약']}}},
{id:5004,category:'데이터베이스론',number:4,question:'데이터베이스 모델에 대한 설명으로 옳은 것은?',choices:['계층형 모델은 데이터의 상하 종속적인 관계를 그래프 구조로 표현한다.','망형 모델은 데이터의 복잡한 n:m 관계를 트리 구조로 표현한다.','객체지향형 모델은 연산을 제외한 속성만으로 구성된 개체(entity)를 사용한다.','관계형 모델은 테이블 내의 열(column)을 이용하여 관계를 표현한다.'],answer:4,explanation:{summary:'관계형 모델: 2차원 테이블(행과 열). 외래키로 관계 표현.',choiceAnalysis:[{n:1,text:'틀림. 계층형: 트리(Tree) 구조',correct:false},{n:2,text:'틀림. 망형: 그래프(Graph) 구조',correct:false},{n:3,text:'틀림. 객체지향: 속성+메서드(연산) 포함',correct:false},{n:4,text:'맞음. 관계형: 테이블(행과 열) ✓',correct:true}],concept:{title:'📌 데이터베이스 모델',items:['계층형: 트리 구조, 1:N 관계','망형: 그래프 구조, M:N 관계','관계형: 2차원 테이블, 현재 가장 널리 사용','객체지향형: 객체+메서드, OOP 개념 적용']}}},
{id:5005,category:'데이터베이스론',number:5,question:'논리적 데이터 모델에 해당하지 않는 것은?',choices:['객체-관계 모델','개체-관계 모델','관계 모델','계층 모델'],answer:2,explanation:{summary:'개체-관계(ER) 모델은 개념적 데이터 모델. 논리적 모델은 관계형, 네트워크형 등.',choiceAnalysis:[{n:1,text:'객체-관계: 논리적 모델',correct:false},{n:2,text:'개체-관계(ER): 개념적 설계 단계 모델 ✓',correct:true},{n:3,text:'관계 모델: 논리적 모델',correct:false},{n:4,text:'계층 모델: 논리적 모델',correct:false}],concept:{title:'📌 데이터 모델 수준',items:['개념적 모델: ER 다이어그램','논리적 모델: 관계형, 계층형, 네트워크형, 객체지향','물리적 모델: 실제 저장 구조(인덱스, 파일 구조)']}}},
{id:5006,category:'데이터베이스론',number:6,question:'DBMS의 3단계 스키마(schema) 아키텍처에 관한 설명으로 옳지 않은 것은?',choices:['외부 스키마 - 논리적 사용자 관점','서브 스키마 - 물리적 사용자 관점','개념 스키마 - 논리적 범기관적 관점','내부 스키마 - 물리적 저장장치 관점'],answer:2,explanation:{summary:'서브 스키마(Sub Schema) = 외부 스키마. 물리적 관점이 아닌 사용자 관점(논리적).',choiceAnalysis:[{n:1,text:'맞음. 외부=사용자 관점',correct:false},{n:2,text:'틀림. 서브스키마=외부스키마=논리적 사용자 관점 ✓',correct:true},{n:3,text:'맞음. 개념=전체 논리 구조',correct:false},{n:4,text:'맞음. 내부=물리적 저장',correct:false}],concept:{title:'📌 3단계 스키마',items:['외부(External)/서브: 개별 사용자 뷰','개념(Conceptual): 전체 DB 논리 구조','내부(Internal): 물리적 저장 구조','데이터 독립성: 한 단계 변화가 다른 단계에 영향 없음']}}},
{id:5007,category:'데이터베이스론',number:7,question:'다음 <보기>의 설명에 해당하는 용어는 무엇인가?',boxLabel:'<보기>',boxText:'∘ 데이터베이스 구조(structure)와 제약조건(constraints)에 대한 명세를 기술한 것이다.\n∘ 데이터베이스를 구성하는 데이터 개체, 이들의 속성, 이들 간에 존재하는 관계 그리고 데이터의 조작 시 이들 데이터 값들이 갖는 제약 조건이 포함된다.',choices:['스키마(schema)','뷰(view)','SQL(Structured Query Language)','트리거(trigger)'],answer:1,explanation:{summary:'스키마(Schema): DB 구조와 제약조건의 정의.',choiceAnalysis:[{n:1,text:'스키마: DB 구조 명세 ✓',correct:true},{n:2,text:'뷰: 가상 테이블',correct:false},{n:3,text:'SQL: 질의 언어',correct:false},{n:4,text:'트리거: 자동 실행 프로시저',correct:false}],concept:{title:'📌 스키마(Schema)',items:['DB 구조와 제약조건의 명세','DDL로 정의','외부/개념/내부 스키마로 구분','메타데이터(데이터에 대한 데이터)']}}},
{id:5008,category:'데이터베이스론',number:8,question:'3단계 데이터베이스 설명으로 옳지 않은 것은?',choices:['내부 스키마, 개념 스키마, 외부 스키마로 나뉜다.','외부 스키마는 사용자나 응용 프로그래머가 접근할 수 있는 데이터베이스를 정의한 것이다.','개념 스키마는 데이터베이스 전체를 기술한 것이므로 여러 개 존재하며, 사용자나 응용 프로그램은 개념 스키마의 일부를 사용한다.','내부 스키마는 실제로 저장될 내부 레코드 형식, 인덱스 유무, 저장 데이터 항목의 표현 방법, 내부 레코드의 물리적 순서를 나타낸다.'],answer:3,explanation:{summary:'개념 스키마는 DB당 하나만 존재. 여러 개가 아님.',choiceAnalysis:[{n:1,text:'맞음. 3단계 스키마',correct:false},{n:2,text:'맞음. 외부 스키마=사용자 뷰',correct:false},{n:3,text:'틀림. 개념 스키마는 하나만 존재 ✓',correct:true},{n:4,text:'맞음. 내부 스키마=물리적 구조',correct:false}],concept:{title:'📌 스키마 개수',items:['외부 스키마: 여러 개(사용자마다 다른 뷰)','개념 스키마: 하나(전체 DB 논리 구조)','내부 스키마: 하나(물리적 구조)']}}},
{id:5009,category:'데이터베이스론',number:9,question:'다음 중 논리적 데이터 독립성에 대한 설명으로 옳은 것은?',choices:['데이터베이스 논리적 구조의 변경은 응용 프로그램에 영향을 준다.','데이터베이스 논리적 구조의 변경은 물리적 구조에 영향을 준다.','데이터베이스 논리적 구조의 변경은 응용 프로그램에 영향을 주지 않는다.','데이터베이스 논리적 구조의 변경은 물리적 구조에 영향을 주지 않는다.'],answer:3,explanation:{summary:'논리적 독립성: 개념 스키마 변경이 외부 스키마(응용 프로그램)에 영향 안 줌.',choiceAnalysis:[{n:1,text:'틀림. 논리적 독립성: 응용 프로그램에 영향 없음',correct:false},{n:2,text:'물리적 독립성이 다루는 관계',correct:false},{n:3,text:'맞음. 논리적 독립성=개념↔외부 독립 ✓',correct:true},{n:4,text:'물리적 독립성 설명',correct:false}],concept:{title:'📌 데이터 독립성',items:['논리적 독립성: 개념 스키마 변경 → 외부 스키마 영향 없음','물리적 독립성: 내부 스키마 변경 → 개념 스키마 영향 없음','독립성이 높을수록 유지보수 용이']}}},
{id:5010,category:'데이터베이스론',number:10,question:'다음 <보기>의 설명에 해당하는 데이터베이스 관리 시스템의 기능은 무엇인가?',boxLabel:'<보기>',boxText:'ㄱ. 조작에 필요한 데이터를 저장하기 적합한 데이터베이스 구조를 정의하거나, 이미 정의된 구조를 수정할 수 있다.\nㄴ. 사용자 요구에 따라 데이터를 삽입·삭제·수정·검색하는 연산을 처리한다.\nㄷ. 데이터를 여러 사용자가 공유하여도 항상 정확하고 안전하게 유지되도록 한다.',choices:['ㄱ:정의기능 / ㄴ:제어기능 / ㄷ:조작기능','ㄱ:정의기능 / ㄴ:조작기능 / ㄷ:제어기능','ㄱ:절차기능 / ㄴ:조작기능 / ㄷ:정의기능','ㄱ:절차기능 / ㄴ:제어기능 / ㄷ:조작기능'],answer:2,explanation:{summary:'DBMS 3기능: 정의(DDL), 조작(DML), 제어(DCL)',choiceAnalysis:[{n:1,text:'ㄴ,ㄷ 순서 오류',correct:false},{n:2,text:'ㄱ=정의, ㄴ=조작, ㄷ=제어 ✓',correct:true},{n:3,text:'절차기능은 없는 분류',correct:false},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 DBMS 3가지 기능',items:['정의 기능(DDL): DB 구조 정의/수정','조작 기능(DML): 데이터 검색/삽입/수정/삭제','제어 기능(DCL): 무결성, 보안, 회복, 병행제어']}}},
{id:5011,category:'데이터베이스론',number:11,question:'데이터 언어 중 데이터 조작어(Data Manipulation Language)에 대한 설명으로 가장 적절한 것은?',choices:['데이터베이스를 올바로 공용하게 하면서 정확성을 유지하기 위해 필요한 언어','무결성(integrity) 및 보안(security) 유지 작업을 지원','데이터에 대한 검색, 삽입, 삭제, 수정을 위한 언어','병행제어(concurrency control)를 지원'],answer:3,explanation:{summary:'DML(Data Manipulation Language): 데이터 CRUD(검색, 삽입, 수정, 삭제)',choiceAnalysis:[{n:1,text:'DCL 설명',correct:false},{n:2,text:'DCL 설명',correct:false},{n:3,text:'DML: SELECT, INSERT, UPDATE, DELETE ✓',correct:true},{n:4,text:'DCL 설명',correct:false}],concept:{title:'📌 SQL 언어 분류',items:['DDL: CREATE, ALTER, DROP, TRUNCATE','DML: SELECT, INSERT, UPDATE, DELETE','DCL: GRANT, REVOKE','TCL: COMMIT, ROLLBACK, SAVEPOINT']}}},
{id:5012,category:'데이터베이스론',number:12,question:'데이터베이스관리시스템에서 사용하는 데이터 언어에 대한 설명 중 옳지 않은 것은?',choices:['데이터 부속어(DSL)는 호스트 응용 프로그램 속에 삽입되어 사용되는 언어이다.','데이터 정의어(DDL)는 데이터베이스를 정의하거나 그 정의를 수정할 목적으로 사용되는 언어로서, 데이터베이스 스키마를 컴퓨터가 이해할 수 있도록 기술한다.','비절차적 데이터 조작어(DML)는 사용자가 무슨 데이터를 원하며, 어떻게 그것을 접근해야 되는지를 명세하는 언어이다.','데이터 제어어(DCL)는 여러 사용자가 데이터베이스를 올바르게 공용하고 정확하게 유지하기 위해 규정이나 기법을 통해 데이터를 제어하도록 기술하는 언어이다.'],answer:3,explanation:{summary:'비절차적 DML: 무엇(What)을 원하는지만 명세. 어떻게(How) 접근하는지는 DBMS가 결정.',choiceAnalysis:[{n:1,text:'맞음. 부속어(DSL): 임베디드 SQL',correct:false},{n:2,text:'맞음. DDL: 스키마 정의',correct:false},{n:3,text:'틀림. 비절차적=무엇(what)만. 어떻게(how)는 절차적 ✓',correct:true},{n:4,text:'맞음. DCL: 데이터 제어',correct:false}],concept:{title:'📌 절차적 vs 비절차적 DML',items:['절차적: 어떻게(How) 데이터를 접근할지 명세(C, COBOL)','비절차적: 무엇(What)이 필요한지만 명세(SQL)','SQL은 비절차적 언어']}}},
{id:5013,category:'데이터베이스론',number:13,question:'DBMS에서 릴레이션, 애트리뷰트, 인덱스, 데이터베이스 사용자 등에 관한 정보가 저장되는 곳은?',choices:['트랜잭션','시스템 카탈로그','ER 다이어그램','응용 프로그램'],answer:2,explanation:{summary:'시스템 카탈로그(System Catalog): DB의 메타데이터(데이터에 대한 데이터) 저장.',choiceAnalysis:[{n:1,text:'트랜잭션: 논리적 작업 단위',correct:false},{n:2,text:'시스템 카탈로그(데이터 사전): 메타데이터 저장 ✓',correct:true},{n:3,text:'ER 다이어그램: 설계 도구',correct:false},{n:4,text:'응용 프로그램: 사용자 프로그램',correct:false}],concept:{title:'📌 시스템 카탈로그(Data Dictionary)',items:['DB 스키마 정보(테이블, 열, 인덱스)','사용자 정보, 접근 권한','통계 정보(레코드 수, 크기 등)','DBMS가 직접 관리']}}},
{id:5014,category:'데이터베이스론',number:14,question:'릴레이션(relation)의 특성에 대한 설명으로 옳은 것은?',choices:['하나의 릴레이션에는 동일한 투플이 존재할 수 있다.','동일한 값을 갖지만 투플의 순서가 다른 릴레이션은 다르게 취급된다.','하나의 릴레이션에서 속성 사이의 순서는 정해져있다.','모든 애트리뷰트 값은 논리적으로 더 이상 분해되지 않는 원자값이다.'],answer:4,explanation:{summary:'릴레이션 속성값은 원자값(Atomic Value)이어야 함(1NF 조건).',choiceAnalysis:[{n:1,text:'틀림. 릴레이션: 중복 투플 없음',correct:false},{n:2,text:'틀림. 투플 순서 무관(집합)',correct:false},{n:3,text:'틀림. 속성 순서도 무관',correct:false},{n:4,text:'맞음. 원자값(더 이상 분해 불가) ✓',correct:true}],concept:{title:'📌 릴레이션 특성',items:['투플 중복 없음(유일성)','투플 순서 무관(집합)','속성 순서 무관','속성값: 원자값(분해 불가)','속성명 유일']}}},
{id:5015,category:'데이터베이스론',number:15,question:'데이터베이스의 키에 대한 설명이다. 옳지 않은 것은?',choices:['기본키는 개체무결성을 가지며 절대 Null이 될 수 없다.','대체키는 후보키 중에서 기본키를 제외한 모든 키를 말한다.','슈퍼키는 유일성과 최소성을 모두 만족한다.','후보키는 하나의 릴레이션에서 유일성과 최소성을 만족하는 하나 또는 몇 개의 속성들의 부분집합이다.'],answer:3,explanation:{summary:'슈퍼키(Super Key): 유일성만 만족. 최소성은 후보키/기본키의 추가 조건.',choiceAnalysis:[{n:1,text:'맞음. 기본키: NULL 불가',correct:false},{n:2,text:'맞음. 대체키=후보키-기본키',correct:false},{n:3,text:'틀림. 슈퍼키=유일성만. 최소성은 후보키 조건 ✓',correct:true},{n:4,text:'맞음. 후보키=유일성+최소성',correct:false}],concept:{title:'📌 키 종류',items:['슈퍼키: 유일성만 만족','후보키: 유일성+최소성','기본키: 후보키 중 선택된 하나','대체키: 기본키 외 후보키','외래키: 다른 테이블의 기본키 참조']}}},
{id:5016,category:'데이터베이스론',number:16,question:'다음 중 개체 무결성 제약(entity integrity constraint)에 대한 설명으로 옳은 것은?',choices:['릴레이션은 참조할 수 없는 외래키 값을 가져서는 안된다.','기본키에 속한 애트리뷰트는 널(null) 값을 가져서는 안된다.','외래키에 속한 애트리뷰트는 중복을 허용하지 않는다.','릴레이션은 여러 개의 후보키를 가져서는 안된다.'],answer:2,explanation:{summary:'개체 무결성: 기본키는 NULL 값 불가.',choiceAnalysis:[{n:1,text:'참조 무결성 제약',correct:false},{n:2,text:'개체 무결성: 기본키≠NULL ✓',correct:true},{n:3,text:'도메인 무결성',correct:false},{n:4,text:'틀린 설명',correct:false}],concept:{title:'📌 무결성 제약 조건',items:['개체 무결성: 기본키는 NULL 불가, 유일해야 함','참조 무결성: 외래키는 NULL이거나 참조 대상 존재','도메인 무결성: 속성값은 정해진 도메인 내','NULL 무결성: NOT NULL 제약']}}},
{id:5017,category:'데이터베이스론',number:17,question:'다음에서 설명하는 것은?',boxLabel:'<설명>',boxText:'데이터베이스의 갱신이 발생할 때 DBMS가 자동으로 수행하는 사용자 정의 프로시저이다.\n무결성 제약조건을 유지하기 위하여 데이터베이스 갱신을 모니터링하고, 데이터베이스 갱신을 전파한다.',choices:['assertion','catalog','check','trigger'],answer:4,explanation:{summary:'트리거(Trigger): DB 이벤트(삽입/수정/삭제) 발생 시 자동 실행되는 프로시저.',choiceAnalysis:[{n:1,text:'Assertion: 임의 조건 제약',correct:false},{n:2,text:'Catalog: 메타데이터 저장소',correct:false},{n:3,text:'Check: 도메인 제약',correct:false},{n:4,text:'Trigger: 이벤트 발생 시 자동 실행 ✓',correct:true}],concept:{title:'📌 트리거(Trigger)',items:['특정 테이블에 DML 발생 시 자동 실행','BEFORE/AFTER/INSTEAD OF','FOR EACH ROW: 행 단위 실행','무결성 유지, 감사 로그, 자동 계산에 활용']}}},
{id:5018,category:'데이터베이스론',number:18,question:'다음 릴레이션(relation) R과 S의 카티션 프로덕트(cartesian product) 연산 시 결과 릴레이션의 차수(degree)와 카디널리티(cardinality) 값은?',boxLabel:'<릴레이션>',boxText:'R(번호, 이름): 3개 투플\nS(번호, 나이): 3개 투플',choices:['차수:3, 카디널리티:6','차수:4, 카디널리티:6','차수:3, 카디널리티:9','차수:4, 카디널리티:9'],answer:4,explanation:{summary:'카티션 프로덕트: 차수=2+2=4, 카디널리티=3×3=9',choiceAnalysis:[{n:1,text:'3,6: 오류',correct:false},{n:2,text:'4,6: 카디널리티 오류',correct:false},{n:3,text:'3,9: 차수 오류',correct:false},{n:4,text:'차수=4(2+2), 카디널리티=9(3×3) ✓',correct:true}],concept:{title:'📌 카티션 프로덕트(Cartesian Product)',items:['결과 차수(열) = R차수 + S차수','결과 카디널리티(행) = |R| × |S|','모든 가능한 조합을 생성']}}},
{id:5019,category:'데이터베이스론',number:19,question:'다음의 릴레이션에 대해 담당교수가 강감찬인 학생의 이름을 구하고자 한다. 관계대수식으로 옳은 것은?',choices:['π이름(σ담당교수=강감찬(학생⋈학과)) (담당교수=학과)','π이름(σ담당교수=강감찬(학생⋈학과)) (학과명=학과)','σ담당교수=강감찬(π이름(학생⋈학과)) (학과명=학과)','σ담당교수=강감찬(π이름(학생⋈학과)) (담당교수=학과)'],answer:2,explanation:{summary:'학생과 학과를 조인 후 담당교수=강감찬 선택 후 이름 추출.',choiceAnalysis:[{n:1,text:'조인 조건이 담당교수=학과: 불일치',correct:false},{n:2,text:'조인(학과명=학과), 선택(담당교수=강감찬), 추출(이름) ✓',correct:true},{n:3,text:'순서 오류',correct:false},{n:4,text:'조인 조건 오류',correct:false}],concept:{title:'📌 관계대수 연산',items:['σ(Selection): 조건에 맞는 행 선택','π(Projection): 특정 열 추출','⋈(Natural Join): 공통 속성으로 조인','÷(Division): 나눗셈 연산']}}},
{id:5020,category:'데이터베이스론',number:20,question:'다음의 릴레이션 R1과 R2에 대한 관계대수 R1÷R2의 결과 릴레이션으로 옳은 것은?',boxLabel:'<릴레이션>',boxText:'R1(C1, C2), R2(C2)\nR2.C2 = {A, B}',choices:['C1={3,4}','C1={1,4} (C2 포함)','C1={1,3}','C1={2,3}'],answer:3,explanation:{summary:'나눗셈(Division): R2의 모든 값을 포함하는 C1 값 찾기. A와 B 모두 가진 C1: 1(A,E,B존재), 3(J,B,A)',choiceAnalysis:[{n:1,text:'오류',correct:false},{n:2,text:'오류',correct:false},{n:3,text:'C1={1,3}: R2={A,B}를 모두 포함 ✓',correct:true},{n:4,text:'오류',correct:false}],concept:{title:'📌 관계대수 나눗셈(÷)',items:['R1 ÷ R2: R2의 모든 값과 매핑되는 R1의 C1 값','R2={A,B}','C1=1: (1,A),(1,B) 존재→포함','C1=3: (3,J),(3,B),(3,A) 존재→포함']}}},
{id:5021,category:'데이터베이스론',number:21,question:'릴레이션 R1(A,B,C)와 R2(C,D,E)를 자연조인(Natural Join)하면 생성되는 결과의 속성 수와 투플(Tuple) 수를 바르게 나열한 것은?',boxLabel:'<데이터>',boxText:'R1: 4투플(A,B,C)\nR2: 4투플(C,D,E)\n조인 키: C',choices:['5개, 5개','5개, 4개','6개, 5개','6개, 4개'],answer:2,explanation:{summary:'자연 조인: 공통 속성 C 하나로 병합. 속성=3+3-1=5. 실제 조인되는 투플 수=4',choiceAnalysis:[{n:1,text:'5개, 5개: 카디널리티 오류',correct:false},{n:2,text:'속성=5, 투플=4 ✓',correct:true},{n:3,text:'속성 6개 오류',correct:false},{n:4,text:'속성 오류',correct:false}],concept:{title:'📌 자연 조인',items:['공통 속성을 하나로 합침','차수 = R1차수 + R2차수 - 공통속성수','카디널리티: 조인 조건 만족하는 투플 수']}}},
{id:5022,category:'데이터베이스론',number:22,question:'테이블 R과 S에 자연조인(natural join) 연산을 적용한 결과 테이블로 옳은 것은?',boxLabel:'<테이블>',boxText:'R(A, B, C): a1-b1-c1, a2-b2-c2, a3-b3-c3, a4-b4-c4\nS(B, C, D): b1-c1-d1, b2-c2-d2, b3-c3-d3, b5-c5-d5',choices:['A,B,C,D: (a1,b1,c1,d1),(a2,b2,c2,d2),(a3,b3,c3,d3)','6열로 중복 표현','A,B,C,D: 일치항+NULL 포함','A,B,C만 3행'],answer:1,explanation:{summary:'자연 조인: R과 S에서 (B,C)가 일치하는 투플만. b4-c4와 b5-c5는 일치 없음.',choiceAnalysis:[{n:1,text:'3행: a1-b1-c1-d1, a2-b2-c2-d2, a3-b3-c3-d3 ✓',correct:true},{n:2,text:'중복 열 포함은 자연 조인 아님',correct:false},{n:3,text:'NULL은 외부 조인',correct:false},{n:4,text:'A,B,C만은 프로젝션',correct:false}],concept:{title:'📌 자연 조인 결과',items:['공통 속성(B, C)이 일치하는 투플만 포함','일치 없는 (a4,b4,c4), (b5,c5,d5)는 제외','결과: (a1,b1,c1,d1),(a2,b2,c2,d2),(a3,b3,c3,d3)']}}},
{id:5023,category:'데이터베이스론',number:23,question:'다음 관계대수 표현 중 옳지 않은 것은?',choices:['R ∩ S ∩ T = R ∩ (S ∩ T)','R ∪ S ≠ S ∪ R','σ조건1 AND 조건2(R) = σ조건1(σ조건2(R))','R ⋈ A=B S = σA=B(R × S)'],answer:2,explanation:{summary:'합집합(∪)은 교환 법칙 성립: R∪S = S∪R',choiceAnalysis:[{n:1,text:'맞음. 교집합 결합 법칙',correct:false},{n:2,text:'틀림. R∪S = S∪R (교환 법칙) ✓',correct:true},{n:3,text:'맞음. 선택 연산 분리',correct:false},{n:4,text:'맞음. 세타 조인 = 카티션 프로덕트 + 선택',correct:false}],concept:{title:'📌 관계대수 법칙',items:['합집합(∪): 교환, 결합 법칙 성립','교집합(∩): 교환, 결합 법칙 성립','선택(σ): 교환, 분리 가능','프로젝션(π): 분리 가능']}}},
{id:5024,category:'데이터베이스론',number:24,question:'다음 SQL 중 정의 기능에 해당하지 않는 것은?',choices:['drop table 학생 cascade;','alter table 학생 add 기말점수 char;','create table 학생 (학번 int, 이름 char(10));','update 학생 set 학년 = 3 where 학번=100;'],answer:4,explanation:{summary:'UPDATE: DML(데이터 조작). DROP, ALTER, CREATE는 DDL(데이터 정의).',choiceAnalysis:[{n:1,text:'DROP: DDL',correct:false},{n:2,text:'ALTER: DDL',correct:false},{n:3,text:'CREATE: DDL',correct:false},{n:4,text:'UPDATE: DML(데이터 조작) ✓',correct:true}],concept:{title:'📌 DDL vs DML',items:['DDL(정의): CREATE, ALTER, DROP, TRUNCATE, RENAME','DML(조작): SELECT, INSERT, UPDATE, DELETE']}}},
{id:5025,category:'데이터베이스론',number:25,question:'SQL 명령어 중에서 데이터 제어어(DCL)만을 모두 고르면?',boxLabel:'<보기>',boxText:'ㄱ. CREATE    ㄴ. GRANT\nㄷ. DROP    ㄹ. REVOKE',choices:['ㄱ, ㄴ','ㄴ, ㄹ','ㄷ, ㄹ','ㄴ, ㄷ, ㄹ'],answer:2,explanation:{summary:'DCL: GRANT(권한 부여), REVOKE(권한 취소). CREATE, DROP은 DDL.',choiceAnalysis:[{n:1,text:'CREATE는 DDL',correct:false},{n:2,text:'GRANT+REVOKE = DCL ✓',correct:true},{n:3,text:'DROP은 DDL',correct:false},{n:4,text:'DROP 제외해야',correct:false}],concept:{title:'📌 DCL 명령어',items:['GRANT: 사용자에게 권한 부여','REVOKE: 사용자 권한 취소','DCL: 보안, 접근 제어 담당']}}},
{id:5026,category:'데이터베이스론',number:26,question:'다음은 Foreign Key를 정의하는 SQL CREATE 구문 중 일부이다. 다음 중 옵션 위치에 명시할 수 없는 것은?',boxLabel:'SQL',boxText:'FOREIGN KEY (열)\nREFERENCES 기본테이블\n[ ON DELETE 옵션 ]\n[ ON UPDATE 옵션 ]',choices:['No Action','Check','Cascade','Set Null'],answer:2,explanation:{summary:'외래키 옵션: NO ACTION, CASCADE, SET NULL, SET DEFAULT, RESTRICT. CHECK는 아님.',choiceAnalysis:[{n:1,text:'NO ACTION: 외래키 옵션',correct:false},{n:2,text:'CHECK: 도메인 제약 절. 외래키 옵션 아님 ✓',correct:true},{n:3,text:'CASCADE: 외래키 옵션',correct:false},{n:4,text:'SET NULL: 외래키 옵션',correct:false}],concept:{title:'📌 외래키 참조 옵션',items:['NO ACTION: 아무 작업 없음(오류 발생)','CASCADE: 부모 변경/삭제 시 자식도 같이','SET NULL: 자식 외래키를 NULL로','SET DEFAULT: 기본값으로 설정','RESTRICT: 자식 존재 시 부모 변경 금지']}}},
{id:5027,category:'데이터베이스론',number:27,question:'다음 SQL SELECT 문 중 문법 상 올바르지 않은 것은?',choices:['Where 급여 BETWEEN 3000000 AND 4500000','Where 부서번호 IN(1, 3)','Select 직원명, 급여, 급여 * 1.1 AS 인상급여','Where 부서번호 = NULL'],answer:4,explanation:{summary:'NULL 비교는 = 연산자 불가. IS NULL 또는 IS NOT NULL 사용.',choiceAnalysis:[{n:1,text:'BETWEEN: 올바른 문법',correct:false},{n:2,text:'IN: 올바른 문법',correct:false},{n:3,text:'AS 별칭: 올바른 문법',correct:false},{n:4,text:'= NULL: 틀림. IS NULL 사용해야 함 ✓',correct:true}],concept:{title:'📌 NULL 비교',items:['WHERE 열 = NULL: 오류','WHERE 열 IS NULL: 정확한 NULL 검사','WHERE 열 IS NOT NULL: NULL이 아닌 것','NULL은 = 연산으로 비교 불가(항상 FALSE)']}}},
{id:5028,category:'데이터베이스론',number:28,question:'부서와 사원 테이블이 있을 때 테이블 연산 수행에 대한 설명으로 옳지 않은 것은?',choices:['부서 테이블에서 (2, 영업부) 투플을 삭제한다면 참조 무결성 제약조건을 위배한다.','사원 테이블에 (13, 강감찬, A1) 투플을 삽입한다면 도메인 무결성 제약조건을 위배한다.','사원 테이블에 (14, 김유신, 0) 투플을 삽입한다면 참조 무결성 제약조건을 위배한다.','부서 테이블에 (1, 연구부) 투플을 삽입한다면 참조 무결성 제약조건을 위배한다.'],answer:4,explanation:{summary:'부서(1, 연구부) 삽입: 이미 부서번호 1이 존재하면 기본키 중복 위반(개체 무결성). 참조 무결성 아님.',choiceAnalysis:[{n:1,text:'맞음. 사원이 부서2 참조 중→삭제 시 참조 무결성 위반',correct:false},{n:2,text:'맞음. A1은 INT 타입이 아님→도메인 위반',correct:false},{n:3,text:'맞음. 부서번호 0 없음→참조 무결성 위반',correct:false},{n:4,text:'틀림. 기본키 중복=개체 무결성 위반 ✓',correct:true}],concept:{title:'📌 무결성 위반 종류',items:['개체 무결성: 기본키 NULL 또는 중복','참조 무결성: 외래키가 존재하지 않는 값 참조','도메인 무결성: 정의된 도메인 범위 초과']}}},
{id:5029,category:'데이터베이스론',number:29,question:'다음 SQL문을 실행한 결과는?',boxLabel:'<프로젝트 테이블>',boxText:'관리번호:1-5, 관리자사번:1,1,2,3,4, 연구비:500,2200,900,400,1500\nSELECT 관리자사번, SUM(연구비) FROM 프로젝트 GROUP BY 관리자사번 HAVING SUM(연구비) >= 1000;',choices:['관리자사번 1: 2700, 2: 900','관리자사번 1: 2700, 4: 1500','관리자사번 1: 2700, 2: 900, 4: 1500','관리자사번 1: 500, 2200'],answer:1,explanation:{summary:'GROUP BY 관리자사번: 1→2700(500+2200), 2→900, 3→400, 4→1500. HAVING≥1000: 1(2700), 4(1500).',choiceAnalysis:[{n:1,text:'1→2700, 2→900 오류(2는 900<1000)',correct:false},{n:2,text:'1→2700, 4→1500 ✓',correct:true},{n:3,text:'2→900<1000 포함 오류',correct:false},{n:4,text:'그룹 전 개별 값',correct:false}],concept:{title:'📌 GROUP BY + HAVING',items:['GROUP BY: 같은 값끼리 그룹화','집계 함수(SUM, AVG, COUNT, MAX, MIN)','HAVING: 그룹에 대한 조건(집계 결과 필터)','WHERE: 그룹화 전, HAVING: 그룹화 후']}}},
{id:5030,category:'데이터베이스론',number:30,question:'뷰(VIEW)에 대한 설명으로 옳지 않은 것은?',choices:['뷰 테이블은 물리적으로 구현된 것은 아니다.','뷰 테이블에 열을 추가할 때에는 ALTER 문을 사용한다.','기본 테이블과 뷰 테이블로부터 새로운 뷰 테이블을 생성할 수 있다.','뷰 테이블은 데이터의 접근을 제어하게 함으로써 보안을 제공한다.'],answer:2,explanation:{summary:'뷰에 열 추가 불가. 뷰는 DROP 후 재생성만 가능. ALTER로 수정 불가.',choiceAnalysis:[{n:1,text:'맞음. 뷰: 가상 테이블(물리적 X)',correct:false},{n:2,text:'틀림. 뷰는 ALTER 불가, DROP 후 재생성 ✓',correct:true},{n:3,text:'맞음. 뷰 기반 뷰 생성 가능',correct:false},{n:4,text:'맞음. 뷰: 보안, 독립성 제공',correct:false}],concept:{title:'📌 뷰(VIEW) 특징',items:['가상 테이블: 물리적 저장 없음','SELECT로 정의, 실행 시 기본 테이블 참조','CREATE VIEW, DROP VIEW','UPDATE 제한: 일부 뷰만 수정 가능','장점: 보안, 독립성, 편의성']}}},
{id:5031,category:'데이터베이스론',number:31,question:'다음 중 데이터베이스의 뷰(view)에 대한 설명으로 옳지 않은 것은?',choices:['데이터베이스에 대한 논리적 데이터 독립성을 제공한다.','뷰에 대한 변경이 자유롭다.','접근 제어를 통한 보안을 제공한다.','여러 사용자의 상이한 요구를 지원하기 쉽다.'],answer:2,explanation:{summary:'뷰 변경 제한 있음. 집계 함수, 그룹화, 조인이 포함된 뷰는 수정 불가.',choiceAnalysis:[{n:1,text:'맞음. 논리적 독립성',correct:false},{n:2,text:'틀림. 뷰 변경 자유롭지 않음(제한 있음) ✓',correct:true},{n:3,text:'맞음. 보안 제공',correct:false},{n:4,text:'맞음. 사용자별 다른 뷰 제공',correct:false}],concept:{title:'📌 뷰 변경 제한',items:['수정 불가한 뷰: 집계 함수, GROUP BY, DISTINCT, 다중 테이블 조인','수정 가능한 뷰: 단순 선택(하나의 기본 테이블)']}}},
{id:5032,category:'데이터베이스론',number:32,question:'다음 <보기>의 기능을 수행하는 데이터베이스 설계 단계는 무엇인가?',boxLabel:'<보기>',boxText:'∘ 목표 DBMS에 맞는 스키마로 변환한다.\n∘ 트랜잭션의 인터페이스를 설계한다.\n∘ 스키마를 평가하고 정제(refinement)한다.',choices:['요구조건 분석','개념적 설계 단계','논리적 설계 단계','물리적 설계 단계'],answer:3,explanation:{summary:'논리적 설계: DBMS에 맞는 스키마(릴레이션) 설계. 정규화 수행.',choiceAnalysis:[{n:1,text:'요구조건 분석: 사용자 요구 파악',correct:false},{n:2,text:'개념적 설계: ER 다이어그램',correct:false},{n:3,text:'논리적 설계: 목표 DBMS 스키마, 정규화 ✓',correct:true},{n:4,text:'물리적 설계: 저장 구조, 인덱스',correct:false}],concept:{title:'📌 DB 설계 단계',items:['요구 분석: 사용자 요구 파악','개념적 설계: ER 모델(DBMS 독립)','논리적 설계: 관계형 모델(DBMS 종속)','물리적 설계: 저장 구조, 인덱스','구현: SQL 작성']}}},
{id:5033,category:'데이터베이스론',number:33,question:'다음 관계대수 연산 중 단항 연산에 해당하는 것은?',choices:['합집합(Union)','교집합(Intersection)','카티션 프로덕트(Cartesian Product)','프로젝션(Projection)'],answer:3,explanation:{summary:'프로젝션(π): 하나의 릴레이션에서 특정 열만 추출하는 단항 연산.',choiceAnalysis:[{n:1,text:'합집합: 이항 연산(두 릴레이션)',correct:false},{n:2,text:'교집합: 이항 연산',correct:false},{n:3,text:'카티션 프로덕트: 이항 연산',correct:false},{n:4,text:'프로젝션(π): 단항 연산 ✓',correct:true}],concept:{title:'📌 관계대수 단항 vs 이항',items:['단항: σ(Selection), π(Projection), ρ(Rename)','이항: ∪(Union), ∩(Intersection), -(Difference), ×(Cartesian), ⋈(Join), ÷(Division)']}}},
{id:5034,category:'데이터베이스론',number:34,question:'E-R 다이어그램에서 직원과 프로젝트 사이의 다대다 관계를 관계형 데이터베이스로 올바르게 변환한 것은?',choices:['EMPLOYEE_WORKS_ON_PROJECT(ID, Name, Hours, Number, Location)','EMPLOYEE(ID, Name, Hours) / PROJECT(Number, Location, Hours)','EMPLOYEE(ID, Name) / WORKS_ON(Hours) / PROJECT(Number, Location)','EMPLOYEE(ID, Name) / WORKS_ON(ID, Number, Hours) / PROJECT(Number, Location)'],answer:4,explanation:{summary:'다대다 관계: 별도의 연결 테이블(WORKS_ON)로 분리. 양쪽 기본키와 관계 속성 포함.',choiceAnalysis:[{n:1,text:'하나의 테이블로 합치면 중복 발생',correct:false},{n:2,text:'관계 속성(Hours) 위치 오류',correct:false},{n:3,text:'연결 테이블에 외래키 없음',correct:false},{n:4,text:'EMPLOYEE, 연결테이블(ID,Number,Hours), PROJECT 분리 ✓',correct:true}],concept:{title:'📌 다대다 관계 변환',items:['직원(ID, Name)', '프로젝트(Number, Location)', '관계 테이블(ID, Number, Hours): 양쪽 기본키+관계 속성']}}},
{id:5035,category:'데이터베이스론',number:35,question:'다음과 같은 개체-관계(ER) 다이어그램을 관계형 데이터베이스 테이블로 변환하였을 때 바르게 표현한 것은?',choices:['가족(이름,사번,주민번호,성별,나이), 사원(사번,부서명,주민번호,이름,주소), 부서(부서명,부서장,업무,위치)','가족(사번,이름,성별,나이), 사원(부서명,사번,주민번호,이름,주소), 부서(부서명,부서장,업무,위치)','가족(주민번호,이름,사번,성별,나이), 사원(사번,부서명,주민번호,이름,주소), 부서(부서명,부서장,업무,위치)','가족(사번,이름,성별,나이), 사원(사번,부서명,주민번호,이름,주소), 부서(부서명,부서장,업무,위치)'],answer:4,explanation:{summary:'약한 개체(가족): 강한 개체(사원)의 기본키를 외래키로 포함. 가족은 사원의 사번을 포함해야 함.',choiceAnalysis:[{n:1,text:'가족에 사원 속성 혼합 오류',correct:false},{n:2,text:'가족에 사번 포함, 사원에 부서명 먼저 오류',correct:false},{n:3,text:'가족의 기본키 오류',correct:false},{n:4,text:'가족(사번, 이름, 성별, 나이): 사번=FK, 나머지 정리 ✓',correct:true}],concept:{title:'📌 약한 개체 변환',items:['약한 개체: 강한 개체의 기본키를 포함','강한 개체 기본키 = 약한 개체의 외래키','기본키: 부분키+외래키 조합']}}},
{id:5036,category:'데이터베이스론',number:36,question:'다음 개체 관계 다이어그램(entity relationship diagram)에 대한 설명으로 옳지 않은 것은?',choices:['각 과제는 최소한 한 명의 직원에게 할당되어야 한다.','각 직원은 최소한 한 과제를 할당받아야 한다.','동일한 과제가 여러 명에게 할당될 수도 있다.','어떤 직원은 과제를 여러 개 할당받을 수도 있다.'],answer:2,explanation:{summary:'ER 다이어그램에서 직원 쪽 최솟값이 0이면 과제 없는 직원도 존재 가능.',choiceAnalysis:[{n:1,text:'과제→직원 최솟값=1(할당 필수)',correct:false},{n:2,text:'직원의 최솟값에 따라 다름. 0이면 과제 없어도 됨 ✓',correct:true},{n:3,text:'과제:직원 = N:M이면 가능',correct:false},{n:4,text:'직원:과제 = 다대다 가능',correct:false}],concept:{title:'📌 ER 참여 제약',items:['전체 참여(이중선): 모든 개체가 관계에 참여해야 함','부분 참여(단선): 참여 안 해도 됨','최솟값/최댓값(min, max) 표기법']}}},
{id:5037,category:'데이터베이스론',number:37,question:'다음 <보기>의 릴레이션의 관계를 표현하기 위한 방법으로 가장 옳은 것은?',boxLabel:'<보기>',boxText:'∘고객(주민등록번호, 이름, 주소)\n∘계좌(계좌번호, 예금액)\n∘고객은 여러 개의 계좌를 가질 수 있으며, 한 계좌는 반드시 한 고객에 소속된다.',choices:['고객 릴레이션의 주민등록번호를 계좌 릴레이션에 외래키로 추가한다.','계좌 릴레이션의 계좌번호를 고객 릴레이션에 외래키로 추가한다.','별도의 릴레이션을 만들어 주민등록번호와 계좌번호를 합쳐 기본키와 외래키로 사용한다.','계좌 릴레이션의 예금액을 고객 릴레이션에 외래키로 추가한다.'],answer:1,explanation:{summary:'1:N 관계(고객:계좌): N쪽(계좌)에 1쪽(고객)의 기본키를 외래키로 추가.',choiceAnalysis:[{n:1,text:'고객 PK를 계좌 FK로: 1:N 표준 방법 ✓',correct:true},{n:2,text:'반대 방향 오류',correct:false},{n:3,text:'M:N 관계의 처리 방법',correct:false},{n:4,text:'예금액은 속성, FK 아님',correct:false}],concept:{title:'📌 1:N 관계 변환',items:['1쪽의 기본키를 N쪽 테이블의 외래키로 추가','고객(1)→계좌(N): 계좌 테이블에 고객 주민번호(FK) 추가']}}},
{id:5038,category:'데이터베이스론',number:38,question:'다음 릴레이션에서 속성(A, B, C)들의 함수 종속을 옳지 않게 표현한 것은?',boxLabel:'<투플>',boxText:'(c,d,i), (f,j,g), (h,j,g), (f,c,b)',choices:['A → B는 성립하지 않는다.','B → C는 성립한다.','(A, B) → C는 성립한다.','(B, C) → A는 성립한다.'],answer:4,explanation:{summary:'(j,g)에 f와 h 두 개의 A값 존재→(B,C)→A 성립 안 함.',choiceAnalysis:[{n:1,text:'맞음. f→j와 f→c 존재→A→B 성립 안함',correct:false},{n:2,text:'맞음. j→g, c→i,b(다름)→B→C 불성립? 재확인: j는 g만, c는 b만... 성립',correct:false},{n:3,text:'맞음. (A,B) 조합은 유일→C 결정',correct:false},{n:4,text:'틀림. (j,g)에서 A=f,h 두 가지→(B,C)→A 불성립 ✓',correct:true}],concept:{title:'📌 함수적 종속',items:['X→Y: X 값이 같으면 Y 값도 같아야 함','반례가 있으면 성립 안 함','(j,g)→f이기도 하고 h이기도 함→불성립']}}},
