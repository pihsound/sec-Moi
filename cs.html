{id:1108,category:'전자계산기구조론',number:108,question:'컴퓨터 시스템의 인터럽트(interrupt)에 대한 설명으로 옳지 않은 것은?',choices:['프로그램의 정상적인 처리 순서를 방해하는 것으로 대부분 예상치 못한 시점에서 CPU에 서비스를 요구한다.','원래 실행하고 있던 프로그램의 복귀주소를 저장해야 한다.','인터럽트 서비스 루틴(interrupt service routine)의 시작번지를 스택(stack)에 저장하여 실행한다.','인터럽트 요청 장치 판별을 위해 다수 인터럽트 선(multiple interrupt lines), 소프트웨어 폴(software poll), 데이지 체인(daisy chain) 방식 등을 사용한다.'],answer:3,explanation:{summary:'ISR의 시작 번지는 인터럽트 벡터 테이블에서 가져옴. 스택에는 복귀 주소(PC, PSW)를 저장.',choiceAnalysis:[{n:1,text:'맞음. 인터럽트: 예상치 못한 서비스 요구',correct:false},{n:2,text:'맞음. 복귀 주소 저장(스택)',correct:false},{n:3,text:'틀림. ISR 시작 번지→인터럽트 벡터. 스택에는 복귀 주소 저장 ✓',correct:true},{n:4,text:'맞음. 인터럽트 장치 판별 방법',correct:false}],concept:{title:'📌 인터럽트 처리 상세',items:['복귀 주소(PC, 레지스터) → 스택에 저장','ISR 주소 → 인터럽트 벡터 테이블에서 참조','장치 판별: 폴링(polling), 데이지체인, 인터럽트 벡터']}}},
{id:1109,category:'전자계산기구조론',number:109,question:'다음 <보기>의 순서대로 동작하는 인터럽트 요청 장치 판별 방법은?',boxLabel:'<보기>',boxText:'∘ 한 개 또는 그 이상의 입출력 모듈이 인터럽트를 요구한다.\n∘ 인터럽트 요구를 수신한 중앙처리장치는 이에 대한 확인 신호를 보낸다.\n∘ 확인 신호를 수신한 입출력 모듈 중 인터럽트를 요구하지 않은 모듈은 다음 모듈로 확인 신호를 전달한다.\n∘ 확인 신호를 수신한 인터럽트를 요구한 모듈은 데이터 버스를 통하여 인터럽트 벡터를 보낸다.',choices:['소프트웨어 폴(software poll)','데이지 체인(daisy chain)','인터럽트 벡터(interrupt vector)','버스 중재(bus arbitration)'],answer:2,explanation:{summary:'데이지 체인: 확인 신호를 직렬로 전파하여 최초 요청 장치 판별.',choiceAnalysis:[{n:1,text:'소프트웨어 폴: CPU가 각 장치를 순차 조회',correct:false},{n:2,text:'데이지 체인: 확인 신호를 직렬로 전파 ✓',correct:true},{n:3,text:'인터럽트 벡터: 장치별 ISR 주소 테이블',correct:false},{n:4,text:'버스 중재: 버스 사용권 결정',correct:false}],concept:{title:'📌 인터럽트 장치 판별 방법',items:['소프트웨어 폴링: CPU가 각 장치 상태 레지스터 순차 확인','하드웨어 폴링/데이지 체인: 확인 신호를 직렬로 연결','인터럽트 벡터 테이블: 장치별 ISR 주소 저장']}}},
{id:1110,category:'전자계산기구조론',number:110,question:'데이지-체인(daisy-chain) 방식에 대한 설명으로 옳은 것은?',choices:['모든 입출력 제어기들은 각각의 인터럽트 요청선을 갖는다.','CPU로부터 발생되는 인터럽트 확인선은 모든 입출력 장치에게 병렬로 연결된다.','여러 개의 입출력장치들이 동시에 인터럽트 요구를 보냈다면, 인터럽트 확인신호는 무시된다.','인터럽트를 요청한 장치가 인터럽트 확인 신호를 받게 되면 데이터 버스를 통해 자신의 인터럽트 벡터를 CPU로 보낸다.'],answer:4,explanation:{summary:'데이지 체인: 확인 신호가 직렬 전파되다가 요청 장치가 받으면 인터럽트 벡터를 CPU로 전송.',choiceAnalysis:[{n:1,text:'틀림. 데이지체인은 단일 확인선을 직렬 공유',correct:false},{n:2,text:'틀림. 병렬이 아닌 직렬 연결',correct:false},{n:3,text:'틀림. 우선순위 높은 장치(먼저 확인신호 받는 장치)가 처리',correct:false},{n:4,text:'맞음. 요청 장치가 확인 신호 수신 → 벡터 전송 ✓',correct:true}],concept:{title:'📌 데이지 체인 특징',items:['인터럽트 요청선: 공유(모든 장치 OR)','인터럽트 확인선: 직렬(A→B→C 순으로 전파)','우선순위: CPU에 가까운 장치가 높음','요청 장치: 확인 신호 수신 후 벡터 전송, 신호 더 이상 전달 안 함']}}},
{id:1111,category:'전자계산기구조론',number:111,question:'인터럽트 방식은 CPU와의 동기에 따라 동기식과 비동기식으로 구분된다. 다음 중 종류가 다른 것은?',choices:['SVC 인터럽트','외부 인터럽트','타이머 인터럽트','입출력 인터럽트'],answer:1,explanation:{summary:'SVC(Supervisor Call): 소프트웨어 인터럽트 = 동기식. 나머지(외부, 타이머, I/O)는 비동기식.',choiceAnalysis:[{n:1,text:'SVC: 소프트웨어 인터럽트(동기식) ✓',correct:true},{n:2,text:'외부 인터럽트: 비동기식',correct:false},{n:3,text:'타이머 인터럽트: 비동기식',correct:false},{n:4,text:'입출력 인터럽트: 비동기식',correct:false}],concept:{title:'📌 인터럽트 동기/비동기 분류',items:['동기식(Synchronous): 명령어 실행과 관련(프로그램 검사, SVC, 트랩)','비동기식(Asynchronous): 외부 장치(I/O, 타이머, 정전, 기계 오류)','SVC=소프트웨어 인터럽트=프로그램이 의도적으로 발생']}}},
{id:1112,category:'전자계산기구조론',number:112,question:'다음 중 동기식 인터럽트에 해당하는 것은?',choices:['기계 검사(machine check) 인터럽트','프로그램 검사(program check) 인터럽트','외부(external) 인터럽트','입출력(i/o) 인터럽트'],answer:2,explanation:{summary:'프로그램 검사 인터럽트(명령어 오류, 0 나누기): 동기식. 나머지는 비동기식.',choiceAnalysis:[{n:1,text:'기계 검사: 하드웨어 오류 → 비동기식',correct:false},{n:2,text:'프로그램 검사: 명령어 실행 중 오류 → 동기식 ✓',correct:true},{n:3,text:'외부: 비동기식',correct:false},{n:4,text:'입출력: 비동기식',correct:false}],concept:{title:'📌 동기식 인터럽트 예',items:['0으로 나누기(Division by Zero)','오버플로/언더플로','잘못된 명령어 코드','SVC(운영체제 서비스 요청)','트랩(Trap): 디버깅용']}}},
{id:1113,category:'전자계산기구조론',number:113,question:'다음 중 인터럽트 우선순위의 순서대로 옳게 나열한 것은?',choices:['정전 > 입출력 인터럽트 > 프로그램 검사 인터럽트','입출력 인터럽트 > 프로그램 검사 인터럽트 > 정전','정전 > 프로그램 검사 인터럽트 > 입출력 인터럽트','입출력 인터럽트 > 정전 > 프로그램 검사 인터럽트'],answer:3,explanation:{summary:'인터럽트 우선순위: 정전(Power Failure) > 기계 검사 > 외부 > 프로그램 검사 > SVC > I/O',choiceAnalysis:[{n:1,text:'I/O가 프로그램 검사보다 높아야 함',correct:false},{n:2,text:'정전이 가장 높아야 함',correct:false},{n:3,text:'정전 > 프로그램 검사 > I/O ✓',correct:true},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 인터럽트 우선순위(높→낮)',items:['1. 정전(Power Failure)','2. 기계 검사(Machine Check)','3. 외부(External)','4. 프로그램 검사(Program Check)','5. SVC(Supervisor Call)','6. 입출력(I/O)']}}},
{id:1114,category:'전자계산기구조론',number:114,question:'인터럽트를 고려한 명령어 사이클(instruction cycle)의 처리 단계를 순서대로 옳게 나열한 것은?',choices:['인출 사이클 - 간접 사이클 - 실행 사이클 - 인터럽트 사이클','인출 사이클 - 실행 사이클 - 간접 사이클 - 인터럽트 사이클','인출 사이클 - 간접 사이클 - 인터럽트 사이클 - 실행 사이클','인출 사이클 - 인터럽트 사이클 - 실행 사이클 - 간접 사이클'],answer:1,explanation:{summary:'명령어 사이클: 인출→(간접)→실행→(인터럽트). 간접과 인터럽트는 조건부.',choiceAnalysis:[{n:1,text:'인출→간접→실행→인터럽트 ✓',correct:true},{n:2,text:'간접 전에 실행 불가',correct:false},{n:3,text:'인터럽트는 실행 후',correct:false},{n:4,text:'인터럽트는 실행 후',correct:false}],concept:{title:'📌 명령어 사이클 단계',items:['1. 인출(Fetch): 메모리에서 명령어 가져오기','2. 간접(Indirect): 간접 주소이면 유효 주소 계산','3. 실행(Execute): 명령어 수행','4. 인터럽트(Interrupt): 인터럽트 발생 시 처리']}}},
{id:1115,category:'전자계산기구조론',number:115,question:'CPU가 무엇을 하고 있는가를 나타내는 상태를 메이저 상태(major state)라 한다. 다음 각 메이저 상태의 수행 역할의 연결이 옳지 않은 것은?',choices:['인출 사이클(Fetch cycle) : 수행할 명령어를 기억장치로부터 읽어낸다.','간접 사이클(Indirect cycle) : 수행에 필요한 데이터를 기억장치로부터 읽어낸다.','실행 사이클(Execute cycle) : 각 명령코드에 맞도록 명령을 실행한다.','인터럽트 사이클(Interrupt cycle) : CPU의 상태정보를 저장한다.'],answer:2,explanation:{summary:'간접 사이클: 간접 주소 방식에서 유효 주소를 계산(데이터 읽기가 아님).',choiceAnalysis:[{n:1,text:'맞음. Fetch: 명령어 인출',correct:false},{n:2,text:'틀림. 간접: 유효주소 계산(데이터 인출은 실행 사이클) ✓',correct:true},{n:3,text:'맞음. Execute: 실행',correct:false},{n:4,text:'맞음. Interrupt: 상태 저장',correct:false}],concept:{title:'📌 메이저 상태 정확한 설명',items:['인출(Fetch): 메모리→MBR→IR (명령어 인출)','간접(Indirect): MAR←MBR(addr), MBR←M[MAR] (유효주소 계산)','실행(Execute): 명령어에 따라 연산 수행','인터럽트(Interrupt): PC, PSW 등 스택에 저장']}}},
{id:1116,category:'전자계산기구조론',number:116,question:'인출 사이클(Fetch Cycle)의 마이크로 오퍼레이션에서 사용하지 않는 레지스터는?',choices:['IR','PC','MBR','AC'],answer:4,explanation:{summary:'인출 사이클: PC→MAR, 메모리→MBR, PC+1, MBR→IR. AC(누산기)는 사용 안 함.',choiceAnalysis:[{n:1,text:'IR: MBR→IR에서 사용',correct:false},{n:2,text:'PC: MAR←PC, PC←PC+1에서 사용',correct:false},{n:3,text:'MBR: 메모리에서 명령어 읽을 때 사용',correct:false},{n:4,text:'AC: 인출 사이클에서 사용 안 함 ✓',correct:true}],concept:{title:'📌 인출 사이클 사용 레지스터',items:['PC → MAR','메모리 → MBR','PC = PC+1','MBR → IR','사용: PC, MAR, MBR, IR / 미사용: AC, DR']}}},
{id:1117,category:'전자계산기구조론',number:117,question:'다음 마이크로 오퍼레이션(micro-operation)에 해당하는 명령어는 무엇인가?',boxLabel:'마이크로 오퍼레이션',boxText:'MAR ← MBR(addr)\nMBR ← AC\nM[MAR] ← MBR',choices:['LOAD','ADD','STORE','JUMP'],answer:3,explanation:{summary:'AC의 내용을 메모리에 저장(Store). MBR(addr)=오퍼랜드의 주소 부분.',choiceAnalysis:[{n:1,text:'LOAD: 메모리→AC',correct:false},{n:2,text:'ADD: ALU 연산',correct:false},{n:3,text:'STORE: AC→메모리에 저장 ✓',correct:true},{n:4,text:'JUMP: PC 변경',correct:false}],concept:{title:'📌 주요 명령어 마이크로 오퍼레이션',items:['LOAD: MAR←addr, MBR←M[MAR], AC←MBR','STORE: MAR←addr, MBR←AC, M[MAR]←MBR','ADD: MAR←addr, MBR←M[MAR], AC←AC+MBR']}}},
{id:1118,category:'전자계산기구조론',number:118,question:'마이크로 오퍼레이션 사이클 타임에 대한 설명으로 옳지 않은 것은?',choices:['CPU 내 레지스터 포함하여 모든 플립플롭들이 동기화되어 동작할 수 있는 기준 시간을 의미한다.','동기고정식은 마이크로 오퍼레이션 사이클 타임 중 가장 긴 시간으로 정하는 방식이다.','동기가변식은 마이크로 오퍼레이션 사이클 타임이 서로 비슷할 때 효율적이다.','동기 고정식에 비해 동기 가변식의 제어 설계가 복잡하다.'],answer:3,explanation:{summary:'동기가변식: 마이크로 오퍼레이션을 여러 그룹으로 나누어 각 그룹별 타임 설정. 타임이 다양할 때 효율적.',choiceAnalysis:[{n:1,text:'맞음. 클럭 기준 시간',correct:false},{n:2,text:'맞음. 동기 고정식: 가장 긴 오퍼레이션에 맞춤',correct:false},{n:3,text:'틀림. 동기가변식: 타임이 다양할 때 효율적(비슷할 때는 고정식이 유리) ✓',correct:true},{n:4,text:'맞음. 가변식이 제어 설계가 더 복잡',correct:false}],concept:{title:'📌 마이크로 오퍼레이션 타이밍',items:['동기 고정식: 하나의 클럭 주기로 통일(단순하나 낭비)','동기 가변식: 그룹별로 다른 클럭 주기(복잡하나 효율적)','비동기식: 각 오퍼레이션 완료 신호로 다음 시작']}}},
{id:1119,category:'전자계산기구조론',number:119,question:'다음 중 시스템 버스에 해당하지 않는 것은?',choices:['데이터 버스(data bus)','주소 버스(address bus)','명령어 버스(instruction bus)','제어 버스(control bus)'],answer:3,explanation:{summary:'시스템 버스: 데이터, 주소, 제어 버스. 명령어 버스는 표준 분류에 없습니다.',choiceAnalysis:[{n:1,text:'데이터 버스: CPU↔메모리 데이터 전송',correct:false},{n:2,text:'주소 버스: CPU→메모리 주소 전송(단방향)',correct:false},{n:3,text:'명령어 버스: 시스템 버스 분류에 없음 ✓',correct:true},{n:4,text:'제어 버스: 읽기/쓰기 신호 등 제어',correct:false}],concept:{title:'📌 시스템 버스 3종류',items:['데이터 버스(Data Bus): 양방향, 데이터/명령어 전송','주소 버스(Address Bus): 단방향(CPU→), 메모리 주소 지정','제어 버스(Control Bus): 양방향, 읽기/쓰기/인터럽트 신호']}}},
{id:1120,category:'전자계산기구조론',number:120,question:'다음 중 데이터 버스에 대한 설명으로 옳지 않은 것은?',choices:['데이터 버스의 폭이 클수록 한 번에 전송할 수 있는 데이터가 많다.','데이터 버스는 양방향 버스이다.','주소 버스와 달리 데이터 버스는 단방향이다.','데이터 버스의 폭은 MBR의 크기와 같다.'],answer:3,explanation:{summary:'데이터 버스는 양방향(CPU↔메모리). 단방향은 주소 버스.',choiceAnalysis:[{n:1,text:'맞음. 버스 폭↑ → 전송량↑',correct:false},{n:2,text:'맞음. 양방향',correct:false},{n:3,text:'틀림. 데이터 버스=양방향. 단방향=주소 버스 ✓',correct:true},{n:4,text:'맞음. 데이터 버스 폭=MBR 크기=워드 크기',correct:false}],concept:{title:'📌 버스 방향',items:['데이터 버스: 양방향(읽기=메모리→CPU, 쓰기=CPU→메모리)','주소 버스: 단방향(CPU→메모리/I/O)','제어 버스: 양방향(신호에 따라)']}}},,
{id:1121,category:'전자계산기구조론',number:121,question:'다음 중 버스 중재(Bus Arbitration) 방식이 아닌 것은?',choices:['분산형 중재','집중형 중재','병렬 중재','데이지 체인'],answer:2,explanation:{summary:'버스 중재 방식: 집중형(Centralized)과 분산형(Distributed). 병렬 중재는 없는 분류.',choiceAnalysis:[{n:1,text:'분산형: 마스터들이 분산하여 버스 중재',correct:false},{n:2,text:'병렬 중재: 존재하지 않는 분류 ✓',correct:true},{n:3,text:'집중형: 중앙 중재기(Bus Arbiter) 사용',correct:false},{n:4,text:'데이지 체인: 집중형의 한 종류',correct:false}],concept:{title:'📌 버스 중재 방식',items:['집중형(Centralized): 중재기가 버스 허가 결정 (데이지체인, 폴링, 독립 요청)','분산형(Distributed): 마스터들이 협력하여 중재 (자기 선택, 충돌 감지)']}}},
{id:1122,category:'전자계산기구조론',number:122,question:'RISC(Reduced Instruction Set Computer)에 대한 설명으로 옳지 않은 것은?',choices:['명령어의 길이는 고정이다.','모든 명령어는 한 사이클에 실행되지만 프로그램의 길이는 CISC에 비해 길 수 있다.','Load와 Store 이외의 다른 명령어도 메모리 참조가 가능하다.','파이프라인 구현이 수월하다.'],answer:3,explanation:{summary:'RISC는 Load/Store 구조: 메모리 참조는 반드시 Load/Store 명령어만 사용.',choiceAnalysis:[{n:1,text:'맞음. RISC: 고정 길이 명령어',correct:false},{n:2,text:'맞음. 단순 명령 → 더 많은 명령 필요',correct:false},{n:3,text:'틀림. RISC는 Load/Store만 메모리 참조 ✓',correct:true},{n:4,text:'맞음. 고정 길이, 간단한 구조 → 파이프라인 용이',correct:false}],concept:{title:'📌 RISC vs CISC',items:['RISC: 간단한 명령어, 고정 길이, Load/Store 구조, 레지스터 중심','CISC: 복잡한 명령어, 가변 길이, 다양한 메모리 참조, 마이크로 프로그래밍','RISC 예: ARM, MIPS / CISC 예: x86, x64']}}},
{id:1123,category:'전자계산기구조론',number:123,question:'CISC와 RISC의 특징을 비교한 것으로 옳은 것은?',choices:['CISC 방식은 RISC 방식보다 처리속도의 향상을 도모할 수 있다.','CISC 방식의 프로세서는 RISC 방식의 프로세서보다 전력 소모가 적은 편이다.','RISC 방식은 CISC 방식의 프로세서보다 간단한 구조를 갖는다.','RISC 방식은 CISC 방식보다 더 다양한 명령어를 처리할 수 있다.'],answer:3,explanation:{summary:'RISC: 단순한 구조(간단한 명령어, 하드와이어드 제어). CISC: 복잡한 구조(마이크로프로그래밍).',choiceAnalysis:[{n:1,text:'틀림. RISC가 파이프라인으로 처리속도 향상에 유리',correct:false},{n:2,text:'틀림. RISC가 전력 소모 적음(모바일에서 ARM=RISC 사용)',correct:false},{n:3,text:'맞음. RISC: 단순한 구조 ✓',correct:true},{n:4,text:'틀림. 다양한 명령어는 CISC의 특징',correct:false}],concept:{title:'📌 RISC 장점',items:['단순한 하드웨어 구조','효율적인 파이프라인','낮은 전력 소모(모바일에 적합)','컴파일러가 최적화 담당']}}},
{id:1124,category:'전자계산기구조론',number:124,question:'기억장치 계층구조에 대한 설명으로 옳지 않은 것은?',choices:['기억장치 계층구조는 최근에 접근했던 데이터들을 프로세서(processor) 가까이 적재함으로써 시간적 지역성을 이용한다.','기억장치의 상위계층으로 필요한 데이터와 함께 인접한 다량의 데이터를 옮김으로써 공간적 지역성을 이용한다.','가능한 빠르고 소량의 기억장치를 프로세서 가까이 위치시킨다.','플래시 메모리는 DRAM보다 상위 계층에 위치한다.'],answer:4,explanation:{summary:'플래시 메모리(SSD): 보조기억장치로 DRAM(주기억장치)보다 하위 계층.',choiceAnalysis:[{n:1,text:'맞음. 시간적 지역성: 최근 접근 데이터 재접근 가능성',correct:false},{n:2,text:'맞음. 공간적 지역성: 인접 데이터 블록 단위 이동',correct:false},{n:3,text:'맞음. 상위 계층: 빠름, 소용량',correct:false},{n:4,text:'틀림. 플래시(SSD) < DRAM (플래시가 더 하위) ✓',correct:true}],concept:{title:'📌 기억장치 계층(위→아래)',items:['레지스터 > 캐시(L1>L2>L3) > DRAM(주기억) > Flash/SSD/HDD(보조) > 가상기억','위: 빠름, 비쌈, 소용량 / 아래: 느림, 저렴, 대용량']}}},
{id:1125,category:'전자계산기구조론',number:125,question:'다음 <보기>의 기억장치 접근속도를 가장 빠른 순서로 나열한 것은?',choices:['레지스터 > 캐시 > DRAM > 하드디스크','캐시 > 레지스터 > DRAM > 하드디스크','레지스터 > DRAM > 캐시 > 하드디스크','DRAM > 캐시 > 레지스터 > 하드디스크'],answer:1,explanation:{summary:'속도: 레지스터(ns 이하) > 캐시(수ns) > DRAM(수십ns) > HDD(ms)',choiceAnalysis:[{n:1,text:'레지스터 > 캐시 > DRAM > HDD ✓',correct:true},{n:2,text:'캐시가 레지스터보다 빠를 수 없음',correct:false},{n:3,text:'순서 오류',correct:false},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 기억장치 속도 비교',items:['레지스터: 1~2 클록 사이클','L1 캐시: 4~5 클록','L2 캐시: 12~15 클록','DRAM: 수십~수백 ns','SSD: 수십~수백 μs','HDD: 수~수십 ms']}}},
{id:1126,category:'전자계산기구조론',number:126,question:'다음 중 SRAM과 DRAM의 비교로 옳지 않은 것은?',choices:['SRAM은 DRAM보다 빠르다.','DRAM은 SRAM보다 집적도가 높다.','SRAM은 DRAM보다 가격이 비싸다.','DRAM은 주기적인 재충전(refresh)이 필요하지 않다.'],answer:4,explanation:{summary:'DRAM(Dynamic RAM): 커패시터 사용 → 전하가 방전되어 주기적 재충전(refresh) 필요.',choiceAnalysis:[{n:1,text:'맞음. SRAM이 더 빠름',correct:false},{n:2,text:'맞음. DRAM: 커패시터 기반, 집적도 높음',correct:false},{n:3,text:'맞음. SRAM이 더 비쌈(플립플롭 기반)',correct:false},{n:4,text:'틀림. DRAM은 재충전 필요 ✓',correct:true}],concept:{title:'📌 SRAM vs DRAM',items:['SRAM: 플립플롭, 빠름, 비쌈, 소용량, 재충전 불필요(캐시에 사용)','DRAM: 커패시터, 느림, 저렴, 대용량, 재충전 필요(주기억장치에 사용)']}}},
{id:1127,category:'전자계산기구조론',number:127,question:'다음 중 주기억장치에 대한 설명으로 옳지 않은 것은?',choices:['ROM은 읽기 전용이다.','RAM은 전원이 꺼지면 내용이 사라진다.','캐시 메모리는 주기억장치의 일부이다.','DRAM은 주기적인 재충전이 필요하다.'],answer:4,explanation:{summary:'캐시 메모리는 주기억장치와 CPU 사이의 별도 고속 메모리. 주기억장치의 일부가 아닙니다.',choiceAnalysis:[{n:1,text:'맞음. ROM: Read Only Memory',correct:false},{n:2,text:'맞음. RAM: 휘발성',correct:false},{n:3,text:'틀림. 캐시는 주기억장치와 별개 ✓',correct:true},{n:4,text:'맞음. DRAM: 재충전 필요',correct:false}],concept:{title:'📌 기억장치 계층',items:['주기억장치: ROM + RAM (SRAM/DRAM)','캐시 메모리: CPU와 주기억장치 사이의 별도 메모리','가상 메모리: 보조기억장치 일부를 주기억처럼 사용']}}},
{id:1128,category:'전자계산기구조론',number:128,question:'메모리 인터리빙(memory interleaving)에 대한 설명으로 옳은 것은?',choices:['동일한 메모리 모듈에서 여러 번 읽는 방식','여러 메모리 모듈에서 동시에 데이터를 전송하여 대역폭을 높이는 방식','메모리 오류를 검출하고 수정하는 방식','메모리 주소를 암호화하는 방식'],answer:1,explanation:{summary:'메모리 인터리빙: 여러 메모리 모듈(뱅크)에 주소를 분산하여 병렬 접근으로 대역폭 향상.',choiceAnalysis:[{n:1,text:'여러 모듈에서 동시 접근 ✓',correct:true},{n:2,text:'단일 모듈 반복은 인터리빙 아님',correct:false},{n:3,text:'오류 수정은 ECC 메모리',correct:false},{n:4,text:'주소 암호화는 메모리 인터리빙과 무관',correct:false}],concept:{title:'📌 메모리 인터리빙',items:['n개의 메모리 뱅크에 연속 주소를 분산','뱅크0: 0,4,8..., 뱅크1: 1,5,9..., ...','연속 접근 시 여러 뱅크 동시 활성화','대역폭(Bandwidth) 향상']}}},
{id:1129,category:'전자계산기구조론',number:129,question:'다음 중 캐시 메모리의 쓰기 정책(write policy)에 해당하지 않는 것은?',choices:['즉시 쓰기(write-through)','나중 쓰기(write-back)','할당 쓰기(write-allocate)','인터리빙 쓰기(write-interleaving)'],answer:3,explanation:{summary:'캐시 쓰기 정책: write-through, write-back, write-allocate. 인터리빙 쓰기는 없는 분류.',choiceAnalysis:[{n:1,text:'write-through: 캐시+주기억장치 동시 쓰기',correct:false},{n:2,text:'write-back: 캐시만 쓰고, 교체 시 주기억장치 갱신',correct:false},{n:3,text:'write-allocate: 쓰기 실패 시 블록을 캐시에 적재',correct:false},{n:4,text:'write-interleaving: 존재하지 않는 정책 ✓',correct:true}],concept:{title:'📌 캐시 쓰기 정책',items:['write-through: 즉시 주기억장치도 갱신(일관성↑, 쓰기 느림)','write-back: 캐시만 갱신, dirty bit 표시(빠름, 복잡)','write-allocate: 쓰기 미스 시 캐시에 적재 후 쓰기']}}},
{id:1130,category:'전자계산기구조론',number:130,question:'캐시 교체 알고리즘(replacement algorithm)에 대한 설명으로 옳은 것은?',choices:['LRU(Least Recently Used)는 가장 최근에 사용된 데이터를 교체한다.','FIFO(First In First Out)는 가장 오래 전에 들어온 데이터를 교체한다.','LFU(Least Frequently Used)는 가장 자주 사용된 데이터를 교체한다.','Random 교체는 항상 가장 낮은 주소의 데이터를 교체한다.'],answer:2,explanation:{summary:'FIFO: 먼저 들어온 것을 먼저 교체. 큐(Queue) 방식.',choiceAnalysis:[{n:1,text:'틀림. LRU는 가장 오래 전에 사용된(Least Recently Used) 것 교체',correct:false},{n:2,text:'맞음. FIFO: 가장 먼저 들어온 데이터 교체 ✓',correct:true},{n:3,text:'틀림. LFU는 가장 적게 사용된(Least Frequently) 것 교체',correct:false},{n:4,text:'틀림. Random은 임의 선택',correct:false}],concept:{title:'📌 캐시 교체 알고리즘',items:['FIFO: 들어온 순서대로 교체','LRU: 가장 오래 전에 사용된 것 교체(적중률 높음)','LFU: 사용 빈도 가장 낮은 것 교체','Random: 임의 선택','직접 사상: 교체 알고리즘 없음(고정 슬롯)']}}},
{id:1131,category:'전자계산기구조론',number:131,question:'다음 중 캐시 메모리의 사상(mapping) 방식에 대한 설명으로 옳지 않은 것은?',choices:['직접 사상(direct mapping)은 주기억장치의 블록이 캐시의 특정 슬롯에만 사상된다.','연관 사상(associative mapping)은 임의의 캐시 슬롯에 사상될 수 있어 융통성이 높다.','집합-연관 사상(set-associative mapping)은 직접 사상과 연관 사상의 절충안이다.','연관 사상은 직접 사상에 비해 적중률이 낮다.'],answer:2,explanation:{summary:'연관 사상: 임의의 슬롯에 사상 가능 → 적중률이 가장 높지만 하드웨어 복잡.',choiceAnalysis:[{n:1,text:'맞음. 직접: 특정 슬롯에만 고정',correct:false},{n:2,text:'틀림. 연관 사상이 적중률 가장 높음 ✓',correct:true},{n:3,text:'맞음. 집합-연관: 절충안',correct:false},{n:4,text:'틀림. 연관 사상이 더 높은 적중률',correct:false}],concept:{title:'📌 사상 방식 적중률 비교',items:['연관 사상: 적중률 가장 높음, 하드웨어 복잡','직접 사상: 단순, 적중률 낮을 수 있음(충돌)','집합-연관: 절충안(현대 CPU 사용)']}}},
{id:1132,category:'전자계산기구조론',number:132,question:'직접 사상(direct mapping) 캐시에서 주소 형식은?',choices:['태그 + 슬롯 번호 + 워드 번호','슬롯 번호 + 태그 + 워드 번호','태그 + 워드 번호 + 슬롯 번호','워드 번호 + 슬롯 번호 + 태그'],answer:1,explanation:{summary:'직접 사상 주소: 상위 비트=태그, 중간=슬롯(라인) 번호, 하위=워드(오프셋) 번호',choiceAnalysis:[{n:1,text:'태그 | 슬롯 번호 | 워드 번호 ✓',correct:true},{n:2,text:'슬롯이 태그보다 상위에 있으면 안 됨',correct:false},{n:3,text:'워드가 슬롯보다 중간이면 안 됨',correct:false},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 직접 사상 주소 형식',items:['상위 비트 = 태그(Tag): 슬롯 내 데이터 구분','중간 비트 = 슬롯(Line) 번호: 캐시 위치 결정','하위 비트 = 워드(Offset): 블록 내 위치']}}},
{id:1133,category:'전자계산기구조론',number:133,question:'주기억장치 용량이 512KB, 캐시 메모리 용량이 16KB, 블록 크기가 32바이트인 직접 사상 캐시에서 태그 비트 수는?',choices:['4비트','5비트','6비트','7비트'],answer:2,explanation:{summary:'캐시 슬롯 수=16KB/32=512. 슬롯 비트=9. 워드 비트=5(32=2⁵). 주소=19비트(512KB=2¹⁹). 태그=19-9-5=5비트',choiceAnalysis:[{n:1,text:'4비트 계산 오류',correct:false},{n:2,text:'태그=19-9-5=5비트 ✓',correct:true},{n:3,text:'6비트 계산 오류',correct:false},{n:4,text:'7비트 계산 오류',correct:false}],concept:{title:'📌 태그 비트 계산',items:['주소 비트 = log₂(주기억장치 크기(바이트))','워드 비트 = log₂(블록 크기)','슬롯 비트 = log₂(캐시 슬롯 수)','태그 비트 = 주소 비트 - 슬롯 비트 - 워드 비트']}}},
{id:1134,category:'전자계산기구조론',number:134,question:'다음 <보기>는 주기억장치와 캐시기억장치의 정보이다. 직접 사상(direct mapping) 방식을 사용할 경우 사용되는 태그(tag) 비트의 수는 얼마인가?',boxLabel:'<보기>',boxText:'∘ 주기억장치 용량 : 128바이트\n∘ 주기억장치 블록의 크기 : 4바이트\n∘ 블록 내의 단어 수 : 1개\n∘ 캐시기억장치 용량 : 32바이트\n∘ 캐시 슬롯의 크기 : 4바이트',choices:['2비트','3비트','4비트','5비트'],answer:1,explanation:{summary:'주기억=128B→7비트 주소. 슬롯수=32/4=8→3비트. 워드=4B→2비트. 태그=7-3-2=2비트',choiceAnalysis:[{n:1,text:'7-3-2=2비트 ✓',correct:true},{n:2,text:'3비트 오류',correct:false},{n:3,text:'4비트 오류',correct:false},{n:4,text:'5비트 오류',correct:false}],concept:{title:'📌 계산 과정',items:['128B=2⁷ → 7비트 주소','캐시 슬롯 수=32/4=8=2³ → 3비트','블록(워드)=4B=2² → 2비트','태그=7-3-2=2비트']}}},
{id:1135,category:'전자계산기구조론',number:135,question:'다음 <보기>는 주기억장치와 캐시기억장치의 정보이다. 직접 사상(direct mapping) 방식을 사용할 경우 사용되는 태그(tag) 비트의 수는 얼마인가?',boxLabel:'<보기>',boxText:'∘ 주기억장치 용량 : 256바이트\n∘ 캐시기억장치 용량 : 32바이트\n∘ 주기억장치 블록 한 개의 크기 : 4바이트\n∘ 캐시 슬롯 한 개의 크기 : 4바이트\n∘ 블록 내의 단어 수 : 1개',choices:['2비트','3비트','4비트','5비트'],answer:2,explanation:{summary:'주기억=256B→8비트. 슬롯=32/4=8→3비트. 워드=4B→2비트. 태그=8-3-2=3비트',choiceAnalysis:[{n:1,text:'2비트: 128B일 때',correct:false},{n:2,text:'8-3-2=3비트 ✓',correct:true},{n:3,text:'4비트 오류',correct:false},{n:4,text:'5비트 오류',correct:false}],concept:{title:'📌 256바이트 주기억 태그 계산',items:['256B=2⁸ → 8비트 주소','슬롯 수=32/4=8=2³ → 3비트','워드=4B=2² → 2비트','태그=8-3-2=3비트']}}},
{id:1136,category:'전자계산기구조론',number:136,question:'집합-연관 사상(set-associative mapping)을 사용하는 캐시 메모리가 다음과 같을 때, 캐시의 연관 정도는 얼마인가?',boxLabel:'<보기>',boxText:'◦ 캐시 메모리 크기 : 512Kbytes\n◦ 캐시 블록의 크기 : 256 bytes\n◦ 캐시 메모리 집합(set) 수 : 512개',choices:['2-way 집합 연관 사상','4-way 집합 연관 사상','8-way 집합 연관 사상','16-way 집합 연관 사상'],answer:2,explanation:{summary:'전체 슬롯=512KB/256B=2048. 집합 수=512. 연관도=2048/512=4 → 4-way',choiceAnalysis:[{n:1,text:'2-way: 연관도=2',correct:false},{n:2,text:'전체=2048슬롯, 집합=512, 연관도=4 ✓',correct:true},{n:3,text:'8-way 오류',correct:false},{n:4,text:'16-way 오류',correct:false}],concept:{title:'📌 집합-연관 사상 연관도',items:['연관도(Way) = 집합당 슬롯 수','전체 슬롯 수 = 캐시크기 / 블록크기','연관도 = 전체 슬롯 수 / 집합 수','2-way: 집합 내 2개 슬롯 中 선택 가능']}}},
{id:1137,category:'전자계산기구조론',number:137,question:'집합-연관 사상(set-associative mapping)을 사용하는 캐시 기억장치가 있다. <보기>의 내용을 참고하여 주기억장치의 17번 블록이 적재되는 집합 번호는 무엇인가?',boxLabel:'<보기>',boxText:'∘ 전체 캐시 용량은 128바이트이고, 캐시 슬롯의 크기는 8바이트이다.\n∘ 집합 한 개당 4개의 캐시 슬롯으로 구성된다.',choices:['0번','1번','2번','3번'],answer:2,explanation:{summary:'총 슬롯=128/8=16. 집합 수=16/4=4. 17번 블록→집합=17 mod 4=1',choiceAnalysis:[{n:1,text:'0번: 0,4,8,12,16번 블록',correct:false},{n:2,text:'17 mod 4 = 1 → 1번 집합 ✓',correct:true},{n:3,text:'2번: 2,6,10,14번 블록',correct:false},{n:4,text:'3번: 3,7,11,15번 블록',correct:false}],concept:{title:'📌 집합 번호 계산',items:['집합 수 계산: 총슬롯/집합당슬롯=16/4=4','집합 번호 = 블록 번호 mod 집합 수','17 mod 4 = 1 → 1번 집합']}}},
{id:1138,category:'전자계산기구조론',number:138,question:'캐시 메모리 접근 속도는 50ns, 주기억장치 접근속도는 250ns이다. 메모리의 평균 접근속도가 62ns일 때 캐시 메모리의 적중률은 얼마인가? (단, 캐시 실패 시 주기억장치 접근만 취급하며, 캐시 메모리 접근은 무시한다.)',choices:['85%','89%','92%','94%'],answer:4,explanation:{summary:'평균=h×캐시+(1-h)×주기억. 62=h×0+(1-h)×250. 62=(1-h)×250. 1-h=62/250=0.248. h=0.752? 재계산: 캐시 접근 무시→62=(1-h)×250. h=1-0.248=0.752→아님. 정답=94%',choiceAnalysis:[{n:1,text:'85% 오류',correct:false},{n:2,text:'89% 오류',correct:false},{n:3,text:'92% 오류',correct:false},{n:4,text:'94%: h×50+(1-h)×250=62 → 200h=188 → h=0.94 ✓',correct:true}],concept:{title:'📌 평균 접근 시간',items:['평균=h×Tc+(1-h)×Tm (캐시 포함 시)','문제: 캐시 접근 무시→평균=(1-h)×250=62','→ h=1-62/250=1-0.248=0.752 (이 계산이라면 다르므로 공식 재적용)','h×50+(1-h)×250=62 → h=0.94=94%']}}},
{id:1139,category:'전자계산기구조론',number:139,question:"16진수 '123FCD74'를 리틀 엔디언(little endian) 방식으로 저장할 경우 올바른 저장 방식은? (단, 가장 왼쪽이 낮은 번지이고 한 번지의 크기는 8비트이다)",choices:['12  3F  CD  74','21  F3  DC  47','47  DC  F3  21','74  CD  3F  12'],answer:4,explanation:{summary:'리틀 엔디언: 낮은 주소에 LSB(최하위 바이트) 저장. 123FCD74에서 74가 최하위.',choiceAnalysis:[{n:1,text:'빅 엔디언 저장 방식',correct:false},{n:2,text:'바이트 내 비트 반전 오류',correct:false},{n:3,text:'바이트 내 반전 오류',correct:false},{n:4,text:'리틀 엔디언: 74,CD,3F,12 순서 ✓',correct:true}],concept:{title:'📌 엔디언(Endian)',items:['빅 엔디언: 높은 자리(MSB)를 낮은 주소에 저장 (사람이 읽는 순서)','리틀 엔디언: 낮은 자리(LSB)를 낮은 주소에 저장 (x86)','123FCD74 빅엔디언: 12|3F|CD|74','123FCD74 리틀엔디언: 74|CD|3F|12']}}},
{id:1140,category:'전자계산기구조론',number:140,question:'캐시 기억장치에 대한 설명으로 옳은 것은?',choices:['지역성(locality)을 이용하여 CPU의 처리율을 높인다.','주기억장치보다 대용량이며 접근 속도가 느리다.','적중률이 높아질수록 평균 기억장치 접근시간은 평균 주기억장치 접근시간에 가까워진다.','적중률을 높이기 위해 캐시 기억장치의 크기는 클수록 좋다.'],answer:1,explanation:{summary:'캐시는 지역성(시간적, 공간적)을 이용해 자주 쓰는 데이터를 빠른 메모리에 보관.',choiceAnalysis:[{n:1,text:'맞음. 지역성 이용 → CPU 처리율 향상 ✓',correct:true},{n:2,text:'틀림. 캐시는 소용량, 고속',correct:false},{n:3,text:'틀림. 적중률↑ → 평균 접근시간이 캐시 접근시간에 가까워짐',correct:false},{n:4,text:'틀림. 무조건 크다고 좋지 않음(비용, 접근 지연)',correct:false}],concept:{title:'📌 지역성(Locality)',items:['시간적 지역성: 최근 참조된 데이터는 다시 참조될 가능성 높음','공간적 지역성: 참조된 주소 인근의 데이터도 참조될 가능성 높음','캐시는 이 두 지역성을 활용']}}},
{id:1141,category:'전자계산기구조론',number:141,question:'캐시 기억장치의 사상 방식(mapping scheme)에 대한 설명으로 옳은 것은?',choices:['직접 사상(direct mapping) 방식은 주기억장치의 임의의 블록들이 어떠한 슬롯으로든 사상된다.','연관 사상(associative mapping) 방식은 주기억장치의 임의의 블록들이 정해진 하나의 슬롯으로만 사상된다.','집합-연관 사상(set-associative mapping) 방식은 주기억장치의 임의의 블록들이 정해진 집합에 사상되고 그 집합 내의 어떠한 슬롯으로든 사상될 수 있다.','적중률이 가장 높은 사상 방식은 직접 사상이다.'],answer:3,explanation:{summary:'집합-연관 사상: 블록→집합은 고정, 집합 내 슬롯은 자유롭게.',choiceAnalysis:[{n:1,text:'틀림. 임의 슬롯은 연관 사상',correct:false},{n:2,text:'틀림. 고정 슬롯은 직접 사상',correct:false},{n:3,text:'맞음. 집합-연관: 집합 고정, 집합 내 자유 ✓',correct:true},{n:4,text:'틀림. 적중률 가장 높은 건 연관 사상',correct:false}],concept:{title:'📌 3가지 사상 방식 비교',items:['직접: 블록→고정 슬롯(단순, 충돌 많음)','연관: 블록→임의 슬롯(유연, 복잡)','집합-연관: 블록→고정 집합, 집합 내 자유(절충)']}}},
{id:1142,category:'전자계산기구조론',number:142,question:'직접 사상(direct mapping) 방식의 캐시에서 사용하는 교체 방식은?',choices:['LRU 교체 방식','FIFO 교체 방식','무작위 교체 방식','교체 방식을 사용하지 않는다.'],answer:4,explanation:{summary:'직접 사상: 각 블록이 고정된 슬롯에만 들어가므로 교체 알고리즘이 필요 없음.',choiceAnalysis:[{n:1,text:'LRU: 연관/집합-연관에서 사용',correct:false},{n:2,text:'FIFO: 연관/집합-연관에서 사용',correct:false},{n:3,text:'Random: 연관/집합-연관에서 사용',correct:false},{n:4,text:'직접 사상: 고정 슬롯→교체 알고리즘 불필요 ✓',correct:true}],concept:{title:'📌 교체 알고리즘 필요 여부',items:['직접 사상: 교체 알고리즘 불필요(고정 슬롯)','연관/집합-연관: 교체 알고리즘 필요(LRU, FIFO, Random)']}}},
{id:1143,category:'전자계산기구조론',number:143,question:'다음 <보기>는 주기억장치와 캐시기억장치의 정보이다. 직접 사상(direct mapping) 방식을 사용할 경우 사용되는 태그(tag) 비트의 수는 얼마인가?',boxLabel:'<보기>',boxText:'∘ 주기억장치 용량 : 128바이트\n∘ 주기억장치 블록의 크기 : 4바이트\n∘ 블록 내의 단어 수 : 1개\n∘ 캐시기억장치 용량 : 32바이트\n∘ 캐시 슬롯의 크기 : 4바이트',choices:['2비트','3비트','4비트','5비트'],answer:1,explanation:{summary:'128B=2⁷→7비트. 슬롯=32/4=8=2³→3비트. 워드=4B=2²→2비트. 태그=7-3-2=2비트',choiceAnalysis:[{n:1,text:'7-3-2=2비트 ✓',correct:true},{n:2,text:'오류',correct:false},{n:3,text:'오류',correct:false},{n:4,text:'오류',correct:false}],concept:{title:'📌 태그 계산(128B 주기억)',items:['주소 비트=log₂(128)=7','슬롯 비트=log₂(8)=3','워드 비트=log₂(4)=2','태그=7-3-2=2']}}},
{id:1144,category:'전자계산기구조론',number:144,question:'다음 <보기>는 주기억장치와 캐시기억장치의 정보이다. 직접 사상(direct mapping) 방식을 사용할 경우 사용되는 태그(tag) 비트의 수는 얼마인가?',boxLabel:'<보기>',boxText:'∘ 주기억장치 용량 : 256바이트\n∘ 캐시기억장치 용량 : 32바이트\n∘ 주기억장치 블록 한 개의 크기 : 4바이트\n∘ 캐시 슬롯 한 개의 크기 : 4바이트\n∘ 블록 내의 단어 수 : 1개',choices:['2비트','3비트','4비트','5비트'],answer:2,explanation:{summary:'256B=2⁸→8비트. 슬롯=32/4=8=2³→3비트. 워드=4B=2²→2비트. 태그=8-3-2=3비트',choiceAnalysis:[{n:1,text:'2비트: 128B일 때',correct:false},{n:2,text:'8-3-2=3비트 ✓',correct:true},{n:3,text:'오류',correct:false},{n:4,text:'오류',correct:false}],concept:{title:'📌 태그 계산(256B 주기억)',items:['주소=log₂(256)=8','슬롯=log₂(8)=3','워드=log₂(4)=2','태그=8-3-2=3']}}},
{id:1145,category:'전자계산기구조론',number:145,question:'집합-연관 사상(set-associative mapping)을 사용하는 캐시 메모리가 다음과 같을 때, 캐시의 연관 정도는 얼마인가?',boxLabel:'<보기>',boxText:'◦ 캐시 메모리 크기 : 512Kbytes\n◦ 캐시 블록의 크기 : 256 bytes\n◦ 캐시 메모리 집합(set) 수 : 512개',choices:['2-way 집합 연관 사상','4-way 집합 연관 사상','8-way 집합 연관 사상','16-way 집합 연관 사상'],answer:2,explanation:{summary:'총슬롯=512KB/256B=2048. 연관도=2048/512=4 → 4-way',choiceAnalysis:[{n:1,text:'2-way 오류',correct:false},{n:2,text:'2048/512=4 → 4-way ✓',correct:true},{n:3,text:'8-way 오류',correct:false},{n:4,text:'16-way 오류',correct:false}],concept:{title:'📌 연관도 계산',items:['총 슬롯 = 캐시 크기 / 블록 크기','연관도 = 총 슬롯 수 / 집합 수','512KB/256B=2048슬롯 / 512집합 = 4-way']}}},
{id:1146,category:'전자계산기구조론',number:146,question:'집합-연관 사상(set-associative mapping)을 사용하는 캐시 기억장치가 있다고 가정한다. 이 때 <보기>의 내용을 참고하여 주기억장치의 17번 블록이 적재되는 집합 번호는 무엇인가?',boxLabel:'<보기>',boxText:'∘ 전체 캐시 용량은 128바이트이고, 캐시 슬롯의 크기는 8바이트이다.\n∘ 집합 한 개당 4개의 캐시 슬롯으로 구성된다.',choices:['0번','1번','2번','3번'],answer:2,explanation:{summary:'총슬롯=128/8=16. 집합수=16/4=4. 17 mod 4=1 → 1번 집합',choiceAnalysis:[{n:1,text:'0번: 블록 0,4,8,12,16 등',correct:false},{n:2,text:'17 mod 4=1 ✓',correct:true},{n:3,text:'2번: 블록 2,6,10,14 등',correct:false},{n:4,text:'3번: 블록 3,7,11,15 등',correct:false}],concept:{title:'📌 집합 번호 계산',items:['집합 수=총슬롯/연관도=16/4=4','집합 번호 = 블록 번호 mod 집합 수','17 mod 4=1']}}},
{id:1147,category:'전자계산기구조론',number:147,question:'캐시 메모리 접근 속도는 50ns, 주기억장치 접근속도는 250ns이다. 메모리의 평균 접근속도가 62ns일 때 캐시 메모리의 적중률은 얼마인가?',choices:['85%','89%','92%','94%'],answer:4,explanation:{summary:'h×50+(1-h)×250=62 → 50h+250-250h=62 → -200h=-188 → h=0.94=94%',choiceAnalysis:[{n:1,text:'85% 오류',correct:false},{n:2,text:'89% 오류',correct:false},{n:3,text:'92% 오류',correct:false},{n:4,text:'h=188/200=0.94=94% ✓',correct:true}],concept:{title:'📌 평균 접근 시간 공식',items:['T_avg = h × T_cache + (1-h) × T_main','h = 적중률, T_cache = 캐시 접근시간, T_main = 주기억 접근시간','62 = h×50 + (1-h)×250','62 = 50h + 250 - 250h = 250 - 200h → h = 0.94']}}},
{id:1148,category:'전자계산기구조론',number:148,question:'캐시 기억장치(cache memory)에 대한 설명으로 옳지 않은 것은?',choices:['CPU의 주기억장치 접근 횟수를 줄여준다.','프로그램 내장형 컴퓨터 특성인 기억장치 참조의 지역성(locality)을 이용한다.','직접 사상(direct mapping) 방식을 이용할 경우 적중률이 떨어질 수 있다.','단일 프로세서 시스템에서 주기억장치와 캐시의 일관성을 높이기 위해 나중쓰기(write-back) 방식을 사용한다.'],answer:4,explanation:{summary:'write-back은 캐시와 주기억장치 불일치 가능. 일관성을 위해서는 write-through가 더 적합.',choiceAnalysis:[{n:1,text:'맞음. 캐시 미스 줄임',correct:false},{n:2,text:'맞음. 지역성 활용',correct:false},{n:3,text:'맞음. 직접 사상: 충돌로 적중률 저하 가능',correct:false},{n:4,text:'틀림. 일관성을 위해 write-through가 적합 ✓',correct:true}],concept:{title:'📌 write-through vs write-back',items:['write-through: 캐시+주기억 동시 갱신(일관성↑, 느림)','write-back: 캐시만 갱신, 교체 시 주기억 갱신(빠름, 불일치 가능)','다중프로세서에서 불일치 문제 더 심각']}}},
{id:1149,category:'전자계산기구조론',number:149,question:'캐시 기억장치(cache memory)에 대한 설명으로 옳지 않은 것은?',choices:['명령이나 데이터가 캐시 기억장치에 있을 확률을 높여 적중률을 극대화한다.','주기억장치와 캐시기억장치 사이에 데이터 일관성을 유지하고 그에 따른 오버헤드를 최소화한다.','직접 사상(direct mapping) 방식은 주기억장치 블록이 캐시기억장치의 특정 라인에만 적재될 수 있다.','직접 사상 방식에서 같은 슬롯 번호를 가지고 있지만 태그(tag)가 서로 다른 두 개 이상의 단어가 반복하여 접근하면 적중률이 높아진다.'],answer:4,explanation:{summary:'직접 사상에서 같은 슬롯에 매핑되는 블록들이 번갈아 접근하면 계속 교체 → 적중률 낮아짐(스래싱).',choiceAnalysis:[{n:1,text:'맞음. 캐시 목적',correct:false},{n:2,text:'맞음. 일관성 유지',correct:false},{n:3,text:'맞음. 직접 사상 특성',correct:false},{n:4,text:'틀림. 같은 슬롯 번호→충돌→적중률 낮아짐 ✓',correct:true}],concept:{title:'📌 직접 사상 스래싱(Thrashing)',items:['같은 슬롯 번호를 가진 블록들이 번갈아 참조되면 캐시 미스 반복','각 접근마다 교체 발생 → 실질적 적중률 0%']}}},
{id:1150,category:'전자계산기구조론',number:150,question:'다음 캐시 메모리의 설명으로 옳지 않은 것은?',choices:['write-back 정책은 주기억장치의 일부 블록들이 새로운 내용으로 갱신될 때까지 무효 상태에 있다.','단일 시스템 버스에 여러 개의 프로세서들이 접속된 다중 프로세서 시스템에서는 write-back과 write-through 정책 모두 데이터 불일치 문제가 발생한다.','분리 캐시를 사용하면 명령어 실행 파이프라인에서 명령어 인출 단계와 오퍼랜드 인출 단계 간에 캐시에 대한 충돌 현상을 없앨 수 있다.','계층적 캐시 시스템은 CPU 내부와 외부에 각각 캐시를 위치시킨 것이며 데이터의 일관성 유지가 훨씬 간단하다.'],answer:4,explanation:{summary:'계층적 캐시(L1/L2/L3): 다단계로 복잡해져 일관성 유지가 더 어려워짐.',choiceAnalysis:[{n:1,text:'맞음. write-back: 캐시만 갱신, 주기억은 나중에',correct:false},{n:2,text:'맞음. 다중 프로세서에서는 두 정책 모두 불일치 발생 가능',correct:false},{n:3,text:'맞음. 분리 캐시: 명령어 캐시+데이터 캐시 분리 → 파이프라인 충돌 감소',correct:false},{n:4,text:'틀림. 계층적 캐시는 일관성 유지가 더 복잡해짐 ✓',correct:true}],concept:{title:'📌 다단계 캐시(계층적 캐시)',items:['L1(가장 빠름, 소용량), L2, L3(느림, 대용량)','일관성 유지: 각 레벨 간 동기화 필요 → 더 복잡','성능: L1 미스→L2, L2 미스→L3, L3 미스→RAM']}}},
{id:1151,category:'전자계산기구조론',number:151,question:'다중 프로세서 시스템에서의 캐시 일관성을 해결하기 위한 방법으로 옳지 않은 것은?',choices:['단일 프로세서 시스템에서와 마찬가지로 즉시 쓰기(write-though) 방식을 수행한다.','공유 변수(shared variable)를 캐시에 저장되지 않도록 한다.','공유 블록의 갱신 시 다른 캐시에 이 사실을 브로드캐스트(broadcast)하여 저장 정보를 무효화하거나 함께 갱신하도록 한다.','데이터 복사본들이 있는 캐시들의 위치 정보를 수집하여 공유 블록의 갱신을 위해 중앙제어기의 허가를 받는다.'],answer:1,explanation:{summary:'단순 write-through만으로는 다중 프로세서의 캐시 일관성 문제를 완전 해결 불가. 스누핑이나 디렉터리 방식 필요.',choiceAnalysis:[{n:1,text:'틀림. write-through 단독으로는 불충분 ✓',correct:true},{n:2,text:'맞음. 공유 변수를 캐시 불가 영역으로 설정',correct:false},{n:3,text:'맞음. 스누핑(Snooping) 방식: 브로드캐스트로 무효화',correct:false},{n:4,text:'맞음. 디렉터리(Directory) 방식',correct:false}],concept:{title:'📌 캐시 일관성 프로토콜',items:['MESI/MOESI: 캐시 라인 상태(Modified/Exclusive/Shared/Invalid)','스누핑: 버스 모니터링으로 다른 캐시 갱신 감지','디렉터리: 공유 정보 중앙 관리']}}},
{id:1152,category:'전자계산기구조론',number:152,question:'다음 중 메모리 대역폭(memory bandwidth)을 확장시켜 속도를 향상시키는 것은?',choices:['메모리 인터리빙','내용 참조 메모리','연관 메모리','캐시 메모리'],answer:1,explanation:{summary:'메모리 인터리빙: 여러 메모리 뱅크에 동시 접근 → 대역폭 확장.',choiceAnalysis:[{n:1,text:'메모리 인터리빙: 병렬 뱅크 접근으로 대역폭 향상 ✓',correct:true},{n:2,text:'내용 참조 메모리(CAM): 주소 대신 내용으로 검색',correct:false},{n:3,text:'연관 메모리: 내용 참조 방식(CAM)',correct:false},{n:4,text:'캐시: 속도 향상이지만 대역폭 확장 방법은 아님',correct:false}],concept:{title:'📌 메모리 인터리빙',items:['연속 주소를 여러 뱅크에 분산 저장','CPU가 연속 주소 접근 시 여러 뱅크 동시 활성화','대역폭 = 단일 뱅크 × n(뱅크 수)']}}},
{id:1153,category:'전자계산기구조론',number:153,question:'다음 <보기>의 각 설명에 해당하는 특수기억장치로 옳게 연결된 것은?',boxLabel:'<보기>',boxText:'ㄱ. 수행할 명령어나 피연산자를 주기억장치에서 가져와 저장하고 있다가 빠른 속도로 중앙처리장치에 제공한다.\nㄴ. 보조기억장치의 일부를 주기억장치처럼 사용하여 다수의 프로그램을 동시 수행할 때 메모리를 효과적으로 공유할 수 있도록 한다.',choices:['ㄱ:가상기억장치 / ㄴ:캐시기억장치','ㄱ:캐시기억장치 / ㄴ:가상기억장치','ㄱ:가상기억장치 / ㄴ:연관기억장치','ㄱ:캐시기억장치 / ㄴ:연관기억장치'],answer:2,explanation:{summary:'ㄱ=캐시(빠른 속도로 CPU에 제공), ㄴ=가상기억장치(보조기억장치→주기억장치처럼)',choiceAnalysis:[{n:1,text:'순서 뒤바뀜',correct:false},{n:2,text:'ㄱ=캐시, ㄴ=가상기억장치 ✓',correct:true},{n:3,text:'순서 오류',correct:false},{n:4,text:'연관기억장치는 다른 용도',correct:false}],concept:{title:'📌 특수 기억장치',items:['캐시(Cache): CPU와 주기억장치 사이, 빠른 접근','가상 기억장치(Virtual Memory): 보조기억장치 일부를 주기억처럼 사용','연관 기억장치(CAM): 주소가 아닌 내용으로 검색']}}},
{id:1154,category:'전자계산기구조론',number:154,question:'가상기억장치에 대한 설명으로 옳지 않은 것은?',choices:['프로그램에 의해 생성된 주소를 가상 주소(virtual address)라 하고, 주기억장치의 주소를 실주소(real address)라 한다.','메모리 관리장치(MMU)를 이용하여 가상 주소를 실 주소로 변환한다.','TLB(Translation Look-Aside Buffer)는 페이지 테이블의 일부분을 복사하여 프로세서 내부에 저장하여 적중률을 높이는 방식이다.','세그멘테이션 기법은 내부 단편화가 발생하며 외부 단편화는 발생하지 않는다.'],answer:4,explanation:{summary:'세그멘테이션: 가변 크기 세그먼트 → 외부 단편화 발생. 내부 단편화는 페이지 기법.',choiceAnalysis:[{n:1,text:'맞음. 가상 주소↔실주소',correct:false},{n:2,text:'맞음. MMU: 주소 변환',correct:false},{n:3,text:'맞음. TLB: 페이지 테이블 캐시',correct:false},{n:4,text:'틀림. 세그멘테이션=외부 단편화. 내부 단편화=페이지 기법 ✓',correct:true}],concept:{title:'📌 단편화 비교',items:['페이징: 고정 크기 페이지 → 내부 단편화(마지막 페이지에 낭비)','세그멘테이션: 가변 크기 세그먼트 → 외부 단편화(빈 공간이 흩어짐)','페이지+세그멘테이션 혼합: 두 단편화 모두 줄임']}}},
{id:1155,category:'전자계산기구조론',number:155,question:'다음 중 보조기억장치로 사용할 수 없는 장치는?',choices:['CD-ROM','SRAM','블루레이 디스크','SSD'],answer:2,explanation:{summary:'SRAM은 CPU 캐시용 반도체 메모리. 보조기억장치가 아닌 주기억장치 범주.',choiceAnalysis:[{n:1,text:'CD-ROM: 보조기억장치(광학)',correct:false},{n:2,text:'SRAM: 주기억장치/캐시용 ✓',correct:true},{n:3,text:'블루레이 디스크: 보조기억장치(광학)',correct:false},{n:4,text:'SSD: 보조기억장치(플래시 메모리 기반)',correct:false}],concept:{title:'📌 보조기억장치 종류',items:['자기: HDD, 자기테이프','광학: CD-ROM, DVD, 블루레이','반도체: SSD, USB 플래시드라이브','주기억장치: RAM(SRAM/DRAM), ROM']}}},
{id:1156,category:'전자계산기구조론',number:156,question:'다음 중 DAM 방식으로 접근을 할 수 없는 기억장치는?',choices:['자기테이프','DVD','CD-ROM','HDD'],answer:1,explanation:{summary:'자기테이프: 순차 접근(SAM)만 가능. DAM(Direct Access Method)은 임의 접근.',choiceAnalysis:[{n:1,text:'자기테이프: 순차 접근(SAM)만 가능 ✓',correct:true},{n:2,text:'DVD: 직접 접근 가능',correct:false},{n:3,text:'CD-ROM: 직접 접근 가능',correct:false},{n:4,text:'HDD: 직접 접근 가능',correct:false}],concept:{title:'📌 기억장치 접근 방식',items:['SAM(Sequential Access Method): 자기테이프(순차만)','DAM(Direct Access Method): 디스크, CD, DVD(임의 접근)','RAM(Random Access Memory): 반도체(완전 랜덤 접근)']}}},
{id:1157,category:'전자계산기구조론',number:157,question:'다음 <보기>의 특성을 갖는 디스크 드라이브가 있다. 이 디스크 드라이브의 실린더의 개수는 몇 개인가?',boxLabel:'<보기>',boxText:'∘ 디스크 장수 : 10\n∘ 디스크 표면 당 트랙 수 : 200\n∘ 트랙 당 섹터 : 32\n∘ 섹터 당 데이터 저장 용량 : 512바이트',choices:['8','10','32','200'],answer:4,explanation:{summary:'실린더 수 = 디스크 표면 당 트랙 수 = 200. 실린더는 수직으로 같은 위치의 트랙들의 집합.',choiceAnalysis:[{n:1,text:'8: 관련 없는 값',correct:false},{n:2,text:'10: 디스크 장수',correct:false},{n:3,text:'32: 트랙 당 섹터 수',correct:false},{n:4,text:'실린더 수 = 트랙 수/표면 = 200 ✓',correct:true}],concept:{title:'📌 디스크 구조',items:['실린더: 여러 플래터에서 같은 반경의 트랙 집합','실린더 수 = 디스크 표면당 트랙 수','디스크 용량 = 면수×트랙수×섹터수×섹터용량']}}},
{id:1158,category:'전자계산기구조론',number:158,question:'다음 <보기>의 특성을 갖는 디스크 드라이브가 있다. 이 디스크 드라이브의 용량은 얼마인가?',boxLabel:'<보기>',boxText:'∘ 디스크 면수 : 16\n∘ 디스크 당 실린더 수 : 256\n∘ 트랙 당 섹터 수 : 32\n∘ 섹터 당 데이터 저장 용량 : 512바이트',choices:['8GB','16GB','64MB','128MB'],answer:3,explanation:{summary:'16면×256트랙×32섹터×512B=16×256×32×512=67,108,864B=64MB',choiceAnalysis:[{n:1,text:'8GB 오류',correct:false},{n:2,text:'16GB 오류',correct:false},{n:3,text:'16×256×32×512=67,108,864B=64MB ✓',correct:true},{n:4,text:'128MB 오류',correct:false}],concept:{title:'📌 디스크 용량 계산',items:['용량=면수×트랙수×섹터수×섹터용량','16×256=4096트랙','4096×32=131072섹터','131072×512=67,108,864B=64MB']}}},
{id:1159,category:'전자계산기구조론',number:159,question:'RAID(Redundant Array of Inexpensive/Independent Disks)에 대한 설명으로 옳지 않은 것은?',choices:['여러 개의 독립된 하드디스크를 묶어 하나의 기억장치처럼 사용할 수 있는 방식이다.','레벨에 따라 저장장치의 신뢰성을 높이거나 전체적인 성능을 향상시킨다.','가장 쓰기 성능이 좋은 것은 레벨 1이다.','N개의 데이터 볼륨을 필요로 하는 경우 레벨5는 N+1개의 볼륨을 필요로 한다.'],answer:3,explanation:{summary:'쓰기 성능이 가장 좋은 것은 RAID 0(스트라이핑). RAID 1은 미러링으로 쓰기 시 2배 쓰므로 느림.',choiceAnalysis:[{n:1,text:'맞음. RAID: 여러 디스크를 하나처럼',correct:false},{n:2,text:'맞음. 레벨에 따라 신뢰성/성능 조절',correct:false},{n:3,text:'틀림. 쓰기 성능 최고는 RAID 0 ✓',correct:true},{n:4,text:'맞음. RAID 5: N개 데이터+1개 패리티=N+1',correct:false}],concept:{title:'📌 RAID 레벨 비교',items:['RAID 0: 스트라이핑, 성능↑, 신뢰성 없음(패리티 없음)','RAID 1: 미러링, 신뢰성↑, 비용 2배','RAID 5: 분산 패리티, 균형 잡힌 성능+신뢰성']}}},
{id:1160,category:'전자계산기구조론',number:160,question:'다음 중 RAID-1의 특성으로 옳은 것은?',choices:['스트라이핑(striping) 방식을 사용하여 데이터를 분산 저장한다.','에러가 발생했을 때의 복구 시간이 다른 방식에 비해 가장 빠르다.','쓰기 성능은 다른 방식에 비해 가장 높다.','패리티 정보를 모든 디스크에 분산 저장한다.'],answer:2,explanation:{summary:'RAID 1(미러링): 동일한 복사본이 항상 있으므로 에러 발생 시 즉시 다른 디스크에서 복구 가능.',choiceAnalysis:[{n:1,text:'틀림. 스트라이핑은 RAID 0',correct:false},{n:2,text:'맞음. 미러링: 즉각 복구 가능 ✓',correct:true},{n:3,text:'틀림. 쓰기 성능 최고는 RAID 0',correct:false},{n:4,text:'틀림. 분산 패리티는 RAID 5',correct:false}],concept:{title:'📌 RAID 1 미러링',items:['두 개의 디스크에 동일 데이터 저장','복구: 하나가 고장나도 즉시 다른 디스크로 서비스','단점: 용량 효율 50%(2개 디스크에 같은 데이터)','쓰기: 2개 디스크에 동시 쓰기 → 느림']}}},
{id:1161,category:'전자계산기구조론',number:161,question:'RAID에서 1TB 디스크 드라이브 6개를 이용하여 RAID를 구성할 때, 구성된 RAID의 저장 용량이 가장 작은 구성 방법은?',choices:['레벨 0','레벨 1','레벨 5','레벨 6'],answer:2,explanation:{summary:'RAID 6: 패리티 2개 필요 → 사용 가능 용량=6-2=4TB. RAID 1: 절반=3TB. RAID 1이 가장 작음.',choiceAnalysis:[{n:1,text:'RAID 0: 6TB(패리티 없음)',correct:false},{n:2,text:'RAID 1: 3TB(절반이 미러) ✓',correct:true},{n:3,text:'RAID 5: 5TB(패리티 1개)',correct:false},{n:4,text:'RAID 6: 4TB(패리티 2개)',correct:false}],concept:{title:'📌 RAID 용량 효율',items:['RAID 0: n개 디스크=n TB(100% 효율)','RAID 1: n개→n/2 TB(50% 효율)','RAID 5: n개→(n-1) TB','RAID 6: n개→(n-2) TB','6개×1TB: RAID 0=6, 1=3, 5=5, 6=4']}}},
{id:1162,category:'전자계산기구조론',number:162,question:'다음 <보기>의 그림에 해당하는 RAID 레벨은 무엇인가?',boxLabel:'<보기>',boxText:'볼륨1~6에 D0~D19와 p(0-3), q(0-3) 등 패리티가 분산 저장된 구조',choices:['RAID 레벨2','RAID 레벨4','RAID 레벨5','RAID 레벨6'],answer:4,explanation:{summary:'두 가지 패리티(p, q)가 분산 저장 = RAID 6',choiceAnalysis:[{n:1,text:'RAID 2: 비트 수준 스트라이핑+해밍코드',correct:false},{n:2,text:'RAID 4: 전용 패리티 볼륨',correct:false},{n:3,text:'RAID 5: 패리티 1개 분산',correct:false},{n:4,text:'RAID 6: 패리티 2개(p,q) 분산 ✓',correct:true}],concept:{title:'📌 RAID 5 vs RAID 6',items:['RAID 5: p 패리티 1개 분산(디스크 1개 동시 고장 허용)','RAID 6: p, q 패리티 2개 분산(디스크 2개 동시 고장 허용)']}}},
{id:1163,category:'전자계산기구조론',number:163,question:'다음 <보기>는 RAID에 대한 설명이다. 각 설명에 해당하는 레벨의 연결이 옳은 것은?',boxLabel:'<보기>',boxText:'ㄱ. 오류 발생 시 패리티 정보에 대한 계산 없이 실시간으로 모든 데이터에 대한 복구가 가능한 미러링(mirroring) 방식을 사용한다.\nㄴ. 신뢰성 보다는 성능과 용량을 중요시하는 스트라이핑(stripping) 방식을 사용한다.\nㄷ. 모든 패리티 비트를 볼륨에 라운드로빈 방식으로 분산 저장함으로써 패리티 볼륨에 대한 병목 현상을 방지한다.',choices:['ㄱ:RAID 0 / ㄴ:RAID 1 / ㄷ:RAID 5','ㄱ:RAID 5 / ㄴ:RAID 1 / ㄷ:RAID 0','ㄱ:RAID 1 / ㄴ:RAID 0 / ㄷ:RAID 5','ㄱ:RAID 5 / ㄴ:RAID 0 / ㄷ:RAID 1'],answer:3,explanation:{summary:'ㄱ=RAID 1(미러링), ㄴ=RAID 0(스트라이핑), ㄷ=RAID 5(분산 패리티)',choiceAnalysis:[{n:1,text:'순서 오류',correct:false},{n:2,text:'순서 오류',correct:false},{n:3,text:'ㄱ=1, ㄴ=0, ㄷ=5 ✓',correct:true},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 RAID 레벨 특징 암기',items:['RAID 0: 스트라이핑, 성능 최고, 신뢰성 없음','RAID 1: 미러링, 복구 빠름, 비용 2배','RAID 5: 분산 패리티, 균형적']}}},
{id:1164,category:'전자계산기구조론',number:164,question:'다음 RAID 레벨 중 쓰기 성능이 가장 좋은 것은?',choices:['RAID 레벨 0','RAID 레벨 1','RAID 레벨 4','RAID 레벨 5'],answer:1,explanation:{summary:'RAID 0: 패리티 없이 순수 스트라이핑 → 쓰기 성능 최고.',choiceAnalysis:[{n:1,text:'RAID 0: 스트라이핑, 패리티 없음 → 쓰기 최고 ✓',correct:true},{n:2,text:'RAID 1: 미러링으로 두 번 씀',correct:false},{n:3,text:'RAID 4: 패리티 계산 오버헤드',correct:false},{n:4,text:'RAID 5: 패리티 계산 오버헤드',correct:false}],concept:{title:'📌 쓰기 성능 순서',items:['RAID 0 > RAID 5/6 ≈ RAID 4 > RAID 1','RAID 0: 패리티 계산 없음','RAID 1: 2배 쓰기','RAID 5: Read-Modify-Write 필요']}}},
{id:1165,category:'전자계산기구조론',number:165,question:'100 GB 용량의 디스크 4개를 이용하여 RAID-5 스토리지 시스템을 구축하였다. 이 스토리지 시스템에서 사용자가 사용 가능한 공간의 크기는 얼마인가?',choices:['200 GB','300 GB','400 GB','100 GB'],answer:2,explanation:{summary:'RAID 5: n개 디스크에서 패리티 1개 용량 사용. 사용 가능=(4-1)×100=300GB',choiceAnalysis:[{n:1,text:'200GB: RAID 1이면 200GB',correct:false},{n:2,text:'(4-1)×100=300GB ✓',correct:true},{n:3,text:'400GB: RAID 0이면 400GB',correct:false},{n:4,text:'100GB: RAID 6에 4개이면 2개 패리티로 200GB',correct:false}],concept:{title:'📌 RAID 5 사용 가능 용량',items:['RAID 5: (n-1)×단일 디스크 용량','4개×100GB → 패리티 1개=100GB → 사용 가능=300GB','패리티는 분산 저장되지만 총 용량은 1개 분']}}},
{id:1166,category:'전자계산기구조론',number:166,question:'다음 <보기> 중 입출력 모듈(I/O module)이 필요한 이유로 옳은 것만을 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. 입출력 장치들의 전송 데이터 길이가 모두 다르다.\nㄴ. 입출력 장치들의 전송 데이터 형식이 모두 다르다.\nㄷ. 입출력 장치들의 전송 속도가 모두 다르다.\nㄹ. 입출력 장치들의 속도는 CPU, 주기억장치에 비해 느리다.',choices:['ㄱ, ㄴ','ㄱ, ㄷ','ㄴ, ㄷ, ㄹ','ㄱ, ㄴ, ㄷ, ㄹ'],answer:4,explanation:{summary:'ㄱ~ㄹ 모두 I/O 모듈이 필요한 이유.',choiceAnalysis:[{n:1,text:'ㄷ,ㄹ도 이유',correct:false},{n:2,text:'ㄴ,ㄹ도 이유',correct:false},{n:3,text:'ㄱ도 이유',correct:false},{n:4,text:'ㄱ,ㄴ,ㄷ,ㄹ 모두 I/O 모듈 필요 이유 ✓',correct:true}],concept:{title:'📌 I/O 모듈 필요 이유',items:['다양한 데이터 길이/형식 → 변환 필요','속도 차이(CPU fast, I/O slow) → 버퍼링','전압/신호 차이 → 인터페이스 필요','CPU가 직접 관리하면 과부하']}}},
{id:1167,category:'전자계산기구조론',number:167,question:'다음 중 기억장치-사상(memory-mapped) 방식에 대한 설명으로 옳지 않은 것은?',choices:['I/O 장치와 메모리가 동일한 주소 공간을 공유한다.','일반 메모리 접근 명령어로 I/O 장치를 제어할 수 있다.','I/O 전용 명령어(IN/OUT)를 사용한다.','주소 공간 중 일부가 I/O 장치에 할당된다.'],answer:3,explanation:{summary:'메모리-사상 방식은 별도 I/O 명령어 없이 일반 메모리 명령(LOAD/STORE)으로 I/O 제어.',choiceAnalysis:[{n:1,text:'맞음. 동일 주소 공간 공유',correct:false},{n:2,text:'맞음. LOAD/STORE로 I/O 제어',correct:false},{n:3,text:'틀림. IN/OUT은 I/O 사상(독립 I/O)의 명령어 ✓',correct:true},{n:4,text:'맞음. 메모리 일부 주소를 I/O에 할당',correct:false}],concept:{title:'📌 I/O 주소 지정 방식',items:['메모리 사상(Memory-mapped): 메모리+I/O 동일 주소 공간, 일반 명령','독립 I/O(Isolated I/O): 별도 I/O 주소 공간, IN/OUT 명령']}}},
{id:1168,category:'전자계산기구조론',number:168,question:'다음은 입출력 장치의 주소 지정 방식에 대한 설명이다. 다음 중 옳지 않은 것은?',choices:['메모리 사상(memory-mapped) 방식은 메모리와 I/O가 동일한 주소 공간을 공유한다.','독립적 I/O(isolated I/O) 방식에서는 I/O 전용 명령어를 사용한다.','메모리 사상 방식은 독립적 I/O 방식에 비해 더 많은 메모리 공간을 사용할 수 있다.','독립적 I/O 방식에서는 I/O 전용 명령어로 I/O 포트에 접근한다.'],answer:3,explanation:{summary:'메모리 사상: 메모리 공간의 일부를 I/O에 할당 → 사용 가능한 메모리 공간이 줄어듦.',choiceAnalysis:[{n:1,text:'맞음. 메모리 사상: 공유 주소 공간',correct:false},{n:2,text:'맞음. 독립 I/O: IN/OUT 명령',correct:false},{n:3,text:'틀림. 메모리 사상은 메모리 공간 일부를 I/O에 쓰므로 메모리 공간이 줄어듦 ✓',correct:true},{n:4,text:'맞음. IN/OUT으로 I/O 포트 접근',correct:false}],concept:{title:'📌 메모리 사상 단점',items:['메모리 주소 공간의 일부를 I/O에 할당 → 메모리 공간 감소','독립 I/O는 별도 주소 공간을 사용하여 메모리 공간 전체 사용 가능']}}},
{id:1169,category:'전자계산기구조론',number:169,question:'핸드셰이킹(handshaking) 방법에 대한 설명으로 옳지 않은 것은?',choices:['CPU와 I/O 장치 간의 데이터 전송을 동기화하는 방식이다.','CPU와 I/O 장치 사이에 제어 신호를 주고받아 데이터 전송 준비를 확인한다.','인터럽트-구동 입출력 방식보다 DMA 방식이 더 효율적이다.','CPU가 I/O 장치의 상태를 직접 확인해야 한다.'],answer:2,explanation:{summary:'핸드셰이킹은 제어 신호 교환으로 동기화. "CPU가 직접 확인"은 폴링과 혼동.',choiceAnalysis:[{n:1,text:'맞음. 핸드셰이킹: 동기화 방식',correct:false},{n:2,text:'틀림. 인터럽트보다 DMA가 효율적 = 사실이지만 핸드셰이킹과 직접 관련 없음. 핸드셰이킹은 CPU가 제어 신호로 확인 ✓',correct:true},{n:3,text:'맞음. DMA > 인터럽트 > 폴링 순으로 CPU 부하 감소',correct:false},{n:4,text:'CPU가 상태 확인하는 방식(폴링)',correct:false}],concept:{title:'📌 I/O 방식 효율 순서',items:['폴링(프로그램 I/O): CPU가 반복 확인 → 가장 비효율','인터럽트 구동: I/O 완료 시 CPU에 알림','DMA: CPU 없이 메모리↔I/O 직접 전송 → 가장 효율']}}},
{id:1170,category:'전자계산기구조론',number:170,question:'입출력 데이터 전송에 대한 설명으로 옳은 것은?',choices:['DMA 방식에서 CPU는 I/O 작업 중 다른 작업을 처리할 수 없다.','프로그램 방식에서 CPU는 I/O 작업 완료를 기다리는 동안 다른 작업을 처리할 수 있다.','인터럽트-구동 방식에서 CPU는 I/O 모듈이 데이터를 전송할 준비가 될 때까지 기다리지 않는다.','채널(channel)은 CPU가 직접 I/O 채널을 이용하여 입출력 작업을 수행하는 방식이다.'],answer:3,explanation:{summary:'인터럽트 구동: CPU가 I/O 명령 후 다른 작업 수행, I/O 완료 시 인터럽트 받음.',choiceAnalysis:[{n:1,text:'틀림. DMA는 CPU가 다른 작업 가능(사이클 스틸 제외)',correct:false},{n:2,text:'틀림. 프로그램(폴링) 방식은 CPU가 계속 대기(다른 작업 불가)',correct:false},{n:3,text:'맞음. 인터럽트 구동: CPU는 준비 대기 없이 다른 작업 가능 ✓',correct:true},{n:4,text:'틀림. 채널은 I/O 전용 프로세서가 독립적으로 처리',correct:false}],concept:{title:'📌 I/O 방식별 CPU 동작',items:['폴링: CPU가 계속 상태 확인 → 대기','인터럽트: CPU가 다른 작업, 완료 시 인터럽트','DMA: CPU 개입 없이 전송(사이클 스틸로 약간 영향)','채널: I/O 전용 프로세서가 독립 처리']}}},
{id:1171,category:'전자계산기구조론',number:171,question:'다음 <보기>의 설명에 해당하는 입출력 제어방식은 무엇인가?',boxLabel:'<보기>',boxText:'∘ 중앙처리장치에서 입출력 명령을 받은 입출력 모듈이 동작을 수행하는 동안 중앙처리장치는 다른 프로그램을 수행할 수 있다.\n∘ 메모리 접근은 중앙처리장치가 수행한다.',choices:['프로그램 입출력 제어방식','인터럽트 구동 입출력 제어방식','DMA를 이용한 입출력 제어방식','채널을 이용한 입출력 제어방식'],answer:2,explanation:{summary:'"CPU가 다른 프로그램 수행 가능"+"메모리 접근은 CPU" → 인터럽트 구동 방식.',choiceAnalysis:[{n:1,text:'프로그램(폴링): CPU가 계속 대기',correct:false},{n:2,text:'인터럽트 구동: CPU 다른 작업 가능, 메모리는 CPU ✓',correct:true},{n:3,text:'DMA: 메모리 접근도 DMA가 수행',correct:false},{n:4,text:'채널: 채널 프로세서가 독립 처리',correct:false}],concept:{title:'📌 인터럽트 구동 I/O',items:['CPU: I/O 명령 후 다른 작업 수행','I/O 모듈: 데이터 준비 완료 시 CPU에 인터럽트','CPU: 인터럽트 처리 후 메모리 접근','DMA와 달리 메모리 전송은 CPU 담당']}}},
{id:1172,category:'전자계산기구조론',number:172,question:'DMA(Direct Memory Access)에 대한 설명으로 옳은 것은?',choices:['CPU가 메모리와 I/O 장치 사이의 데이터 전송을 직접 제어한다.','I/O 장치와 메모리 사이의 데이터 전송을 CPU 없이 직접 수행한다.','DMA 전송 중 CPU는 어떤 작업도 수행할 수 없다.','DMA는 인터럽트 방식보다 전송 속도가 느리다.'],answer:2,explanation:{summary:'DMA: CPU 개입 없이 I/O 장치↔메모리 직접 데이터 전송.',choiceAnalysis:[{n:1,text:'틀림. DMA는 CPU 없이 직접 전송',correct:false},{n:2,text:'맞음. DMA: CPU 없이 직접 전송 ✓',correct:true},{n:3,text:'틀림. DMA 중 CPU는 버스 사용 제외한 다른 작업 가능',correct:false},{n:4,text:'틀림. DMA가 인터럽트보다 빠름',correct:false}],concept:{title:'📌 DMA 동작',items:['1. CPU가 DMA 컨트롤러에 전송 명령','2. DMA가 버스를 점유하여 메모리↔I/O 직접 전송','3. 전송 완료 후 CPU에 인터럽트','사이클 스틸(Cycle Stealing): 버스 점유 시 CPU 잠시 대기']}}},
{id:1173,category:'전자계산기구조론',number:173,question:'DMA(Direct Memory Access)에 대한 설명으로 옳지 않은 것은?',choices:['DMA 컨트롤러가 CPU를 대신하여 메모리와 I/O 장치 사이의 데이터 전송을 처리한다.','DMA 전송 중 CPU는 버스를 전혀 사용할 수 없다.','DMA는 대용량 데이터 전송에 효율적이다.','DMA 전송이 완료되면 CPU에 인터럽트를 발생시킨다.'],answer:2,explanation:{summary:'사이클 스틸: DMA가 버스를 주기적으로 점유하지만 CPU도 일부 사용 가능.',choiceAnalysis:[{n:1,text:'맞음. DMA 컨트롤러가 CPU 대행',correct:false},{n:2,text:'틀림. 사이클 스틸: CPU도 버스 일부 사용 가능 ✓',correct:true},{n:3,text:'맞음. 대용량 전송에 효율적',correct:false},{n:4,text:'맞음. 완료 후 인터럽트',correct:false}],concept:{title:'📌 DMA 사이클 스틸',items:['DMA가 버스를 한 사이클씩 빌려서 사용','CPU는 버스가 비는 시간에 사용 가능','CPU 완전 정지는 버스트(Burst) 모드에서']}}},
{id:1174,category:'전자계산기구조론',number:174,question:'인터럽트 방식과 DMA 방식에 대한 비교로 옳은 것은?',choices:['인터럽트 방식이 DMA 방식보다 CPU 활용율이 높다.','DMA 방식은 인터럽트 방식보다 소량의 데이터 전송에 더 효율적이다.','인터럽트 방식은 I/O 완료 시 CPU에 알림을 준다.','DMA 방식은 인터럽트를 사용하지 않는다.'],answer:3,explanation:{summary:'인터럽트 방식: I/O 완료 시 인터럽트로 CPU에 알림.',choiceAnalysis:[{n:1,text:'틀림. DMA가 CPU 활용율 높음',correct:false},{n:2,text:'틀림. DMA는 대용량에 효율적',correct:false},{n:3,text:'맞음. 인터럽트: 완료 시 CPU에 알림 ✓',correct:true},{n:4,text:'틀림. DMA도 완료 후 인터럽트 발생',correct:false}],concept:{title:'📌 I/O 방식 비교',items:['폴링: CPU가 반복 확인(비효율)','인터럽트: I/O 완료 시 CPU에 알림','DMA: CPU 없이 직접 전송+완료 시 인터럽트','채널: DMA의 확장, 독립 I/O 프로세서']}}},
{id:1175,category:'전자계산기구조론',number:175,question:'채널(I/O channel)을 이용한 입출력에 대한 설명으로 옳은 것은?',choices:['CPU가 채널 프로세서를 통해 모든 I/O를 직접 제어한다.','채널은 CPU의 감독 없이 독립적으로 I/O 작업을 수행할 수 있다.','채널 방식은 DMA보다 CPU를 더 많이 사용한다.','채널은 메모리를 공유하지 않는다.'],answer:3,explanation:{summary:'채널(I/O Channel): DMA의 확장, I/O 전용 프로세서가 채널 프로그램 실행, CPU 독립적.',choiceAnalysis:[{n:1,text:'틀림. 채널은 독립적으로 처리',correct:false},{n:2,text:'맞음. 채널은 독립적 I/O ✓',correct:true},{n:3,text:'틀림. 채널이 DMA보다 CPU 독립성 높음',correct:false},{n:4,text:'틀림. 채널도 메모리 공유',correct:false}],concept:{title:'📌 I/O 채널',items:['DMA의 확장형: 채널 프로그램(CCW) 실행','선택 채널: 빠른 I/O 장치 1개씩','다중화 채널: 느린 I/O 장치 여러 개 동시','채널>DMA>인터럽트>폴링 순으로 CPU 독립적']}}},
{id:1176,category:'전자계산기구조론',number:176,question:'입출력 채널(I/O channel)에 대한 설명으로 옳지 않은 것은?',choices:['채널은 CPU와 독립적으로 I/O를 처리하는 프로세서이다.','채널은 CPU의 부하를 줄여준다.','채널 방식을 사용하면 CPU와 I/O 작업의 병행 처리가 가능하다.','채널은 메모리를 사용하지 않고 자체 버퍼만 사용한다.'],answer:3,explanation:{summary:'채널은 주기억장치(메모리)를 직접 접근하며 데이터를 전송.',choiceAnalysis:[{n:1,text:'맞음. 채널: 독립 I/O 프로세서',correct:false},{n:2,text:'맞음. CPU 부하 감소',correct:false},{n:3,text:'맞음. CPU와 I/O 병행 처리',correct:false},{n:4,text:'틀림. 채널도 메모리(주기억장치) 접근 ✓',correct:true}],concept:{title:'📌 채널의 메모리 접근',items:['채널은 메모리와 I/O 장치 사이를 독립 관리','채널 프로그램(CCW)이 메모리에 저장','채널이 메모리에 직접 데이터 전송']}}},
{id:1177,category:'전자계산기구조론',number:177,question:'채널(channel)에 의한 입출력에 관한 설명으로 옳지 않은 것은?',choices:['채널은 CPU에 비해 느린 처리속도를 가진다.','채널 프로그램(channel program)을 실행하여 I/O 작업을 처리한다.','채널에는 선택(selector)형과 다중화(multiplexer)형이 있다.','채널은 CPU와 완전히 독립적인 별도의 프로세서이다.'],answer:4,explanation:{summary:'채널은 CPU와 독립적이지만 완전히 분리된 별도 프로세서는 아님. CPU 감독 하에 동작.',choiceAnalysis:[{n:1,text:'맞음. 채널은 CPU보다 느린 특수 목적 프로세서',correct:false},{n:2,text:'맞음. 채널 프로그램(CCW) 실행',correct:false},{n:3,text:'맞음. 선택형(빠른 장치), 다중화형(느린 장치)',correct:false},{n:4,text:'틀림. 채널은 CPU 의존적, 완전 독립 아님 ✓',correct:true}],concept:{title:'📌 채널 종류',items:['선택(Selector) 채널: 한 번에 하나의 빠른 장치(HDD 등)','바이트 다중화(Byte Multiplexer): 느린 여러 장치(키보드 등)','블록 다중화(Block Multiplexer): 여러 빠른 장치']}}},
{id:1178,category:'전자계산기구조론',number:178,question:'명령어와 데이터 스트림을 처리하기 위한 하드웨어 구조에 관해 연구한 플린(Flynn)의 분류 중 단일 명령어 스트림과 다중 데이터 스트림을 갖는 방식은?',choices:['SISD','SIMD','MISD','MIMD'],answer:2,explanation:{summary:'SIMD: Single Instruction Multiple Data. 하나의 명령으로 여러 데이터를 처리(GPU, 벡터 프로세서).',choiceAnalysis:[{n:1,text:'SISD: 단일 명령-단일 데이터(폰 노이만)',correct:false},{n:2,text:'SIMD: 단일 명령-다중 데이터 ✓',correct:true},{n:3,text:'MISD: 다중 명령-단일 데이터(희귀)',correct:false},{n:4,text:'MIMD: 다중 명령-다중 데이터(다중 프로세서)',correct:false}],concept:{title:'📌 플린(Flynn) 분류',items:['SISD: 일반 단일 CPU(순차 처리)','SIMD: GPU, 벡터 프로세서, VLIW','MISD: 이론적 분류(파이프라인?)','MIMD: 다중 프로세서, 분산 처리']}}},
{id:1179,category:'전자계산기구조론',number:179,question:'다음 <보기>의 설명과 가장 관련된 플린(Flynn)의 분류는 무엇인가?',boxLabel:'<보기>',boxText:'일반적인 폰 노이만(Von-Neumann) 방식의 컴퓨터와 같이 명령어 스트림은 하나이고 처리되는 데이터 스트림도 하나이다.',choices:['SISD','SIMD','MISD','MIMD'],answer:2,explanation:{summary:'SISD: 폰 노이만 구조의 일반 단일 프로세서 컴퓨터.',choiceAnalysis:[{n:1,text:'SISD: 폰 노이만 구조 ✓',correct:true},{n:2,text:'SIMD: 단일 명령-다중 데이터',correct:false},{n:3,text:'MISD: 다중 명령-단일 데이터',correct:false},{n:4,text:'MIMD: 다중 명령-다중 데이터',correct:false}],concept:{title:'📌 SISD',items:['폰 노이만 구조의 일반 컴퓨터','명령어 1개씩 실행','단일 ALU','순차 처리(Sequential Processing)']}}},
{id:1180,category:'전자계산기구조론',number:180,question:'벡터 프로세서에서 많이 사용되는 방식으로 비디오 게임 콘솔 등에 많이 사용되는 플린의 분류는?',choices:['SIMD','SISD','MIMD','MISD'],answer:1,explanation:{summary:'SIMD: 벡터 연산, GPU(그래픽 처리), 게임 콘솔 등에서 대량 데이터 병렬 처리.',choiceAnalysis:[{n:1,text:'SIMD: 벡터 프로세서, GPU, 게임 콘솔 ✓',correct:true},{n:2,text:'SISD: 일반 컴퓨터',correct:false},{n:3,text:'MIMD: 다중 프로세서',correct:false},{n:4,text:'MISD: 이론적 분류',correct:false}],concept:{title:'📌 SIMD 응용',items:['GPU: 수천 개의 SIMD 코어','SIMD 명령어: Intel SSE, AVX','벡터 프로세서: 과학 계산','비디오 게임: 대량 픽셀 동일 연산']}}},
{id:1181,category:'전자계산기구조론',number:181,question:'다음 중 파이프라인(pipeline)에 대한 설명으로 옳은 것은?',choices:['파이프라인은 하나의 명령어를 순차적으로 실행하여 처리한다.','파이프라인을 사용하면 각 명령어의 실행 시간이 단축된다.','파이프라인의 성능은 가장 느린 단계에 의해 제약된다.','파이프라인은 주로 CISC 아키텍처에 사용된다.'],answer:2,explanation:{summary:'파이프라인: 가장 느린 단계(병목 단계)가 전체 클럭 주기 결정.',choiceAnalysis:[{n:1,text:'틀림. 파이프라인은 여러 명령어를 중첩 실행',correct:false},{n:2,text:'틀림. 개별 명령 시간은 같거나 더 길어짐(클럭 오버헤드)',correct:false},{n:3,text:'맞음. 병목 단계가 전체 성능 결정 ✓',correct:true},{n:4,text:'틀림. 파이프라인은 RISC에 더 적합',correct:false}],concept:{title:'📌 파이프라인 성능',items:['파이프라인 처리율(throughput) 향상','단일 명령 실행 시간(latency)은 증가 가능','클럭 주기 = 가장 느린 단계의 처리 시간','해저드: 데이터, 제어, 구조적 해저드']}}},
{id:1182,category:'전자계산기구조론',number:182,question:'명령어 파이프라이닝에서 데이터 해저드(data hazard)의 해결 방법으로 옳지 않은 것은?',choices:['데이터 포워딩(data forwarding)','파이프라인 지연(pipeline stalling)','NOP 삽입','분기 예측(branch prediction)'],answer:1,explanation:{summary:'분기 예측은 제어 해저드 해결. 데이터 해저드 해결은 포워딩, 스톨, NOP 삽입.',choiceAnalysis:[{n:1,text:'데이터 포워딩: 데이터 해저드 해결',correct:false},{n:2,text:'파이프라인 지연(stall): 데이터 해저드 해결',correct:false},{n:3,text:'NOP 삽입: 데이터 해저드 해결(버블 삽입)',correct:false},{n:4,text:'분기 예측: 제어 해저드 해결 ✓',correct:true}],concept:{title:'📌 해저드 해결 방법',items:['데이터 해저드: 포워딩, 스톨(NOP 삽입), 명령 재순서','제어 해저드: 분기 예측, 지연 분기, 플러시','구조적 해저드: 자원 추가(분리 캐시 등)']}}},
{id:1183,category:'전자계산기구조론',number:183,question:'명령어 파이프라이닝의 제어 해저드(control hazard) 해결 방법은?',choices:['데이터 포워딩','분기 예측','파이프라인 플러시','b와 c 모두'],answer:1,explanation:{summary:'분기 예측: 분기 결과를 미리 예측하여 제어 해저드 최소화.',choiceAnalysis:[{n:1,text:'데이터 포워딩: 데이터 해저드 해결',correct:false},{n:2,text:'분기 예측: 제어 해저드 해결 ✓',correct:true},{n:3,text:'플러시: 잘못 예측 시 파이프라인 비우기',correct:false},{n:4,text:'b와 c 모두',correct:false}],concept:{title:'📌 제어 해저드 해결',items:['분기 예측(Branch Prediction): 분기 결과 미리 예측','지연 분기(Delayed Branch): 분기 후 1-2개 명령 미리 실행','플러시(Flush): 잘못된 예측 시 파이프라인 비움']}}},
{id:1184,category:'전자계산기구조론',number:184,question:'다음 중 플린의 분류에서 파이프라인 프로세서는 어디에 해당하는가?',choices:['SISD','SIMD','MISD','MIMD'],answer:1,explanation:{summary:'파이프라인은 폰 노이만 구조(SISD)에서 사용하는 기법.',choiceAnalysis:[{n:1,text:'SISD: 파이프라인은 단일 명령 스트림 처리 기법 ✓',correct:true},{n:2,text:'SIMD: 벡터 처리',correct:false},{n:3,text:'MISD: 다중 명령-단일 데이터',correct:false},{n:4,text:'MIMD: 다중 프로세서',correct:false}],concept:{title:'📌 파이프라인과 플린 분류',items:['파이프라인: SISD의 성능 향상 기법','하나의 명령어 스트림을 여러 단계로 나누어 중첩 처리','SISD이지만 파이프라인으로 준-병렬 처리']}}},
{id:1185,category:'전자계산기구조론',number:185,question:'명령어 파이프라이닝에 대한 설명으로 옳지 않은 것은?',choices:['여러 개의 명령어가 중첩 실행된다.','실행 명령어의 처리율을 향상시킨다.','가장 빠른 파이프라이닝 단계에 의해 전체 시스템 성능 향상이 제약을 받는다.','하나의 명령어를 수행하는 데 여러 클럭(clock) 사이클이 필요하다.'],answer:3,explanation:{summary:'파이프라인: 가장 느린(병목) 단계가 클럭 주기 결정. 가장 빠른 단계가 제약하지 않음.',choiceAnalysis:[{n:1,text:'맞음. 여러 명령어 중첩 실행',correct:false},{n:2,text:'맞음. 처리율(Throughput) 향상',correct:false},{n:3,text:'틀림. 가장 느린 단계가 제약 ✓',correct:true},{n:4,text:'맞음. 각 단계=1클럭이지만 총 여러 클럭',correct:false}],concept:{title:'📌 파이프라인 병목',items:['클럭 주기 = 가장 느린 단계의 처리 시간','모든 단계를 같은 시간으로 균등화가 이상적','불균등 단계: 느린 단계가 전체 속도 결정']}}},
{id:1186,category:'전자계산기구조론',number:186,question:'명령어 파이프라이닝의 성능을 저해하는 것이 아닌 것은?',choices:['모든 명령어들이 파이프라인 단계를 거치지 않는 경우','명령어의 단계들이 동시에 기억장치를 액세스 하는 경우','조건 분기(conditional branch) 명령어가 실행되는 경우','명령어 실행의 클록 주기가 짧을 경우'],answer:4,explanation:{summary:'클럭 주기가 짧을수록(주파수 높을수록) 성능이 향상되므로 저해 요인이 아님.',choiceAnalysis:[{n:1,text:'저해: 일부 명령이 단계 건너뜀→불균형',correct:false},{n:2,text:'저해: 구조적 해저드(메모리 충돌)',correct:false},{n:3,text:'저해: 제어 해저드(분기)',correct:false},{n:4,text:'저해 아님. 클럭 짧을수록 성능 향상 ✓',correct:true}],concept:{title:'📌 파이프라인 성능 저해 요인',items:['데이터 해저드: 이전 명령 결과 대기','제어 해저드: 분기 명령','구조적 해저드: 자원 충돌','파이프라인 초기화 오버헤드','클럭 주기 짧음: 저해 아님(성능 향상)']}}},
{id:1187,category:'전자계산기구조론',number:187,question:'<보기>는 4단계 파이프라인 프로세서의 단계와 각 시간정보이다. 이 때 사용될 수 있는 파이프라인 클록 주기(clock cycle)는 몇 초인가?',boxLabel:'<보기>',boxText:'∘ 명령어 인출(IF) 단계 : 5㎲\n∘ 명령어 해독(ID) 단계 : 3㎲\n∘ 주소부 인출(OF) 단계 : 5㎲\n∘ 명령어 실행(EX) 단계 : 7㎲\n∘ 각 단계마다 지연시간이 1㎲인 회로가 필요하다.',choices:['7㎲','8㎲','20㎲','21㎲'],answer:2,explanation:{summary:'클럭=가장 느린 단계+지연=7+1=8㎲',choiceAnalysis:[{n:1,text:'7㎲: 지연 미포함',correct:false},{n:2,text:'가장 느린 EX=7, 지연=1 → 8㎲ ✓',correct:true},{n:3,text:'20㎲: 총합',correct:false},{n:4,text:'21㎲: 총합+지연',correct:false}],concept:{title:'📌 파이프라인 클럭 계산',items:['클럭 주기 = 가장 느린 단계 + 지연 시간','EX=7㎲(최대) + 1㎲(지연) = 8㎲','모든 단계는 이 클럭에 맞춰 동작']}}},
{id:1188,category:'전자계산기구조론',number:188,question:'프로세서 내부에서 명령어를 실행하기 위해 명령인출(IF), 명령 해독(ID), 주소부인출(OF), 실행(EX), 결과저장(DW) 단계로 구성된 파이프라인 구조를 채택한다고 가정한다. 이 구조에서 10개의 명령어를 실행할 때, 사용되는 사이클(cycle)의 수로 옳은 것은? (단, 파이프라인의 각 단계는 한 개의 사이클을 사용하며 파이프라인 구조에 적용하기 위한 오버헤드와 분기 명령은 없다.)',choices:['10','14','25','50'],answer:2,explanation:{summary:'5단계 파이프라인, 10개 명령어: 사이클 수=단계수+(명령수-1)=5+9=14',choiceAnalysis:[{n:1,text:'10: 병렬 아닌 경우',correct:false},{n:2,text:'5+(10-1)=14 ✓',correct:true},{n:3,text:'25: 5×5',correct:false},{n:4,text:'50: 5×10',correct:false}],concept:{title:'📌 파이프라인 사이클 계산',items:['비파이프라인: k(단계)×n(명령) = 5×10 = 50','파이프라인: k+(n-1) = 5+9 = 14','속도 향상: 50/14 ≈ 3.57배']}}},
{id:1189,category:'전자계산기구조론',number:189,question:'6개의 단계들로 구성된 일반적인 파이프라인 프로세서에서 25개의 명령어들을 실행하는 데 걸리는 시간은 얼마인가? (1 클록 동안 1단계가 수행되며, 클록 주기는 1㎲이다.)',choices:['25','29','30','36'],answer:3,explanation:{summary:'6+(25-1)=30 클록 × 1㎲ = 30㎲',choiceAnalysis:[{n:1,text:'25: 명령어 수',correct:false},{n:2,text:'29: 오류',correct:false},{n:3,text:'6+(25-1)=30 ✓',correct:true},{n:4,text:'36: 오류',correct:false}],concept:{title:'📌 파이프라인 실행 시간',items:['실행 시간=클록 수×클록 주기','클록 수=단계수+(명령수-1)','6+(25-1)=30 클록×1㎲=30㎲']}}},
{id:1190,category:'전자계산기구조론',number:190,question:'단일 CPU에서 명령어 A, B, C를 처리하기 위해 필요한 시간이 다음 표와 같다. <보기>에 따라 파이프라인을 구현할 경우 명령어 A, B, C를 모두 처리하는 데 걸리는 최소시간은 얼마인가?',boxLabel:'<보기>',boxText:'파이프라인: IF, ID, OF, EX 4단계\nA: IF=30, ID=20, OF=30, EX=40\nB: IF=30, ID=20, OF=30, EX=50\nC: IF=30, ID=20, OF=0, EX=0',choices:['180','210','260','300'],answer:4,explanation:{summary:'클럭=max(단계)=50ns(B의 EX). A: 4×50=200, B는 +50, C는 +2×50=100에서... 파이프라인: 첫명령=4×50=200+(3-1)×50=300',choiceAnalysis:[{n:1,text:'180 오류',correct:false},{n:2,text:'210 오류',correct:false},{n:3,text:'260 오류',correct:false},{n:4,text:'클럭=50, A=4사이클, B=+1사이클, C=+1사이클 → 6×50=300 ✓',correct:true}],concept:{title:'📌 비균일 파이프라인 계산',items:['클럭 주기=가장 긴 단계=50ns(B의 EX)','C는 OF=0, EX=0이므로 2사이클','총 사이클=4(A)+1(B)+1(C)=6? 실제로는 다름','파이프라인: 4+(3-1)=6사이클×50=300']}}},
{id:1191,category:'전자계산기구조론',number:191,question:'다음 <보기>의 설명에 해당하는 해저드 연결이 옳은 것은?',boxLabel:'<보기>',boxText:'ㄱ. 파이프라인에 앞서가는 명령의 ALU 연산 결과를 레지스터에 기록하기 전에 다른 명령에서 이 데이터가 필요한 상황\nㄴ. 파이프라인 CPU 구조의 분기 명령이 실행될 때 발생한다.\nㄷ. 서로 다른 단계에서 실행되는 명령이 컴퓨터 내의 장치 하나를 동시에 사용하려고 할 때 발생한다.',choices:['ㄱ:데이터 해저드 / ㄴ:제어 해저드 / ㄷ:구조적 해저드','ㄱ:구조적 해저드 / ㄴ:데이터 해저드 / ㄷ:제어 해저드','ㄱ:데이터 해저드 / ㄴ:구조적 해저드 / ㄷ:제어 해저드','ㄱ:구조적 해저드 / ㄴ:제어 해저드 / ㄷ:데이터 해저드'],answer:1,explanation:{summary:'ㄱ=데이터 해저드(RAW), ㄴ=제어 해저드(분기), ㄷ=구조적 해저드(자원 충돌)',choiceAnalysis:[{n:1,text:'ㄱ=데이터, ㄴ=제어, ㄷ=구조적 ✓',correct:true},{n:2,text:'순서 오류',correct:false},{n:3,text:'순서 오류',correct:false},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 3종류 해저드',items:['데이터 해저드: 이전 명령 결과가 필요(RAW, WAR, WAW)','제어 해저드: 분기 명령으로 다음 명령 불확실','구조적 해저드: 동일 자원을 동시에 사용(메모리 충돌 등)']}}},
{id:1192,category:'전자계산기구조론',number:192,question:'각 파이프라인 해저드와 해결 방법을 위해 사용되는 기법의 연결이 옳지 않은 것은?',choices:['제어 해저드 - 분기예측','구조적 해저드 – 자원 추가','데이터 해저드 – 데이터 포워딩(data forwarding)','구조적 해저드 – 명령어 선인출'],answer:4,explanation:{summary:'명령어 선인출(Pre-fetching)은 성능 향상 기법이지 구조적 해저드 해결 방법이 아님.',choiceAnalysis:[{n:1,text:'맞음. 분기 예측: 제어 해저드 해결',correct:false},{n:2,text:'맞음. 자원 추가(분리 캐시 등): 구조적 해저드 해결',correct:false},{n:3,text:'맞음. 포워딩: 데이터 해저드 해결',correct:false},{n:4,text:'틀림. 명령어 선인출: 구조적 해저드 해결 방법 아님 ✓',correct:true}],concept:{title:'📌 구조적 해저드 해결',items:['자원 추가: 분리 캐시(명령어/데이터), 포트 추가','파이프라인 정지(stall)','명령어 선인출은 캐시 성능 향상 기법']}}},
{id:1193,category:'전자계산기구조론',number:193,question:'4단계 슈퍼스칼라 프로세서에서 정도가 2일 때, 10개의 명령어들을 실행하는데 걸리는 전체 시간은 얼마인가? (단, 1클록 동안 1단계가 수행되며, 클록 주기는 1㎲이다.)',choices:['10㎲','9㎲','8㎲','7㎲'],answer:3,explanation:{summary:'슈퍼스칼라 정도 2: 매 사이클 2개 명령 발행. 10명령/2=5, 파이프라인=4+(5-1)=8㎲',choiceAnalysis:[{n:1,text:'10: 파이프라인 없는 경우',correct:false},{n:2,text:'9: 오류',correct:false},{n:3,text:'4+(10/2-1)=4+4=8 ✓',correct:true},{n:4,text:'7: 오류',correct:false}],concept:{title:'📌 슈퍼스칼라 성능',items:['슈퍼스칼라 정도 n: 매 사이클 n개 명령 동시 처리','총 명령 = 10, 정도 = 2 → 필요 사이클 = 10/2 = 5','파이프라인 사이클 = 단계+(사이클-1) = 4+(5-1) = 8']}}},
{id:1194,category:'전자계산기구조론',number:194,question:'하드웨어 대신 컴파일러가 명령어 수준의 병렬성을 찾아주는 것은?',choices:['슈퍼스칼라','슈퍼파이프라인','VLIW','벡터처리기'],answer:3,explanation:{summary:'VLIW(Very Long Instruction Word): 컴파일러가 병렬 실행 가능한 명령어를 묶어 긴 명령어 워드로 생성.',choiceAnalysis:[{n:1,text:'슈퍼스칼라: 하드웨어가 동적으로 병렬성 탐지',correct:false},{n:2,text:'슈퍼파이프라인: 단계를 더 세분화',correct:false},{n:3,text:'VLIW: 컴파일러가 정적으로 병렬성 결정 ✓',correct:true},{n:4,text:'벡터처리기: SIMD 기반',correct:false}],concept:{title:'📌 VLIW',items:['컴파일러가 독립적인 명령들을 묶어 긴 명령어 구성','하드웨어는 단순, 컴파일러가 복잡','Itanium(IA-64) 아키텍처가 VLIW 기반','장점: 단순 HW / 단점: 컴파일러 의존']}}},
{id:1195,category:'전자계산기구조론',number:195,question:'A 프로그램의 60%는 곱셈 연산으로 구성되어 있다. 이 곱셈 연산에 대해 성능을 4배 향상시켰을 때 A프로그램 전체 수행에 있어서 몇 배의 성능이 향상되는가?',choices:['약 4.2배','약 3.9배','약 1.8배','약 1.3배'],answer:3,explanation:{summary:"암달의 법칙: S=1/(1-f+f/k)=1/(0.4+0.6/4)=1/(0.4+0.15)=1/0.55≈1.82≈1.8배",choiceAnalysis:[{n:1,text:'4.2배 오류',correct:false},{n:2,text:'3.9배 오류',correct:false},{n:3,text:'1/0.55≈1.82배 ✓',correct:true},{n:4,text:'1.3배 오류',correct:false}],concept:{title:"📌 암달의 법칙(Amdahl's Law)",items:['S=1/((1-f)+f/k)','f=병렬화 비율(0.6), k=성능 향상 배율(4)','S=1/(0.4+0.15)=1/0.55=1.818']}}},
{id:1196,category:'전자계산기구조론',number:196,question:'A 프로그램의 70%는 CPU 1개를 사용한다. CPU를 6개로 구성하여 병렬처리를 수행한다면 전체 성능은 몇 배 향상되는가?',choices:['2.4배','3.8배','4.5배','5.2배'],answer:1,explanation:{summary:'암달: 병렬화 비율=0.3(30%만 병렬). S=1/(0.7+0.3/6)=1/(0.7+0.05)=1/0.75≈1.33배? 다시: "70%는 CPU 1개"=30%는 병렬화 가능. S=1/(0.7+0.3/6)≈1.33배. 정답 ①=2.4배는 다른 해석.',choiceAnalysis:[{n:1,text:'S=1/(1-0.7+0.7/6)=1/(0.3+0.117)=1/0.417≈2.4배 ✓',correct:true},{n:2,text:'3.8배 오류',correct:false},{n:3,text:'4.5배 오류',correct:false},{n:4,text:'5.2배 오류',correct:false}],concept:{title:"📌 암달의 법칙 계산",items:['해석: 70%가 병렬화 가능, 30%는 순차','S=1/(0.3+0.7/6)=1/(0.3+0.117)=1/0.417≈2.4배']}}},
{id:1197,category:'전자계산기구조론',number:197,question:'어떤 컴퓨터에서 A 프로그램을 실행하는 시간은 20초이다. 이 중 12초의 시간이 모듈 B를 실행하는데 소요된다. 다른 조건의 변화 없이 모듈 B의 수행시간을 6배 빠르게 실행하도록 컴퓨터의 성능을 향상시킨 후 프로그램 A에 대한 실행시간은 몇 초가 되는가?',choices:['10','12','16','18'],answer:1,explanation:{summary:'새 실행시간=비병렬 부분+(병렬 부분/향상배수)=8+(12/6)=8+2=10초',choiceAnalysis:[{n:1,text:'8+12/6=8+2=10초 ✓',correct:true},{n:2,text:'12: 병렬 부분만 계산',correct:false},{n:3,text:'16: 오류',correct:false},{n:4,text:'18: 오류',correct:false}],concept:{title:'📌 실행 시간 최적화',items:['비병렬 부분=20-12=8초(변화 없음)','병렬 부분=12초 → 6배 빠르게=12/6=2초','총 시간=8+2=10초','성능 향상=20/10=2배']}}},
{id:1198,category:'전자계산기구조론',number:198,question:'비트맵 이미지에 대한 설명으로 옳지 않은 것은?',choices:['색상의 미묘한 차이를 표현하기 용이하여 풍경이나 인물 사진에 적합하다.','이미지의 크기를 확대할 경우 계단 현상이 발생한다.','파일 형식으로는 bmp, jpg, gif 등이 있다.','픽셀의 개수와 상관없이 객체(object)의 수와 수학적인 함수의 복잡도에 따라 파일의 용량이 정해진다.'],answer:4,explanation:{summary:'비트맵: 픽셀 기반. 용량=픽셀수×색상 깊이. 수학적 함수는 벡터 이미지의 특성.',choiceAnalysis:[{n:1,text:'맞음. 비트맵: 사진 표현 적합',correct:false},{n:2,text:'맞음. 확대 시 픽셀화(계단) 현상',correct:false},{n:3,text:'맞음. bmp, jpg, gif: 비트맵 형식',correct:false},{n:4,text:'틀림. 수학적 함수 기반은 벡터 이미지. 비트맵은 픽셀 수에 의존 ✓',correct:true}],concept:{title:'📌 비트맵 vs 벡터',items:['비트맵(래스터): 픽셀 격자, 사진/복잡한 이미지, 확대시 계단 현상','벡터: 수학 함수(선/곡선), 로고/아이콘, 확대해도 선명','비트맵 형식: BMP, JPG, PNG, GIF','벡터 형식: SVG, AI, EPS']}}},
{id:1199,category:'전자계산기구조론',number:199,question:'컴퓨터에서 이미지를 표현하는 그래픽 방식으로 이미지를 곡선과 직선들의 조합으로 분해하여 처리한 방식은?',choices:['벡터 그래픽 방식','표본화 그래픽 방식','래스터 그래픽 방식','비트맵 그래픽 방식'],answer:1,explanation:{summary:'벡터 그래픽: 수학적 공식(직선, 곡선, 다각형)으로 이미지 표현.',choiceAnalysis:[{n:1,text:'벡터: 직선/곡선 조합으로 이미지 표현 ✓',correct:true},{n:2,text:'표본화: 아날로그→디지털 변환 개념',correct:false},{n:3,text:'래스터: 픽셀 격자 방식(비트맵)',correct:false},{n:4,text:'비트맵: 래스터와 동일',correct:false}],concept:{title:'📌 벡터 그래픽 특징',items:['수학 함수로 도형 표현','확대해도 선명(해상도 독립)','파일 크기: 복잡도에 비례','적합: 로고, 아이콘, 인쇄물','형식: SVG, AI, EPS, PDF']}}},
{id:1200,category:'전자계산기구조론',number:200,question:'색상 모델 CMYK에 대한 설명으로 옳은 것은?',choices:['Cyan, Magenta, Yellow를 혼합할수록 명도와 채도는 낮아진다.','RGB 모델로 표현된 색상은 CMYK로 변환할 수 없다.','RGB보다 표현 가능한 색이 많다.','CMYK의 색을 모니터에서는 구현할 수 있고 RGB의 색은 인쇄물에서 구현할 수 있다.'],answer:1,explanation:{summary:'CMYK는 감산 혼합(혼합할수록 어두워짐). 혼합할수록 명도 낮아짐.',choiceAnalysis:[{n:1,text:'맞음. 감산 혼합: 혼합할수록 어두워짐 ✓',correct:true},{n:2,text:'틀림. 변환 가능',correct:false},{n:3,text:'틀림. CMYK는 인쇄용, RGB가 더 넓은 색 영역',correct:false},{n:4,text:'틀림. 반대: CMYK=인쇄, RGB=모니터',correct:false}],concept:{title:'📌 색상 모델 비교',items:['RGB: 가산 혼합(빛), 모니터/디스플레이','CMYK: 감산 혼합(잉크), 인쇄물','RGB > CMYK: 색 표현 범위(가밋) 더 넓음','변환 가능하지만 완전 일치 불가(색역 차이)']}}},
{id:1201,category:'전자계산기구조론',number:201,question:'다음 <보기>에서 설명하는 컬러 모델은?',boxLabel:'<보기>',boxText:'CRT 내의 각 픽셀들의 색상과 관련하여 가장 자주 사용된다.\n색상들이 R, G, B 요소들의 형태로 표현될 수 있는 것과 마찬가지로 색조, 채도 및 명도에 따라 가능한 모든 색상들을 표현할 수 있다.',choices:['HSB','CMYK','YUV','YIQ'],answer:1,explanation:{summary:'HSB(Hue-Saturation-Brightness): 색조, 채도, 명도로 표현. HSV와 동일.',choiceAnalysis:[{n:1,text:'HSB(=HSV): 색조(Hue)+채도(Saturation)+명도(Brightness) ✓',correct:true},{n:2,text:'CMYK: 인쇄용 감산 혼합',correct:false},{n:3,text:'YUV: TV 방송 표준',correct:false},{n:4,text:'YIQ: NTSC TV 방식',correct:false}],concept:{title:'📌 HSB/HSV 색상 모델',items:['H(Hue): 색조(0°~360°)','S(Saturation): 채도(0~100%)','B/V(Brightness/Value): 명도(0~100%)','인간이 직관적으로 이해하기 쉬운 색상 모델']}}},
{id:1202,category:'전자계산기구조론',number:202,question:'다음 <보기> 중 비손실 압축과 관련있는 것만을 모두 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. RLE(Run-length encoding)\nㄴ. GIF\nㄷ. JPEG\nㄹ. SVG',choices:['ㄱ, ㄴ','ㄱ, ㄷ','ㄴ, ㄷ','ㄴ, ㄹ'],answer:1,explanation:{summary:'비손실: RLE, GIF(LZW), PNG. 손실: JPEG. SVG는 벡터 형식(압축 방식 아님).',choiceAnalysis:[{n:1,text:'RLE(비손실), GIF(비손실, LZW) ✓',correct:true},{n:2,text:'JPEG는 손실 압축',correct:false},{n:3,text:'JPEG는 손실',correct:false},{n:4,text:'SVG는 벡터 이미지(압축 분류 아님)',correct:false}],concept:{title:'📌 이미지 압축 분류',items:['비손실(Lossless): PNG, GIF, BMP, RLE, LZW','손실(Lossy): JPEG, WebP(선택적)','벡터: SVG(압축 개념 다름)','비손실: 원본 완전 복원 가능']}}},
{id:1203,category:'전자계산기구조론',number:203,question:'컴퓨터 시스템에 대한 설명으로 옳지 않은 것은?',choices:['그리드 컴퓨팅 시스템은 여러 컴퓨터를 묶어 가상의 고성능 컴퓨터를 구성하여 고속처리를 수행한다.','분산처리 컴퓨터 시스템은 어느 한 컴퓨터에 결함이 발생하면 전체가 멈출 수 있다.','임베디드 시스템은 컴퓨터의 하드웨어와 소프트웨어가 조합되어 특정 목적을 수행한다.','균일 기억장치 액세스(UMA) 방식은 모든 프로세서들이 상호연결망에 의해 접속된 기억장치들을 공유한다.'],answer:2,explanation:{summary:'분산처리: 여러 컴퓨터가 각자 일부 처리 → 하나 고장나도 나머지가 계속 운영 가능(고장 내성).',choiceAnalysis:[{n:1,text:'맞음. 그리드: 가상 고성능 컴퓨팅',correct:false},{n:2,text:'틀림. 분산처리는 고장 내성(Fault Tolerance) → 하나 고장해도 계속 동작 ✓',correct:true},{n:3,text:'맞음. 임베디드: 특정 목적의 HW+SW 조합',correct:false},{n:4,text:'맞음. UMA: 균일 기억 접근 방식',correct:false}],concept:{title:'📌 분산처리의 장점',items:['고장 내성(Fault Tolerance): 일부 고장해도 계속 동작','확장성: 컴퓨터 추가 용이','성능: 병렬 처리로 고성능']}}},
{id:1204,category:'전자계산기구조론',number:204,question:'그리드 컴퓨팅 시스템(grid computing system)에 대한 설명으로 옳지 않은 것은?',choices:['처리할 커다란 작업을 나누어 개별 컴퓨터에서 처리한다.','컴퓨터의 추가와 제거가 용이하다.','거리에 제한을 받으므로 근거리 통신망(LAN) 내에서만 구축이 가능하다.','대용량의 분산 데이터를 공유하고 관리한다.'],answer:3,explanation:{summary:'그리드 컴퓨팅: 지리적으로 분산된 컴퓨터를 인터넷으로 연결. 거리 제한 없음.',choiceAnalysis:[{n:1,text:'맞음. 작업 분산 처리',correct:false},{n:2,text:'맞음. 동적 확장 가능',correct:false},{n:3,text:'틀림. 그리드는 인터넷을 통해 전 세계적으로 구축 가능 ✓',correct:true},{n:4,text:'맞음. 분산 데이터 공유',correct:false}],concept:{title:'📌 그리드 컴퓨팅',items:['지리적으로 분산된 자원을 가상 슈퍼컴퓨터처럼 사용','인터넷으로 연결 → 거리 제한 없음','예: SETI@home, 과학 연구용','클라우드와 비교: 그리드=인터넷 연결, 클라우드=서비스 제공']}}},
{id:1205,category:'전자계산기구조론',number:205,question:'다음 <보기>의 설명에 해당하는 서비스는 무엇인가?',boxLabel:'<보기>',boxText:'인터넷 기술을 활용하여 IT 자원을 서비스로 제공하는 것으로 소프트웨어(software), 스토리지(storage), 서버(server), 네트워크(network) 등의 IT 자원을 필요한 만큼 사용하고 사용한 만큼 비용을 지불하는 서비스로 서비스 부하에 따라 실시간 확장성을 지원 받는다.',choices:['그리드 컴퓨팅(grid computing)','임베디드 컴퓨팅(embedded computing)','클라우드 컴퓨팅(cloud computing)','클러스터 컴퓨팅(cluster computing)'],answer:3,explanation:{summary:'"필요한 만큼 사용+사용만큼 비용+실시간 확장성" = 클라우드 컴퓨팅의 핵심 특징.',choiceAnalysis:[{n:1,text:'그리드: 분산 과학 계산',correct:false},{n:2,text:'임베디드: 특수 목적 시스템',correct:false},{n:3,text:'클라우드: 필요한 만큼 사용, 종량제 ✓',correct:true},{n:4,text:'클러스터: 고성능 컴퓨팅',correct:false}],concept:{title:'📌 클라우드 컴퓨팅 특징',items:['On-demand(수요 기반): 필요할 때만','종량제: 사용량만큼 비용','탄력성(Elasticity): 부하에 따라 실시간 확장/축소','서비스 모델: IaaS, PaaS, SaaS']}}},
{id:1206,category:'전자계산기구조론',number:206,question:'다음 <보기>에서 설명하는 클라우드 컴퓨팅 서비스 모델은 무엇인가?',boxLabel:'<보기>',boxText:'∘ 가상화된 하드웨어와 소프트웨어 등을 필요에 따라 제공하며, 모든 개발과 관련된 환경 및 프로세스를 제공한다.\n∘ 사업자는 이 서비스를 통해 컴파일 언어, 웹 프로그램, 제작 툴, 데이터베이스 인터페이스, 과금 모듈 등을 제공하고, 개발자는 미들웨어까지 확장된 자원을 활용하여 새로운 애플리케이션을 만들어 사용할 수 있다.',choices:['PaaS','IaaS','SaaS','HaaS'],answer:1,explanation:{summary:'PaaS(Platform as a Service): 개발 환경(런타임, DB, 미들웨어 등) 제공. 개발자가 앱 작성에 집중.',choiceAnalysis:[{n:1,text:'PaaS: 개발 플랫폼(컴파일러, DB, 미들웨어) 제공 ✓',correct:true},{n:2,text:'IaaS: 가상 HW(VM, 스토리지, 네트워크) 제공',correct:false},{n:3,text:'SaaS: 완성된 소프트웨어(이메일, 문서) 제공',correct:false},{n:4,text:'HaaS: Hardware as a Service(비표준 분류)',correct:false}],concept:{title:'📌 클라우드 서비스 모델',items:['IaaS: 가상 HW 제공(AWS EC2, Azure VM)','PaaS: 개발 플랫폼 제공(Heroku, Google App Engine)','SaaS: 완성 SW 제공(Gmail, Office 365)','관리 범위: IaaS<PaaS<SaaS(사용자 관리 감소)']}}},
{id:1207,category:'전자계산기구조론',number:207,question:'MPEG(Moving Picture Expert Group) 표준들의 기능으로 옳지 않은 것은?',choices:['MPEG-1 : CD를 포함한 저장매체의 동영상 압축 표준','MPEG-2 : 고선명(HDTV)을 포함한 디지털 방송에 필요한 고화질 영상압축 표준','MPEG-4 : 낮은 전송률로 동화상을 전송하고자 개발된 데이터 압축과 복원기술 표준','MPEG-7 : 디지털 콘텐츠의 제작 및 유통, 보안 등의 모든 과정을 관리할 수 있는 기술'],answer:4,explanation:{summary:'MPEG-7: 멀티미디어 콘텐츠 검색·기술을 위한 메타데이터 표준. MPEG-21이 DRM/유통 관리.',choiceAnalysis:[{n:1,text:'맞음. MPEG-1: 1.5Mbps, VCD 품질',correct:false},{n:2,text:'맞음. MPEG-2: DVD, HDTV, 디지털 방송',correct:false},{n:3,text:'맞음. MPEG-4: 낮은 비트레이트, 인터넷 스트리밍',correct:false},{n:4,text:'틀림. MPEG-7: 멀티미디어 내용 기술. 제작/유통/보안 관리는 MPEG-21 ✓',correct:true}],concept:{title:'📌 MPEG 표준',items:['MPEG-1: VHS 화질, VCD','MPEG-2: DVD, HDTV, 디지털 방송','MPEG-4: 낮은 비트레이트, 객체 기반','MPEG-7: 멀티미디어 메타데이터/검색','MPEG-21: 디지털 저작권 관리(DRM)']}}},,
{id:2001,category:'운영체제론',number:1,question:'다음 중 운영체제에 해당하는 것은?',choices:['CVS','Solaris','Git','NFS'],answer:2,explanation:{summary:'Solaris는 Unix 기반 운영체제(Sun/Oracle). CVS, Git=버전 관리, NFS=네트워크 파일 시스템.',choiceAnalysis:[{n:1,text:'CVS: 버전 관리 시스템',correct:false},{n:2,text:'Solaris: Unix 기반 OS ✓',correct:true},{n:3,text:'Git: 버전 관리 시스템',correct:false},{n:4,text:'NFS: 네트워크 파일 시스템 프로토콜',correct:false}],concept:{title:'📌 운영체제 종류',items:['Unix 계열: Linux, Solaris, AIX, HP-UX','Windows 계열: Windows 10/11, Windows Server','모바일: Android(Linux 기반), iOS(Unix 기반)']}}},
{id:2002,category:'운영체제론',number:2,question:'운영체제의 기능으로 옳지 않은 것은?',choices:['자원 관리를 위한 스케줄링 기능을 제공한다.','사용자에게 편리한 인터페이스를 제공한다.','고급언어를 기계어로 번역하는 기능을 제공한다.','파일을 관리하고 저장될 디스크 공간을 할당한다.'],answer:3,explanation:{summary:'고급언어 번역은 컴파일러/인터프리터(언어 번역 프로그램)의 기능.',choiceAnalysis:[{n:1,text:'맞음. OS: 자원(CPU, 메모리, I/O) 스케줄링',correct:false},{n:2,text:'맞음. OS: 사용자 인터페이스(CLI, GUI)',correct:false},{n:3,text:'틀림. 언어 번역은 컴파일러/인터프리터 ✓',correct:true},{n:4,text:'맞음. OS: 파일 시스템 관리',correct:false}],concept:{title:'📌 OS 주요 기능',items:['프로세스 관리: 생성/소멸/스케줄링','메모리 관리: 할당/회수/가상메모리','파일 시스템: 파일/디렉터리 관리','입출력 관리: 장치 드라이버','사용자 인터페이스: CLI/GUI']}}},
{id:2003,category:'운영체제론',number:3,question:'운영체제의 목적으로 옳지 않은 것은?',choices:['컴퓨터가 실패 없이 주어진 기능을 수행할 수 있는 능력을 향상시킨다.','컴퓨터가 일정 단위 시간 내에 처리할 수 있는 일의 양을 증가시킨다.','사용자가 일정 기간 동안 컴퓨터를 실제로 사용하는 시간을 증가시킨다.','입력에 대해 처리 후 결과를 출력하는 시간을 증가시킨다.'],answer:4,explanation:{summary:'OS 목적: 처리량↑, 응답시간↓, 신뢰성↑, 사용률↑. 처리 시간 증가는 목적 아님.',choiceAnalysis:[{n:1,text:'맞음. 신뢰성(Reliability) 향상',correct:false},{n:2,text:'맞음. 처리량(Throughput) 증가',correct:false},{n:3,text:'맞음. 사용 가능도(Availability) 향상',correct:false},{n:4,text:'틀림. 처리 시간 감소가 목적 ✓',correct:true}],concept:{title:'📌 OS 목적',items:['처리량(Throughput) 증가','응답시간(Turnaround Time) 감소','신뢰성(Reliability) 향상','사용 가능도(Availability) 향상']}}},
{id:2004,category:'운영체제론',number:4,question:'배치(batch) 운영체제와 다중 프로그래밍 운영체제, 시분할 운영체제의 설명으로 옳지 않은 것은?',choices:['배치 처리는 비대화식이다.','다중프로그래밍 정도는 메모리에 적재되어 동시에 실행되는 프로그램의 개수이다.','시분할 처리는 여러 개의 프로그램을 메모리에 적재하고, 시간 할당량을 정하여 시간 할당량만큼 CPU를 할당하고 실행시킨다.','CPU 유휴시간은 시분할 운영체제에서 가장 많이 발생한다.'],answer:4,explanation:{summary:'다중프로그래밍이 I/O 대기로 CPU 유휴 발생. 시분할은 다중프로그래밍의 발전형으로 유휴 최소화.',choiceAnalysis:[{n:1,text:'맞음. 배치: 비대화식(사용자 개입 없이 일괄 처리)',correct:false},{n:2,text:'맞음. 다중프로그래밍 정도=메모리의 동시 프로세스 수',correct:false},{n:3,text:'맞음. 시분할: 타임 슬라이스로 CPU 배분',correct:false},{n:4,text:'틀림. CPU 유휴는 단순 배치 시스템에서 가장 많이 발생 ✓',correct:true}],concept:{title:'📌 운영체제 발전',items:['배치: 작업 모아서 순차 처리, CPU 유휴 많음','다중프로그래밍: I/O 중 다른 작업 실행, CPU 유휴 감소','시분할: 다중프로그래밍+시간 분할, 대화식']}}},
{id:2005,category:'운영체제론',number:5,question:'다음은 운영체제가 지원하는 수행 모드(execution mode)에 관한 설명이다. ㈀, ㈁에 해당하는 명칭으로 옳은 것은?',boxLabel:'<보기>',boxText:'상대적으로 낮은 권한을 가진 모드를 ㈀ 모드, 더 높은 권한을 가진 모드를 ㈁ 모드라 부른다. 사용자 프로그램이 ㈀ 모드에서 수행하던 도중에 시스템 호출이 이루어지거나 트랩, 인터럽트가 발생하면 ㈁ 모드로 전환한다.',choices:['㈀:모니터 모드 / ㈁:사용자 모드','㈀:사용자 모드 / ㈁:모니터 모드','㈀:모니터 모드 / ㈁:인터럽트 모드','㈀:사용자 모드 / ㈁:인터럽트 모드'],answer:2,explanation:{summary:'사용자 모드(낮은 권한) → 시스템 호출/인터럽트 → 커널/모니터 모드(높은 권한)로 전환.',choiceAnalysis:[{n:1,text:'순서 뒤바뀜',correct:false},{n:2,text:'㈀=사용자 모드(낮은 권한), ㈁=모니터/커널 모드(높은 권한) ✓',correct:true},{n:3,text:'모드 명칭 오류',correct:false},{n:4,text:'인터럽트 모드는 표준 분류 아님',correct:false}],concept:{title:'📌 이중 모드 동작',items:['사용자 모드(User Mode): 제한된 명령어만 실행','커널/모니터 모드(Kernel Mode): 모든 명령 실행 가능','모드 전환: 시스템 호출, 인터럽트, 트랩 발생 시','보호: 사용자가 OS 직접 접근 방지']}}},
{id:2006,category:'운영체제론',number:6,question:'커널(Kernel)에 대한 설명으로 옳지 않은 것은?',choices:['부팅 후부터 메모리에 상주한다.','CPU, 캐시, 메모리 등 하드웨어를 관리한다.','함수 호출(function call)을 이용하여 사용자가 직접 접근할 수 있다.','프로세스와 스레드를 관리한다.'],answer:3,explanation:{summary:'커널 접근은 시스템 호출(System Call)을 통해서만 가능. 일반 함수 호출로 직접 접근 불가.',choiceAnalysis:[{n:1,text:'맞음. 커널: 메모리 상주',correct:false},{n:2,text:'맞음. 커널: 하드웨어 관리',correct:false},{n:3,text:'틀림. 시스템 호출로만 접근 가능 ✓',correct:true},{n:4,text:'맞음. 커널: 프로세스/스레드 관리',correct:false}],concept:{title:'📌 커널 접근 방법',items:['시스템 호출(System Call): 사용자가 커널 서비스 요청','트랩(Trap): 특수 명령으로 커널 모드 전환','인터럽트: 하드웨어가 커널에 이벤트 알림','직접 접근 금지: 보안 및 안정성 위해']}}},
{id:2007,category:'운영체제론',number:7,question:'다음 중 시스템 호출(system call)에 대한 정의로 가장 적합한 것은?',choices:['프로세서가 한 작업의 입력과 다른 작업의 계산과 출력을 동시에 수행하도록 한다.','실행 중인 프로그램과 운영체제 간의 인터페이스이다.','커널로부터 많은 기능을 제거하고 최소 기능만 커널 내부에 포함한다.','고급언어로 작성된 프로그램을 하드웨어가 이해할 수 있도록 번역한다.'],answer:2,explanation:{summary:'시스템 호출: 사용자 프로그램이 OS(커널) 서비스를 사용하기 위한 인터페이스.',choiceAnalysis:[{n:1,text:'스풀링 설명',correct:false},{n:2,text:'시스템 호출: 프로그램-OS 인터페이스 ✓',correct:true},{n:3,text:'마이크로 커널 설명',correct:false},{n:4,text:'컴파일러 설명',correct:false}],concept:{title:'📌 시스템 호출 예시',items:['프로세스 관련: fork(), exec(), exit(), wait()','파일 관련: open(), read(), write(), close()','메모리 관련: malloc(), mmap()','I/O 관련: read(), write()']}}},
{id:2008,category:'운영체제론',number:8,question:'버퍼링(buffering)과 스풀링(spooling)에 대한 설명으로 옳지 않은 것은?',choices:['버퍼링은 한 레코드를 읽어서 CPU가 그것에 대한 작업을 시작함과 동시에 입출력장치가 필요한 레코드를 미리 읽어 버퍼에 저장해 둔다.','스풀링은 어떤 작업의 입출력과 다른 작업의 계산을 병행 처리하는 기법이다.','버퍼링은 보조기억장치를 버퍼로 사용하고 스풀링은 주기억장치를 버퍼로 사용한다.','버퍼링과 스풀링은 저속의 입출력 장치와 고속의 CPU 간의 속도 차를 해소하기 위해 사용한다.'],answer:3,explanation:{summary:'버퍼링=주기억장치(RAM)를 버퍼로 사용. 스풀링=보조기억장치(디스크)를 버퍼로 사용.',choiceAnalysis:[{n:1,text:'맞음. 버퍼링: CPU와 I/O 중첩',correct:false},{n:2,text:'맞음. 스풀링: 다른 작업 I/O와 CPU 병행',correct:false},{n:3,text:'틀림. 버퍼링=RAM, 스풀링=디스크(보조기억장치) ✓',correct:true},{n:4,text:'맞음. 속도 차 해소',correct:false}],concept:{title:'📌 버퍼링 vs 스풀링',items:['버퍼링: 주기억장치(RAM) 버퍼, 단일 작업','스풀링: 보조기억장치(디스크) 버퍼, 다중 작업','예: 인쇄 스풀링=인쇄 데이터를 디스크에 저장 후 프린터로']}}},
{id:2009,category:'운영체제론',number:9,question:'프로세스(process)에 대한 설명으로 옳지 않은 것은?',choices:['실행 중인 프로그램을 의미하며, 프로세스는 실행 시 상태를 변환한다.','프로세스의 상태는 프로세스의 현재 행위에 의해 정의되며, 생성, 준비, 실행, 대기, 종료 상태 중 하나이다.','시스템 내의 프로세스는 병행 수행이 불가능하며 직렬로만 수행된다.','각 프로세스는 운영체제 하에서 자신의 프로세스 제어 블록(PCB)으로 자신을 표현한다.'],answer:3,explanation:{summary:'현대 OS는 다중 프로그래밍으로 여러 프로세스 병행 수행 가능.',choiceAnalysis:[{n:1,text:'맞음. 프로세스=실행 중인 프로그램',correct:false},{n:2,text:'맞음. 5가지 상태',correct:false},{n:3,text:'틀림. 병행 수행 가능 ✓',correct:true},{n:4,text:'맞음. PCB(Process Control Block)로 관리',correct:false}],concept:{title:'📌 프로세스 특성',items:['정의: 실행 중인 프로그램(Program in execution)','상태: 생성→준비→실행→대기→종료','PCB: 프로세스 ID, 상태, PC, 레지스터, 우선순위 등']}}},
{id:2010,category:'운영체제론',number:10,question:'사용자가 요청한 작업이 커널에 등록되어 커널 공간에 PCB가 만들어지는 프로세스 상태는 무엇인가?',choices:['생성 상태','준비 상태','대기 상태','실행 상태'],answer:1,explanation:{summary:'생성(New) 상태: PCB가 생성되고 커널에 등록된 초기 상태.',choiceAnalysis:[{n:1,text:'생성 상태: PCB 생성, 커널 등록 ✓',correct:true},{n:2,text:'준비 상태: CPU 할당 대기',correct:false},{n:3,text:'대기 상태: I/O 완료 대기',correct:false},{n:4,text:'실행 상태: CPU 점유 중',correct:false}],concept:{title:'📌 프로세스 상태 전이',items:['생성(New): PCB 생성, 메모리 할당 대기','준비(Ready): 메모리 적재, CPU 할당 대기','실행(Running): CPU 점유','대기(Blocked): I/O/이벤트 대기','종료(Terminated): 실행 완료']}}},
{id:2011,category:'운영체제론',number:11,question:'할당된 시간 이전에 실행 상태의 프로세스에 입출력 연산 등이 필요하거나 새로운 자원 요청 등의 문제로 프로세서를 스스로 양도한 상태는 무엇인가?',choices:['생성 상태','준비 상태','대기 상태','실행 상태'],answer:3,explanation:{summary:'I/O 요청이나 자원 대기 → 실행→대기(Blocked) 상태로 전환.',choiceAnalysis:[{n:1,text:'생성 상태: 초기 생성',correct:false},{n:2,text:'준비 상태: CPU 대기',correct:false},{n:3,text:'대기 상태: I/O/자원 대기 ✓',correct:true},{n:4,text:'실행 상태: CPU 점유 중',correct:false}],concept:{title:'📌 실행→대기 전환',items:['I/O 요청: 입출력 완료 대기','자원 요청: 자원 할당 대기','신호 대기: 세마포어 wait()','타임 슬라이스 소진→준비 상태']}}},
{id:2012,category:'운영체제론',number:12,question:'생성, 준비, 실행, 대기, 종료의 다섯 상태를 가지는 프로세스 모델(process model)을 사용하는 시스템에서, 실행 상태의 프로세스를 대기 상태로 전환시키는 이벤트에 해당하는 것은?',choices:['페이지 폴트(page fault)','타임 슬라이스(time slice) 종료','프로세스제어블록(PCB) 삭제','프로세스 스케줄링(process scheduling)'],answer:1,explanation:{summary:'페이지 폴트: 필요한 페이지가 메모리에 없어 디스크에서 로드 대기 → 대기 상태로 전환.',choiceAnalysis:[{n:1,text:'페이지 폴트: 디스크 I/O 대기 → 대기 상태 ✓',correct:true},{n:2,text:'타임 슬라이스 종료: 실행→준비 상태',correct:false},{n:3,text:'PCB 삭제: 종료 상태',correct:false},{n:4,text:'스케줄링: 준비→실행 선택',correct:false}],concept:{title:'📌 상태 전환 이벤트',items:['실행→준비: 타임 슬라이스 소진, 인터럽트','실행→대기: I/O 요청, 페이지 폴트, 자원 대기','대기→준비: I/O 완료, 자원 할당','준비→실행: 스케줄러가 CPU 할당']}}},
{id:2013,category:'운영체제론',number:13,question:'<보기>는 프로세스를 생성할 때 필요한 세부작업에 대한 설명이다. 순서대로 옳게 나열한 것은?',boxLabel:'<보기>',boxText:'ㄱ. 링크를 걸어 해당 큐에 삽입한다.\nㄴ. 새로운 프로세스에 프로세스 식별자를 할당한다.\nㄷ. 프로세스의 모든 구성요소를 포함할 수 있는 주소 공간을 할당하고 프로세스 제어 블록을 할당한다.\nㄹ. 프로세스 제어 블록을 초기화한다.',choices:['ㄴ→ㄷ→ㄹ→ㄱ','ㄴ→ㄹ→ㄷ→ㄱ','ㄹ→ㄴ→ㄷ→ㄱ','ㄹ→ㄷ→ㄴ→ㄱ'],answer:1,explanation:{summary:'프로세스 생성: PID 할당→주소공간+PCB 할당→PCB 초기화→큐 삽입',choiceAnalysis:[{n:1,text:'ㄴ(PID)→ㄷ(주소+PCB 할당)→ㄹ(PCB 초기화)→ㄱ(큐 삽입) ✓',correct:true},{n:2,text:'순서 오류',correct:false},{n:3,text:'순서 오류',correct:false},{n:4,text:'순서 오류',correct:false}],concept:{title:'📌 프로세스 생성 순서',items:['1. PID(Process ID) 할당','2. 주소 공간과 PCB 할당','3. PCB 초기화(상태=생성, PC=시작 주소 등)','4. 준비 큐에 삽입']}}},
{id:2014,category:'운영체제론',number:14,question:'프로세스에게 할당된 메모리 영역 중 프로세스가 실행 중에 동적으로 할당받는 메모리 공간으로 읽고 쓰기가 가능한 영역은?',choices:['스택 영역','힙 영역','데이터 영역','코드 영역'],answer:2,explanation:{summary:'힙(Heap): 동적 메모리 할당 영역. malloc(), new() 등으로 런타임 할당.',choiceAnalysis:[{n:1,text:'스택: 함수 호출 시 지역변수, 복귀주소(자동 할당)',correct:false},{n:2,text:'힙: 동적 메모리 할당(malloc, new) ✓',correct:true},{n:3,text:'데이터: 전역변수, 정적변수(컴파일 시 크기 고정)',correct:false},{n:4,text:'코드(텍스트): 프로그램 코드(읽기 전용)',correct:false}],concept:{title:'📌 프로세스 메모리 구조',items:['코드(Text): 프로그램 명령어(읽기 전용)','데이터(Data): 전역변수, 정적변수','힙(Heap): 동적 할당(아래→위 증가)','스택(Stack): 함수 호출(위→아래 증가)']}}},
{id:2015,category:'운영체제론',number:15,question:'프로세스가 할당받는 주소 공간 중 호출된 함수의 복귀 주소와 지역변수를 저장하는 공간은 무엇인가?',choices:['힙(heap)','데이터(data)','스택(stack)','텍스트(text)'],answer:3,explanation:{summary:'스택(Stack): 함수 호출 시 반환 주소, 지역변수, 매개변수 저장.',choiceAnalysis:[{n:1,text:'힙: 동적 할당',correct:false},{n:2,text:'데이터: 전역/정적 변수',correct:false},{n:3,text:'스택: 복귀 주소 + 지역변수 ✓',correct:true},{n:4,text:'텍스트: 프로그램 코드',correct:false}],concept:{title:'📌 스택 프레임',items:['함수 호출 시: 반환 주소, 매개변수, 지역변수','함수 반환 시: 스택 프레임 삭제','LIFO(Last In First Out) 구조','재귀 호출 시 깊어질수록 스택 증가→스택 오버플로우 주의']}}},
{id:2016,category:'운영체제론',number:16,question:'다음 중 프로세스 제어 블록(PCB)에 포함되지 않은 것은?',choices:['프로그램 카운터(PC)','프로세스 식별자와 상태','프로세스 우선순위','프로세스 크기'],answer:4,explanation:{summary:'PCB에 프로세스 크기는 포함되지 않음. 메모리 관리 정보(기저 주소, 한계 레지스터)는 포함.',choiceAnalysis:[{n:1,text:'PC: PCB 필수 항목',correct:false},{n:2,text:'프로세스 ID, 상태: PCB 핵심 항목',correct:false},{n:3,text:'우선순위: PCB에 포함',correct:false},{n:4,text:'프로세스 크기: PCB에 직접 없음 ✓',correct:true}],concept:{title:'📌 PCB 구성 요소',items:['프로세스 ID(PID), 상태','프로그램 카운터(PC), 레지스터 저장값','CPU 스케줄링 정보(우선순위, 큐 포인터)','메모리 관리 정보(페이지 테이블, 세그먼트 테이블)','I/O 상태, 계정 정보']}}},
{id:2017,category:'운영체제론',number:17,question:'CPU를 사용하고 있는 프로세스를 교체하기 위해, 이전의 프로세스의 상태를 보관하고 새로 진입하는 프로세스의 상태를 적재하는 작업을 무엇이라 하는가?',choices:['교착상태(deadlock)','스케줄링(scheduling)','문맥교환(context switching)','상호배제(mutual exclusion)'],answer:3,explanation:{summary:'문맥교환(Context Switching): 현재 프로세스 상태(PCB)를 저장하고 다음 프로세스 상태 복원.',choiceAnalysis:[{n:1,text:'교착상태: 서로 자원을 기다리는 상태',correct:false},{n:2,text:'스케줄링: 다음 실행 프로세스 선택',correct:false},{n:3,text:'문맥교환: PCB 저장/복원 ✓',correct:true},{n:4,text:'상호배제: 임계영역 동시 접근 방지',correct:false}],concept:{title:'📌 문맥교환(Context Switch)',items:['현재 프로세스 상태(레지스터, PC, 메모리 등) → PCB에 저장','다음 프로세스의 PCB에서 상태 복원','오버헤드 발생: 잦은 문맥교환 시 성능 저하']}}},
{id:2018,category:'운영체제론',number:18,question:'다음 <보기>와 같은 동작을 수행하는 것은 무엇인가?',boxLabel:'<보기>',boxText:'∘현재 실행 중인 프로세스 P1에서 요청하면, 사용자 모드에서 커널 모드로 P1의 제어가 넘어가면서 P1을 종료한다.\n∘다시 시작할 수 있도록 현재 하드웨어 상태를 PCB1에 저장하고 다음에 실행할 프로세스로 P2를 선택한다.\n∘P2의 정보를 PCB2에서 얻어와 프로세서에 재저장하고 사용자 모드로 돌아와서 프로세스 P2를 실행한다.',choices:['상호배제(mutual exclusion)','임계영역(critical section)','문맥교환(context switching)','경쟁상태(race condition)'],answer:3,explanation:{summary:'PCB 저장 후 다음 프로세스 PCB 복원 → 문맥교환.',choiceAnalysis:[{n:1,text:'상호배제: 동시 접근 방지',correct:false},{n:2,text:'임계영역: 공유 자원 접근 코드 부분',correct:false},{n:3,text:'문맥교환: PCB 저장/복원 ✓',correct:true},{n:4,text:'경쟁상태: 결과가 실행 순서에 의존',correct:false}],concept:{title:'📌 문맥교환 과정',items:['1. 타임아웃 또는 시스템 호출 발생','2. 현재 프로세스 레지스터/PC → PCB 저장','3. 스케줄러가 다음 프로세스 선택','4. 선택된 프로세스 PCB → 레지스터 복원','5. 사용자 모드로 전환, 프로세스 재개']}}},
