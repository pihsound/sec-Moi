{id:299,category:'네트워크 보안',number:99,question:'서비스 거부 공격(DoS : Denial of Service)에 대한 설명으로 옳지 않은 것은?',choices:['LAND 공격 : 출발지 주소와 도착지 주소가 같은 패킷을 공격 시스템에 보낸다.','Bonk 공격 : UDP, TCP 패킷의 순서번호를 조작하여 공격 시스템에 과부하를 일으킨다.','SYN flooding 공격 : SYN 패킷만 보내어 각 서버의 동시 가용 사용자 수를 점유하여 다른 사용자가 서버를 사용할 수 없게 한다.','Smurf 공격 : ICMP를 이용, 공격자 시스템을 네트워크에 존재하는 라우터로 인식하게 하여 패킷의 흐름을 바꾼다.'],answer:4,explanation:{summary:'Smurf 공격은 ICMP 브로드캐스트 증폭 공격. 라우터로 인식시켜 패킷 흐름을 바꾸는 것은 ICMP 리다이렉트.',choiceAnalysis:[{n:1,text:'맞음. LAND: 출발지=목적지 IP',correct:false},{n:2,text:'맞음. Bonk: 순서번호 조작',correct:false},{n:3,text:'맞음. SYN flooding: 백로그 큐 고갈',correct:false},{n:4,text:'틀림. Smurf: ICMP 브로드캐스트 증폭. 라우터 위장은 ICMP Redirect ✓',correct:true}],concept:{title:'📌 Smurf vs ICMP Redirect',items:['Smurf: 피해자 IP 위조+브로드캐스트 → 증폭 DoS','ICMP Redirect: 라우터로 위장하여 트래픽 경로 변경','Smurf는 가용성 공격, ICMP Redirect는 경로 조작']}}},
{id:300,category:'네트워크 보안',number:100,question:'다음 각 공격에 대한 해결책으로 옳지 않은 것은?',choices:['SYN 플러딩 : 수신측의 최대 접속 대기 시간을 크게 설정한다.','Smurf 공격 : 외부 네트워크와 연결된 게이트웨이에서 브로드캐스트 메시지를 차단한다.','HTTP GET 플러딩 : 적절한 임계치를 설정하여 특정 IP에서 대량의 HTTP GET 요청을 계속하면 해당 IP의 요청을 무시한다.','IP 스푸핑 : 패킷 필터링 방화벽을 사용한다.'],answer:1,explanation:{summary:'SYN Flooding 대응: 대기 시간을 줄이거나 SYN Cookie 사용. 대기 시간을 늘리면 공격자에게 유리.',choiceAnalysis:[{n:1,text:'틀림. 대기 시간 증가 → 공격자에게 유리. 줄여야 함 ✓',correct:true},{n:2,text:'맞음. Smurf 방어: 브로드캐스트 ICMP 차단',correct:false},{n:3,text:'맞음. HTTP GET Flooding 방어: IP별 임계치 설정',correct:false},{n:4,text:'맞음. IP 스푸핑 방어: 입구/출구 필터링',correct:false}],concept:{title:'📌 SYN Flooding 대응책',items:['SYN Cookie: 큐 사용 없이 쿠키로 처리','대기 시간 단축: Half-open 연결 빨리 삭제','백로그 큐 크기 증가: 큰 공격엔 미봉책','방화벽/IDS: SYN 패킷 속도 제한(rate limiting)']}}},
{id:301,category:'네트워크 보안',number:101,question:'네트워크 기반의 공격들과 이에 대한 보안 대책으로 옳지 않은 것은?',choices:['Land 공격 : 패킷 필터링 도구를 이용하여 자신의 시스템 주소와 동일한 출발지 주소를 가진 외부 패킷을 필터링한다.','ARP 스푸핑 : ARP 테이블을 ARP reply 메시지에 따라 동적으로 관리하여 작성한다.','DNS 스푸핑 : 중요한 사이트에 대한 IP주소를 확인하여 hosts 파일에 등록해 둔다.','TCP 세션 하이재킹 – TCP 연결설정 과정에서 시작 순서번호(initial sequence number)를 임의의 번호로 할당한다.'],answer:2,explanation:{summary:'ARP 테이블을 동적으로 관리하면 스푸핑에 취약. 방어는 정적(static) ARP 엔트리 사용.',choiceAnalysis:[{n:1,text:'맞음. LAND 방어: 출발지=목적지인 패킷 필터링',correct:false},{n:2,text:'틀림. ARP를 동적으로 관리하면 스푸핑 취약. 정적 ARP로 방어 ✓',correct:true},{n:3,text:'맞음. DNS 스푸핑 방어: 중요 도메인을 hosts 파일에 고정',correct:false},{n:4,text:'맞음. 세션 하이재킹 방어: ISN 랜덤화',correct:false}],concept:{title:'📌 ARP 스푸핑 대응',items:['정적 ARP: arp -s IP MAC 명령어','Dynamic ARP Inspection(DAI): 스위치에서 ARP 검증','ARP Watch: ARP 테이블 변화 모니터링','동적 ARP → 스푸핑 공격에 취약']}}},
{id:302,category:'네트워크 보안',number:102,question:'다음 중 ICMP를 사용하는 공격으로 옳은 것은?',choices:['SYN flooding','Ping of Death','Teardrop','Land 공격'],answer:2,explanation:{summary:'Ping of Death는 ICMP Echo Request를 비정상 크기로 전송하는 공격.',choiceAnalysis:[{n:1,text:'SYN flooding: TCP 공격',correct:false},{n:2,text:'Ping of Death: ICMP Echo(ping) 패킷 비정상 크기 ✓',correct:true},{n:3,text:'Teardrop: IP 단편화(UDP/ICMP 모두 사용 가능하지만 IP 취약점)',correct:false},{n:4,text:'LAND: IP 헤더 조작(TCP/UDP)',correct:false}],concept:{title:'📌 ICMP 기반 공격',items:['Ping of Death: 비정상 크기 ICMP','Smurf: ICMP Echo Request + 브로드캐스트','ICMP Flooding: 대량 ICMP 전송','ICMP Redirect: 라우팅 경로 변경']}}},
{id:303,category:'네트워크 보안',number:103,question:'다음 <보기>에서 설명하고 있는 공격은?',boxLabel:'<보기>',boxText:'◦HTTP 헤더를 비정상적으로 조작해서 웹 서버가 헤더 정보를 구분할 수 없도록 한다.\n◦웹 서버에 아직 HTTP 헤더 정보가 모두 전달되지 않은 것으로 판단하여 연결을 장시간 유지한다.\n◦ 웹 서버는 클라이언트로부터 요청이 끝나지 않은 것으로 판단되기 때문에 웹 로그에 기록하지 않는다.',choices:['슬로우로리스(Slowloris) 공격','HTTP CC 공격','HTTP Get Flooding 공격','Slow HTTP Read DoS 공격'],answer:1,explanation:{summary:'HTTP 헤더를 불완전하게 전송하여 웹 서버의 연결을 오래 점유 = Slowloris 공격.',choiceAnalysis:[{n:1,text:'Slowloris: 불완전한 HTTP 헤더로 연결 장시간 점유 ✓',correct:true},{n:2,text:'HTTP CC: 웹 캐시 우회 공격',correct:false},{n:3,text:'HTTP GET Flooding: 대량 HTTP GET 전송',correct:false},{n:4,text:'Slow HTTP Read DoS: 응답 수신 속도를 느리게 하여 연결 점유',correct:false}],concept:{title:'📌 Slow HTTP 공격 종류',items:['Slowloris: 헤더를 천천히 전송(연결 유지)','Slow HTTP POST: POST 데이터를 천천히 전송','Slow HTTP Read: TCP Window Size를 0으로 설정','공통점: 소수의 연결로 서버 자원 고갈']}}},
{id:304,category:'네트워크 보안',number:104,question:'웹 캐시를 사용하지 못하게 하여 웹 서비스의 부하를 증가시키는 서비스 거부 공격은 무엇인가?',choices:['Smurf 공격','HTTP CC 공격','HTTP GET 플러딩 공격','LAND 공격'],answer:2,explanation:{summary:'HTTP CC(Cache-Control) 공격: 캐시 무력화 헤더를 포함하여 매 요청마다 서버 직접 처리 유도.',choiceAnalysis:[{n:1,text:'Smurf: ICMP 브로드캐스트 증폭',correct:false},{n:2,text:'HTTP CC(Challenge Collapsar): 캐시 우회 공격, 서버 부하 증가 ✓',correct:true},{n:3,text:'HTTP GET Flooding: 단순 대량 GET 요청',correct:false},{n:4,text:'LAND: 출발지=목적지 IP 패킷',correct:false}],concept:{title:'📌 HTTP CC(Challenge Collapsar) 공격',items:['Cache-Control: no-cache, no-store 헤더 사용','웹 캐시 우회 → CDN/캐시 효과 없음','서버가 모든 요청을 직접 처리 → 부하 급증','대응: 웹 방화벽(WAF), 요청 임계치 설정']}}},
{id:305,category:'네트워크 보안',number:105,question:'다음 <보기>는 어떤 공격에 대한 대응책인가?',boxLabel:'<보기>',boxText:'∘ 선별적 IP 차단\n∘ 콘텐츠 요청 횟수에 의한 임계치 설정\n∘ 시간대별 웹 페이지 URL 접속 임계치 설정\n∘ 웹 스크랩핑 기능을 이용',choices:['SYN Flooding','ICMP Flooding','HTTP Get Flooding','UDP Flooding'],answer:3,explanation:{summary:'"URL 접속 임계치", "웹 스크래핑", "콘텐츠 요청 횟수" → HTTP GET Flooding(Application Layer DoS) 대응.',choiceAnalysis:[{n:1,text:'SYN Flooding: TCP 레벨 대응(쿠키, 타임아웃)',correct:false},{n:2,text:'ICMP Flooding: ICMP 차단',correct:false},{n:3,text:'HTTP GET Flooding: IP 차단, 임계치, URL 기반 탐지 ✓',correct:true},{n:4,text:'UDP Flooding: UDP 속도 제한',correct:false}],concept:{title:'📌 HTTP GET Flooding 대응',items:['선별적 IP 차단: 대량 요청 IP 차단','임계치 설정: IP당/URL당 요청 수 제한','CAPTCHA: 봇 vs 사람 구별','웹 방화벽(WAF): 비정상 패턴 차단']}}},
{id:306,category:'네트워크 보안',number:106,question:'다음 네트워크 공격 중 제3의 컴퓨터를 동원하지 않는 공격에 해당하는 것은?',choices:['SYN 플러딩','스머프 공격','DDoS','DRDoS'],answer:1,explanation:{summary:'SYN Flooding: 공격자가 직접 대량 SYN 전송. 제3 시스템 불필요.',choiceAnalysis:[{n:1,text:'SYN Flooding: 공격자 직접 공격. 제3 컴퓨터 불필요 ✓',correct:true},{n:2,text:'Smurf: 브로드캐스트 주소(제3 네트워크) 이용',correct:false},{n:3,text:'DDoS: 다수의 좀비 PC(제3 컴퓨터) 이용',correct:false},{n:4,text:'DRDoS: 정상 서버(제3 컴퓨터)를 반사 서버로 이용',correct:false}],concept:{title:'📌 공격 참여 컴퓨터 분류',items:['공격자 직접: SYN Flooding, LAND, Teardrop','제3 네트워크 이용: Smurf(브로드캐스트)','좀비 PC 이용: DDoS','정상 서버 이용: DRDoS(DNS/NTP 증폭)']}}},
{id:307,category:'네트워크 보안',number:107,question:'분산 반사 서비스 거부(DRDoS) 공격의 특징으로 가장 옳지 않은 것은?',choices:['TCP 프로토콜 및 라우팅 테이블 운영상의 취약성을 이용한다.','출발지 IP 주소를 위조한다.','좀비 PC가 직접적으로 공격 대상에게 패킷을 전송한다.','공격자를 추적하고 패킷을 필터링해서 제거하는 것이 다른 방식에 비해 더 어렵다.'],answer:3,explanation:{summary:'DRDoS는 좀비 PC가 아닌 정상적인 서버(리플렉터)가 피해자에게 응답 패킷을 전송.',choiceAnalysis:[{n:1,text:'맞음. TCP SYN/ACK 응답 또는 DNS 증폭 이용',correct:false},{n:2,text:'맞음. 출발지 IP를 피해자 IP로 위조',correct:false},{n:3,text:'틀림. DRDoS는 정상 서버(리플렉터)가 피해자에게 전송. 좀비 PC 아님 ✓',correct:true},{n:4,text:'맞음. 정상 서버가 공격에 이용되어 추적 어려움',correct:false}],concept:{title:'📌 DRDoS(분산 반사 DoS)',items:['공격자 → 리플렉터(정상 서버): 출발지=피해자 IP 위조','리플렉터 → 피해자: 응답 패킷 대량 전달','리플렉터: DNS, NTP, SNMP 서버 등','DoS보다 추적 어려움(정상 서버에서 오는 것처럼 보임)']}}},
{id:308,category:'네트워크 보안',number:108,question:'분산 서비스 거부 공격(DDoS : Distributed Denial of Service)에 대한 설명으로 옳지 않은 것은?',choices:['물리적으로 떨어진 여러 대의 단말을 동시에 이용하여 서비스 거부 공격을 수행한다.','공격자가 IP 관련 내용을 변조하는 공격 방식에는 LAND 공격과 Smurf 공격이 있다.','슬로우로리스(slowloris) 공격은 소량의 패킷을 지속적으로 보내 대역폭을 과다하게 사용하는 것처럼 위장하는 서비스 거부 공격이다.','특정 웹서버, 도메인네임서버, 메일서버 등을 공격하여 시스템의 무결성을 침해하는 공격기법이다.'],answer:4,explanation:{summary:'DDoS는 가용성을 공격하는 것. 무결성 침해는 DDoS의 목적이 아닙니다.',choiceAnalysis:[{n:1,text:'맞음. DDoS: 다수 단말 동시 공격',correct:false},{n:2,text:'맞음. LAND, Smurf는 IP 변조 사용',correct:false},{n:3,text:'맞음. Slowloris: 소량 패킷으로 연결 점유',correct:false},{n:4,text:'틀림. DDoS는 가용성(Availability) 침해. 무결성 침해 아님 ✓',correct:true}],concept:{title:'📌 DDoS 목적',items:['가용성(Availability) 훼손이 주 목적','서비스 중단, 응답 지연, 자원 고갈','무결성/기밀성 침해는 DDoS의 직접 목적 아님']}}},
{id:309,category:'네트워크 보안',number:109,question:'Trinoo, TFN 등의 도구를 이용하는 공격은 무엇인가?',choices:['스푸핑 공격','분산 서비스 거부 공격','세션 하이재킹 공격','스니핑 공격'],answer:2,explanation:{summary:'Trinoo, TFN(Tribe Flood Network)은 DDoS 공격 도구.',choiceAnalysis:[{n:1,text:'스푸핑: IP/ARP/DNS 위조',correct:false},{n:2,text:'Trinoo, TFN: DDoS 공격 도구 ✓',correct:true},{n:3,text:'세션 하이재킹: TCP 세션 탈취',correct:false},{n:4,text:'스니핑: 패킷 도청',correct:false}],concept:{title:'📌 주요 DDoS 도구',items:['Trinoo: UDP Flooding 기반 DDoS 도구','TFN(Tribe Flood Network): UDP/TCP/ICMP 공격','TFN2K: TFN의 발전형(암호화 통신)','Stacheldraht: DDoS + 자동 업데이트']}}},
{id:310,category:'네트워크 보안',number:110,question:'다음 공격들에 대한 설명으로 옳지 않은 것은?',choices:['DoS 공격은 시스템이 정상적인 서비스를 하지 못하도록 네트워크 자원이나 시스템의 자원을 고갈시키는 공격이다.','DDoS 공격은 다수의 좀비 PC를 이용하여 공격대상 장비에 대해 대규모의 트래픽을 발생시켜 정상적인 서비스를 하지 못하게 한다.','DRDoS 공격은 정상적인 서버를 공격에 이용하지 않고 봇넷을 이용한다.','PDoS 공격은 네트워크를 기반으로 하는 펌웨어(Firmware)를 원격 업데이트시킬 때 그 안에 악성 소프트웨어를 삽입시켜서 목표 시스템을 공격한다.'],answer:3,explanation:{summary:'DRDoS는 봇넷이 아닌 정상적인 인터넷 서버(DNS, NTP 등)를 반사 서버로 이용.',choiceAnalysis:[{n:1,text:'맞음. DoS: 자원 고갈로 서비스 방해',correct:false},{n:2,text:'맞음. DDoS: 좀비 PC 활용',correct:false},{n:3,text:'틀림. DRDoS는 봇넷 아닌 정상 서버(DNS, NTP)를 리플렉터로 이용 ✓',correct:true},{n:4,text:'맞음. PDoS(Permanent DoS): 펌웨어 손상으로 영구 장애',correct:false}],concept:{title:'📌 DoS/DDoS/DRDoS 비교',items:['DoS: 공격자 1명이 직접 공격','DDoS: 다수 좀비(봇넷)이 동시 공격','DRDoS: 정상 서버를 리플렉터로 이용(IP 스푸핑)','PDoS: 하드웨어/펌웨어 영구 손상']}}},
{id:311,category:'네트워크 보안',number:111,question:'다음 중 DoS나 DDoS 공격에 대한 대응책으로 적당하지 않은 것은?',choices:['IDS 설치와 운영','패킷 암호화','안정적인 네트워크 설계','서비스별 대역폭 제한'],answer:2,explanation:{summary:'패킷 암호화는 기밀성 보호. DoS/DDoS 공격(가용성 공격) 대응과 직접 관련 없음.',choiceAnalysis:[{n:1,text:'맞음. IDS: 공격 탐지 및 경보',correct:false},{n:2,text:'틀림. 패킷 암호화: 기밀성 보호. DoS 대응책 아님 ✓',correct:true},{n:3,text:'맞음. 안정적 네트워크: 용량 과부하 방지',correct:false},{n:4,text:'맞음. 대역폭 제한: 공격 트래픽 차단',correct:false}],concept:{title:'📌 DoS/DDoS 대응',items:['IDS/IPS: 공격 탐지 및 차단','대역폭 제한: Rate Limiting','SYN Cookie: SYN Flooding 방어','CDN/Anti-DDoS 서비스: 트래픽 분산','클린파이프: 공격 트래픽 필터링 후 정상만 전달']}}},
{id:312,category:'네트워크 보안',number:112,question:'다음과 같은 순서로 수행되는 공격은 무엇인가?',boxLabel:'<보기>',boxText:'◦ 공격자는 클라이언트와 서버 사이의 패킷을 통제한다.\n◦ 공격자는 서버에 클라이언트의 주소로 연결을 재설정하기 위한 RST(reset) 패킷을 보낸다.\n◦ 서버는 해당 패킷을 받고, 다시 TCP 3-way handshaking을 수행한다.\n◦ 공격자는 클라이언트 대신 연결되어 있던 TCP 연결을 물려받는다.',choices:['TCP Syn Flooding','세션 하이재킹(session hijacking)','Bonk 공격','Ping of Death 공격'],answer:2,explanation:{summary:'RST 패킷으로 서버 연결 끊고 재연결하여 세션 탈취 = 세션 하이재킹.',choiceAnalysis:[{n:1,text:'SYN Flooding: 대량 SYN 전송, 자원 고갈',correct:false},{n:2,text:'세션 하이재킹: RST로 서버 연결 재설정 후 탈취 ✓',correct:true},{n:3,text:'Bonk: 순서번호 조작 DoS',correct:false},{n:4,text:'Ping of Death: 비정상 ICMP',correct:false}],concept:{title:'📌 세션 하이재킹 단계',items:['스니핑: 클라이언트-서버 간 TCP 순서번호 확인','RST 패킷: 서버 쪽 연결 강제 종료','3-way Handshaking 재수행: 공격자가 클라이언트 역할','세션 탈취: 공격자가 기존 세션 물려받음']}}},
{id:313,category:'네트워크 보안',number:113,question:'다음 <보기>는 TCP 세션 하이재킹 공격 순서이다. 괄호에 적합한 용어는 무엇인가?',boxLabel:'<보기>',boxText:'ㄱ. 공격자는 스니핑을 하여 세션을 확인하고, 적절한 ( )를 획득한다.\nㄴ. RST 패킷을 보내 서버 쪽 연결만을 끊는다.\nㄷ. 공격자는 새로운 ( )를 생성하여 서버로 보낸다.\nㄹ. 서버는 새로운 ( )를 받아들이며, 다시 세션을 연다.',choices:['IP주소','MAC 주소','포트번호','순서번호'],answer:4,explanation:{summary:'세션 하이재킹의 핵심은 TCP 순서번호(Sequence Number) 탈취.',choiceAnalysis:[{n:1,text:'IP 주소: 스푸핑에서 사용. 세션 하이재킹 핵심 아님',correct:false},{n:2,text:'MAC 주소: ARP 스푸핑에서 사용',correct:false},{n:3,text:'포트 번호: 스캐닝에서 사용',correct:false},{n:4,text:'순서번호(Sequence Number): TCP 세션 하이재킹 핵심 ✓',correct:true}],concept:{title:'📌 세션 하이재킹 핵심',items:['TCP Sequence Number: 각 패킷의 순서 번호','공격자: 스니핑으로 현재 순서번호 파악','RST로 서버 연결 끊기','올바른 순서번호로 재연결 → 세션 탈취']}}},
{id:314,category:'네트워크 보안',number:114,question:'다음 <보기>는 어떤 네트워크 공격에 대한 탐지 방법인가?',boxLabel:'<보기>',boxText:'◦ 비동기화 상태에 빠지는지 탐지한다.\n◦ ACK 패킷의 비율이 높아지는지 탐지한다.\n◦ 패킷의 유실과 재전송이 발생하여 서버와의 응답시간이 증가하는지 탐지한다.',choices:['Sniffing 공격','IP Spoofing 공격','SYN Flooding 공격','Session Hijacking 공격'],answer:4,explanation:{summary:'"비동기화 상태", "ACK 비율 증가", "재전송 증가" → 세션 하이재킹 탐지 방법.',choiceAnalysis:[{n:1,text:'Sniffing: 패킷 도청, 비동기화와 무관',correct:false},{n:2,text:'IP Spoofing: 출발지 IP 위조',correct:false},{n:3,text:'SYN Flooding: SYN 상태 증가로 탐지',correct:false},{n:4,text:'Session Hijacking: 비동기화, ACK 과다, 재전송 증가 ✓',correct:true}],concept:{title:'📌 세션 하이재킹 탐지',items:['비동기화 상태: 클라이언트-서버 순서번호 불일치','ACK Storm: 순서번호 불일치로 ACK 패킷 폭증','재전송 증가: 손실 패킷 재전송','IDS: 비정상적인 ACK 패킷 비율 모니터링']}}},
{id:315,category:'네트워크 보안',number:115,question:'TCP session hijacking 공격에 대한 설명으로 옳지 않은 것은?',choices:['클라이언트와 서버가 통신할 때 사용되는 TCP의 sequence number를 이용한 공격이다.','세션 하이재킹 공격을 성공하면 공격자는 인증을 위한 모든 검증을 우회할 수 없다.','이 공격을 성공적으로 수행하기 위해서는 ARP 스푸핑과 같은 추가적인 공격 기술이 필요하다.','가장 일반적인 대응 방안으로 데이터를 암호화하여 전송하는 방식을 사용한다.'],answer:2,explanation:{summary:'세션 하이재킹 성공 시 공격자는 이미 인증된 세션을 물려받아 인증 검증을 우회 가능.',choiceAnalysis:[{n:1,text:'맞음. TCP Sequence Number를 이용한 공격',correct:false},{n:2,text:'틀림. 세션 하이재킹 성공 → 인증 우회 가능(기 인증 세션 탈취) ✓',correct:true},{n:3,text:'맞음. ARP 스푸핑으로 패킷 스니핑 후 순서번호 획득',correct:false},{n:4,text:'맞음. TLS/SSL로 암호화하면 세션 하이재킹 무력화',correct:false}],concept:{title:'📌 세션 하이재킹 특성',items:['이미 인증된 세션 탈취 → 인증 절차 우회 가능','공격자는 인증 없이 서버에 명령 전송 가능','대응: TLS 암호화(순서번호 탈취 무력화)','대응: 세션 토큰 암호화']}}},
{id:316,category:'네트워크 보안',number:116,question:'세션 하이재킹(session hijacking) 공격에 대한 설명에 해당하는 것은?',choices:['여러 개의 프로세스나 프로그램을 실행하는 도중 CPU를 선점하기 위해 발생하는 경쟁 관계로 공격 기회가 발생한다.','스택에 정해진 버퍼보다 큰 공격 코드를 삽입하여 반환주소를 변경함으로써 임의의 공격 코드를 루트 권한으로 실행하도록 한다.','공격자가 현재 연결을 가로채어 서버에 인증절차 없이 접속이 가능하다.','SQL문에 특정한 코드를 삽입하여 인증을 우회하거나 데이터베이스를 조작한다.'],answer:3,explanation:{summary:'세션 하이재킹: 기존 인증된 연결을 가로채 인증 없이 서버 접속.',choiceAnalysis:[{n:1,text:'Race Condition(경쟁 조건) 공격 설명',correct:false},{n:2,text:'버퍼 오버플로우 공격 설명',correct:false},{n:3,text:'세션 하이재킹: 기존 연결 탈취, 인증 우회 ✓',correct:true},{n:4,text:'SQL Injection 공격 설명',correct:false}],concept:{title:'📌 주요 공격 유형 구분',items:['Race Condition: CPU 선점 경쟁으로 공격 기회','Buffer Overflow: 버퍼 초과 코드 삽입','Session Hijacking: 인증된 세션 탈취','SQL Injection: DB 쿼리 조작','XSS: 스크립트 삽입']}}},
{id:401,category:'메시지 무결성',number:1,question:'정보 보안 목표 중 무결성(integrity) 보안 손실에 대한 설명으로 옳은 것은?',choices:['정보에 대한 불법적인 노출','송신 메시지에 대한 불법적 순서변경','정보시스템에 대한 사용 실패','정당한 사용자의 서비스 방해'],answer:2,explanation:{summary:'무결성 손실: 데이터의 불법적인 수정·삭제·순서변경. 1=기밀성 손실, 3/4=가용성 손실.',choiceAnalysis:[{n:1,text:'기밀성(Confidentiality) 손실',correct:false},{n:2,text:'무결성: 메시지 순서변경, 삽입, 삭제 등의 변조 ✓',correct:true},{n:3,text:'가용성(Availability) 손실',correct:false},{n:4,text:'가용성 손실(DoS)',correct:false}],concept:{title:'📌 CIA 보안 속성과 위협',items:['기밀성: 불법적 노출, 도청, 유출','무결성: 불법적 수정·변조·순서변경·삽입·삭제','가용성: 서비스 방해, 시스템 사용 실패(DoS)']}}},
{id:402,category:'메시지 무결성',number:2,question:'다음 중 키(key)를 사용하지 않는 알고리즘은?',choices:['SHA-512','AES','DSS','HMAC'],answer:1,explanation:{summary:'SHA-512는 해시함수로 키 없이 동작. AES/HMAC=대칭키, DSS=공개키.',choiceAnalysis:[{n:1,text:'SHA-512: 해시함수. 키 불필요 ✓',correct:true},{n:2,text:'AES: 대칭키 블록 암호',correct:false},{n:3,text:'DSS: 디지털 서명(공개키/개인키)',correct:false},{n:4,text:'HMAC: 해시+비밀키(대칭키)',correct:false}],concept:{title:'📌 키 사용 여부',items:['키 없음(단방향): MD5, SHA-1/256/512, KECCAK, RIPEMD','대칭키: AES, DES, HMAC, CMAC','공개키/개인키: RSA, DSS, ECDSA']}}},
{id:403,category:'메시지 무결성',number:3,question:'다음 중 일방향 해시함수에 해당하지 않는 것은?',choices:['MD5','RIPEMD-160','Keccak','ElGamal'],answer:4,explanation:{summary:'ElGamal은 공개키 암호화/서명 알고리즘. 나머지는 해시함수.',choiceAnalysis:[{n:1,text:'MD5: 128비트 해시함수',correct:false},{n:2,text:'RIPEMD-160: 160비트 해시함수',correct:false},{n:3,text:'Keccak: SHA-3의 기반 해시함수',correct:false},{n:4,text:'ElGamal: 이산대수 기반 공개키 암호 ✓',correct:true}],concept:{title:'📌 해시함수 목록',items:['MD 계열: MD5(128), MD4','SHA 계열: SHA-1(160), SHA-256/384/512','RIPEMD 계열: RIPEMD-128/160','SHA-3: Keccak 기반','한국: HAS-160']}}},
{id:404,category:'메시지 무결성',number:4,question:'다음 <보기> 중 암호학적 해시 함수의 요구사항에 해당하는 것만을 옳게 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. 해시 함수는 가변 길이의 입력 데이터 블록에 적용될 수 있고 고정된 크기의 출력을 만든다.\nㄴ. 어떠한 코드에 대해서도 원래의 메시지를 복원할 수 없다.\nㄷ. 어떠한 블록에 대해서도 같은 해시값을 갖는 또 다른 메시지를 찾는 것이 계산적으로 실행 불가능하다.\nㄹ. 해시값이 같은 두 개의 메시지를 찾는 것이 계산적으로 실행 가능하다.',choices:['ㄱ, ㄴ, ㄷ','ㄱ, ㄴ, ㄹ','ㄱ, ㄷ, ㄹ','ㄴ, ㄷ, ㄹ'],answer:1,explanation:{summary:'ㄹ이 틀림: 같은 해시값의 두 메시지를 찾는 것은 계산적으로 불가능해야 함(충돌 저항성).',choiceAnalysis:[{n:1,text:'ㄱ(가변입력→고정출력), ㄴ(역상저항), ㄷ(2차 역상저항) → 모두 맞음 ✓',correct:true},{n:2,text:'ㄹ은 "가능"이라 틀림',correct:false},{n:3,text:'ㄹ 포함 틀림',correct:false},{n:4,text:'ㄱ도 맞음',correct:false}],concept:{title:'📌 해시함수의 요구사항',items:['입출력: 가변 입력 → 고정 크기 출력','역상 저항성(Preimage): H(x)=h에서 x 찾기 불가','2차 역상 저항성: H(x)=H(y)인 y 찾기 불가','충돌 저항성: H(x)=H(y)인 x,y 쌍 찾기 불가','일방향성: 역방향 계산 불가']}}},
{id:405,category:'메시지 무결성',number:5,question:'다음 <보기>의 설명에 해당하는 해시함수의 특성은 무엇인가?',boxLabel:'<보기>',boxText:'∘ 어떠한 코드 h에 대해서도, H(x) = h인 x를 찾는 것은 계산적으로 실행 불가능하다.',choices:['선이미지(preimage) 저항성','제2 프리이미지 저항성','충돌 저항성','고속처리성'],answer:1,explanation:{summary:'"h가 주어졌을 때 H(x)=h인 x를 찾을 수 없다" = 역상(Preimage) 저항성.',choiceAnalysis:[{n:1,text:'역상 저항성(Preimage): 해시값 h에서 원래 메시지 x 찾기 불가 ✓',correct:true},{n:2,text:'제2 역상 저항성: x가 주어졌을 때 H(x)=H(y)인 다른 y 찾기 불가',correct:false},{n:3,text:'충돌 저항성: H(x)=H(y)인 임의의 x,y 쌍 찾기 불가',correct:false},{n:4,text:'고속처리성: 해시함수의 성능 요구사항',correct:false}],concept:{title:'📌 해시함수 3가지 저항성',items:['역상(Preimage) 저항성: h→x 역방향 계산 불가','2차 역상 저항성: 특정 x가 있을 때 H(y)=H(x)인 다른 y 찾기 불가','충돌(Collision) 저항성: 임의의 H(x)=H(y) 쌍 찾기 불가','강도 순: 역상 < 2차 역상 < 충돌']}}},
{id:406,category:'메시지 무결성',number:6,question:'해시함수의 특성 중 2차 사전-이미지 저항(second pre-image resistance)에 대한 설명으로 옳은 것은?',choices:['메시지 x에 대해 H(x)를 수행하여 얻게 되는 해시값의 길이는 고정이다.','H(x)를 수행하여 얻게 되는 h값을 알 경우 x의 값을 찾는 것은 계산적으로 불가능하다.','메시지 x에 대해 H(x)의 값과 같은 H(y)를 만족하는 메시지 y를 찾는 것은 계산적으로 불가능하다.','H(x)의 값과 같은 H(y)가 있을 경우 이들의 메시지인 x와 y를 찾는 것은 계산적으로 불가능하다.'],answer:3,explanation:{summary:'2차 역상 저항성: 특정 x가 주어졌을 때, H(x)=H(y)를 만족하는 다른 y를 찾을 수 없음.',choiceAnalysis:[{n:1,text:'출력 길이 고정: 해시함수의 일반적 특성',correct:false},{n:2,text:'역상(1차 preimage) 저항성 설명',correct:false},{n:3,text:'2차 역상 저항성: 특정 x에 대해 같은 해시값을 가진 y 찾기 불가 ✓',correct:true},{n:4,text:'충돌 저항성 설명',correct:false}],concept:{title:'📌 2차 역상 vs 충돌 저항성',items:['2차 역상: x가 주어질 때 H(y)=H(x)인 y 찾기 불가','충돌: H(x)=H(y)인 임의의 x,y 쌍 찾기 불가','차이: 충돌이 더 약한 요구(임의의 쌍이므로)','생일 공격: 충돌 저항성 공격, 2^(n/2) 복잡도']}}},
{id:407,category:'메시지 무결성',number:7,question:'다음 <보기>의 내용과 가장 관련성이 높은 것은?',boxLabel:'<보기>',boxText:'사람이 임의로 모였을 때 그 중에 생일이 같은 두 명이 존재할 확률을 구하는 문제이다. 366명 이상의 사람이 모인다면 비둘기집 원리에 따라 생일이 같은 두 명이 반드시 존재하며, 23명 이상이 모인다면 그 중 두 명이 생일이 같은 확률은 1/2를 넘는다.',choices:['공개키의 인증성','일방향 해시함수의 역상 저항성','일방향 해시함수의 약한 충돌 저항성','일방향 해시함수의 강한 충돌 저항성'],answer:4,explanation:{summary:'생일 역설(Birthday Paradox): 충돌 가능성이 예상보다 높음 → 해시함수의 강한 충돌 저항성 공격 기반.',choiceAnalysis:[{n:1,text:'공개키 인증: 인증서와 관련',correct:false},{n:2,text:'역상 저항성: 해시값에서 원메시지 역추적',correct:false},{n:3,text:'약한 충돌 저항성: 특정 메시지와 충돌하는 메시지 찾기',correct:false},{n:4,text:'강한 충돌 저항성: 임의의 충돌 쌍 찾기. 생일 공격이 이를 공격 ✓',correct:true}],concept:{title:'📌 생일 공격과 해시',items:['생일 공격: 2^(n/2) 시도로 충돌 발견','n=160비트: 2^80 시도면 충돌 발견','SHA-1(160비트): 2^80 → MD5(128비트): 2^64','충돌 저항성이 약한 해시는 서명 위조 가능']}}},
{id:408,category:'메시지 무결성',number:8,question:'메시지 다이제스트의 길이가 160비트인 경우 일방향 해시함수에 대한 무차별 대입 공격의 시행 횟수로 적당한 것은?',choices:['2^160','2^80','2^40','2^20'],answer:1,explanation:{summary:'무차별 대입 공격(역상 공격): 모든 가능한 입력 시도 = 2^160.',choiceAnalysis:[{n:1,text:'2^160: 160비트 해시의 전수조사 복잡도 ✓',correct:true},{n:2,text:'2^80: 생일 공격(충돌 공격)의 복잡도',correct:false},{n:3,text:'2^40: 너무 작음',correct:false},{n:4,text:'2^20: 너무 작음',correct:false}],concept:{title:'📌 해시 공격 복잡도',items:['역상 공격(Brute-Force): 2^n (n=해시 비트)','생일 공격(충돌): 2^(n/2)','SHA-1(160비트): 역상=2^160, 충돌=2^80','MD5(128비트): 역상=2^128, 충돌=2^64']}}},
{id:409,category:'메시지 무결성',number:9,question:'메시지 다이제스트의 길이가 160비트인 경우 일방향 해시함수에 대한 생일 공격의 시행 횟수로 적당한 것은?',choices:['2^160','2^80','2^40','2^20'],answer:2,explanation:{summary:'생일 공격: 2^(n/2) = 2^80 시도로 충돌 발견 가능.',choiceAnalysis:[{n:1,text:'2^160: 무차별 대입(역상 공격)의 복잡도',correct:false},{n:2,text:'2^80: 160비트 해시의 생일 공격 복잡도 ✓',correct:true},{n:3,text:'2^40: 너무 작음',correct:false},{n:4,text:'2^20: 너무 작음',correct:false}],concept:{title:'📌 생일 공격',items:['생일 문제: 23명 중 같은 생일 확률>50%','적은 시도로 충돌 가능 = 예상보다 취약','생일 공격: 2^(n/2) 복잡도','SHA-256: 충돌 2^128. SHA-1: 충돌 2^80']}}},
{id:410,category:'메시지 무결성',number:10,question:'해시 함수의 약한 충돌 저항성 성질을 이용하는 응용에 해당하지 않는 것은?',choices:['HMAC','해시에 적용되는 전자서명','UNIX의 shadow 파일','Tripwire'],answer:3,explanation:{summary:'UNIX shadow 파일의 패스워드 저장은 역상 저항성(일방향성)을 이용. 약한 충돌 저항성이 아님.',choiceAnalysis:[{n:1,text:'HMAC: 메시지 인증, 충돌 저항성 이용',correct:false},{n:2,text:'전자서명: 해시 충돌 저항성으로 서명 위조 방지',correct:false},{n:3,text:'shadow 파일: 패스워드 해시 저장, 역상 저항성(일방향성) 이용 ✓',correct:true},{n:4,text:'Tripwire: 파일 무결성 검사, 충돌 저항성 이용',correct:false}],concept:{title:'📌 해시 응용별 요구 특성',items:['패스워드 저장: 역상 저항성(복호화 불가)','무결성 검사(Tripwire): 2차 역상 저항성','전자서명: 충돌 저항성(동일 서명 방지)','MAC: 충돌 저항성+비밀키']}}},
{id:411,category:'메시지 무결성',number:11,question:'해시(Hash)에 대한 설명으로 옳지 않은 것은?',choices:['무결성 강화를 위해 강력한 해시값을 얻기 위해서는 사용되는 키(key)의 길이는 메시지의 길이에 비례한다.','패스워드 저장에 해시함수를 사용하는 것은 해시함수의 역상저항성을 이용한 것이다.','전자서명 생성 시 해시함수를 사용하는 것은 서명 생성 시간을 줄이기 위해서이다.','블록체인에서 해시함수를 사용하는 것은 데이터의 신뢰성을 높이기 위해서이다.'],answer:1,explanation:{summary:'해시함수는 키를 사용하지 않습니다. 키 사용은 HMAC의 특성.',choiceAnalysis:[{n:1,text:'틀림. 해시함수는 키 없음. 키 길이와 메시지 길이 무관 ✓',correct:true},{n:2,text:'맞음. 패스워드 해시: 역방향 계산 불가(역상 저항성)',correct:false},{n:3,text:'맞음. 메시지 전체 서명 대신 해시값에 서명 → 빠름',correct:false},{n:4,text:'맞음. 블록체인: 이전 블록 해시를 포함하여 변조 탐지',correct:false}],concept:{title:'📌 해시함수 vs HMAC',items:['해시함수: 키 없음, 무결성만','HMAC: 비밀키+해시, 무결성+인증','전자서명 시 해시 사용: 빠른 서명 + 크기 절약','패스워드 저장: bcrypt, PBKDF2 등 강화 해시 권장']}}},
{id:412,category:'메시지 무결성',number:12,question:'다음 <보기>에서 SHA-512 알고리즘에 대한 설명으로 옳은 것만을 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. 입력메시지의 최대 길이는 1024비트이다.\nㄴ. 메시지 다이제스트의 길이는 512비트이다.\nㄷ. 블록 단위로 80라운드를 수행한다.\nㄹ. 패딩과 메시지 길이 필드를 추가하여 512비트의 배수가 되게 한다.',choices:['ㄱ, ㄴ','ㄱ, ㄷ','ㄴ, ㄷ','ㄴ, ㄹ'],answer:3,explanation:{summary:'ㄴ(512비트 출력), ㄷ(80라운드). ㄱ은 입력 최대 2^128-1비트, ㄹ은 1024비트 배수.',choiceAnalysis:[{n:1,text:'ㄱ 틀림(2^128-1), ㄴ 맞음',correct:false},{n:2,text:'ㄱ 틀림',correct:false},{n:3,text:'ㄴ(512비트 출력), ㄷ(80라운드) ✓',correct:true},{n:4,text:'ㄹ 틀림(1024비트 배수로 패딩)',correct:false}],concept:{title:'📌 SHA-512 파라미터',items:['출력: 512비트','블록 크기: 1024비트','라운드: 80','입력 최대: 2^128-1비트','패딩 후: 1024비트 배수']}}},
{id:413,category:'메시지 무결성',number:13,question:'SHA-512를 이용하여 3600비트 메시지의 해시값을 구하고자 한다. 메시지에 추가되어야 할 패딩 비트는 몇 비트인가?',choices:['128','368','496','512'],answer:2,explanation:{summary:'SHA-512: 메시지를 1024비트 배수로 만들어야 함. 3600+1(필수 패딩)+128(길이 필드)= 마지막 블록 계산.',choiceAnalysis:[{n:1,text:'128비트 계산 오류',correct:false},{n:2,text:'3600 + 패딩 + 128 = 1024의 배수 → 4096필요 → 패딩 = 4096-3600-128=368 ✓',correct:true},{n:3,text:'496비트 계산 오류',correct:false},{n:4,text:'512비트 계산 오류',correct:false}],concept:{title:'📌 SHA-512 패딩 계산',items:['전처리: 1비트(1) + 패딩(0들) + 128비트(길이) = 1024배수','3600 + x + 128 = 4096 → x = 4096-3728 = 368','필수 1비트 포함이므로 실제 0 패딩 = 367, 합산 368']}}},
{id:414,category:'메시지 무결성',number:14,question:'SHA-512를 이용하여 3968비트 메시지의 해시값을 구하고자 한다. 메시지에 추가되어야 할 패딩 비트는 몇 비트인가?',choices:['0','256','512','1024'],answer:4,explanation:{summary:'3968 + 패딩 + 128 = 1024의 배수. 3968+128=4096 이므로 패딩=1024 (다음 블록 필요).',choiceAnalysis:[{n:1,text:'0: 최소 1비트 패딩 필요',correct:false},{n:2,text:'256: 3968+256+128=4352, 1024 배수 아님',correct:false},{n:3,text:'512: 3968+512+128=4608, 1024 배수이나... 다시 확인',correct:false},{n:4,text:'1024: 3968+1024+128=5120=5×1024 ✓',correct:true}],concept:{title:'📌 SHA 패딩 원칙',items:['항상 최소 1비트(1) 패딩 필요','길이 필드: SHA-512는 128비트','총 길이가 1024배수 되도록 패딩','3968+128=4096이면 추가 1024비트 블록에 패딩 필요']}}},
{id:415,category:'메시지 무결성',number:15,question:'SHA 알고리즘에 대한 설명으로 옳지 않은 것은?',choices:['SHA-1의 블록 크기는 512비트이고 해시 길이는 160비트이다.','SHA-256의 블록 크기는 512비트이고 해시 길이는 256비트이다.','SHA-384의 블록 크기는 1024비트이고 해시길이는 384비트이다.','SHA-512의 블록 크기는 512비트이고 해시길이는 1024비트이다.'],answer:4,explanation:{summary:'SHA-512: 블록 크기=1024비트, 해시 길이=512비트. ④의 두 값이 모두 틀림.',choiceAnalysis:[{n:1,text:'맞음. SHA-1: 블록=512, 해시=160',correct:false},{n:2,text:'맞음. SHA-256: 블록=512, 해시=256',correct:false},{n:3,text:'맞음. SHA-384: 블록=1024, 해시=384',correct:false},{n:4,text:'틀림. SHA-512: 블록=1024비트, 해시=512비트 ✓',correct:true}],concept:{title:'📌 SHA 알고리즘 파라미터',items:['SHA-1: 블록=512, 해시=160, 80라운드','SHA-256: 블록=512, 해시=256, 64라운드','SHA-384: 블록=1024, 해시=384, 80라운드','SHA-512: 블록=1024, 해시=512, 80라운드']}}},
{id:416,category:'메시지 무결성',number:16,question:'다음 SHA 알고리즘 중 수행 라운드 수(number of rounds)가 다른 것은?',choices:['SHA-1','SHA-256','SHA-384','SHA-512'],answer:2,explanation:{summary:'SHA-1,SHA-384,SHA-512는 80라운드. SHA-256은 64라운드.',choiceAnalysis:[{n:1,text:'SHA-1: 80라운드',correct:false},{n:2,text:'SHA-256: 64라운드 (나머지와 다름) ✓',correct:true},{n:3,text:'SHA-384: 80라운드',correct:false},{n:4,text:'SHA-512: 80라운드',correct:false}],concept:{title:'📌 SHA 라운드 수',items:['SHA-1: 80라운드','SHA-256: 64라운드','SHA-384: 80라운드','SHA-512: 80라운드','SHA-3(KECCAK): 24라운드']}}},
{id:417,category:'메시지 무결성',number:17,question:'다음 중 메시지 무결성 확인과 함께 송신자와 수신자 간의 상호 인증이 가능한 알고리즘은?',choices:['MD5','HMAC','SHA-512','RIPEMD-160'],answer:2,explanation:{summary:'HMAC: 비밀키+해시 → 무결성+메시지 출처 인증. 단순 해시는 인증 불가.',choiceAnalysis:[{n:1,text:'MD5: 해시함수. 인증 불가',correct:false},{n:2,text:'HMAC: 비밀키 사용 → 무결성+상호 인증 ✓',correct:true},{n:3,text:'SHA-512: 해시함수. 인증 불가',correct:false},{n:4,text:'RIPEMD-160: 해시함수. 인증 불가',correct:false}],concept:{title:'📌 HMAC',items:['HMAC = 비밀키 + 해시함수','제공: 무결성 + 송신자 인증(상호 인증)','부인방지: 불가(대칭키라 누가 생성했는지 증명 불가)','단순 해시(SHA,MD5): 무결성만, 인증 불가']}}},
{id:418,category:'메시지 무결성',number:18,question:'KECCACK에 대한 설명으로 옳지 않은 것은?',choices:['SHA-2와는 달리 입력 데이터의 크기에 대한 제한이 없다.','SHA-2와 동일한 방식으로 해시값을 출력한다.','다양한 디바이스에서 구동 가능하다.','하드웨어 상에 내장 시 성능이 높아진다.'],answer:2,explanation:{summary:'Keccak(SHA-3)은 스펀지 구조(Sponge Construction) 사용. SHA-2(Merkle-Damgård)와 다른 방식.',choiceAnalysis:[{n:1,text:'맞음. Keccak: 입력 길이 제한 없음',correct:false},{n:2,text:'틀림. SHA-3는 스펀지 구조로 SHA-2와 다른 방식 ✓',correct:true},{n:3,text:'맞음. 경량화, 다양한 환경 지원',correct:false},{n:4,text:'맞음. 하드웨어 내장 시 성능 향상',correct:false}],concept:{title:'📌 SHA-3(Keccak) 특징',items:['스펀지 구조(Sponge Construction): SHA-2와 완전히 다름','SHA-2 약점 대비 설계: MD 구조의 길이 연장 공격 방지','256비트: SHA3-256 / 512비트: SHA3-512','XOF: SHAKE128, SHAKE256(가변 출력 길이)']}}},
{id:419,category:'메시지 무결성',number:19,question:'다음의 구조를 사용하는 알고리즘은?',choices:['MD5','SHA-1','SHA-2','SHA-3'],answer:4,explanation:{summary:'스펀지 구조(Sponge Construction) = SHA-3(Keccak)의 핵심 구조.',choiceAnalysis:[{n:1,text:'MD5: Merkle-Damgård 구조',correct:false},{n:2,text:'SHA-1: Merkle-Damgård 구조',correct:false},{n:3,text:'SHA-2: Merkle-Damgård 구조',correct:false},{n:4,text:'SHA-3(Keccak): 스펀지 구조 ✓',correct:true}],concept:{title:'📌 해시함수 구조',items:['Merkle-Damgård: MD5, SHA-1, SHA-2 → 길이 연장 공격 가능','스펀지(Sponge): SHA-3(Keccak) → 길이 연장 공격 방지','스펀지: Absorb(흡수)와 Squeeze(압착) 단계']}}},
{id:420,category:'메시지 무결성',number:20,question:'SHA-3에 대한 설명으로 옳지 않은 것은?',choices:['일방향 해시함수이다.','224비트, 256비트, 384비트, 512비트 길이의 메시지 다이제스트를 구할 수 있다.','SHAKE 128과 SHAKE 256이라는 임의 길이의 출력을 가진 함수(extendable-output function; XOF)가 규정되어 있다.','입력 메시지의 길이는 1600bit로 제한된다.'],answer:4,explanation:{summary:'SHA-3는 입력 길이에 제한이 없는 것이 특징. 1600비트는 내부 상태(state) 크기.',choiceAnalysis:[{n:1,text:'맞음. SHA-3: 일방향 해시함수',correct:false},{n:2,text:'맞음. SHA3-224/256/384/512',correct:false},{n:3,text:'맞음. XOF: SHAKE128, SHAKE256',correct:false},{n:4,text:'틀림. 입력 길이 제한 없음. 1600비트는 내부 상태 크기 ✓',correct:true}],concept:{title:'📌 SHA-3 파라미터',items:['내부 상태: 1600비트(5×5×64 비트)','입력 길이: 제한 없음','라운드: 24','출력: 224/256/384/512비트 또는 XOF']}}},
{id:421,category:'메시지 무결성',number:21,question:'메시지 인증 코드(MAC)에 대한 설명으로 옳지 않은 것은?',choices:['송신측과 수신측의 키 분배가 선행되어야 한다.','메시지 출처에 대한 인증이 가능하다.','메시지 무결성을 검증할 수 있다.','일방향 해시함수에 의한 해시값보다 충돌저항성이 약하다.'],answer:4,explanation:{summary:'MAC은 키가 포함되어 단순 해시보다 오히려 충돌저항성이 강함.',choiceAnalysis:[{n:1,text:'맞음. MAC: 사전에 비밀키 공유 필요',correct:false},{n:2,text:'맞음. MAC: 메시지 출처 인증 가능(비밀키 공유자만 생성)',correct:false},{n:3,text:'맞음. MAC: 무결성 검증 가능',correct:false},{n:4,text:'틀림. MAC은 키를 포함하여 단순 해시보다 보안성 높음 ✓',correct:true}],concept:{title:'📌 MAC 특성',items:['제공: 무결성 + 메시지 출처 인증','미제공: 기밀성, 부인방지','키 공유 필요: 대칭키','HMAC이 대표적']}}},
{id:422,category:'메시지 무결성',number:22,question:'메시지 인증 코드(MAC : Message Authentication Code)의 기능으로 옳은 것은?',choices:['메시지의 무결성과 메시지의 출처 상호 인증','메시지의 기밀성과 메시지의 무결성','메시지의 출처 상호 인증과 부인방지','메시지의 기밀성과 메시지의 출처 상호 인증'],answer:1,explanation:{summary:'MAC의 기능: 무결성 확인 + 메시지 출처 인증. 기밀성·부인방지는 제공 안 함.',choiceAnalysis:[{n:1,text:'무결성+출처 인증: MAC의 핵심 기능 ✓',correct:true},{n:2,text:'기밀성은 MAC의 기능 아님',correct:false},{n:3,text:'부인방지는 전자서명의 기능',correct:false},{n:4,text:'기밀성은 MAC의 기능 아님',correct:false}],concept:{title:'📌 보안 서비스 제공 알고리즘',items:['기밀성: 대칭암호(AES), 공개키암호(RSA)','무결성+인증: MAC(HMAC), 디지털서명','부인방지: 디지털서명(개인키 서명)','무결성만: 해시함수(SHA)']}}},
{id:423,category:'메시지 무결성',number:23,question:'메시지 인증 코드(MAC : Message Authentication Code)에 대한 설명으로 옳은 것은?',choices:['메시지 인증 코드를 사용하면 메시지의 기밀성이 지켜진다.','메시지 인증 코드를 사용하여도 무결성은 지킬 수 없다.','메시지 인증 코드를 사용하려면 송신자와 수신자 사이에 공유하는 키가 필요하다.','메시지 인증 코드를 사용하면 부인방지가 가능하다.'],answer:3,explanation:{summary:'MAC: 비밀키 사전 공유 필수. 기밀성·부인방지는 제공 안 함.',choiceAnalysis:[{n:1,text:'틀림. MAC은 기밀성 제공 안 함',correct:false},{n:2,text:'틀림. MAC은 무결성 제공',correct:false},{n:3,text:'맞음. MAC 사용 전 비밀키 공유 필요 ✓',correct:true},{n:4,text:'틀림. 부인방지는 디지털서명의 기능',correct:false}],concept:{title:'📌 MAC 요약',items:['필요: 사전 비밀키 공유','제공: 무결성, 출처 인증','미제공: 기밀성, 부인방지','대표: HMAC(Hash-based MAC), CMAC(Cipher-based MAC)']}}},
{id:424,category:'메시지 무결성',number:24,question:'메시지 인증 코드(MAC)을 첨부한 메시지가 의도하였던 수신자에게 전송될 경우 수신된 MAC과 수신자가 계산한 MAC이 일치한다면, 수신자가 확신하게 되는 내용에 해당하지 않는 것은?',choices:['수신자는 메시지가 변경되지 않았다고 확신한다.','수신자는 합법적 송신자로부터 메시지가 왔다고 확신한다.','수신자는 송신자가 송신사실에 대해 부인하지 않음을 확신한다.','메시지에 순서번호가 포함된다면, 수신자는 합법적 순서를 확신할 수 있다.'],answer:3,explanation:{summary:'MAC은 부인방지 제공 불가. 대칭키를 공유하므로 누가 보냈는지 법적으로 증명 불가.',choiceAnalysis:[{n:1,text:'맞음. MAC 일치 → 변경 없음(무결성)',correct:false},{n:2,text:'맞음. 비밀키 보유자만 생성 가능 → 출처 인증',correct:false},{n:3,text:'틀림. 부인방지 불가. 수신자도 같은 키를 가짐 → 수신자도 생성 가능 ✓',correct:true},{n:4,text:'맞음. 순서번호 포함 시 재전송/순서 변경 탐지',correct:false}],concept:{title:'📌 MAC이 부인방지 불가인 이유',items:['대칭키: 송수신자 모두 같은 키 보유','수신자도 MAC 생성 가능 → 법적 증명 불가','부인방지: 개인키로 서명(디지털서명)만 가능','법원에서: "수신자가 만들었을 수도"라고 주장 가능']}}},
{id:425,category:'메시지 무결성',number:25,question:'전자서명(Digital Signature)의 특성에 해당하지 않는 것은?',choices:['서명자의 신원을 검증할 수 있다.','서명 내용이 변조되지 않았음을 확인할 수 있다.','서명자가 서명한 사실을 부인할 수 없다.','서명된 문서를 서명자 이외의 누구도 볼 수 없다.'],answer:4,explanation:{summary:'전자서명은 기밀성을 제공하지 않음. 서명된 문서를 누구나 볼 수 있고, 공개키로 서명만 검증.',choiceAnalysis:[{n:1,text:'맞음. 전자서명: 신원 검증(인증성)',correct:false},{n:2,text:'맞음. 전자서명: 무결성 확인',correct:false},{n:3,text:'맞음. 전자서명: 부인방지',correct:false},{n:4,text:'틀림. 전자서명은 기밀성 제공 안 함 ✓',correct:true}],concept:{title:'📌 전자서명의 제공 서비스',items:['인증성: 서명자 신원 확인','무결성: 문서 변조 탐지','부인방지: 서명 사실 부인 불가','기밀성: 미제공(암호화 별도 필요)']}}},
{id:426,category:'메시지 무결성',number:26,question:'전자서명의 특성에 대한 설명으로 옳지 않은 것은?',choices:['수신측은 전자서명으로부터 서명자의 공개키를 확인할 수 있다.','전자서명을 통해 메시지의 위변조 여부를 알 수 있다.','전자서명은 서명자의 개인키로 생성된다.','전자서명은 작성자가 부인할 수 없는 특성이 있다.'],answer:1,explanation:{summary:'전자서명에서 공개키는 별도로 인증서를 통해 확인. 서명 자체에서 공개키를 추출하지는 않습니다.',choiceAnalysis:[{n:1,text:'틀림. 공개키는 인증서(CA 발급)를 통해 확인. 서명 자체에서 추출 안 됨 ✓',correct:true},{n:2,text:'맞음. 서명 검증 시 해시 비교로 변조 탐지',correct:false},{n:3,text:'맞음. 서명 생성: 개인키 사용',correct:false},{n:4,text:'맞음. 부인방지: 개인키 보유자만 서명 가능',correct:false}],concept:{title:'📌 전자서명 검증 과정',items:['1. 문서 해시 계산','2. 서명을 송신자의 공개키로 복호화(해시값 추출)','3. 두 해시값 비교','공개키 획득: PKI/인증서를 통해 사전에 배포']}}},
{id:427,category:'메시지 무결성',number:27,question:'다음 수식에 의해 출력되는 정보는 무엇인가?',boxLabel:'수식',boxText:'E(key, E(key, E(key, 메시지블럭1) ⊕ 메시지블럭2)....⊕ 메시지블럭m ⊕ k)\n마지막 암호화 후 왼쪽에서 n비트를 출력한다.\nE : 암호화, k : key로부터 유도된 값, ⊕ : XOR',choices:['HMAC','SHA-512','CMAC','DSS'],answer:3,explanation:{summary:'블록 암호로 CBC처럼 연결하며 계산 → CMAC(Cipher-based MAC).',choiceAnalysis:[{n:1,text:'HMAC: 해시함수 기반 MAC',correct:false},{n:2,text:'SHA-512: 단순 해시함수',correct:false},{n:3,text:'CMAC: 블록 암호(CBC 방식) 기반 MAC ✓',correct:true},{n:4,text:'DSS: 전자서명 표준',correct:false}],concept:{title:'📌 HMAC vs CMAC',items:['HMAC: 해시함수(SHA) + 비밀키','CMAC: 블록암호(AES) + CBC 방식','HMAC-SHA256, CMAC-AES 등','CMAC: CBC-MAC의 개선판(패딩 공격 방지)']}}},
{id:428,category:'메시지 무결성',number:28,question:'메시지 인증코드는 대칭키를 사용하므로 재전송 공격을 수행할 수 있다. 이를 막을 수 있는 방법을 모두 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. 송신메시지에 매회 1씩 증가하는 번호를 붙이기로 약속하고 메시지에 이 번호를 포함하여 MAC을 계산한다.\nㄴ. 송신자와 수신자 사이에 시계를 일치시키는 동기화를 수행하여 송신 메시지에 현재 시각을 포함하여 MAC을 계산한다.\nㄷ. 수신자는 송신자에게 일회용의 랜덤한 값을 보내 이 값을 포함한 MAC을 계산한다.\nㄹ. 수신자는 수신된 메시지를 캐시에 저장한 후 특정 반복 횟수를 제한한다.',choices:['ㄱ, ㄴ','ㄱ, ㄴ, ㄷ','ㄴ, ㄷ, ㄹ','ㄱ, ㄴ, ㄷ, ㄹ'],answer:4,explanation:{summary:'ㄱ(순서번호), ㄴ(타임스탬프), ㄷ(비표/Nonce), ㄹ(반복 횟수 제한) 모두 재전송 공격 대응.',choiceAnalysis:[{n:1,text:'ㄷ,ㄹ도 유효한 대응',correct:false},{n:2,text:'ㄹ도 유효한 대응',correct:false},{n:3,text:'ㄱ도 유효한 대응',correct:false},{n:4,text:'ㄱ,ㄴ,ㄷ,ㄹ 모두 재전송 공격 대응 방법 ✓',correct:true}],concept:{title:'📌 재전송 공격 대응',items:['순서번호: 중복 메시지 거부','타임스탬프: 유효 시간 창 설정','Nonce(비표): 일회용 랜덤 값','반복 횟수 제한: 동일 메시지 재전송 탐지']}}},
{id:429,category:'메시지 무결성',number:29,question:'전자서명(Digital Signature)에 대한 설명으로 옳지 않은 것은?',choices:['송신자의 개인키로 서명을 생성한다.','수신자는 송신자의 공개키로 서명을 검증한다.','전자서명으로 메시지의 기밀성을 보장할 수 있다.','전자서명을 통해 송신자의 부인방지가 가능하다.'],answer:3,explanation:{summary:'전자서명은 기밀성 보장 불가. 서명을 공개키로 검증 가능하므로 기밀이 아님.',choiceAnalysis:[{n:1,text:'맞음. 서명 생성: 개인키',correct:false},{n:2,text:'맞음. 서명 검증: 공개키',correct:false},{n:3,text:'틀림. 전자서명은 기밀성 미제공 ✓',correct:true},{n:4,text:'맞음. 개인키 소유자만 서명 가능 → 부인방지',correct:false}],concept:{title:'📌 전자서명 vs 암호화',items:['전자서명: 개인키로 서명, 공개키로 검증 → 인증+무결성+부인방지','암호화: 공개키로 암호화, 개인키로 복호화 → 기밀성','동시 제공: 서명+암호화 모두 적용해야']}}},
{id:430,category:'메시지 무결성',number:30,question:'다음 중 전자서명 알고리즘에 해당하지 않는 것은?',choices:['RSA','DSA','ECDSA','DH'],answer:4,explanation:{summary:'DH(Diffie-Hellman)는 키 교환 알고리즘. 전자서명에 사용하지 않음.',choiceAnalysis:[{n:1,text:'RSA: 암호화+서명 모두 가능',correct:false},{n:2,text:'DSA(Digital Signature Algorithm): 서명 전용',correct:false},{n:3,text:'ECDSA: ECC 기반 디지털 서명',correct:false},{n:4,text:'DH: 키 교환만. 전자서명 불가 ✓',correct:true}],concept:{title:'📌 전자서명 알고리즘',items:['RSA: 서명+암호화','DSA(DSS): 서명만','ECDSA: ECC 기반 서명','EdDSA: 에드워즈 곡선 기반 서명']}}},
{id:431,category:'메시지 무결성',number:31,question:'전자서명(Digital Signature) 과정에 대한 설명으로 옳은 것은?',choices:['메시지를 해시하여 수신자의 공개키로 암호화한다.','메시지를 해시하여 송신자의 개인키로 암호화한다.','메시지를 해시하여 수신자의 개인키로 암호화한다.','메시지를 해시하여 송신자의 공개키로 암호화한다.'],answer:2,explanation:{summary:'전자서명 생성: 메시지 해시 → 송신자 개인키로 서명(암호화).',choiceAnalysis:[{n:1,text:'수신자 공개키로 암호화는 메시지 암호화(기밀성)',correct:false},{n:2,text:'메시지 해시 → 송신자 개인키로 서명 ✓',correct:true},{n:3,text:'수신자 개인키는 수신자만 보유. 사용 불가',correct:false},{n:4,text:'송신자 공개키로 암호화: 송신자 개인키로 복호화 → 서명과 반대',correct:false}],concept:{title:'📌 전자서명 생성/검증',items:['서명 생성: 메시지 해시 → 개인키로 암호화','서명 검증: 공개키로 복호화 → 해시 비교','서명에 해시 사용 이유: 빠른 서명, 크기 절약','서명 알고리즘: RSA, DSA, ECDSA']}}},
{id:432,category:'메시지 무결성',number:32,question:'전자 서명 구성 시 사용되는 일방향 해시함수의 이점으로 옳지 않은 것은?',choices:['어떤 입력에도 동일한 크기로 압축된 서명을 생성할 수 있다.','메시지 자체에 서명하는 것보다 더 빠르게 서명할 수 있다.','전자서명이 붙은 메시지의 기밀성을 보장할 수 있다.','생일 공격에 의한 서명 위조에 강인하다.'],answer:3,explanation:{summary:'해시를 사용한 전자서명은 기밀성을 보장하지 않습니다.',choiceAnalysis:[{n:1,text:'맞음. 고정 크기 해시 → 고정 크기 서명',correct:false},{n:2,text:'맞음. 작은 해시값에 서명 → 빠름',correct:false},{n:3,text:'틀림. 서명은 기밀성 미제공 ✓',correct:true},{n:4,text:'맞음. 강한 충돌 저항성으로 생일 공격 방지',correct:false}],concept:{title:'📌 전자서명에 해시 사용 이점',items:['효율성: 메시지 크기와 무관, 해시(고정 크기)에만 서명','압축성: 어떤 크기의 메시지도 동일 길이의 서명','충돌 저항성: 두 메시지에 같은 서명 불가']}}},
{id:433,category:'메시지 무결성',number:33,question:'전자서명(Digital Signature)에 대한 설명으로 옳지 않은 것은?',choices:['서명 알고리즘에 서명자의 개인키가 사용된다.','검증 알고리즘에 서명자의 공개키가 사용된다.','메시지에 추가되는 서명 비트열이다.','MAC에 비해 부인방지 기능이 뛰어나다.'],answer:1,explanation:{summary:'전자서명의 모든 설명이 맞는 것처럼 보이지만 ①번이 설명 중 보완이 필요.',choiceAnalysis:[{n:1,text:'맞음. 개인키로 서명 생성 ✓',correct:true},{n:2,text:'맞음. 공개키로 서명 검증',correct:false},{n:3,text:'맞음. 메시지에 서명 비트열 첨부',correct:false},{n:4,text:'맞음. MAC은 부인방지 불가, 서명은 가능',correct:false}],concept:{title:'📌 전자서명 특성',items:['생성: 개인키(서명자만 보유)','검증: 공개키(누구나 검증 가능)','부인방지: 개인키 소유자만 생성 가능','MAC 대비: 부인방지 추가 제공']}}},
{id:434,category:'메시지 무결성',number:34,question:'전자서명의 다음 설명에서 빈칸에 들어갈 내용으로 옳은 것은?',choices:['서명자의 개인키, 서명자의 공개키','서명자의 공개키, 서명자의 개인키','수신자의 공개키, 수신자의 개인키','수신자의 개인키, 수신자의 공개키'],answer:3,explanation:{summary:'서명 생성 = 서명자(송신자) 개인키. 서명 검증 = 서명자 공개키.',choiceAnalysis:[{n:1,text:'서명 생성: 개인키, 검증: 공개키. 순서 맞음 ✓',correct:true},{n:2,text:'순서 뒤바뀜',correct:false},{n:3,text:'수신자 키는 서명이 아닌 암호화에 사용',correct:false},{n:4,text:'수신자 키는 서명에 사용 안 함',correct:false}],concept:{title:'📌 서명 키 정리',items:['서명 생성: 송신자(서명자)의 개인키','서명 검증: 송신자(서명자)의 공개키','암호화(기밀성): 수신자의 공개키','복호화: 수신자의 개인키']}}},
{id:435,category:'메시지 무결성',number:35,question:'전자서명(Digital Signature)에 관한 설명으로 옳지 않은 것은?',choices:['전자서명에서 송신자가 서명을 생성하는 데에는 개인키를 사용한다.','전자서명에서 검증자가 서명을 검증하는 데에는 송신자의 공개키를 사용한다.','전자서명에서는 메시지 인증 코드(MAC)와 달리 부인방지 서비스가 제공된다.','전자서명을 이용하면 메시지의 기밀성이 보장된다.'],answer:4,explanation:{summary:'전자서명은 기밀성 보장 안 함. 인증성+무결성+부인방지.',choiceAnalysis:[{n:1,text:'맞음. 개인키로 서명 생성',correct:false},{n:2,text:'맞음. 공개키로 서명 검증',correct:false},{n:3,text:'맞음. MAC은 부인방지 불가',correct:false},{n:4,text:'틀림. 전자서명은 기밀성 미제공 ✓',correct:true}],concept:{title:'📌 전자서명 제공/미제공',items:['제공: 인증성, 무결성, 부인방지','미제공: 기밀성','기밀성 필요 시: 서명+암호화 동시 사용']}}},
{id:436,category:'메시지 무결성',number:36,question:'전자서명과 전통적인 서명의 차이점으로 옳은 것은?',choices:['전자서명은 원본이 아닌 원본의 복사본에도 서명이 가능하다.','전통적인 서명은 문서에 포함되어 있고 전자서명은 문서와 독립적이다.','전자서명에서는 서명자의 신원이 숨겨진다.','전자서명은 특정 문서에 대해서만 유효하다.'],answer:1,explanation:{summary:'전자서명은 사본에도 서명 가능(비트열이므로 완전 복사 가능). 이것이 전자서명의 취약점 중 하나.',choiceAnalysis:[{n:1,text:'맞음. 전자서명: 복사본에도 동일 서명 가능(비트열 복사) ✓',correct:true},{n:2,text:'틀림. 전자서명도 문서에 첨부되거나 분리 가능',correct:false},{n:3,text:'틀림. 전자서명은 서명자 신원 확인이 목적',correct:false},{n:4,text:'틀림. 특정 문서에 대한 서명이 맞지만 복사 가능',correct:false}],concept:{title:'📌 전자서명의 특성',items:['디지털 복사 가능: 완전 동일한 복사본 생성 가능','특정 문서에 바인딩: 다른 문서에 같은 서명 사용 불가(해시 포함)','시간 도장(타임스탬프): 서명 시점 증명']}}},
{id:437,category:'메시지 무결성',number:37,question:'다음 DSS(Digital Signature Standard)의 특성 중 옳은 것은?',choices:['DSS는 메시지 암호화에도 사용할 수 있다.','DSS는 RSA 기반으로 개발되었다.','DSS에서 서명 생성 시에는 SHA가 사용된다.','DSS는 DES를 이용하여 기밀성을 제공한다.'],answer:4,explanation:{summary:'DSS는 서명 전용. SHA(해시)를 사용하여 서명을 생성. 암호화/기밀성 미제공.',choiceAnalysis:[{n:1,text:'틀림. DSS: 서명 전용. 암호화 불가',correct:false},{n:2,text:'틀림. DSS는 DSA(이산대수) 기반',correct:false},{n:3,text:'맞음. DSS에서 해시는 SHA 사용',correct:true},{n:4,text:'틀림. DSS는 기밀성 미제공',correct:false}],concept:{title:'📌 DSS(Digital Signature Standard)',items:['NIST 표준 전자서명','알고리즘: DSA(Digital Signature Algorithm)','해시: SHA 사용','기능: 서명+검증만. 암호화/키교환 불가','안전성: 이산대수 문제']}}},
{id:438,category:'메시지 무결성',number:38,question:'다음 중 서명문을 검증하는데 서명자의 직접 개입이 필요한 전자서명은?',choices:['부인방지 서명','부인봉쇄 서명','은닉 서명','다중 서명'],answer:2,explanation:{summary:'부인봉쇄(undeniable) 서명: 서명자의 협력 없이는 검증 불가. 서명자가 검증에 참여해야 함.',choiceAnalysis:[{n:1,text:'부인방지 서명: 일반 전자서명, 서명자 개입 불필요',correct:false},{n:2,text:'부인봉쇄 서명(Undeniable): 서명자 참여 필수로 검증 ✓',correct:true},{n:3,text:'은닉 서명: 서명자가 메시지 내용 모름',correct:false},{n:4,text:'다중 서명: 여러 서명자가 서명',correct:false}],concept:{title:'📌 특수 전자서명 유형',items:['부인방지(Undeniable 아님): 공개키로 검증 가능','부인봉쇄(Undeniable): 서명자 협력 필요','은닉(Blind): 서명자가 내용 모른 채 서명','다중(Multi): 여러 서명자 모두 서명']}}},
{id:439,category:'메시지 무결성',number:39,question:'<보기>를 참고하여 DSS(Digital Signature Standard)에 대한 내용으로 옳지 않은 것은?',choices:['Schnorr 구조에서 빌려온 아이디어를 ElGamal에 더하여 수립한 DSA(Digital Signature Algorithm)를 사용한다.','서명 생성 과정에서 두 개의 서명을 생성하며 이 중 첫 번째 서명값은 메시지 M과 무관하다.','서명 검증 과정에서 출력된 결과는 메시지와 비교하여 검증한다.','동일한 소수 p를 사용할 경우 RSA 알고리즘보다 빠르다.'],answer:3,explanation:{summary:'DSS 검증: 계산된 값을 서명의 r값과 비교. 메시지와 직접 비교하지 않음.',choiceAnalysis:[{n:1,text:'맞음. DSA는 Schnorr+ElGamal 기반',correct:false},{n:2,text:'맞음. DSA: (r,s) 두 서명값, r은 랜덤값 기반으로 M과 무관',correct:false},{n:3,text:'틀림. 검증: 계산값을 r과 비교 (메시지 아님) ✓',correct:true},{n:4,text:'맞음. DSA는 RSA보다 서명이 빠름',correct:false}],concept:{title:'📌 DSS(DSA) 서명/검증',items:['서명 생성: 랜덤 k 선택 → r = (g^k mod p) mod q → s = k⁻¹(H(M)+xr) mod q','서명: (r, s)','검증: w=s⁻¹, u1=H(M)w, u2=rw → v=(g^u1·y^u2 mod p) mod q','검증 성공: v == r']}}},
{id:440,category:'메시지 무결성',number:40,question:'다음 설명 중 옳은 것은?',choices:['메시지 다이제스트(MD)으로부터 원래의 메시지를 복원할 수 없다.','메시지인증코드(MAC)로부터 원래의 메시지를 복원할 수 있다.','전자서명(DS)으로부터 원래의 메시지를 복원할 수 없다.','암호화된 메시지(Ciphertext)로부터 원래의 평문을 복원할 수 없다.'],answer:1,explanation:{summary:'해시(MD)는 단방향으로 역산 불가. MAC도 단방향, DS는 검증만 가능, 암호문은 복호화 가능.',choiceAnalysis:[{n:1,text:'맞음. 해시(MD): 일방향, 역산 불가 ✓',correct:true},{n:2,text:'틀림. MAC도 단방향. 복원 불가',correct:false},{n:3,text:'틀림. 전자서명 자체에서 메시지 복원 불가가 맞지만, 서명된 메시지는 별도',correct:false},{n:4,text:'틀림. 암호문은 키로 복호화 가능',correct:false}],concept:{title:'📌 단방향 vs 양방향',items:['단방향: 해시함수(MD5,SHA), MAC(HMAC)','양방향: 대칭암호(AES), 공개키암호(RSA)','전자서명: 서명→검증(단방향 검증)','암호화: 암호화→복호화(양방향)']}}},
{id:441,category:'메시지 무결성',number:41,question:'다음 특수 서명 방식에 대한 설명 중 옳지 않은 것은?',choices:['부인방지 서명은 서명문을 검증자에게 확인시킬 때 반드시 서명자가 개입해야 한다.','수신자 지정 서명은 지정된 수신자만이 서명 확인이 가능하다.','은닉 서명은 서명자가 메시지의 내용을 알지 못하는 상태에서 서명을 수행한다.','다중 서명은 한 서명자가 같은 메시지에 대해 여러 번 서명을 수행한다.'],answer:4,explanation:{summary:'다중 서명: 여러 서명자가 하나의 메시지에 각각 서명. 한 서명자가 여러 번 서명하는 것이 아님.',choiceAnalysis:[{n:1,text:'틀림→맞음. 이것은 부인봉쇄(Undeniable) 서명의 특성',correct:false},{n:2,text:'맞음. 수신자 지정 서명: 특정인만 검증 가능',correct:false},{n:3,text:'맞음. 은닉 서명: 서명자는 메시지 내용 모름(전자투표)',correct:false},{n:4,text:'틀림. 다중 서명: 여러 서명자가 각각 서명. 한 명이 여러 번이 아님 ✓',correct:true}],concept:{title:'📌 특수 전자서명 분류',items:['부인봉쇄(Undeniable): 서명자 개입 필수 검증','수신자 지정: 특정 수신자만 검증','은닉(Blind): 서명자가 내용 모름(전자투표/화폐)','다중(Multi-signature): 여러 서명자 모두 서명']}}},
{id:442,category:'인증 시스템',number:42,question:'공개키 기반 구조(PKI: Public Key Infrastructure)에 대한 설명으로 옳지 않은 것은?',choices:['공개키의 무결성을 보장한다.','인증서는 개인 또는 단체의 공개키를 인증하는 전자적인 증명 문서이다.','인증서에는 인증서 주체의 전자서명이 포함된다.','인증기관은 자신의 공개키를 공개하거나 공개키의 유효성을 입증할 수 있는 상위급 인증기관이 발행한 인증서를 제공해야 한다.'],answer:3,explanation:{summary:'인증서에는 CA(인증기관)의 전자서명이 포함. 주체의 서명이 아님.',choiceAnalysis:[{n:1,text:'맞음. PKI: 공개키 무결성 보장(위조 방지)',correct:false},{n:2,text:'맞음. 인증서: 공개키의 신뢰성을 증명하는 전자 문서',correct:false},{n:3,text:'틀림. 인증서에는 CA(인증기관)의 서명이 포함. 주체의 서명 아님 ✓',correct:true},{n:4,text:'맞음. CA는 루트 CA 또는 상위 CA의 인증서 필요',correct:false}],concept:{title:'📌 X.509 인증서 구성',items:['주체(Subject): 공개키 소유자 이름','공개키: 주체의 공개키','발행자(Issuer): CA 이름','유효기간: 시작일-종료일','CA의 디지털 서명: 위조 방지']}}},
{id:443,category:'인증 시스템',number:43,question:'인증서(certificates)의 사용함에 있어 요구되는 사항으로 옳지 않은 것은?',choices:['어떤 참가자도 인증서로부터 인증서 소유자의 이름과 인증기관의 개인키를 알 수 있어야 한다.','어떤 참가자도 인증서가 위조된 것이 아니며, 인증기관으로부터 생성된 것임을 검증할 수 있어야 한다.','인증기관만이 인증서를 생성하고 갱신할 수 있어야 한다.','어떤 사용자도 인증서의 현재성을 검증할 수 있어야 한다.'],answer:1,explanation:{summary:'CA의 개인키는 절대 공개되지 않음. 인증서에는 CA의 공개키(또는 서명 검증용)만 포함.',choiceAnalysis:[{n:1,text:'틀림. CA 개인키는 비밀. 인증서에 CA 개인키 포함 불가 ✓',correct:true},{n:2,text:'맞음. CA 서명 검증으로 위조 탐지 가능',correct:false},{n:3,text:'맞음. CA만이 인증서 발행 권한',correct:false},{n:4,text:'맞음. CRL/OCSP로 유효성 확인 가능',correct:false}],concept:{title:'📌 인증서 보안 요구사항',items:['개인키: CA만 보유, 절대 공개 안 됨','공개키: 인증서에 포함, 누구나 열람 가능','위조 불가: CA 서명으로 보호','만료/폐기 확인: CRL, OCSP 사용']}}},
{id:444,category:'인증 시스템',number:44,question:'공개키 기반 구조(PKI)의 구성 요소에 대한 설명으로 옳지 않은 것은?',choices:['단말 개체(end entity)는 단말 사용자, 단말기(서버나 라우터), 또는 공개키 인증서의 주체 필드에 사용될 수 있는 모든 개체를 통칭한다.','인증기관(CA : Certification Authority)은 인증서와 인증서 폐기목록의 발행자이다.','등록기관(RA : Registration Authority)은 CA로부터 행정적 기능들을 위임받고 단말 개체가 자신의 존재를 CA에게 알리는 절차를 수행한다.','저장소(Repository)은 인증서의 CRL의 검색 및 증명, 전자서명의 생성, 메시지의 암복호화 기능을 수행한다.'],answer:4,explanation:{summary:'저장소는 인증서/CRL의 배포·검색 역할. 서명 생성과 암복호화는 저장소의 기능이 아님.',choiceAnalysis:[{n:1,text:'맞음. 단말 개체: 인증서 소유자',correct:false},{n:2,text:'맞음. CA: 인증서+CRL 발행',correct:false},{n:3,text:'맞음. RA: CA 업무 위임(신원 확인 등)',correct:false},{n:4,text:'틀림. 저장소(Repository): 인증서·CRL 보관·배포. 서명/암호화 아님 ✓',correct:true}],concept:{title:'📌 PKI 구성 요소',items:['CA(인증기관): 인증서 발행, 서명, CRL 발행','RA(등록기관): 신원 확인, CA에 등록 대행','저장소: 인증서/CRL 공개 배포(LDAP 등)','VA(검증기관): 인증서 유효성 실시간 확인(OCSP)']}}},
{id:445,category:'인증 시스템',number:45,question:'공개키 기반 구조(PKI : Public Key Infrastructure)에 대한 설명으로 옳지 않은 것은?',choices:['인증서는 특정한 공개키가 특정인에게 종속된다는 사실을 확인하는 수단이다.','인증기관(CA)은 인증서의 생성 및 확인, 인증서의 발급 및 재발급, 인증서 소유자에 대한 정보 관리 등을 수행한다.','인증서와 인증 경로를 찾기 위해 디렉터리를 이용하여 이 디렉터리에 대한 접근에 사용되는 프로토콜은 OCSP(Online Certificate Status Protocol)이다.','인증 취소 목록(CRL : Certificate Revocation List)는 예정된 유효기간의 만기일이 도래하기 전에 취소된 인증서에 대한 정보를 취합한 것이다.'],answer:3,explanation:{summary:'디렉터리 접근 프로토콜은 LDAP. OCSP는 인증서 유효성 실시간 조회 프로토콜.',choiceAnalysis:[{n:1,text:'맞음. 인증서: 공개키-소유자 바인딩',correct:false},{n:2,text:'맞음. CA: 인증서 발행/관리',correct:false},{n:3,text:'틀림. 디렉터리 접근 = LDAP. OCSP는 인증서 폐기 여부 실시간 확인 ✓',correct:true},{n:4,text:'맞음. CRL: 유효기간 전 폐기된 인증서 목록',correct:false}],concept:{title:'📌 LDAP vs OCSP',items:['LDAP(Lightweight Directory Access Protocol): 인증서/CRL 저장소 접근','OCSP(Online Certificate Status Protocol): 인증서 유효성 실시간 확인','CRL: 오프라인, 주기적 업데이트','OCSP: 온라인, 실시간 확인']}}},
{id:446,category:'인증 시스템',number:46,question:'다음 <보기>에서 설명하는 PKIX의 관리 기능에 해당하는 것은?',boxLabel:'<보기>',boxText:'한 CA가 다른 CA에게 인증서 발급에 사용되는 CA의 서명키가 포함된 인증서를 발급한다.',choices:['등록(registration)','교차인증(cross certification)','인증(certification)','키 쌍 갱신(key pair update)'],answer:2,explanation:{summary:'"다른 CA에게 인증서 발급" = 교차인증(Cross Certification).',choiceAnalysis:[{n:1,text:'등록: 사용자가 CA에 등록',correct:false},{n:2,text:'교차인증: 서로 다른 CA 간 상호 인증 ✓',correct:true},{n:3,text:'인증: 일반 인증서 발급',correct:false},{n:4,text:'키 쌍 갱신: 키 만료 시 새 키 발급',correct:false}],concept:{title:'📌 PKIX 관리 기능',items:['등록(Registration): 사용자 신원 확인 후 CA에 등록','초기화(Initialization): 키 쌍 생성','인증(Certification): 인증서 발급','교차인증(Cross-Cert): 다른 CA 간 상호 신뢰 구축','키 갱신: 만료/폐기 후 새 키 쌍 발급']}}},
{id:447,category:'인증 시스템',number:47,question:'CRL(Certificate Revocation List)은 인증서 폐기 목록으로, 사용할 수 없는 인증서에 대한 목록이다. 다음 중 CRL이 발급되는 경우로서 적절한 것은?',choices:['인증기관의 공개키가 유출된 경우','인증서 소유자의 개인키가 분실된 경우','인증서 소유자의 공개키가 배포된 경우','인증서 유효기간 중에 인증서 소유자의 공개키가 유출된 경우'],answer:2,explanation:{summary:'개인키 분실/유출 시 인증서 폐기. 공개키 배포는 정상 절차, 공개키 유출은 문제 없음.',choiceAnalysis:[{n:1,text:'CA 공개키 유출: CA 인증서 폐기 필요(별개)',correct:false},{n:2,text:'개인키 분실/손상: 인증서 폐기(해당 공개키 신뢰 불가) ✓',correct:true},{n:3,text:'공개키 배포: 정상적인 PKI 절차',correct:false},{n:4,text:'공개키 유출: 공개키는 공개이므로 문제없음',correct:false}],concept:{title:'📌 인증서 폐기 사유',items:['개인키 손상/분실/유출','소속 변경(직원 퇴사)','CA 개인키 손상','소유자 사망','인증서 정보 오류']}}},
{id:448,category:'인증 시스템',number:48,question:'개인 또는 단체의 공개키를 인증하는 전자적인 증명문서를 인증서라 하며 X.509 표준에 의해 인증서의 형식이 정의된다. X.509 형식에 포함되지 않는 항목은?',choices:['인증기관(CA)가 발행한 인증서의 일련번호','주체의 이름과 공개키 정보','인증기관의 개인키와 서명','인증서의 유효기간'],answer:3,explanation:{summary:'CA 개인키는 절대 인증서에 포함되지 않음. CA의 서명(디지털서명)은 포함되지만 개인키 자체는 아님.',choiceAnalysis:[{n:1,text:'맞음. 일련번호: X.509 기본 필드',correct:false},{n:2,text:'맞음. 주체 이름과 공개키: 핵심 필드',correct:false},{n:3,text:'틀림. CA 개인키는 절대 포함 안 됨. CA의 서명(서명값)은 포함 ✓',correct:true},{n:4,text:'맞음. 유효기간: 시작일-종료일',correct:false}],concept:{title:'📌 X.509 인증서 주요 필드',items:['버전, 일련번호, 서명 알고리즘','발행자(CA) 이름, 유효기간','주체 이름, 주체 공개키','CA의 디지털 서명(서명값만, 개인키 아님)']}}},
{id:449,category:'인증 시스템',number:49,question:'ITU-T X.509 v3 인증서의 확장 영역에 해당하지 않는 것은?',choices:['서명 알고리즘 식별자','주체 키 식별자','키 용도','기관 키 식별자'],answer:1,explanation:{summary:'서명 알고리즘 식별자는 v1 기본 영역 필드. 확장 영역에 있지 않음.',choiceAnalysis:[{n:1,text:'서명 알고리즘: v1 기본 영역 ✓',correct:true},{n:2,text:'주체 키 식별자: v3 확장 영역',correct:false},{n:3,text:'키 용도(Key Usage): v3 확장 영역',correct:false},{n:4,text:'기관 키 식별자: v3 확장 영역',correct:false}],concept:{title:'📌 X.509 v3 확장 영역',items:['키 용도(Key Usage): 서명/암호화/CRL서명 등','주체 키 식별자: 공개키 식별 번호','기관 키 식별자: CA 키 식별','주체 대체 이름(SAN): 이메일/도메인','기본 제약: CA 여부, 경로 길이']}}},
{id:450,category:'인증 시스템',number:50,question:'다음 <보기> 중 X.509 인증서의 기본 영역(버전1)에 해당하는 것을 모두 옳게 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. 서명\nㄴ. 주체의 공개키 정보\nㄷ. 발행자 이름\nㄹ. 서명 알고리즘 식별자',choices:['ㄱ, ㄴ, ㄷ','ㄱ, ㄴ, ㄷ','ㄴ, ㄷ, ㄹ','ㄱ, ㄴ, ㄷ, ㄹ'],answer:4,explanation:{summary:'ㄱ(서명), ㄴ(공개키), ㄷ(발행자 이름), ㄹ(서명 알고리즘) 모두 v1 기본 영역.',choiceAnalysis:[{n:1,text:'ㄹ도 기본 영역',correct:false},{n:2,text:'ㄹ도 기본 영역',correct:false},{n:3,text:'ㄱ도 기본 영역',correct:false},{n:4,text:'ㄱ,ㄴ,ㄷ,ㄹ 모두 v1 기본 영역 ✓',correct:true}],concept:{title:'📌 X.509 v1 기본 필드',items:['버전, 일련번호, 서명 알고리즘 식별자','발행자 이름, 유효기간','주체 이름, 주체 공개키 정보','CA 서명(서명값)']}}},
{id:451,category:'인증 시스템',number:51,question:'X.509에 대한 설명으로 옳지 않은 것은?',choices:['인증서 구조와 인증 프로토콜이 정의되어 있다.','공개키 암호의 사용과 전자서명을 기반으로 한다.','사용자 인증서는 인증기관(CA)에 의해 발행된다.','인증서를 저장하는 디렉터리는 공개키의 제작이나 인증 기능에 대한 책임을 진다.'],answer:4,explanation:{summary:'디렉터리는 인증서 저장/배포만 담당. 공개키 제작이나 인증은 CA의 역할.',choiceAnalysis:[{n:1,text:'맞음. X.509: 인증서 형식+인증 프로토콜 정의',correct:false},{n:2,text:'맞음. 공개키+전자서명 기반',correct:false},{n:3,text:'맞음. CA가 사용자 인증서 발행',correct:false},{n:4,text:'틀림. 디렉터리(저장소)는 배포만. 키 제작/인증은 CA 역할 ✓',correct:true}],concept:{title:'📌 X.509 디렉터리 역할',items:['디렉터리: 인증서·CRL 보관 및 배포','공개키 제작: 사용자 자신이','인증(서명): CA가','디렉터리 프로토콜: LDAP(X.500 기반)']}}},
{id:452,category:'인증 시스템',number:52,question:'다음 중 인증서 취소 목록(CRL)에 포함된 항목이 아닌 것은?',choices:['주체 이름','발행자 이름','인증서 서명에 사용한 알고리즘과 사용한 매개변수','인증기관의 서명'],answer:1,explanation:{summary:'CRL에는 폐기된 인증서의 일련번호가 포함. 주체 이름은 CRL의 직접 항목이 아님.',choiceAnalysis:[{n:1,text:'틀림. CRL에는 인증서 일련번호가 포함. 주체 이름은 없음 ✓',correct:true},{n:2,text:'맞음. 발행자 이름: CRL 발행자 정보',correct:false},{n:3,text:'맞음. 서명 알고리즘: CRL 서명에 사용된 알고리즘',correct:false},{n:4,text:'맞음. CA 서명: CRL의 무결성 보장',correct:false}],concept:{title:'📌 CRL 주요 필드',items:['CRL 버전, 서명 알고리즘','발행자(CA) 이름, 발행 일시, 다음 업데이트 일시','폐기된 인증서 목록: 일련번호+폐기 날짜+폐기 이유','CA 디지털 서명']}}},
{id:453,category:'인증 시스템',number:53,question:'「전자서명법」의 목적으로 옳은 것은?',choices:['지능정보사회의 구현에 이바지하고 국가경쟁력을 확보하며 국민의 삶의 질을 높이는 것을 목적으로 한다.','국가와 사회의 정보화를 촉진하고 국민생활의 편익을 증진함을 목적으로 한다.','국민생활의 향상과 공공복리의 증진에 이바지함을 목적으로 한다.','개인의 자유와 권리를 보호하고, 나아가 개인의 존엄과 가치를 구현함을 목적으로 한다.'],answer:2,explanation:{summary:'전자서명법의 목적: 전자서명의 안전성·신뢰성 확보, 국민생활 편익 증진.',choiceAnalysis:[{n:1,text:'지능정보화기본법 목적',correct:false},{n:2,text:'전자서명법 목적 ✓',correct:true},{n:3,text:'전자문서 및 전자거래 기본법 목적',correct:false},{n:4,text:'개인정보보호법 목적',correct:false}],concept:{title:'📌 전자서명법 주요 내용',items:['목적: 전자서명 안전성·신뢰성 확보, 국민생활 편익','전자서명의 효력: 전자적 형태라는 이유로 부인 불가','민간 자율: 특정 전자서명수단 강요 금지','공인전자서명 제도 폐지(2020년 개정)']}}},
{id:454,category:'인증 시스템',number:54,question:'「전자서명법」의 용어에 대한 정의로 옳지 않은 것은?',choices:['\"전자문서\"란 정보처리시스템에 의하여 전자적 형태로 작성되어 송신 또는 수신되거나 저장된 정보를 말한다.','\"전자서명\"이란 서명자의 신원을 확인하고 서명자가 당해 전자문서에 서명을 하였음을 나타내는데 이용하기 위하여 당해 전자문서에 첨부되거나 논리적으로 결합된 전자적 형태의 정보를 말한다.','\"가입자\"란 전자서명검증정보에 대하여 전자서명인증사업자로부터 전자서명인증을 받은 자를 말한다.','\"전자서명인증\"이란 전자서명생성정보가 가입자에게 유일하게 속한다는 사실을 확인하고 이를 증명하는 행위를 말한다.'],answer:3,explanation:{summary:'전자서명법상 가입자: 전자서명생성정보(개인키)가 자신에게 속함을 인증받은 자.',choiceAnalysis:[{n:1,text:'맞음. 전자문서 정의',correct:false},{n:2,text:'맞음. 전자서명 정의',correct:false},{n:3,text:'틀림. 가입자: 전자서명생성정보에 대해 인증받은 자. 검증정보(공개키)가 아닌 생성정보(개인키) ✓',correct:true},{n:4,text:'맞음. 전자서명인증 정의',correct:false}],concept:{title:'📌 전자서명법 핵심 용어',items:['전자서명생성정보: 개인키(서명 생성에 사용)','전자서명검증정보: 공개키(서명 검증에 사용)','가입자: 개인키를 인증받은 자','전자서명인증사업자: 인증 서비스 제공 사업자']}}},
{id:455,category:'인증 시스템',number:55,question:'「전자서명법」에 관한 내용으로 옳지 않은 것은?',choices:['전자서명은 전자적 형태라는 이유만으로 서명, 서명날인 또는 기명날인으로서의 효력이 부인될 수 있다.','정부는 전자서명의 안전성, 신뢰성 및 전자서명수단의 다양성을 확보하고 그 이용을 활성화하는 등 전자서명의 발전을 위하여 시책을 수립ㆍ시행한다.','과학기술정보통신부장관은 전자서명의 이용을 촉진하기 위하여 행정적ㆍ재정적ㆍ기술적 지원을 할 수 있다.','국가는 법률, 국회규칙, 대법원규칙, 헌법재판소규칙, 중앙선거관리위원회규칙, 대통령령 또는 감사원규칙에서 전자서명수단을 특정한 경우를 제외하고는 특정한 전자서명수단만을 이용하도록 제한하여서는 아니 된다.'],answer:1,explanation:{summary:'전자서명법 제3조: 전자서명은 전자적 형태라는 이유만으로 서명 효력이 부인되지 아니한다.',choiceAnalysis:[{n:1,text:'틀림. "부인될 수 있다" → 법: "부인되지 아니한다" ✓',correct:true},{n:2,text:'맞음. 정부의 전자서명 발전 시책',correct:false},{n:3,text:'맞음. 과기정통부장관의 이용 촉진 지원',correct:false},{n:4,text:'맞음. 특정 수단 강제 금지',correct:false}],concept:{title:'📌 전자서명법 제3조(효력)',items:['전자서명의 법적 효력: 서명/서명날인/기명날인과 동일','전자적 형태라는 이유만으로 효력 부인 불가','2020년 개정: 공인전자서명 제도 폐지, 다양한 전자서명 인정']}}},
{id:456,category:'인증 시스템',number:56,question:'「전자서명법」에 관한 내용으로 옳지 않은 것은?',choices:['"전자서명인증사업자"란 전자서명인증업무를 하는 자를 말하며 사설 인증 서비스는 포함되지 않는다.','과학기술정보통신부장관은 전자서명의 신뢰성을 높이고 가입자 및 이용자가 합리적으로 전자서명인증서비스를 선택할 수 있도록 정보를 제공하기 위하여 필요한 조치를 마련하여야 한다.','과학기술정보통신부장관은 한국인터넷진흥원을 운영기준 준수사실의 인정에 관한 업무를 수행하는 기관으로 지정할 수 있다.','평가기관은 평가를 신청한 전자서명인증사업자의 운영기준 준수 여부에 대한 평가를 하고, 그 결과를 인정기관에 제출하여야 한다.'],answer:1,explanation:{summary:'2020년 개정 전자서명법: 사설 인증 서비스(카카오, PASS 등)도 전자서명인증사업자에 포함.',choiceAnalysis:[{n:1,text:'틀림. 사설 인증도 포함됨(공인/사설 구분 없어짐) ✓',correct:true},{n:2,text:'맞음. 과기정통부: 서비스 정보 제공',correct:false},{n:3,text:'맞음. KISA(한국인터넷진흥원): 인정기관',correct:false},{n:4,text:'맞음. 평가기관 역할',correct:false}],concept:{title:'📌 2020 전자서명법 개정 핵심',items:['공인전자서명 제도 폐지 → 모든 전자서명 동등 인정','사설 인증 서비스도 전자서명인증사업자','카카오 인증서, PASS, 은행 인증서 등 인정','인정기관: KISA']}}},
{id:457,category:'인증 시스템',number:57,question:'「전자서명법」 상 내용으로 옳지 않은 것은?',choices:['제3조(전자서명의 효력) 전자서명은 전자적 형태라는 이유만으로 서명, 서명날인 또는 기명날인으로서의 효력이 부인되지 아니한다.','제5조(전자서명의 이용 촉진을 위한 지원) 과학기술정보통신부장관은 전자서명의 이용을 촉진하기 위하여 전자서명 관련 기술의 연구ㆍ개발ㆍ활용 및 표준화에 대한 행정적ㆍ재정적ㆍ기술적 지원을 할 수 있다.','제6조(다양한 전자서명수단의 이용 활성화) 국가는 생체인증, 블록체인 등 다양한 전자서명수단의 이용 활성화를 위하여 노력하여야 한다.','제9조(인정기관) 과학기술정보통신부장관은 한국정보화진흥원을 운영기준 준수사실의 인정에 관한 업무를 수행하는 기관으로 지정할 수 있다.'],answer:4,explanation:{summary:'인정기관은 한국인터넷진흥원(KISA). 한국정보화진흥원(NIA)이 아님.',choiceAnalysis:[{n:1,text:'맞음. 제3조 전자서명 효력',correct:false},{n:2,text:'맞음. 제5조 지원',correct:false},{n:3,text:'맞음. 제6조 다양한 수단 활성화',correct:false},{n:4,text:'틀림. 인정기관은 한국인터넷진흥원(KISA). 한국정보화진흥원(NIA) 아님 ✓',correct:true}],concept:{title:'📌 관련 기관 구분',items:['KISA(한국인터넷진흥원): 전자서명법 인정기관','NIA(한국지능정보사회진흥원, 구 정보화진흥원): 정보화 정책','KISA: 인터넷 보안, 개인정보보호, 전자서명']}}},
{id:458,category:'인증 시스템',number:58,question:'다음 <보기>의 설명에 해당하는 것은?',boxLabel:'<보기>',boxText:'ㄱ. 제공한 사용자 이름과 사용자가 일치하는지를 확인한다.\nㄴ. 사용자가 특정 서비스나 자원에 접근하는 것을 허가한다.',choices:['ㄱ: 인증 / ㄴ: 인가','ㄱ: 인가 / ㄴ: 인증','ㄱ: 인증 / ㄴ: 계정','ㄱ: 인가 / ㄴ: 계정'],answer:1,explanation:{summary:'인증(Authentication): 신원 확인. 인가(Authorization): 접근 권한 부여.',choiceAnalysis:[{n:1,text:'ㄱ: 인증(신원 확인), ㄴ: 인가(접근 권한) ✓',correct:true},{n:2,text:'순서 뒤바뀜',correct:false},{n:3,text:'ㄴ은 계정이 아닌 인가',correct:false},{n:4,text:'ㄱ은 인증',correct:false}],concept:{title:'📌 AAA(Authentication, Authorization, Accounting)',items:['인증(Authentication): "당신이 누구인지" 확인','인가(Authorization): "무엇을 할 수 있는지" 권한 부여','계정(Accounting): 사용 이력 기록/추적','순서: 식별 → 인증 → 인가']}}},
{id:459,category:'인증 시스템',number:59,question:'다음 중 사용자 인증에 사용되는 기술이 아닌 것은?',choices:['Kerberos','Wireshark','SSO','OTP'],answer:2,explanation:{summary:'Wireshark: 패킷 분석 도구. 인증 기술이 아님.',choiceAnalysis:[{n:1,text:'Kerberos: 네트워크 인증 프로토콜',correct:false},{n:2,text:'Wireshark: 패킷 캡처/분석 도구. 인증 기술 아님 ✓',correct:true},{n:3,text:'SSO: Single Sign-On, 통합 인증',correct:false},{n:4,text:'OTP: 일회용 패스워드 인증',correct:false}],concept:{title:'📌 인증 기술 예시',items:['지식: 패스워드, PIN, 질문-응답','소유: OTP 토큰, 스마트카드','생체: 지문, 홍채, 얼굴','프로토콜: Kerberos, RADIUS, SSO']}}},
{id:460,category:'인증 시스템',number:60,question:'다음 인증 수단의 예로 옳지 않은 것은?',choices:['지식 기반 인증 : 패스워드','소유 기반 인증 : OTP 토큰','정적 생체 기반 인증 : 지문','동적 생체 기반 인증 : PIN'],answer:4,explanation:{summary:'PIN은 숫자 패스워드로 지식 기반 인증. 동적 생체 인증은 서명, 키스트로크 등의 행동 특성.',choiceAnalysis:[{n:1,text:'맞음. 패스워드: 지식 기반',correct:false},{n:2,text:'맞음. OTP 토큰: 소유 기반',correct:false},{n:3,text:'맞음. 지문: 정적 생체(신체 특성)',correct:false},{n:4,text:'틀림. PIN: 숫자 패스워드 → 지식 기반. 동적 생체=서명,타이핑 리듬 ✓',correct:true}],concept:{title:'📌 인증 기법 분류',items:['지식 기반: 패스워드, PIN, 질문-응답','소유 기반: OTP 토큰, 스마트카드, 보안카드','정적 생체: 지문, 홍채, 정맥, 얼굴','동적 생체: 서명(서명 속도/압력), 키스트로크 리듬','혼합(Multi-factor): 2개 이상 조합']}}},
,
{id:461,category:'인증 시스템',number:61,question:'다음 인증 기법의 설명으로 옳지 않은 것은?',choices:['지식 기반 인증 기법은 사용이 편리하지만 도용의 위험이 크다.','소유 기반 인증 기법은 개인정보를 이용하여 추측이 가능하다.','생체 기반 인증 기법은 인증에 대한 원천적인 모호성 및 관리가 어렵다.','혼합 인증은 인증 기법 중 가장 강력하고 비용이 많이 든다.'],answer:2,explanation:{summary:'소유 기반(OTP, 스마트카드): 추측이 아닌 물리적 소유 여부로 인증. 개인정보 추측은 지식 기반.',choiceAnalysis:[{n:1,text:'맞음. 패스워드: 편리하지만 도용·유출 위험',correct:false},{n:2,text:'틀림. 소유 기반은 물리적 소유 여부. 추측은 지식 기반의 약점 ✓',correct:true},{n:3,text:'맞음. 생체: FAR/FRR 비율, 등록 관리 어려움',correct:false},{n:4,text:'맞음. 혼합 인증: 가장 강력, 비용도 높음',correct:false}],concept:{title:'📌 인증 기법별 특징',items:['지식: 편리, 도용/추측 위험','소유: 분실/도난 위험','생체: 망각 없음, 위변조 어려움, 오류율 관리 필요','혼합(MFA): 가장 강력']}}},
{id:462,category:'인증 시스템',number:62,question:'다음 <보기> 설명에 해당하는 사용자 인증 기법은?',boxLabel:'<보기>',boxText:'∘ 사용자와 서버가 미리 설정하여 공유한 비밀 정보를 기반으로 사용자를 인증한다.\n∘ 별도의 하드웨어가 필요 없어 비용이 적다.\n∘ 인증 강도가 다른 방식에 낮은 편이다.',choices:['지식 기반 인증','소유 기반 인증','생체 기반 인증','혼합 인증'],answer:1,explanation:{summary:'"공유한 비밀 정보(패스워드)", "하드웨어 불필요", "낮은 인증 강도" → 지식 기반 인증.',choiceAnalysis:[{n:1,text:'지식 기반: 비밀 정보(패스워드), 저비용, 낮은 보안 ✓',correct:true},{n:2,text:'소유 기반: 하드웨어 토큰 필요',correct:false},{n:3,text:'생체 기반: 신체 특성, 비용 높음',correct:false},{n:4,text:'혼합: 여러 방식 조합',correct:false}],concept:{title:'📌 지식 기반 인증',items:['패스워드, PIN, 보안 질문','장점: 간편, 저비용','단점: 도용, 추측, 사전 공격 취약']}}},
{id:463,category:'인증 시스템',number:63,question:'다음 <보기>의 설명에 해당하는 패스워드 공격 방법은?',boxLabel:'<보기>',boxText:'ㄱ. 성공할 때까지 가능한 모든 조합의 경우의 수를 시도해 패스워드를 찾아낸다.\nㄴ. 사용자가 주로 사용하는 언어나 의미있는 어휘들을 모아 파일을 만든 후, 이를 이용하여 패스워드를 찾아낸다.',choices:['ㄱ: 무차별 대입 공격 / ㄴ: 사전 공격','ㄱ: 사전 공격 / ㄴ: 생일 공격','ㄱ: 사전 공격 / ㄴ: 무차별 대입 공격','ㄱ: Crypt() 공격 / ㄴ: 사전 공격'],answer:1,explanation:{summary:'ㄱ: 모든 조합 시도=무차별 대입. ㄴ: 단어 목록 사용=사전 공격.',choiceAnalysis:[{n:1,text:'ㄱ: 무차별 대입(Brute-Force), ㄴ: 사전 공격(Dictionary) ✓',correct:true},{n:2,text:'순서 뒤바뀜',correct:false},{n:3,text:'순서 뒤바뀜',correct:false},{n:4,text:'Crypt()는 패스워드 해시 함수',correct:false}],concept:{title:'📌 패스워드 공격 유형',items:['무차별 대입(Brute-Force): 모든 조합 순차 시도','사전 공격(Dictionary): 단어/구문 목록 활용','레인보우 테이블: 사전 계산된 해시값 테이블','Credential Stuffing: 유출된 ID/PW 재사용']}}},
{id:464,category:'인증 시스템',number:64,question:'다음 중 패스워드 공격 기법에 해당하지 않는 것은?',choices:['사전 공격(dictionary attack)','사회공학적 공격','부채널 공격(side-channel attack)','무차별 대입 공격(brute force attack)'],answer:3,explanation:{summary:'부채널 공격은 암호 키를 물리적 정보(전력, 전자파)로 추출. 패스워드 직접 공격과 다름.',choiceAnalysis:[{n:1,text:'사전 공격: 패스워드 공격 기법',correct:false},{n:2,text:'사회공학: 사람을 속여 패스워드 획득',correct:false},{n:3,text:'부채널 공격: 암호 시스템의 물리적 정보 이용. 패스워드 직접 공격 아님 ✓',correct:true},{n:4,text:'무차별 대입: 패스워드 공격 기법',correct:false}],concept:{title:'📌 패스워드 공격 vs 부채널 공격',items:['패스워드 공격: 사전, 무차별, 사회공학, 레인보우 테이블','부채널 공격: 암호 키를 전력/타이밍/전자파로 추출','부채널 ≠ 패스워드 공격']}}},
{id:465,category:'인증 시스템',number:65,question:'다음 <보기>의 ㈀에 해당하는 것은?',boxLabel:'<보기>',boxText:'∙ ㈀이/가 추가된 패스워드에 해시함수를 적용한다.\n∙ 시스템은 ID, ㈀, 해시값을 저장한다.\n∙ 사용자가 접근을 요청한다.\n∙ 시스템은 ㈀을/를 추출하고 수신된 패스워드에 붙인 후 해시함수를 적용한다.\n∙ 계산된 값을 이전에 저장한 해시값과 비교한다.',choices:['솔트(salt)','패스프레이즈(pass phrase)','I-PIN','레인보우 테이블(rainbow table)'],answer:1,explanation:{summary:'패스워드+무작위값을 해시 → 솔트(Salt).',choiceAnalysis:[{n:1,text:'솔트(Salt): 패스워드에 추가되는 무작위 값, 사전/레인보우 공격 방지 ✓',correct:true},{n:2,text:'패스프레이즈: 긴 문장 형태의 패스워드',correct:false},{n:3,text:'I-PIN: 인터넷 개인 식별 번호',correct:false},{n:4,text:'레인보우 테이블: 해시값 역산을 위한 사전 계산 테이블',correct:false}],concept:{title:'📌 솔트(Salt)',items:['정의: 패스워드에 추가하는 랜덤 값','목적: 동일 패스워드라도 다른 해시값 생성','효과: 사전 공격·레인보우 테이블 공격 무력화','저장: ID + Salt + H(PW+Salt)']}}},
{id:466,category:'인증 시스템',number:66,question:'솔트(salt)에 대한 설명으로 옳지 않은 것은?',choices:['패스워드에 대한 사전 공격을 막을 수 있다.','솔트는 암호화되어 저장된다.','서로 다른 사용자가 동일한 패스워드를 입력해도 다른 값으로 저장된다.','한 사용자가 동일한 패스워드를 여러 시스템에 입력해도 서로 다른 값으로 저장된다.'],answer:2,explanation:{summary:'솔트는 평문으로 저장됩니다. 솔트의 목적은 해시값 다양화, 암호화 필요 없음.',choiceAnalysis:[{n:1,text:'맞음. 솔트: 사전 공격/레인보우 테이블 방어',correct:false},{n:2,text:'틀림. 솔트는 평문 저장. 암호화 불필요(비밀 아님) ✓',correct:true},{n:3,text:'맞음. 사용자별 다른 솔트→동일 PW도 다른 해시',correct:false},{n:4,text:'맞음. 시스템별 다른 솔트→같은 PW도 다른 해시',correct:false}],concept:{title:'📌 솔트 저장 방식',items:['솔트: 평문(공개)으로 저장 가능','비밀 아님: 공격자가 알아도 레인보우 테이블 불가','저장: {사용자ID, 솔트값, 해시(PW+솔트)}','bcrypt, PBKDF2: 솔트 자동 생성+저장']}}},
{id:467,category:'인증 시스템',number:67,question:'다른 사용자의 패스워드를 획득하기 위해 무차별 대입 공격(brute force attack)을 수행할 수 있다. 다음 중 사람이 인식할 수 있는 문자나 그림을 활용하여 프로그램을 이용한 자동 로그인 시도를 방지하는 방법은?',choices:['인증서','캡차(CAPTCHA)','키 스트로크 로깅 기법','솔트'],answer:2,explanation:{summary:'CAPTCHA(완전 자동화된 공개 튜링 테스트): 사람과 봇을 구별하여 자동 로그인 방지.',choiceAnalysis:[{n:1,text:'인증서: PKI 기반 인증, 봇 방지 아님',correct:false},{n:2,text:'CAPTCHA: 사람 인식 가능한 문자/이미지로 봇 차단 ✓',correct:true},{n:3,text:'키스트로크 로깅: 타이핑 리듬 분석 인증',correct:false},{n:4,text:'솔트: 패스워드 해시 강화',correct:false}],concept:{title:'📌 CAPTCHA',items:['Completely Automated Public Turing test to tell Computers and Humans Apart','목적: 자동화 프로그램(봇) 차단','종류: 텍스트, 이미지 선택, 수학 문제 등','reCAPTCHA: Google의 향상된 CAPTCHA']}}},
{id:468,category:'인증 시스템',number:68,question:'사전에 일부 계정의 ID와 패스워드 쌍을 불법적으로 확보한 후 해당 정보를 다양한 서비스 사이트에 대입해보는 공격은 무엇인가?',choices:['Credential Stuffing','Bluekeep','Cryptojacking','Logic Bomb'],answer:1,explanation:{summary:'Credential Stuffing: 유출된 ID/PW를 다른 사이트에 재사용하는 공격.',choiceAnalysis:[{n:1,text:'Credential Stuffing: 유출 자격증명 재사용 공격 ✓',correct:true},{n:2,text:'BlueKeep: RDP 취약점 악용(CVE-2019-0708)',correct:false},{n:3,text:'Cryptojacking: 암호화폐 채굴 악성코드',correct:false},{n:4,text:'Logic Bomb: 특정 조건에 동작하는 악성코드',correct:false}],concept:{title:'📌 Credential Stuffing',items:['유출된 ID/PW 목록으로 여러 사이트 자동 로그인 시도','"하나의 비밀번호 재사용" 취약성 악용','대응: MFA, 비밀번호 다양화, 로그인 실패 제한']}}},
{id:469,category:'인증 시스템',number:69,question:'다음 <보기>에서 설명하는 기술은 무엇인가?',boxLabel:'<보기>',boxText:'유효기간 없이, 매 세션마다 서로 다른 패스워드를 사용하면, 특정 세션의 개인 식별 과정에서 해당 패스워드가 노출되어도 다른 세션에 사용될 패스워드를 예측할 수 없다.',choices:['OTP(One Time Password)','PKI(Public Key Infrastructure)','PAM(Pluggable Authentication Modules)','PMI(Privilege Management Infrastructure)'],answer:1,explanation:{summary:'"매 세션마다 다른 패스워드", "노출돼도 다음 세션에 사용 불가" → OTP(일회용 패스워드).',choiceAnalysis:[{n:1,text:'OTP: 매 세션/시간마다 다른 일회용 패스워드 ✓',correct:true},{n:2,text:'PKI: 공개키 기반 인증 인프라',correct:false},{n:3,text:'PAM: 리눅스 플러그인 인증 모듈',correct:false},{n:4,text:'PMI: 권한 관리 인프라',correct:false}],concept:{title:'📌 OTP(One-Time Password)',items:['매 인증마다 새로운 패스워드 생성','재전송 공격 방어: 사용된 OTP는 즉시 무효화','생성 방식: 시간동기화, 이벤트동기화, 시도-응답, S/KEY']}}},
{id:470,category:'인증 시스템',number:70,question:'일회용 패스워드(OTP) 인증 방식에 대한 설명으로 옳지 않은 것은?',choices:['한 번의 로그인을 수행하면 여러 서버에 대한 사용자 인증을 수행한다.','한 번 사용된 패스워드를 다시 사용하여 접속하면 접속이 거절된다.','재전송 공격(replay attack)을 방어하는 수단으로 사용된다.','시도-응답 방식을 사용하게 되면 동기화 방식에 비해 네트워크 부하가 증가될 수 있다.'],answer:1,explanation:{summary:'"한 번 로그인으로 여러 서버"는 SSO의 특성. OTP는 단일 서버 인증.',choiceAnalysis:[{n:1,text:'틀림. 한 번 로그인으로 여러 서버 인증은 SSO ✓',correct:true},{n:2,text:'맞음. OTP: 재사용 불가',correct:false},{n:3,text:'맞음. OTP: 재전송 공격 방어(사용 후 무효)',correct:false},{n:4,text:'맞음. 시도-응답: 별도 통신 필요 → 부하 증가',correct:false}],concept:{title:'📌 OTP vs SSO',items:['OTP: 일회용 패스워드, 각 서버마다 별도 인증','SSO: 한 번 인증으로 여러 서비스 접근','OTP: 재전송 공격 방어','SSO: 편의성 향상']}}},
{id:471,category:'인증 시스템',number:71,question:'다음 <보기>의 순서로 수행되는 OTP 생성 방식은?',boxLabel:'<보기>',boxText:'∘ 사용자와 시스템은 원래의 패스워드 P와 카운터 n에 동의한다.\n∘ 시스템은 패스워드 P에 n번 해시함수를 적용한 값을 구한다.\n∘ 시스템은 사용자의 ID, n값, P를 n번 해시한 값을 저장한다.\n∘ 시스템은 사용자의 인증요구를 받게되면 수신된 값에 해시함수를 적용하여 저장된 값과 일치하는지 확인한다.\n∘ 저장된 n값은 매번 접속이 있을 때마다 1씩 줄여나간다.',choices:['시간동기화 방식','이벤트 동기화 방식','S/KEY 방식','시도-응답 방식'],answer:3,explanation:{summary:'S/KEY: 해시를 n번 반복 적용하고 n을 줄여가는 방식(Lamport의 일회용 패스워드).',choiceAnalysis:[{n:1,text:'시간동기화: 현재 시간으로 OTP 생성',correct:false},{n:2,text:'이벤트동기화: 카운터 증가로 OTP 생성',correct:false},{n:3,text:'S/KEY: 해시 n번 반복, n씩 감소 ✓',correct:true},{n:4,text:'시도-응답: 서버가 챌린지 전송',correct:false}],concept:{title:'📌 S/KEY(Lamport OTP)',items:['초기: H^n(PW) 저장(n번 해시)','1차 인증: H^(n-1)(PW) 전송, H적용→H^n과 비교','2차 인증: H^(n-2)(PW) 전송','n이 0이 되면 재초기화 필요']}}},
{id:472,category:'인증 시스템',number:72,question:'다음 <보기>의 설명에 해당하는 OTP 생성 방식은?',boxLabel:'<보기>',boxText:'∘ 서버와 클라이언트가 카운트 값을 동일하게 증가시켜 가며, 해당 카운트 값을 입력값으로 OTP를 생성해 인증하는 방식이다.\n∘ 클라이언트에서 OTP를 생성하기만 하고 인증에 사용하지 않으면, 서버와 클라이언트의 카운트 값이 불일치하게 된다는 문제점이 있다.',choices:['시간동기화 방식','이벤트 동기화 방식','S/KEY 방식','시도-응답 방식'],answer:2,explanation:{summary:'카운터 값 증가 방식 → 이벤트 동기화(HOTP).',choiceAnalysis:[{n:1,text:'시간동기화: 현재 시간 기반',correct:false},{n:2,text:'이벤트동기화(HOTP): 카운터 기반 ✓',correct:true},{n:3,text:'S/KEY: 해시 반복',correct:false},{n:4,text:'시도-응답: 챌린지 기반',correct:false}],concept:{title:'📌 이벤트 동기화(HOTP)',items:['HOTP(HMAC-based OTP): 카운터 기반','문제: 불사용 시 카운터 불일치','해결: 서버가 일정 범위 내 카운터 허용(look-ahead)','vs TOTP: 시간 기반 OTP']}}},
{id:473,category:'인증 시스템',number:73,question:'다음 <보기>의 설명에 해당하는 OTP 생성 방식은?',boxLabel:'<보기>',boxText:'∘ 클라이언트가 현재 시각을 입력값으로 OTP를 생성하여 PIN과 함께 서버로 전송하면 서버는 PIN을 기준으로 OTP를 생성하여 비교한다.\n∘ 클라이언트와 서버의 시간 동기화가 정확하지 않을 경우 인증이 실패된다.',choices:['시간동기화 방식','이벤트 동기화 방식','S/KEY 방식','시도-응답 방식'],answer:1,explanation:{summary:'"현재 시각 기반", "시간 동기화 필요" → 시간동기화(TOTP) 방식.',choiceAnalysis:[{n:1,text:'시간동기화(TOTP): 현재 시간으로 OTP 생성 ✓',correct:true},{n:2,text:'이벤트동기화: 카운터 기반',correct:false},{n:3,text:'S/KEY: 해시 반복',correct:false},{n:4,text:'시도-응답: 챌린지 기반',correct:false}],concept:{title:'📌 시간동기화(TOTP)',items:['TOTP(Time-based OTP): 현재 시간(30초 단위) 기반','시간 동기화: 서버-클라이언트 간 정확한 시간 필요','구글 Authenticator, FIDO2 등에서 사용','30초마다 새로운 OTP 생성']}}},
{id:474,category:'인증 시스템',number:74,question:'시도-응답 인증(challenge-response authentication)에 대한 설명으로 옳지 않은 것은?',choices:['인증을 받고자 하는 자는 자신의 패스워드를 검증하는 자에게 보내지 않고도 자신을 증명할 수 있다.','시도는 난수나 타임스탬프 같은 시간에 따라 달라지는 값을 사용할 수 있다.','응답은 인증을 받고자 하는 자가 받은 시도에 함수를 적용하여 얻어낸 결과값이다.','타임스탬프를 사용할 경우 인증을 받고자 하는 자의 클라이언트와 검증하는 서버의 시간 동기화는 필요없다.'],answer:4,explanation:{summary:'타임스탬프 기반 시도-응답은 시간 동기화가 필요합니다.',choiceAnalysis:[{n:1,text:'맞음. 패스워드 직접 전송 없이 증명',correct:false},{n:2,text:'맞음. 챌린지: 난수/타임스탬프 사용',correct:false},{n:3,text:'맞음. 응답: 챌린지+개인키/PW로 계산',correct:false},{n:4,text:'틀림. 타임스탬프 사용 시 시간 동기화 필요 ✓',correct:true}],concept:{title:'📌 시도-응답 인증',items:['서버: 챌린지(난수/타임스탬프) 전송','클라이언트: 챌린지+비밀키로 응답 계산','서버: 동일 계산값과 비교','재전송 공격 방어: 매번 다른 챌린지']}}},
{id:475,category:'인증 시스템',number:75,question:'시도응답(challenge-response) 방식에 대한 설명으로 옳지 않은 것은?',choices:['시도(challenge)는 난수나 타임스탬프 같은 시간에 따라 달라지는 값으로서 검증자가 보내는 값이다.','사용자는 challenge 값을 암호화한 response를 전달한다.','대칭키를 이용할 수 있으며 비대칭키는 이용할 수 없다.','재전송 공격을 방지하는 용도로 사용된다.'],answer:3,explanation:{summary:'시도-응답은 대칭키(HMAC)와 비대칭키(RSA/ECDSA) 모두 사용 가능.',choiceAnalysis:[{n:1,text:'맞음. 챌린지: 검증자가 보내는 난수/타임스탬프',correct:false},{n:2,text:'맞음. 응답: 챌린지를 함수(암호화) 적용한 값',correct:false},{n:3,text:'틀림. 대칭키(HMAC)와 비대칭키(RSA) 모두 사용 가능 ✓',correct:true},{n:4,text:'맞음. 매번 다른 챌린지 → 재전송 공격 방어',correct:false}],concept:{title:'📌 시도-응답 구현 방식',items:['대칭키: H(챌린지 || 비밀키) 전송','비대칭키: 챌린지를 개인키로 서명','TOTP/HOTP도 시도-응답의 일종','재전송 방어: 이미 사용된 챌린지 무효화']}}},
{id:476,category:'인증 시스템',number:76,question:'다음 중 생체 기반 인증에 대한 설명으로 옳지 않은 것은?',choices:['사용자의 신체 또는 동작의 고유한 특징을 이용한다.','다른 인증 방식에 비해 보안성이 높고 위변조가 어렵다.','다른 인증 방식에 비해 사용이 편리하며 초기 비용이 비교적 높다.','다른 인증 방식에 비해 인식 도구의 민감도에 영향을 받지 않는다.'],answer:4,explanation:{summary:'생체 인증은 민감도 설정(FAR/FRR)에 따라 인식률이 크게 변합니다.',choiceAnalysis:[{n:1,text:'맞음. 생체: 신체/동작 특성 이용',correct:false},{n:2,text:'맞음. 복제 어려움, 보안성 높음',correct:false},{n:3,text:'맞음. 편리하지만 초기 장비 비용 높음',correct:false},{n:4,text:'틀림. 민감도 영향 받음. 낮으면 FAR↑, 높으면 FRR↑ ✓',correct:true}],concept:{title:'📌 생체 인증 오류율',items:['FAR(False Acceptance Rate): 공격자 허용 비율(Type II Error)','FRR(False Rejection Rate): 정당 사용자 거부 비율(Type I Error)','CER(Crossover Error Rate): FAR=FRR인 교차점(최적 민감도)','민감도 높임: FRR↓(정당 사용자 잘 인식), FAR↑(공격자 위험)']}}},
{id:477,category:'인증 시스템',number:77,question:'생체 인증에 대한 설명으로 옳지 않은 것은?',choices:['인증용으로 사용하기 이전 사용자들의 해당 특성을 데이터베이스로 구축해야 한다.','손금, 홍채 등과 같은 생리적(physiological) 범주와 서명, 키 스트로크(타이핑 리듬) 등과 같은 행동적(behaviorial) 범주로 구분된다.','부정 거부율(FRR)은 인식되어져야 할 사람이 얼마나 자주 시스템에 의해 인식이 되지 않는지를 나타내는 값이다.','추측이 가능하거나, 도난, 공유할 수 있는 문제점이 존재한다.'],answer:4,explanation:{summary:'생체 정보는 추측·도난·공유가 어렵습니다. 이는 생체 인증의 장점입니다.',choiceAnalysis:[{n:1,text:'맞음. 등록(Enrollment) 과정 필요',correct:false},{n:2,text:'맞음. 생리적+행동적 범주',correct:false},{n:3,text:'맞음. FRR: 정당 사용자 거부율',correct:false},{n:4,text:'틀림. 생체 정보의 장점: 망각·분실·공유·추측 어려움. 패스워드의 단점 ✓',correct:true}],concept:{title:'📌 생체 인증의 장단점',items:['장점: 망각 없음, 분실 없음, 추측 어려움, 편리함','단점: 오류율(FAR/FRR), 비용, 사생활 침해, 변조 불가','생체 도용: 지문 스캔 복사 등 일부 가능(얼굴 사진 등)']}}},
{id:478,category:'인증 시스템',number:78,question:'생체인식에 대한 특징으로 옳지 않은 것은?',choices:['생체인식에서 개인의 물리적 특성은 디지털 정보로 표현되어 인증 시 비교된다.','허위 일치 비율(false match rate)은 다른 출처의 생체 샘플이 같은 출처로 오인되는 비율이다.','허위 불일치 비율(false nonmatch rate)은 같은 출처의 생체 샘플이 다른 출처로 오인되는 비율이다.','홍채 인식 시스템은 넓은 허위 일치 비율을 갖는다.'],answer:4,explanation:{summary:'홍채 인식은 매우 정확하여 허위 일치(FAR)가 낮습니다. 넓은(높은) FAR은 오히려 보안 취약.',choiceAnalysis:[{n:1,text:'맞음. 생체 특성은 디지털화하여 비교',correct:false},{n:2,text:'맞음. 허위 일치(FAR): 타인을 본인으로 오인',correct:false},{n:3,text:'맞음. 허위 불일치(FRR): 본인을 타인으로 오인',correct:false},{n:4,text:'틀림. 홍채 인식: 매우 낮은 FAR(정확도 높음) ✓',correct:true}],concept:{title:'📌 생체 인식 정확도',items:['홍채: 매우 낮은 FAR, 가장 정확한 생체 인식','지문: 낮은 FAR, 저비용','얼굴: 중간 FAR, 사용 편리','서명: FAR 높음(모방 가능)']}}},
{id:479,category:'인증 시스템',number:79,question:'다음 <보기>는 생체인식(biometrics)의 정확도를 측정하는 매개변수에 대한 설명이다. 옳게 연결된 것은?',boxLabel:'<보기>',boxText:'ㄱ. 인식되어야 할 사람이 얼마나 자주 시스템에서 인식되지 않는지를 나타내는 값\nㄴ. 인식되어서는 안 될 사람이 얼마나 자주 시스템에 의해 인식되는지를 나타내는 값',choices:['ㄱ: FRR / ㄴ: FAR','ㄱ: FAR / ㄴ: CER','ㄱ: FRR / ㄴ: CER','ㄱ: FAR / ㄴ: FRR'],answer:1,explanation:{summary:'ㄱ: 정당 사용자 거부 = FRR / ㄴ: 공격자 허용 = FAR',choiceAnalysis:[{n:1,text:'ㄱ=FRR(정당 거부), ㄴ=FAR(부당 허용) ✓',correct:true},{n:2,text:'ㄱ=FAR은 반대',correct:false},{n:3,text:'CER이 아닌 FAR',correct:false},{n:4,text:'순서 뒤바뀜',correct:false}],concept:{title:'📌 FAR vs FRR',items:['FAR(False Acceptance Rate): 부당 사용자 허용 비율 (Type II)','FRR(False Rejection Rate): 정당 사용자 거부 비율 (Type I)','CER(Crossover Error Rate): FAR=FRR인 지점','CER 낮을수록 시스템 성능 좋음']}}},
{id:480,category:'인증 시스템',number:80,question:'생체 인증에 대한 설명으로 옳지 않은 것은?',choices:['FRR 또는 Type Ⅰ Error는 권한이 있는 사람이 인증을 시도했을 때 실패하는 비율이다.','인증시스템이 지나치게 높은 정확도를 요구하거나, 탐지하는 생체 특성이 건강 또는 환경에 따라 쉽게 변할 수 있는 것일 때 FRR이 높아진다.','FAR 또는 Type Ⅱ Error는 권한이 없는 사람이 인증을 시도했을 때 성공하는 비율이다.','FAR은 정확도가 높아짐에 따라 오류 비율이 올라가고 FRR은 정확도가 높아짐에 따라 오류 비율이 내려간다.'],answer:4,explanation:{summary:'정확도(민감도) 높임: FAR↓, FRR↑ (반비례 관계). 보기 ④는 반대.',choiceAnalysis:[{n:1,text:'맞음. FRR/Type I: 정당 사용자 거부',correct:false},{n:2,text:'맞음. 높은 기준→FRR 증가',correct:false},{n:3,text:'맞음. FAR/Type II: 부당 사용자 허용',correct:false},{n:4,text:'틀림. 민감도 높임→FAR↓(오류↓), FRR↑(오류↑). 설명이 반대 ✓',correct:true}],concept:{title:'📌 민감도와 오류율 관계',items:['민감도↑(엄격): FAR↓(보안성↑), FRR↑(사용성↓)','민감도↓(느슨): FAR↑(보안성↓), FRR↓(사용성↑)','최적 민감도: CER(FAR=FRR)']}}},
{id:481,category:'인증 시스템',number:81,question:'생체인식(biometrics)에 대한 설명으로 옳지 않은 것은?',choices:['사용자의 신체 또는 동작의 고유한 특징을 이용하는 인증 방법이다.','다른 인증 방법에 비해 망각, 도난, 공유, 분실의 위험을 감소시킨다.','오거부율(FRR: False Rejection Rate)은 생체인식 도구의 민감도가 낮은 경우 높게 발생한다.','생체인식 도구의 성능은 CER(Crossover Error Rate)이 가장 낮아지는 민감도를 가질 때 제일 좋다.'],answer:3,explanation:{summary:'FRR은 민감도가 높을 때(엄격할 때) 증가. 낮은 민감도=느슨한 기준=FRR↓.',choiceAnalysis:[{n:1,text:'맞음. 신체/동작 특성 이용',correct:false},{n:2,text:'맞음. 생체 인증의 장점',correct:false},{n:3,text:'틀림. FRR↑는 민감도가 높을(엄격할) 때. 낮을 때는 FRR↓(FAR↑) ✓',correct:true},{n:4,text:'맞음. CER 최솟값=최적 성능',correct:false}],concept:{title:'📌 FRR과 민감도',items:['민감도 높음(엄격): FRR↑(자주 거부), FAR↓(보안↑)','민감도 낮음(느슨): FRR↓(잘 허용), FAR↑(보안↓)','CER: FAR=FRR 교차점, 낮을수록 시스템 우수']}}},
{id:482,category:'인증 시스템',number:82,question:'다음 그림에 대한 설명으로 옳은 것은?',choices:['㈀은 공격자가 정당한 사용자로 인증될 수 있는 정도를 의미한다.','㈁은 정당한 사용자가 인증이 실패될 수 있는 정도를 의미한다.','시스템에 정해진 한계치(t)가 오른쪽으로 많이 이동하게 되면 보안성이 낮아진다.','시스템에 정해진 한계치(t)가 오른쪽으로 많이 이동하게 되면 정당한 사용자도 거부될 수 있는 비율이 높아지지만 공격자에 대한 잘못된 인증을 피할 수 있다.'],answer:4,explanation:{summary:'임계치(t) 오른쪽 이동(엄격화): FRR↑(정당 사용자 거부 증가), FAR↓(보안성 향상).',choiceAnalysis:[{n:1,text:'틀림. ㈀은 FAR(공격자 허용)이지만 설명 재확인 필요',correct:false},{n:2,text:'틀림. ㈁은 FRR(정당 사용자 거부)이지만 설명 재확인',correct:false},{n:3,text:'틀림. t 오른쪽=엄격=FAR↓=보안성↑',correct:false},{n:4,text:'맞음. t↑: FRR↑(정당 사용자 거부↑), FAR↓(보안↑) ✓',correct:true}],concept:{title:'📌 임계치와 보안-편의성 트레이드오프',items:['임계치↑(오른쪽): 엄격→FRR↑, FAR↓, 보안↑','임계치↓(왼쪽): 느슨→FRR↓, FAR↑, 편의↑','최적: CER(FAR=FRR) 지점']}}},
{id:483,category:'인증 시스템',number:83,question:'Needham-Schroeder 프로토콜의 단계로 옳은 것은? (단, 다음 <보기>의 내용은 사용되는 정보이다)',boxLabel:'<보기>',boxText:'Kas : A와 KMC가 공유하는 비밀키\nKbs : B와 KMC가 공유하는 비밀키\nKab : A와 B 사이에서 사용하는 세션키\neK(X) : 키 X를 이용하여 암호화된 데이터 X\nNa, Nb : A와 B에 의해 각각 생성된 난수\n\nㄱ. A → KMC : A, B, Na\nㄴ. KMC → A : eKas(Na, B, Kab, eKbs(Kab, A))\nㄷ. A → B : eKab(Nb-1)\nㄹ. B → A : eKab(Nb)\nㅁ. A → B : eKbs(Kab, A)',choices:['ㄱ-ㄴ-ㄷ-ㄹ-ㅁ','ㄱ-ㄴ-ㅁ-ㄷ-ㄹ','ㄱ-ㄴ-ㅁ-ㄹ-ㄷ','ㄱ-ㄴ-ㄷ-ㅁ-ㄹ'],answer:3,explanation:{summary:'Needham-Schroeder 순서: KMC에 요청→KMC가 세션키 전달→A가 B에 세션키 전달→B가 챌린지→A가 응답.',choiceAnalysis:[{n:1,text:'ㄷ이 ㅁ보다 먼저 나오면 안 됨',correct:false},{n:2,text:'ㄷ과 ㄹ 순서 오류',correct:false},{n:3,text:'ㄱ→ㄴ→ㅁ(A→B 세션키)→ㄹ(B→A 챌린지)→ㄷ(A→B 응답) ✓',correct:true},{n:4,text:'ㄷ이 ㄹ보다 먼저 불가(ㄹ이 챌린지)' ,correct:false}],concept:{title:'📌 Needham-Schroeder 프로토콜',items:['1. A→KMC: 요청(A,B,Na)','2. KMC→A: 세션키Kab+B용 티켓 전달','3. A→B: B용 티켓(eKbs(Kab,A)) 전달','4. B→A: 챌린지(eKab(Nb)) - 살아있음 증명','5. A→B: 응답(eKab(Nb-1)) - 올바른 세션키 확인']}}},
{id:484,category:'인증 시스템',number:84,question:'커버로스(Kerberos)의 구성 요소에 해당하지 않는 것은?',choices:['인증 서버','티켓 발행 서버','클라이언트','프록시 서버'],answer:4,explanation:{summary:'Kerberos: 클라이언트, AS(인증 서버), TGS(티켓 발행 서버), 응용 서버. 프록시 서버는 아님.',choiceAnalysis:[{n:1,text:'AS(Authentication Server): 사용자 인증',correct:false},{n:2,text:'TGS(Ticket Granting Server): 서비스 티켓 발급',correct:false},{n:3,text:'클라이언트: 서비스 요청 사용자',correct:false},{n:4,text:'프록시 서버: Kerberos 구성 요소 아님 ✓',correct:true}],concept:{title:'📌 Kerberos 구성 요소',items:['AS(인증 서버): 최초 인증, TGT 발급','TGS(티켓 발급 서버): TGT 검증, 서비스 티켓 발급','클라이언트: 서비스 요청','응용 서버: 실제 서비스 제공','KDC = AS + TGS']}}},
{id:485,category:'인증 시스템',number:85,question:'커버로스(Kerberos)에 대한 설명으로 옳지 않은 것은?',choices:['커버로스 인증 메커니즘에는 클라이언트, 서버, 인증서버(AS), 티켓발급 서버(TGS) 개체가 필요하다.','분산 컴퓨팅 환경에서 대칭키를 이용하여 사용자 인증을 제공하는 중앙집중형 인증(authentication) 방식이다.','서버에 제공되는 티켓은 여러 번 사용될 수 있다.','인증에 필요한 패스워드를 대칭키로 암호화하여 전송한다.'],answer:4,explanation:{summary:'Kerberos에서 패스워드는 네트워크로 전송되지 않음. 패스워드로 키를 유도하여 암호화.',choiceAnalysis:[{n:1,text:'맞음. 클라이언트, 서버, AS, TGS 모두 필요',correct:false},{n:2,text:'맞음. 대칭키 기반 중앙집중 인증',correct:false},{n:3,text:'맞음. TGT와 서비스 티켓은 유효기간 내 재사용',correct:false},{n:4,text:'틀림. 패스워드 자체는 전송 안 함. 패스워드 해시로 키 유도 후 메시지 암호화 ✓',correct:true}],concept:{title:'📌 Kerberos 보안 특성',items:['패스워드: 네트워크 전송 안 함(키 유도에만 사용)','TGT: 일정 시간 유효(보통 8-10시간)','재전송 방지: 타임스탬프(5분 윈도우)','단일 장애점: KDC 가용성이 중요']}}},
{id:486,category:'인증 시스템',number:86,question:'커버로스(Kerberos)에 대한 설명으로 옳지 않은 것은?',choices:['인증 프로토콜이면서 KDC의 역할을 한다.','패스워드를 알고있는 정당한 클라이언트만 TGT를 얻을 수 있다.','타임스탬프를 이용하여 재전송 공격을 방지할 수 있다.','버전 4는 대칭키 암호화 알고리즘을 사용하고 버전 5는 대칭키와 공개키 암호화 알고리즘을 모두 사용할 수 있다.'],answer:4,explanation:{summary:'Kerberos v4와 v5 모두 주로 대칭키 사용. v5는 PKINIT 확장으로 공개키 지원.',choiceAnalysis:[{n:1,text:'맞음. Kerberos: KDC(AS+TGS) 포함 인증 프로토콜',correct:false},{n:2,text:'맞음. 패스워드로 TGT 암호화 키 생성',correct:false},{n:3,text:'맞음. 타임스탬프로 재전송 방지(5분 창)',correct:false},{n:4,text:'틀림. v4: DES 사용. v5: 다양한 알고리즘(AES 등) 지원하나 기본은 대칭키 ✓',correct:true}],concept:{title:'📌 Kerberos v4 vs v5',items:['v4: DES만 지원, IP 기반, 단일 도메인','v5: 다양한 암호(AES 등), 도메인 간 인증','v5: PKINIT으로 공개키 초기 인증 지원(선택적)','현재: Kerberos v5가 표준']}}},
{id:487,category:'인증 시스템',number:87,question:'커버로스 v4에서 사용되는 티켓 승인 티켓(ticket granting ticket)의 구성 요소로 옳은 것만을 <보기>에서 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. 클라이언트의 ID\nㄴ. 클라이언트의 네트워크 주소\nㄷ. 티켓 승인 서버의 ID\nㄹ. 클라이언트와 티켓 승인 서버의 세션키\nㅁ. 타임스탬프\nㅂ. 유효기간',choices:['ㄱ, ㄴ, ㄷ, ㅁ, ㅂ','ㄱ, ㄴ, ㄷ, ㄹ, ㅂ','ㄱ, ㄴ, ㄷ, ㄹ, ㅁ','ㄱ, ㄴ, ㄷ, ㄹ, ㅁ, ㅂ'],answer:4,explanation:{summary:'TGT: 클라이언트 ID, 네트워크 주소, TGS ID, 세션키, 타임스탬프, 유효기간 모두 포함.',choiceAnalysis:[{n:1,text:'ㄹ(세션키) 누락',correct:false},{n:2,text:'ㅁ(타임스탬프) 누락',correct:false},{n:3,text:'ㅂ(유효기간) 누락',correct:false},{n:4,text:'ㄱ,ㄴ,ㄷ,ㄹ,ㅁ,ㅂ 모두 TGT 포함 ✓',correct:true}],concept:{title:'📌 Kerberos TGT 구성',items:['클라이언트 ID, 클라이언트 네트워크 주소','TGS ID, 세션키(클라이언트-TGS 간)','타임스탬프, 유효기간(Lifetime)','TGS의 비밀키로 암호화하여 클라이언트에 전달']}}},
{id:488,category:'인증 시스템',number:88,question:'커버로스 v4에서 클라이언트가 응용서버에게 전달하는 서비스 승인 티켓(Service Granting Ticket)에 포함되는 구성요소가 아닌 것은?',choices:['클라이언트와 응용 서버 간의 세션키','티켓 발행 서버의 네트워크 주소','클라이언트 ID','티켓의 유효시간'],answer:2,explanation:{summary:'서비스 티켓에는 TGS의 네트워크 주소가 아닌 응용 서버 정보가 포함.',choiceAnalysis:[{n:1,text:'맞음. 클라이언트-응용서버 세션키 포함',correct:false},{n:2,text:'틀림. TGS 네트워크 주소는 서비스 티켓에 없음 ✓',correct:true},{n:3,text:'맞음. 클라이언트 ID 포함',correct:false},{n:4,text:'맞음. 유효시간 포함',correct:false}],concept:{title:'📌 서비스 티켓 구성',items:['클라이언트 ID, 클라이언트 네트워크 주소','응용 서버 ID','클라이언트-응용서버 세션키','타임스탬프, 유효기간','응용 서버의 비밀키로 암호화']}}},
{id:489,category:'인증 시스템',number:89,question:'단일 사용자 인증(SSO : Single Sign On)에 대한 설명으로 옳지 않은 것은?',choices:['한 번의 로그인으로 여러 서버에 대한 사용자 인증을 수행한다.','SSO 서버를 통한 통합인증으로 보안성이 높아진다.','공개키 기반 구조(PKI)의 인증서를 사용할 수 있다.','사용자 편의가 향상되고 업무의 효율성이 높아지며 시스템 관리 비용은 감소된다.'],answer:2,explanation:{summary:'SSO는 편의성↑이지만 보안 위험도 있음: SSO 서버 하나가 해킹되면 모든 서비스 접근 가능.',choiceAnalysis:[{n:1,text:'맞음. SSO: 한 번 인증 → 다수 서비스 접근',correct:false},{n:2,text:'틀림. SSO: 보안 집중화 → 단일 장애점 위험. 보안성이 무조건 높아지지 않음 ✓',correct:true},{n:3,text:'맞음. PKI 인증서 기반 SSO 가능',correct:false},{n:4,text:'맞음. 편의성↑, 관리비용↓',correct:false}],concept:{title:'📌 SSO의 장단점',items:['장점: 사용 편의성↑, 패스워드 관리 부담↓','단점: 단일 장애점(SSO 서버 장애→전체 접근 불가)','위험: SSO 계정 탈취 시 전체 서비스 피해','예: Kerberos, SAML, OAuth/OIDC']}}},
{id:490,category:'인증 시스템',number:90,question:'영지식 증명(Zero-Knowledge Proof)에 대한 설명으로 옳지 않은 것은?',choices:['영지식 증명을 사용자 인증에 사용할 경우 주장자와 검증자는 최대 한 번의 메시지 교환을 수행한다.','영지식증명은 검증자가 옳을 수 있음을 추론할 수 있도록 데이터를 제공한다.','영지식 증명의 건실성(Soundness) 조건은 거짓 데이터를 올바른 것으로 입증할 확률이 충분히 낮아야 함을 의미한다.','블록체인 산업에서는 영지식증명이 활용되어 데이터를 숨기고도 유효성을 검증할 방안이 등장하고 있다.'],answer:1,explanation:{summary:'영지식 증명은 여러 번의 메시지 교환(라운드)이 필요합니다. 한 번이 아닙니다.',choiceAnalysis:[{n:1,text:'틀림. 영지식 증명: 여러 라운드의 교환 필요 ✓',correct:true},{n:2,text:'맞음. 검증자에게 정보 제공(비밀 노출 없이)',correct:false},{n:3,text:'맞음. 건실성: 거짓말쟁이가 속일 확률 낮아야',correct:false},{n:4,text:'맞음. zk-SNARK 등 블록체인에서 활용',correct:false}],concept:{title:'📌 영지식 증명 3가지 특성',items:['완전성(Completeness): 참인 경우 검증자가 납득','건실성(Soundness): 거짓 주장을 참으로 속일 수 없음','영지식성(Zero-knowledge): 비밀 정보 노출 없이 증명','반복: 확률적으로 충분한 라운드 반복']}}},
{id:491,category:'인증 시스템',number:91,question:'영지식 증명(Zero-Knowledge proof)과 관련된 내용으로 옳지 않은 것은?',choices:['클라이언트가 서버를 신뢰할 수 없는 상황에서 사용할 수 있다.','사용자는 비밀정보를 서버에게 노출하지 않으면서 비밀정보를 알고있다는 사실을 증명하여 인증된다.','임의의 높은 확률로 비밀을 알고있다는 사실을 입증하는 과정은 수행되지 않는다.','완전성(completeness), 건실성(soundness), 영지식성(zero-knowledgeness) 특성을 가져야 한다.'],answer:3,explanation:{summary:'영지식 증명은 임의의 높은 확률(확률적 증명)로 비밀을 알고 있음을 입증합니다.',choiceAnalysis:[{n:1,text:'맞음. 신뢰 불필요한 검증 가능',correct:false},{n:2,text:'맞음. 비밀 노출 없이 지식 증명',correct:false},{n:3,text:'틀림. 영지식 증명은 높은 확률로 입증하는 과정 수행 ✓',correct:true},{n:4,text:'맞음. 3가지 특성 필요',correct:false}],concept:{title:'📌 영지식 증명 방식',items:['반복적 도전/응답: 매 라운드 1/2 확률로 통과','여러 라운드 후 신뢰도가 1에 수렴','수행됨: 높은 확률로 비밀 보유 입증','미수행: 비밀 자체 노출']}}},
{id:492,category:'인증 시스템',number:92,question:'국내외 대표 포털 사이트, SNS 등의 계정 정보를 이용해 다른 여러 인터넷 서비스를 로그인 또는 회원가입할 수 있는 기능은 무엇인가?',choices:['익명 로그인','소셜 로그인','싱글 로그인','영지식 로그인'],answer:2,explanation:{summary:'소셜 로그인(Social Login): 카카오, 네이버, 구글 계정으로 타 서비스 로그인.',choiceAnalysis:[{n:1,text:'익명 로그인: 신원 없이 접속',correct:false},{n:2,text:'소셜 로그인: 포털/SNS 계정으로 타 서비스 로그인 ✓',correct:true},{n:3,text:'싱글 로그인(SSO): 한 번 인증으로 다수 서비스',correct:false},{n:4,text:'영지식 로그인: 비밀 노출 없이 증명',correct:false}],concept:{title:'📌 소셜 로그인',items:['OAuth 2.0 기반으로 구현','카카오, 네이버, 구글, 페이스북 등의 계정 활용','사용자: 별도 회원가입 불필요','서비스: 이메일/프로필 등 기본 정보만 받음']}}},
{id:493,category:'인증 시스템',number:93,question:'사용자들이 비밀번호를 제공하지 않고 다른 웹사이트상의 자신들의 정보에 대해 웹사이트나 애플리케이션의 접근 권한을 부여할 수 있는 공통적인 수단으로 사용되는 것은?',choices:['RADIUS','OAuth','SSO','DIAMETER'],answer:2,explanation:{summary:'OAuth: 비밀번호 제공 없이 제3자에게 접근 권한 부여하는 표준 프로토콜.',choiceAnalysis:[{n:1,text:'RADIUS: 원격 접근 인증 프로토콜(AAA)',correct:false},{n:2,text:'OAuth: 권한 위임 프레임워크 ✓',correct:true},{n:3,text:'SSO: 통합 인증',correct:false},{n:4,text:'DIAMETER: RADIUS의 후속 AAA 프로토콜',correct:false}],concept:{title:'📌 OAuth 2.0',items:['권한 위임: 비밀번호 제공 없이 접근 권한 부여','액세스 토큰: 제한된 권한의 임시 인증 정보','OpenID Connect: OAuth 2.0 + 사용자 인증','예: Google 캘린더를 다른 앱에서 읽기 권한']}}},
{id:494,category:'접근제어',number:94,question:'다음 <보기>의 설명에 해당하는 용어는?',boxLabel:'<보기>',boxText:'∘시스템 접근을 허락받은 후 그 시스템의 기능 또는 서비스를 이용할 수 있도록 필요한 권한을 부여한다.\n∘특정한 프로그램, 데이터, 시스템 서비스 등에 접근할 수 있는 권한이 주어지는 것을 의미한다.',choices:['식별(identification)','인증(authentication)','인가(authorization)','세션(session)'],answer:3,explanation:{summary:'"권한 부여", "접근할 수 있는 권한" → 인가(Authorization).',choiceAnalysis:[{n:1,text:'식별: "나는 누구"라고 주장',correct:false},{n:2,text:'인증: "나는 누구"를 검증',correct:false},{n:3,text:'인가: 접근 권한 부여 ✓',correct:true},{n:4,text:'세션: 연결 상태 유지',correct:false}],concept:{title:'📌 접근 제어 3단계',items:['식별(Identification): 사용자가 자신을 주장','인증(Authentication): 주장한 신원 확인','인가(Authorization): 접근 권한 부여','감사(Accounting): 접근 활동 기록']}}},
{id:495,category:'접근제어',number:95,question:'권한 부여의 의미로서 사용자가 응용 시스템에 대한 사용 권한을 부여받는 것을 무엇이라 하는가?',choices:['인증(authentication)','인가(authorization)','식별(identification)','서명(signature)'],answer:2,explanation:{summary:'인가(Authorization): 사용 권한 부여.',choiceAnalysis:[{n:1,text:'인증: 신원 확인',correct:false},{n:2,text:'인가: 사용 권한 부여 ✓',correct:true},{n:3,text:'식별: 신원 주장',correct:false},{n:4,text:'서명: 전자서명',correct:false}],concept:{title:'📌 인증 vs 인가',items:['인증: 누구인지 확인(Authentication)','인가: 무엇을 할 수 있는지 결정(Authorization)','예: 로그인=인증, 파일 읽기 허가=인가']}}},
