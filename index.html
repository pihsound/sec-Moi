{id:496,category:'접근제어',number:96,question:'데이터 객체들을 비밀 등급으로 분류하고 사용자들에게 여러 허가 등급을 지정하여 양자 간의 관계에 따라 판독이나 기록에 제한을 주는 접근제어는?',choices:['강제적 접근제어(mandatory access control)','역할기반 접근제어(role-based access control)','임의적 접근제어(discretionary access control)','래티스 기반 접근제어(lattice-based access control)'],answer:1,explanation:{summary:'"비밀 등급+허가 등급"으로 판독/기록 제한 → MAC(강제적 접근제어).',choiceAnalysis:[{n:1,text:'MAC: 보안 레이블/허가증 기반 강제 접근 제어 ✓',correct:true},{n:2,text:'RBAC: 역할 기반 접근',correct:false},{n:3,text:'DAC: 소유자 재량 접근',correct:false},{n:4,text:'래티스 기반: MAC의 구현 방식 중 하나',correct:false}],concept:{title:'📌 MAC(강제적 접근제어)',items:['보안 레이블(Security Label): 객체의 비밀 등급','보안 허가증(Security Clearance): 주체의 허가 등급','중앙 관리자가 정책 결정, 소유자 변경 불가','군사·정부 기관에서 주로 사용','모델: BLP(기밀성), Biba(무결성)']}}},
{id:497,category:'접근제어',number:97,question:'강제적 접근제어(Mandatory Access Control)에 대한 설명으로 옳지 않은 것은?',choices:['각 주체가 각 개체에 접근할 때마다 사전에 규정된 규칙과 비교하여 그 규칙을 만족하는 주체에게만 접근 권한을 부여한다.','어떤 주체가 특정 객체에 접근 시 양자의 보안 레벨에 기초하여 낮은 수준의 주체가 높은 수준의 객체의 정보에 접근하는 것을 제한한다.','정보의 기밀성이 중요시되는 환경에서 사용된다.','주체의 식별자만을 근거로 삼고 있어 하나의 주체 대 객체 단위로 접근 제한을 설정할 수 있다.'],answer:4,explanation:{summary:'DAC(임의적 접근제어)의 설명. MAC은 보안 레이블 기반이며 주체 대 객체 단위 세밀한 설정 불가.',choiceAnalysis:[{n:1,text:'맞음. MAC: 규칙 기반 접근 제어',correct:false},{n:2,text:'맞음. 낮은 등급 주체는 높은 등급 객체 접근 금지',correct:false},{n:3,text:'맞음. 기밀성 강조 환경(군사)',correct:false},{n:4,text:'틀림. 주체 식별자 기반+세밀한 설정은 DAC의 특성 ✓',correct:true}],concept:{title:'📌 MAC vs DAC 비교',items:['MAC: 보안 레이블/허가증 기반, 중앙 통제, 세밀한 개별 설정 어려움','DAC: 주체 신원 기반, 소유자 통제, 세밀한 개별 접근 설정 가능','MAC: 군사/정부 / DAC: 일반 OS(Unix/Windows 파일 권한)']}}},
{id:498,category:'접근제어',number:98,question:'다음 중 임의적 접근제어 정책에 해당하는 설명으로 옳은 것은?',choices:['주체 또는 그들이 속한 그룹의 신분에 근거해 객체에 대한 접근을 제한한다.','강력한 중앙 집중 접근제어를 수행할 수 있다.','정보에 대한 비밀 등급이 정해지고, 해당 등급에 대한 접근권한이 주체에 부여되면 모든 주체와 객체 사이에 동일한 권한이 부여된다.','조직의 규칙에 의해 역할과 객체의 관계가 정립된다.'],answer:1,explanation:{summary:'DAC(임의적 접근제어): 주체의 신원이나 그룹에 기반하여 소유자가 접근 권한 결정.',choiceAnalysis:[{n:1,text:'DAC: 주체 신원/그룹 기반 접근 제한 ✓',correct:true},{n:2,text:'강력한 중앙 집중: MAC의 특성',correct:false},{n:3,text:'비밀 등급: MAC의 특성',correct:false},{n:4,text:'역할 기반: RBAC의 특성',correct:false}],concept:{title:'📌 DAC(임의적 접근제어)',items:['소유자 재량으로 접근 권한 설정','주체 신원/그룹 기반','구현: ACL(Access Control List)','예: 유닉스 파일 권한(rwx), Windows NTFS']}}},
{id:499,category:'접근제어',number:99,question:'다음 <보기>의 설명에 해당하는 접근 제어는 무엇인가?',boxLabel:'<보기>',boxText:'∘ 주체와 객체가 어떻게 상호작용하는지를 중앙의 관리자가 관리한다.\n∘ 조직 내에서의 사용자가 가진 직무를 근거로 객체에 대한 접근 권한을 지정, 허용한다.\n∘ 주체가 접근할 수 있는 상위 경계부터 하위 경계를 설정하는 래티스 기반 접근 제어(Lattice Based Access Control)를 포함한다.',choices:['임의적 접근제어(Discretionary Access Control)','강제적 접근제어(Mandatory Access Control)','역할 기반 접근제어(Role-Based Access Control)','비강제적 기반 접근제어(Non-Mandatory Access Control)'],answer:3,explanation:{summary:'"직무를 근거로 접근 권한 부여" → RBAC(역할 기반 접근제어).',choiceAnalysis:[{n:1,text:'DAC: 소유자 신원 기반',correct:false},{n:2,text:'MAC: 보안 레이블 기반',correct:false},{n:3,text:'RBAC: 직무/역할 기반 접근 제어 ✓',correct:true},{n:4,text:'Non-MAC: 존재하지 않는 분류',correct:false}],concept:{title:'📌 RBAC(역할 기반 접근제어)',items:['역할 단위로 권한 관리(사용자 직접 관리 아닌 역할에 권한)','예: 관리자/일반직원/감사자 역할','직원 역할 변경 시 역할만 바꾸면 됨','대규모 조직에 적합, 최소 권한 원칙 적용 용이']}}},
{id:500,category:'접근제어',number:100,question:'접근제어 정책에 대한 설명으로 옳지 않은 것은?',choices:['임의적 접근통제(DAC)는 시스템 중앙 관리자만이 시스템 객체의 보안레벨과 사용자의 보안등급을 수정할 수 있다.','강제적 접근통제(MAC)는 하나의 주체 대 객체 단위로 접근 권한을 설정할 수 없다.','규칙기반 접근통제(Rule-BAC)는 각 주체에게 허용된 접근 수준과 객체에게 부여된 허용등급에 근거하여 특정한 규칙을 기초로 객체에 대한 접근 통제를 허용한다.','역할기반 접근통제(Role-BAC)는 직무 순환이 빈번하게 발생하고, 보호해야 할 자산과 사원수가 많은 대규모 조직에 적합하다.'],answer:1,explanation:{summary:'보안레벨/허가증 수정은 MAC(강제적)의 특성. DAC에서는 소유자가 접근 권한 수정 가능.',choiceAnalysis:[{n:1,text:'틀림. 이것은 MAC의 특성. DAC는 소유자가 권한 결정 ✓',correct:true},{n:2,text:'맞음. MAC은 세밀한 개별 설정 어려움',correct:false},{n:3,text:'맞음. 규칙 기반(MAC의 변형)',correct:false},{n:4,text:'맞음. RBAC: 대규모 조직에 적합',correct:false}],concept:{title:'📌 접근제어 정책 비교',items:['DAC: 소유자가 권한 결정(재량 기반)','MAC: 중앙 관리자가 보안 레이블/허가증 관리','RBAC: 직무 역할 기반','Rule-BAC: MAC과 유사, 규칙(Rule) 기반']}}},
{id:501,category:'접근제어',number:101,question:'다음 각 접근제어(access control)에 대한 설명으로 옳은 것은?',choices:['역할 기반 접근제어 - 접근을 요청하는 자의 신원과 접근 규칙에 기반한다.','강제적 접근제어 - 보안 레이블과 보안 허가증의 비교에 기반한다.','속성 기반 접근제어 - 시스템 내에서 사용자가 갖는 역할과 그 역할에 대한 규칙들에 기반한다.','임의적 접근제어 - 사용자, 접근되는 자원, 현재 환경 조건의 속성에 기반한다.'],answer:2,explanation:{summary:'MAC: 보안 레이블(객체)과 보안 허가증(주체)을 비교하여 접근 결정.',choiceAnalysis:[{n:1,text:'신원+접근 규칙: DAC의 특성',correct:false},{n:2,text:'MAC: 보안 레이블+보안 허가증 비교 ✓',correct:true},{n:3,text:'역할+규칙: RBAC의 특성',correct:false},{n:4,text:'속성(사용자,자원,환경): ABAC의 특성',correct:false}],concept:{title:'📌 접근제어 기반 정리',items:['DAC: 주체 신원 기반','MAC: 보안 레이블/허가증 기반','RBAC: 역할/직무 기반','ABAC: 다양한 속성(사용자+자원+환경) 기반']}}},
{id:502,category:'접근제어',number:102,question:'보안 모델(Security Model)에 대한 설명으로 옳지 않은 것은?',choices:['시스템 보안을 위한 규칙 준수 규정과 주체의 객체 접근 허용 범위를 규정한다.','벨 라파듈라 모델은 허가되지 않은 방식의 접근을 방지한다.','비바 모델은 데이터 무결성에 중심을 두어 금융업계에서 필요하다.','클락-윌슨 모델은 기밀성에 중심을 두어 군대와 같은 조직에서 필요하다.'],answer:4,explanation:{summary:'클락-윌슨은 무결성 모델. BLP(벨-라파듈라)가 기밀성 중심.',choiceAnalysis:[{n:1,text:'맞음. 보안 모델의 역할',correct:false},{n:2,text:'맞음. BLP: 기밀성 보호, 불법 접근 방지',correct:false},{n:3,text:'맞음. Biba: 무결성 중심, 금융업 적합',correct:false},{n:4,text:'틀림. Clark-Wilson: 무결성 모델. 기밀성은 BLP ✓',correct:true}],concept:{title:'📌 보안 모델 요약',items:['BLP(Bell-LaPadula): 기밀성, 군사/정부','Biba: 무결성, 금융/상업','Clark-Wilson: 상업적 무결성(트랜잭션 기반)','Chinese Wall: 이해 충돌 방지(컨설팅)']}}},
{id:503,category:'접근제어',number:103,question:'다음 중 상위 등급의 주체가 하위 등급의 객체에 정보의 쓰기를 수행할 수 없도록 하는 속성(no write-down 속성)을 가진 보안 모델은?',choices:['만리장성 모델','Biba 모델','Clark-Wilson 모델','Bell-LaPadula 모델'],answer:4,explanation:{summary:'BLP의 *-속성(star property): 상위 주체가 하위 객체에 쓰기 금지(No Write Down).',choiceAnalysis:[{n:1,text:'Chinese Wall: 이해 충돌 방지',correct:false},{n:2,text:'Biba: 무결성 모델(No Read Down, No Write Up)',correct:false},{n:3,text:'Clark-Wilson: 트랜잭션 기반 무결성',correct:false},{n:4,text:'BLP: *-속성=No Write Down ✓',correct:true}],concept:{title:'📌 BLP 모델 두 가지 속성',items:['단순 보안 속성(SS Property): No Read Up (낮은 허가증→높은 등급 읽기 금지)','*-속성(Star Property): No Write Down (높은 허가증→낮은 등급 쓰기 금지)','목적: 높은 등급 정보가 낮은 등급으로 유출되지 않도록']}}},
{id:504,category:'접근제어',number:104,question:'벨 라파듈라(Bell-LaPadula) 모델이 기밀성을 확보하기 위해 갖는 규칙으로 옳지 않은 것은?',choices:['상위 문서 읽기 금지','하위 문서 읽기 허락','상위 문서 쓰기 금지','하위 문서 쓰기 금지'],answer:3,explanation:{summary:'BLP: 상위 문서에 쓰기는 허용(정보가 위로 올라가는 것은 괜찮음). 상위 읽기가 금지.',choiceAnalysis:[{n:1,text:'맞음. No Read Up: 자신보다 높은 등급 읽기 금지',correct:false},{n:2,text:'맞음. 자신보다 낮은 등급은 읽기 가능',correct:false},{n:3,text:'틀림. 상위 문서 쓰기는 가능(정보가 위로 이동해도 OK) ✓',correct:true},{n:4,text:'맞음. No Write Down: 자신보다 낮은 등급 쓰기 금지',correct:false}],concept:{title:'📌 BLP 읽기/쓰기 규칙',items:['No Read Up: 허가증 < 등급 → 읽기 금지','No Write Down: 허가증 > 등급 → 쓰기 금지','Read Down 허용: 낮은 등급 문서 읽기 가능','Write Up 허용: 높은 등급에 쓰기 가능']}}},
{id:505,category:'접근제어',number:105,question:'다음 <보기>는 어느 보안 모델의 속성에 해당하는 설명인가?',boxLabel:'<보기>',boxText:'∘ 주체의 보안 등급이 객체의 비밀 등급보다 낮을 경우 객체에 쓸 수 있다.\n∘ 주체의 보안 등급이 객체의 비밀 등급보다 높을 경우 객체에 쓸 수 없다.',choices:['BLP 모델의 단순 속성','BLP 모델의 *-속성','Biba 모델의 단순 속성','Biba 모델의 *-속성'],answer:2,explanation:{summary:'"높은 등급 주체가 낮은 등급에 쓰기 금지" = BLP의 *-속성(No Write Down).',choiceAnalysis:[{n:1,text:'BLP 단순 속성: No Read Up (읽기 제한)',correct:false},{n:2,text:'BLP *-속성: No Write Down(쓰기 제한) ✓',correct:true},{n:3,text:'Biba 단순 속성: No Read Down',correct:false},{n:4,text:'Biba *-속성: No Write Up',correct:false}],concept:{title:'📌 BLP vs Biba 속성 비교',items:['BLP 단순: No Read Up (높은 등급 읽기 금지)','BLP *: No Write Down (낮은 등급 쓰기 금지)','Biba 단순: No Read Down (낮은 무결성 읽기 금지)','Biba *: No Write Up (높은 무결성에 쓰기 금지)']}}},
{id:506,category:'접근제어',number:106,question:'다음 <보기> 중 비바(Biba) 모델의 권한에 대한 설명으로 옳은 것만을 고른 것은?',boxLabel:'<보기>',boxText:'ㄱ. 주체의 레벨보다 높은 무결성 레벨의 문서를 읽을 수 없다.\nㄴ. 주체의 레벨보다 낮은 무결성 레벨의 문서를 읽을 수 없다.\nㄷ. 주체의 레벨보다 높은 무결성 레벨의 문서를 쓸 수 없다.\nㄹ. 주체의 레벨보다 낮은 무결성 레벨의 문서를 쓸 수 없다.',choices:['ㄱ, ㄷ','ㄱ, ㄹ','ㄴ, ㄷ','ㄴ, ㄹ'],answer:3,explanation:{summary:'Biba: No Read Down(낮은 무결성 읽기 금지=ㄴ), No Write Up(높은 무결성 쓰기 금지=ㄷ).',boxAnalysis:[{label:'ㄱ',mean:'틀림. 높은 무결성 읽기는 허용'},{label:'ㄴ',mean:'맞음. No Read Down: 낮은 무결성 읽기 금지'},{label:'ㄷ',mean:'맞음. No Write Up: 높은 무결성에 쓰기 금지'},{label:'ㄹ',mean:'틀림. 낮은 무결성에 쓰기는 허용'}],choiceAnalysis:[{n:1,text:'ㄱ은 틀림(허용), ㄷ은 맞음',correct:false},{n:2,text:'ㄹ은 틀림(허용)',correct:false},{n:3,text:'ㄴ(No Read Down), ㄷ(No Write Up) ✓',correct:true},{n:4,text:'ㄹ은 틀림',correct:false}],concept:{title:'📌 Biba 모델 규칙',items:['No Read Down: 주체보다 낮은 무결성 읽기 금지','No Write Up: 주체보다 높은 무결성에 쓰기 금지','목적: 낮은 신뢰도 데이터가 높은 무결성 객체를 오염시키지 않도록']}}},
{id:507,category:'접근제어',number:107,question:'BLP 모델에 대한 설명으로 옳지 않은 것은?',choices:['BLP 모델은 보안 운영체제의 개발에서 중요한 역할은 수행한다.','BLP 모델은 기밀성만을 다루며, 무결성은 다루지 않는다.','BLP 모델은 접근 권한의 수정에 대한 정책이 있다.','BLP 모델은 비밀채널(convert channel)을 포함한다.'],answer:3,explanation:{summary:'BLP 모델은 접근 권한 수정에 대한 정책이 없음(정적 모델). 이것이 단점 중 하나.',choiceAnalysis:[{n:1,text:'맞음. BLP: 보안 OS 개발의 이론적 기반',correct:false},{n:2,text:'맞음. BLP: 기밀성만. 무결성=Biba',correct:false},{n:3,text:'틀림. BLP는 권한 수정 정책 없음 ✓',correct:true},{n:4,text:'맞음. BLP의 약점: 비밀 채널을 통한 정보 유출 가능',correct:false}],concept:{title:'📌 BLP 모델의 한계',items:['무결성 미지원: 기밀성만 다룸','비밀 채널(Covert Channel): 부채널로 정보 유출 가능','동적 권한 변경 미지원','내부자 위협: 같은 보안 레벨 내 통제 미흡']}}},
{id:508,category:'접근제어',number:108,question:'다음 설명 중 클락-윌슨(clark-wilson) 모델의 대한 설명에 해당하는 것은?',choices:['주체는 데이터를 보다 낮은 보안 수준의 객체에 기록할 수 없다.','주체는 보다 낮은 무결성의 정보를 읽을 수 없다.','주체는 허가된 프로그램을 통해 객체에 접근할 수 있다.','이해가 충돌되는 회사 간의 정보 흐름이 일어나지 않도록 한다.'],answer:3,explanation:{summary:'Clark-Wilson: 주체는 직접 객체에 접근 불가. 허가된 프로그램(TP)을 통해서만 접근.',choiceAnalysis:[{n:1,text:'BLP의 No Write Down 속성',correct:false},{n:2,text:'Biba의 No Read Down 속성',correct:false},{n:3,text:'Clark-Wilson: 프로그램(TP) 통해서만 접근 ✓',correct:true},{n:4,text:'Chinese Wall 모델',correct:false}],concept:{title:'📌 Clark-Wilson 모델',items:['UDI(Uncontrolled Data Item): 비인증 데이터','CDI(Constrained Data Item): 무결성 보호 데이터','IVP(Integrity Verification Procedure): 무결성 검증 절차','TP(Transformation Procedure): 허가된 프로그램','주체→TP→CDI 만 가능(직접 접근 불가)']}}},
{id:509,category:'접근제어',number:109,question:'클락-윌슨(clark-wilson) 모델에 대한 설명으로 옳지 않은 것은?',choices:['사용자의 식별과 인증은 필수적이다.','사용자는 데이터를 조작하기 위한 모든 권한을 가져야 한다.','데이터 항목은 지정된 프로그램 집합에 의해서만 조작될 수 있고 사용자는 데이터 항목이 아닌 프로그램에 접근한다.','데이터에 대한 인가되지 않은 수정, 범죄 및 오류 등을 방지하는 목적을 갖는다.'],answer:2,explanation:{summary:'Clark-Wilson의 최소 권한 원칙: 사용자는 필요한 최소한의 권한만 가짐.',choiceAnalysis:[{n:1,text:'맞음. 식별+인증 필수',correct:false},{n:2,text:'틀림. 최소 권한: 모든 권한이 아닌 필요한 권한만 ✓',correct:true},{n:3,text:'맞음. 허가된 프로그램(TP)을 통해서만 데이터 접근',correct:false},{n:4,text:'맞음. 무결성 보호 목적',correct:false}],concept:{title:'📌 Clark-Wilson 상업적 무결성',items:['최소 권한(Least Privilege): 필요한 권한만','직무 분리(Separation of Duty): 한 사람이 모든 과정 불가','감사(Auditing): 모든 접근 기록','은행 등 금융기관에 적합']}}},
{id:510,category:'접근제어',number:110,question:'다음 <보기>의 내용과 관련있는 보안 모델은?',boxLabel:'<보기>',boxText:'∘두 개의 경쟁회사인 회사A와 회사B가 동일한 은행에 계정을 갖고 있다고 가정한다.\n∘회사A와 은행을 다루는 분석가-1은 회사A에 대한 비밀정보를 이용하여 은행 포트폴리오를 수정한다.\n∘회사B와 은행을 다루는 분석가-2는 경쟁자의 비즈니스에 대한 정보에 접근할 수 있게 된다.',choices:['BLP 모델','Biba 모델','Chinese Wall 모델','Clark-Wilson 모델'],answer:3,explanation:{summary:'"경쟁회사 간 정보 유출", "이해 충돌" → Chinese Wall(만리장성) 모델.',choiceAnalysis:[{n:1,text:'BLP: 기밀성 보호',correct:false},{n:2,text:'Biba: 무결성 보호',correct:false},{n:3,text:'Chinese Wall: 이해 충돌 방지(경쟁회사 정보 접근 제한) ✓',correct:true},{n:4,text:'Clark-Wilson: 상업적 무결성',correct:false}],concept:{title:'📌 Chinese Wall(만리장성) 모델',items:['Brewer-Nash 모델이라고도 함','목적: 이해 충돌(Conflict of Interest) 방지','컨설팅 업계: 경쟁사 고객 동시 담당 금지','규칙: 이미 접근한 회사의 경쟁사 정보 접근 금지']}}},
{id:511,category:'접근제어',number:111,question:'만리장성(Chinese-Wall/Brewer-Nash) 보안 모델에 대한 설명으로 옳은 것은?',choices:['허가받지 않은 주체 또는 권한부여된 주체에 의한 객체의 허가받지 않은 수정을 방지한다.','객체의 기밀성을 유지하는데 중점을 두며 객체의 무결성 또는 가용성의 측면을 대처하지 않는다.','분석가가 다양한 고객(회사)를 다룰 때 이해 상충(conflict of interest)이 발생하지 않는다는 것을 보장해야 하는 컨설턴트 비즈니스에서의 접근 규칙을 모델링한다.','특정 분류 수준에 있는 주체는 그보다 상위 분류 수준을 가지는 데이터를 읽을 수 없다.'],answer:3,explanation:{summary:'Chinese Wall: 컨설팅 업계에서 이해 충돌 방지를 위한 접근 규칙 모델링.',choiceAnalysis:[{n:1,text:'Clark-Wilson의 설명',correct:false},{n:2,text:'BLP의 설명',correct:false},{n:3,text:'Chinese Wall: 이해 충돌 방지, 컨설팅 비즈니스 ✓',correct:true},{n:4,text:'BLP의 단순 속성(No Read Up)',correct:false}],concept:{title:'📌 Chinese Wall 핵심',items:['컨설턴트: 경쟁사 고객 동시 담당 시 정보 차단','이미 접근한 회사와 이해 충돌되는 회사 접근 금지','동적 정책: 처음엔 어디나 접근 가능, 이후 제한','예: 회계법인, 컨설팅, 투자은행']}}}
].filter(Boolean);

// ─── 상수 ─────────────────────────────────────────────
const SAVE_KEY='infosec_all_v1';
const CAT_DATE={'정보시스템':'1/9(금)','암호시스템':'1/9(금)','네트워크 보안':'1/23(금)','메시지 무결성':'1/16(금)','인증 시스템':'1/16(금)','접근제어':'1/16(금)'};

// ─── 상태 ──────────────────────────────────────────────
let state={
  idx:0,           // 현재 인덱스 (ids 배열 내)
  ids:[],          // 현재 보여줄 문제 id 목록
  prog:{},         // {id: 'ok'|'ng'|null}
  bm:new Set(),    // 북마크된 id
  cfg:{cat:'all',st:'all',shuffle:false}
};

// ─── 저장/로드 ─────────────────────────────────────────
function save(){
  const d={prog:state.prog,bm:[...state.bm],cfg:state.cfg,lastId:state.ids[state.idx]};
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(d));}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');
    if(d.prog) state.prog=d.prog;
    if(d.bm) state.bm=new Set(d.bm);
    if(d.cfg) state.cfg={...state.cfg,...d.cfg};
    return d.lastId||null;
  }catch(e){return null;}
}

// ─── 필터링 + 순서 ────────────────────────────────────
function buildList(){
  let list=QUIZ_DATA.filter(q=>{
    if(state.cfg.cat!=='all'&&q.category!==state.cfg.cat) return false;
    if(state.cfg.st==='unsolved'&&state.prog[q.id]) return false;
    if(state.cfg.st==='wrong'&&state.prog[q.id]!=='ng') return false;
    if(state.cfg.st==='bookmarked'&&!state.bm.has(q.id)) return false;
    return true;
  });
  if(state.cfg.shuffle) list=[...list].sort(()=>Math.random()-.5);
  state.ids=list.map(q=>q.id);
}

// ─── 헤더 업데이트 ────────────────────────────────────
function updateHeader(){
  const total=state.ids.length;
  const solved=Object.keys(state.prog).filter(id=>state.ids.includes(+id)&&state.prog[+id]).length;
  const ok=Object.keys(state.prog).filter(id=>state.ids.includes(+id)&&state.prog[+id]==='ok').length;
  const ng=solved-ok;
  document.getElementById('ss').textContent=solved;
  document.getElementById('st').textContent=total;
  document.getElementById('sc').textContent=ok;
  document.getElementById('sw').textContent=ng;
  document.getElementById('sb').textContent=[...state.bm].filter(id=>state.ids.includes(id)).length;
  const pos=state.idx+1;
  document.getElementById('ptxt').textContent=`문제 ${pos} / ${total}`;
  const pct=total?Math.round(solved/total*100):0;
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('prev').disabled=state.idx<=0;
  document.getElementById('next').disabled=state.idx>=state.ids.length-1;
}

// ─── 문제 렌더 ────────────────────────────────────────
function renderQ(){
  const qa=document.getElementById('qa');
  if(!state.ids.length){
    qa.innerHTML='<div class="empty">😅 해당 조건의 문제가 없습니다.</div>';
    updateHeader();return;
  }
  const id=state.ids[state.idx];
  const q=QUIZ_DATA.find(x=>x.id===id);
  const done=state.prog[q.id];
  const isBm=state.bm.has(q.id);
  const dateLabel=CAT_DATE[q.category]||'';

  let choicesHtml=q.choices.map((c,i)=>{
    let cls='choice';
    if(done){
      if(i+1===q.answer) cls+=' ok';
      else if(i+1===state.prog[q.id+'_picked']) cls+=' ng';
    }
    return `<button class="${cls}" data-n="${i+1}" ${done?'disabled':''}><span class="cnum">${'①②③④'[i]}</span><span class="ctxt">${c}</span></button>`;
  }).join('');

  let expHtml='';
  if(done){
    const e=q.explanation;
    const correct=done==='ok';
    expHtml=`<div class="exp">
      <span class="res-tag ${correct?'ok':'ng'}">${correct?'✅ 정답!':'❌ 오답'}</span>
      <div class="esec"><p>${e.summary||''}</p></div>`;
    if(e.boxAnalysis){
      expHtml+=`<div class="esec" style="margin-top:12px"><h4>보기 분석</h4>`;
      e.boxAnalysis.forEach(b=>{expHtml+=`<div class="eci"><span class="n">${b.label}</span><span>${b.mean}</span></div>`;});
      expHtml+='</div>';
    }
    if(e.choiceAnalysis){
      expHtml+=`<div class="esec" style="margin-top:12px"><h4>선택지 해설</h4>`;
      e.choiceAnalysis.forEach(ca=>{
        expHtml+=`<div class="eci${ca.correct?' ans':''}"><span class="n">${'①②③④'[ca.n-1]}</span><span>${ca.text}</span></div>`;
      });
      expHtml+='</div>';
    }
    if(e.concept){
      expHtml+=`<div class="econcept"><h4>${e.concept.title||'📌 핵심 개념'}</h4><ul>`;
      (e.concept.items||[]).forEach(it=>{expHtml+=`<li>${it}</li>`;});
      expHtml+='</ul></div>';
    }
    expHtml+='</div>';
  }

  qa.innerHTML=`<div class="qcard">
    <div class="qhdr">
      <div class="qmeta">
        <span class="qnum">${q.number}번</span>
        <span class="qbadge" data-cat="${q.category}">${q.category}</span>
        <span class="qdate">${dateLabel}</span>
      </div>
      <button class="bmbtn${isBm?' on':''}" data-id="${q.id}" title="북마크">⭐</button>
    </div>
    <p class="qtxt">${q.question}</p>
    ${q.boxLabel?`<div class="qbox"><div class="qbox-lbl">${q.boxLabel}</div>${q.boxText}</div>`:''}
    <div class="choices">${choicesHtml}</div>
    ${expHtml}
  </div>`;
  updateHeader();
}

// ─── 이벤트 ───────────────────────────────────────────
document.getElementById('qa').addEventListener('click',e=>{
  const btn=e.target.closest('.choice');
  const bm=e.target.closest('.bmbtn');
  if(btn&&!btn.disabled){
    const id=state.ids[state.idx];
    const q=QUIZ_DATA.find(x=>x.id===id);
    const n=+btn.dataset.n;
    state.prog[q.id]=n===q.answer?'ok':'ng';
    state.prog[q.id+'_picked']=n;
    save(); renderQ();
    // 정답이면 잠시 후 자동 이동
    if(n===q.answer&&state.idx<state.ids.length-1){
      setTimeout(()=>{state.idx++;renderQ();},700);
    }
  }
  if(bm){
    const id=+bm.dataset.id;
    if(state.bm.has(id)) state.bm.delete(id); else state.bm.add(id);
    save(); renderQ();
  }
});

document.getElementById('prev').addEventListener('click',()=>{if(state.idx>0){state.idx--;renderQ();}});
document.getElementById('next').addEventListener('click',()=>{if(state.idx<state.ids.length-1){state.idx++;renderQ();}});

document.addEventListener('keydown',e=>{
  if(['1','2','3','4'].includes(e.key)&&!e.ctrlKey&&!e.metaKey){
    const btn=document.querySelector(`.choice[data-n="${e.key}"]:not(:disabled)`);
    if(btn) btn.click();
  }
  if(e.key==='ArrowLeft') document.getElementById('prev').click();
  if(e.key==='ArrowRight') document.getElementById('next').click();
});

document.getElementById('jb').addEventListener('click',()=>{
  const v=+document.getElementById('ji').value;
  // 번호로 문제 찾기 (현재 필터에 있는 문제 중)
  const q=QUIZ_DATA.find(x=>x.number===v&&state.ids.includes(x.id));
  if(q){const i=state.ids.indexOf(q.id);if(i>=0){state.idx=i;renderQ();}}
  else{
    // 전체에서 찾아서 필터 해제 후 이동
    const all=QUIZ_DATA.filter(x=>x.number===v);
    if(all.length){
      toast(`${v}번 문제로 이동합니다`);
      state.idx=state.ids.indexOf(all[0].id);
      if(state.idx<0){state.cfg.cat='all';state.cfg.st='all';buildList();state.idx=state.ids.indexOf(all[0].id);}
      renderQ();
    }
  }
});

document.getElementById('fcat').addEventListener('change',e=>{
  state.cfg.cat=e.target.value;
  buildList();state.idx=0;save();renderQ();
  document.getElementById('fcat').value=e.target.value;
});
document.getElementById('fst').addEventListener('change',e=>{
  state.cfg.st=e.target.value;
  buildList();state.idx=0;save();renderQ();
});
document.getElementById('bshuffle').addEventListener('click',e=>{
  state.cfg.shuffle=!state.cfg.shuffle;
  e.target.classList.toggle('active',state.cfg.shuffle);
  buildList();state.idx=0;save();renderQ();
});
document.getElementById('breset').addEventListener('click',()=>{
  if(!confirm('진도를 초기화할까요?')) return;
  state.prog={};state.bm=new Set();
  save();buildList();state.idx=0;renderQ();
  toast('초기화 완료!');
});

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ─── 초기화 ───────────────────────────────────────────
(()=>{
  const lastId=load();
  buildList();
  if(lastId){
    const i=state.ids.indexOf(lastId);
    if(i>=0) state.idx=i;
  }
  document.getElementById('fcat').value=state.cfg.cat;
  document.getElementById('fst').value=state.cfg.st;
  document.getElementById('bshuffle').classList.toggle('active',state.cfg.shuffle);
  renderQ();
})();
</script>
</body>
</html>
